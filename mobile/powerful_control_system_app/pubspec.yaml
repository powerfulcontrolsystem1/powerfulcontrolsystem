name: powerful_control_system_app
description: Aplicacion oficial de Powerful Control System para Android e iPhone.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/pcs_app_icon.png

flutter_launcher_icons:
  image_path: assets/branding/pcs_app_icon.png
  android: true
  ios: true
  remove_alpha_ios: true
