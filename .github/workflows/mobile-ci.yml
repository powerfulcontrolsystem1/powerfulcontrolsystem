name: Mobile Flutter CI

on:
  push:
    branches:
      - main
      - 'feature/mobile-**'
      - 'codex/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Flutter Android validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Restore packages and validate
        working-directory: mobile/powerful_control_system_app
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter analyze
          flutter test
          flutter build apk --debug
      - name: Upload Android candidates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-mobile-candidates
          path: |
            mobile/powerful_control_system_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  ios:
    name: Flutter iOS validation
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Validate iOS compilation without signing
        working-directory: mobile/powerful_control_system_app
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter analyze
          flutter test
          flutter build ios --debug --no-codesign
