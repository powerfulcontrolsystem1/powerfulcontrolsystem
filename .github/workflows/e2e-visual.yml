name: E2E Visual QA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL base a probar"
        required: true
        default: "https://staging.powerfulcontrolsystem.com"
      empresa_id:
        description: "Empresa de prueba"
        required: true
        default: "7"
      max_pages:
        description: "Limite de paginas, 0 para todas"
        required: true
        default: "40"

permissions:
  contents: read

jobs:
  visual:
    name: Buttons, layout and print evidence
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run button and layout QA
        env:
          PCS_QA_BASE_URL: ${{ inputs.base_url || 'https://staging.powerfulcontrolsystem.com' }}
          PCS_QA_EMPRESA_ID: ${{ inputs.empresa_id || '7' }}
          PCS_QA_EMAIL: ${{ secrets.PCS_QA_EMAIL }}
          PCS_QA_PASSWORD: ${{ secrets.PCS_QA_PASSWORD }}
          PCS_QA_MAX_PAGES: ${{ inputs.max_pages || '40' }}
          PCS_QA_VIEWPORTS: desktop,mobile
        run: node tools/qa_e2e_buttons.cjs

      - name: Run role matrix audit
        run: node tools/qa_roles_matrix.mjs --out documentos/reportes_profesionales

      - name: Run print format QA
        run: node tools/qa_print_formats.cjs

      - name: Run payment matrix audit
        run: node tools/payment_matrix_audit.mjs --out documentos/reportes_profesionales

      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-visual-evidence
          path: |
            test_runs/
            documentos/reportes_profesionales/
          if-no-files-found: ignore
