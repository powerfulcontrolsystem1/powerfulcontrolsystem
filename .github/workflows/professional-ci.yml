name: Professional CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Preflight, audits and Docker config
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Professional preflight
        shell: pwsh
        run: ./scripts/profesional_preflight.ps1 -Full -SkipDockerConfig

      - name: Go test and vet
        working-directory: backend
        run: |
          go test ./...
          go vet ./...

      - name: Go race detector
        working-directory: backend
        run: go test -race ./...

      - name: Security audit
        run: node tools/security_audit.mjs --out documentos/reportes_profesionales

      - name: Permissions and licenses audit
        run: node tools/permissions_license_audit.mjs --out documentos/reportes_profesionales

      - name: Generate and verify OpenAPI inventory
        run: |
          node tools/openapi_inventory.mjs --out documentos/api/openapi.generated.yaml
          git diff --check documentos/api/openapi.generated.yaml

      - name: Docker production config
        run: docker compose --env-file deploy/.env.platform.example -f deploy/docker-compose.platform.yml config --quiet

      - name: Docker staging config
        run: docker compose --env-file deploy/.env.staging.example -f deploy/docker-compose.platform.yml -f deploy/docker-compose.staging.yml config --quiet

      - name: Docker monitoring config
        run: docker compose --env-file deploy/monitoring/.env.monitoring.example -f deploy/monitoring/docker-compose.monitoring.yml config --quiet

      - name: Observability inventory
        run: node tools/observability_report.mjs --out documentos/reportes_profesionales

      - name: Business observability and capacity
        run: node tools/business_observability_audit.mjs --out documentos/reportes_profesionales

      - name: Migration audit
        run: node tools/migration_audit.mjs --out documentos/reportes_profesionales

      - name: Critical module QA contract
        run: node tools/qa_module_contracts.mjs --out documentos/reportes_profesionales

      - name: Role QA matrix
        run: node tools/qa_roles_matrix.mjs --out documentos/reportes_profesionales

      - name: Payment and receipts matrix
        run: node tools/payment_matrix_audit.mjs --out documentos/reportes_profesionales

      - name: Real payment contract
        run: node tools/payment_real_matrix_audit.mjs --out documentos/reportes_profesionales

      - name: Support center audit
        run: node tools/support_center_audit.mjs --out documentos/reportes_profesionales

      - name: Staging anonymization audit
        run: node tools/staging_anonymization_audit.mjs --out documentos/reportes_profesionales

      - name: SLO/SLA audit
        run: node tools/slo_sla_audit.mjs --out documentos/reportes_profesionales

      - name: VPS hardening contract
        run: node tools/vps_hardening_audit.mjs --out documentos/reportes_profesionales

      - name: UX consistency audit
        run: node tools/ux_consistency_audit.mjs --out documentos/reportes_profesionales

      - name: Documentation normalization audit
        run: node tools/docs_normalization_audit.mjs --out documentos/reportes_profesionales

      - name: Upload professional reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: professional-reports
          path: documentos/reportes_profesionales/
          if-no-files-found: ignore

  deploy-staging:
    name: Deploy staging after green CI
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.PCS_ENABLE_STAGING_DEPLOY == 'true' }}
    timeout-minutes: 20
    env:
      PCS_STAGING_HOST: ${{ secrets.PCS_STAGING_HOST }}
      PCS_STAGING_USER: ${{ secrets.PCS_STAGING_USER }}
      PCS_STAGING_SSH_KEY: ${{ secrets.PCS_STAGING_SSH_KEY }}
      PCS_STAGING_PATH: ${{ secrets.PCS_STAGING_PATH }}
    steps:
      - name: Configure SSH
        run: |
          test -n "$PCS_STAGING_HOST"
          test -n "$PCS_STAGING_USER"
          test -n "$PCS_STAGING_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$PCS_STAGING_SSH_KEY" > ~/.ssh/pcs_staging
          chmod 600 ~/.ssh/pcs_staging
          ssh-keyscan -H "$PCS_STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Pull, build and restart staging
        run: |
          REMOTE_PATH="${PCS_STAGING_PATH:-/root/powerfulcontrolsystem}"
          ssh -i ~/.ssh/pcs_staging "$PCS_STAGING_USER@$PCS_STAGING_HOST" "cd '$REMOTE_PATH' && git pull --ff-only && bash deploy/scripts/vps-staging-up.sh && bash deploy/scripts/vps-refresh-staging-from-production.sh"
