services:
  nextcloud-db:
    image: postgres:16-alpine
    container_name: pcs-nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?Defina NEXTCLOUD_DB_PASSWORD}
    volumes: ["pcs_nextcloud_db:/var/lib/postgresql/data"]
  nextcloud-redis:
    image: redis:7-alpine
    container_name: pcs-nextcloud-redis
    restart: unless-stopped
    volumes: ["pcs_nextcloud_redis:/data"]
  nextcloud:
    image: nextcloud:30-apache
    container_name: pcs-nextcloud
    restart: unless-stopped
    depends_on: [nextcloud-db, nextcloud-redis]
    ports: ["${NEXTCLOUD_BIND:-127.0.0.1}:${NEXTCLOUD_PORT:-8090}:80"]
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?Defina NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:?Defina NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?Defina NEXTCLOUD_ADMIN_PASSWORD}
      REDIS_HOST: nextcloud-redis
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:?Defina NEXTCLOUD_TRUSTED_DOMAINS}
      OVERWRITEPROTOCOL: https
    volumes:
      - pcs_nextcloud_html:/var/www/html
      - pcs_nextcloud_data:/var/www/html/data
volumes:
  pcs_nextcloud_db: {}
  pcs_nextcloud_redis: {}
  pcs_nextcloud_html: {}
  pcs_nextcloud_data: {}
