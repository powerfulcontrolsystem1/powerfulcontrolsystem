version: "3.8"

services:
  pcs-nextcloud-db:
    image: mariadb:11
    container_name: pcs-nextcloud-db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_DB_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - pcs_nextcloud_db:/var/lib/mysql

  pcs-nextcloud-redis:
    image: redis:7-alpine
    container_name: pcs-nextcloud-redis
    restart: unless-stopped
    volumes:
      - pcs_nextcloud_redis:/data

  pcs-nextcloud:
    image: nextcloud:29-apache
    container_name: pcs-nextcloud
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - pcs-nextcloud-db
      - pcs-nextcloud-redis
    environment:
      - MYSQL_HOST=pcs-nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - REDIS_HOST=pcs-nextcloud-redis
      - TRUSTED_PROXIES=127.0.0.1
      - OVERWRITEPROTOCOL=https
    volumes:
      - pcs_nextcloud_html:/var/www/html
      - pcs_nextcloud_data:/var/www/html/data

volumes:
  pcs_nextcloud_db:
  pcs_nextcloud_redis:
  pcs_nextcloud_html:
  pcs_nextcloud_data:

