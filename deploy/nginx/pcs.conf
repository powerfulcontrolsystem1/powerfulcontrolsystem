map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;
    server_name _;
    client_max_body_size 100m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://checkout.epayco.co https://checkout.wompi.co; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://checkout.epayco.co https://checkout.wompi.co https://*.google.com" always;

    root /usr/share/nginx/html;
    index index.html;
    types {
        text/html html htm;
        text/css css;
        application/javascript js;
        application/json json;
        application/manifest+json webmanifest;
        image/svg+xml svg;
        image/png png;
        image/jpeg jpg jpeg;
        image/webp webp;
        image/gif gif;
        image/x-icon ico;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_pass http://backend:8080;
    }

    location ~* ^/(login|login_usuario|accept|registrar_nuevo_usuario_administrador|registrar_contrasena_usuario_de_google)\.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri @backend;
    }

    location ~* ^/js/(login|login_usuario|recaptcha_helper|registrar_nuevo_usuario_administrador|registrar_contrasena_usuario_de_google)\.js$ {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://backend:8080;
    }

    location /super/api/ {
        proxy_pass http://backend:8080;
    }

    location /auth/ {
        proxy_pass http://backend:8080;
    }

    location /epayco/ {
        proxy_pass http://backend:8080;
    }

    location /wompi/ {
        proxy_pass http://backend:8080;
    }

    location /generate {
        proxy_pass http://backend:8080;
    }

    location /download {
        proxy_pass http://backend:8080;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://backend:8080;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ @backend;
    }

    location @backend {
        proxy_pass http://backend:8080;
    }
}
