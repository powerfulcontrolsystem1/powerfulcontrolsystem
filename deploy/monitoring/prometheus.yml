global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: pcs-backend
    metrics_path: /
    static_configs:
      - targets: ["pcs-backend:8080"]
    relabel_configs:
      - target_label: service
        replacement: production-backend

  - job_name: pcs-staging-backend
    metrics_path: /
    static_configs:
      - targets: ["pcs-staging-backend:8080"]
    relabel_configs:
      - target_label: service
        replacement: staging-backend
