name: powerful-control-system

services:
  postgres:
    image: postgres:16-alpine
    container_name: pcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pcs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-pcs_superadministrador}
      TZ: ${TZ:-America/Bogota}
      PGTZ: ${TZ:-America/Bogota}
    volumes:
      - pcs_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pcs_internal

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
    image: ${PCS_BACKEND_IMAGE:-pcs-backend:local}
    container_name: pcs-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      TZ: ${TZ:-America/Bogota}
      DB_DIALECT: postgres
      DB_EMPRESAS_DSN: postgres://${POSTGRES_USER:-pcs}:${POSTGRES_PASSWORD}@postgres:5432/pcs_empresas?sslmode=disable
      DB_SUPERADMIN_DSN: postgres://${POSTGRES_USER:-pcs}:${POSTGRES_PASSWORD}@postgres:5432/pcs_superadministrador?sslmode=disable
      CONFIG_ENC_KEY: ${CONFIG_ENC_KEY:?Defina CONFIG_ENC_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://powerfulcontrolsystem.com}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-https://powerfulcontrolsystem.com/auth/google/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-https://onlyoffice.powerfulcontrolsystem.com}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      EMAIL_CORPORATIVO_ENABLED: ${EMAIL_CORPORATIVO_ENABLED:-0}
      EMAIL_CORPORATIVO_AUTO_CREATE: ${EMAIL_CORPORATIVO_AUTO_CREATE:-1}
      EMAIL_CORPORATIVO_DOMAIN: ${EMAIL_CORPORATIVO_DOMAIN:-powerfulcontrolsystem.com}
      EMAIL_CORPORATIVO_WEBMAIL_URL: ${EMAIL_CORPORATIVO_WEBMAIL_URL:-https://mail.powerfulcontrolsystem.com/mail/}
      EMAIL_CORPORATIVO_PROVISION_MODE: ${EMAIL_CORPORATIVO_PROVISION_MODE:-manual}
      EMAIL_CORPORATIVO_IREDADMIN_API_BASE_URL: ${EMAIL_CORPORATIVO_IREDADMIN_API_BASE_URL:-https://mail.powerfulcontrolsystem.com/iredadmin}
      EMAIL_CORPORATIVO_IREDADMIN_ADMIN: ${EMAIL_CORPORATIVO_IREDADMIN_ADMIN:-postmaster@powerfulcontrolsystem.com}
      EMAIL_CORPORATIVO_IREDADMIN_PASSWORD: ${EMAIL_CORPORATIVO_IREDADMIN_PASSWORD:-}
      EMAIL_CORPORATIVO_QUOTA_MB: ${EMAIL_CORPORATIVO_QUOTA_MB:-1024}
      VOICE_STREAM_BASE_URL: ${VOICE_STREAM_BASE_URL:-http://voice-stream:8000}
      GOOGLE_RECAPTCHA_SITE_KEY: ${GOOGLE_RECAPTCHA_SITE_KEY:-}
      GOOGLE_RECAPTCHA_SECRET_KEY: ${GOOGLE_RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_PROVIDER: ${RECAPTCHA_PROVIDER:-google-recaptcha-v2}
      RECAPTCHA_DEV_BYPASS: ${RECAPTCHA_DEV_BYPASS:-0}
    volumes:
      - pcs_backend_logs:/app/backend/logs
      - pcs_web_uploads:/app/web/uploads
      - pcs_backups:/app/backup
      - pcs_downloads:/app/descargas
      - ../juegos:/app/juegos:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pcs_internal

  iredmail:
    profiles: ["mail"]
    image: ${IREDMAIL_IMAGE:-iredmail/mariadb:stable}
    container_name: pcs-iredmail
    hostname: ${IREDMAIL_HOSTNAME:-mail.powerfulcontrolsystem.com}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Bogota}
      HOSTNAME: ${IREDMAIL_HOSTNAME:-mail.powerfulcontrolsystem.com}
      FIRST_MAIL_DOMAIN: ${EMAIL_CORPORATIVO_DOMAIN:-powerfulcontrolsystem.com}
      FIRST_MAIL_DOMAIN_ADMIN_PASSWORD: ${IREDMAIL_ADMIN_PASSWORD:-}
      MLMMJADMIN_API_TOKEN: ${IREDMAIL_MLMMJADMIN_API_TOKEN:-}
      ROUNDCUBE_DES_KEY: ${IREDMAIL_ROUNDCUBE_DES_KEY:-}
      MYSQL_ROOT_PASSWORD: ${IREDMAIL_MYSQL_ROOT_PASSWORD:-}
    volumes:
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/backup-mysql:/var/vmail/backup/mysql
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/mailboxes:/var/vmail/vmail1
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/mlmmj:/var/vmail/mlmmj
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/mlmmj-archive:/var/vmail/mlmmj-archive
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/imapsieve_copy:/var/vmail/imapsieve_copy
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/custom:/opt/iredmail/custom
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/ssl:/opt/iredmail/ssl
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/mysql:/var/lib/mysql
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/clamav:/var/lib/clamav
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/sa_rules:/var/lib/spamassassin
      - ${IREDMAIL_DATA_DIR:-/opt/powerfulcontrolsystem/iredmail/data}/postfix_queue:/var/spool/postfix
      - ${IREDMAIL_BACKUP_DIR:-/opt/powerfulcontrolsystem/iredmail/backups}:/var/backups
    ports:
      - "${IREDMAIL_HTTP_BIND:-127.0.0.1}:${IREDMAIL_HTTP_PORT:-8089}:80"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_SMTP_PORT:-2525}:25"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_POP3_PORT:-8110}:110"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_IMAP_PORT:-8143}:143"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_SMTPS_PORT:-8465}:465"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_SUBMISSION_PORT:-8587}:587"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_IMAPS_PORT:-8993}:993"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_POP3S_PORT:-8995}:995"
      - "${IREDMAIL_BIND:-127.0.0.1}:${IREDMAIL_SIEVE_PORT:-84190}:4190"
    expose:
      - "80"
    networks:
      - pcs_internal

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
    image: ${PCS_FRONTEND_IMAGE:-pcs-frontend:local}
    container_name: pcs-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${HTTP_BIND:-127.0.0.1}:${HTTP_PORT:-8081}:80"
    volumes:
      - pcs_web_uploads:/usr/share/nginx/html/uploads:ro
      - pcs_downloads:/usr/share/nginx/html/descargas:ro
    networks:
      - pcs_internal

  edge:
    profiles: ["edge"]
    image: nginx:1.27-alpine
    container_name: pcs-edge
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    environment:
      EDGE_DOMAIN: ${EDGE_DOMAIN:-powerfulcontrolsystem.com}
      EDGE_WWW_DOMAIN: ${EDGE_WWW_DOMAIN:-www.powerfulcontrolsystem.com}
      EDGE_ONLYOFFICE_DOMAIN: ${EDGE_ONLYOFFICE_DOMAIN:-onlyoffice.powerfulcontrolsystem.com}
      EDGE_MAIL_DOMAIN: ${EDGE_MAIL_DOMAIN:-mail.powerfulcontrolsystem.com}
      EDGE_CERT_NAME: ${EDGE_CERT_NAME:-powerfulcontrolsystem.com}
    ports:
      - "${EDGE_HTTP_BIND:-0.0.0.0}:80:80"
      - "${EDGE_HTTPS_BIND:-0.0.0.0}:443:443"
    volumes:
      - ${EDGE_NGINX_TEMPLATE:-./nginx/edge.conf.template}:/etc/nginx/templates/default.conf.template:ro
      - pcs_letsencrypt:/etc/letsencrypt:ro
      - pcs_certbot_www:/var/www/certbot:ro
    networks:
      - pcs_internal

  certbot:
    profiles: ["certbot"]
    image: certbot/certbot:v2.11.0
    container_name: pcs-certbot
    volumes:
      - pcs_letsencrypt:/etc/letsencrypt
      - pcs_certbot_www:/var/www/certbot

  onlyoffice-documentserver:
    profiles: ["office"]
    image: onlyoffice/documentserver:${ONLYOFFICE_TAG:-latest}
    container_name: pcs-onlyoffice-documentserver
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Defina ONLYOFFICE_JWT_SECRET}
      JWT_HEADER: Authorization
      TZ: ${TZ:-America/Bogota}
    volumes:
      - pcs_onlyoffice_data:/var/www/onlyoffice/Data
      - pcs_onlyoffice_logs:/var/log/onlyoffice
      - pcs_onlyoffice_lib:/var/lib/onlyoffice
      - pcs_onlyoffice_db:/var/lib/postgresql
    expose:
      - "80"
    ports:
      - "${ONLYOFFICE_BIND:-127.0.0.1}:${ONLYOFFICE_PORT:-8088}:80"
    networks:
      - pcs_internal

  voice-stream:
    profiles: ["voice"]
    build:
      context: ..
      dockerfile: deploy/docker/voice-stream.Dockerfile
    image: ${PCS_VOICE_STREAM_IMAGE:-pcs-voice-stream:local}
    container_name: pcs-voice-stream
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Bogota}
      VOICE_STREAM_ENABLED: ${VOICE_STREAM_ENABLED:-true}
      VOICE_STREAM_PIPER_BIN: ${VOICE_STREAM_PIPER_BIN:-piper}
      VOICE_STREAM_TTS_MODEL: ${VOICE_STREAM_TTS_MODEL:-}
      VOICE_STREAM_TTS_CONFIG: ${VOICE_STREAM_TTS_CONFIG:-}
      VOICE_STREAM_MODEL_DIR: ${VOICE_STREAM_MODEL_DIR:-/models}
      VOICE_STREAM_MODEL_NAME: ${VOICE_STREAM_MODEL_NAME:-es_ES-sharvard-medium}
      VOICE_STREAM_MODEL_BASE_URL: ${VOICE_STREAM_MODEL_BASE_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/main/es/es_ES/sharvard/medium}
      VOICE_STREAM_MAX_CHARS: ${VOICE_STREAM_MAX_CHARS:-4000}
      VOICE_STREAM_TTS_TIMEOUT: ${VOICE_STREAM_TTS_TIMEOUT:-20}
      VOICE_STREAM_AUTH_HEADER: ${VOICE_STREAM_AUTH_HEADER:-X-PCS-Voice-Token}
      VOICE_STREAM_AUTH_TOKEN: ${VOICE_STREAM_AUTH_TOKEN:-}
    volumes:
      - pcs_voice_models:/models
      - pcs_voice_cache:/tmp/pcs_voice
    expose:
      - "8000"
    ports:
      - "${VOICE_STREAM_BIND:-127.0.0.1}:${VOICE_STREAM_PORT:-8011}:8000"
    networks:
      - pcs_internal

  rustdesk-hbbs:
    profiles: ["rustdesk"]
    image: rustdesk/rustdesk-server:${RUSTDESK_TAG:-latest}
    container_name: pcs-rustdesk-hbbs
    restart: unless-stopped
    command: hbbs -r rustdesk-hbbr:21117
    volumes:
      - pcs_rustdesk_data:/data
    ports:
      - "${RUSTDESK_BIND:-0.0.0.0}:21115:21115"
      - "${RUSTDESK_BIND:-0.0.0.0}:21116:21116"
      - "${RUSTDESK_BIND:-0.0.0.0}:21116:21116/udp"
    networks:
      - pcs_internal

  rustdesk-hbbr:
    profiles: ["rustdesk"]
    image: rustdesk/rustdesk-server:${RUSTDESK_TAG:-latest}
    container_name: pcs-rustdesk-hbbr
    restart: unless-stopped
    command: hbbr
    volumes:
      - pcs_rustdesk_data:/data
    ports:
      - "${RUSTDESK_BIND:-0.0.0.0}:21117:21117"
    networks:
      - pcs_internal

networks:
  pcs_internal:
    name: pcs_internal
    driver: bridge

volumes:
  pcs_postgres_data:
  pcs_backend_logs:
  pcs_web_uploads:
  pcs_backups:
  pcs_downloads:
  pcs_letsencrypt:
  pcs_certbot_www:
  pcs_onlyoffice_data:
  pcs_onlyoffice_logs:
  pcs_onlyoffice_lib:
  pcs_onlyoffice_db:
  pcs_voice_models:
  pcs_voice_cache:
  pcs_rustdesk_data:
