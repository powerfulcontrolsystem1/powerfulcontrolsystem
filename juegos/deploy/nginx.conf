# Ejemplo de Nginx para Juegos + EmulatorJS.
# Ajusta server_name, rutas y certificados para tu dominio real.

server {
    listen 80;
    server_name juegos.tu-dominio.com;
    client_max_body_size 96m;

    # Recomendado en produccion cuando tengas TLS:
    # return 301 https://$host$request_uri;

    root /opt/juegos/public;
    index index.html;

    # Nginx sirve EmulatorJS directamente.
    location /emulator/ {
        alias /opt/juegos/emulator/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Nginx sirve ROMs en solo lectura. No hay endpoints de subida.
    location /roms/ {
        alias /opt/juegos/roms/;
        types {
            application/octet-stream sfc smc fig swc nes gb gbc gba gen bin zip;
        }
        default_type application/octet-stream;
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # API Go: listado de ROMs, partidas por empresa y health.
    location /api/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
    }

    # SPA: cualquier ruta desconocida vuelve al index.
    location / {
        try_files $uri /index.html;
    }
}

