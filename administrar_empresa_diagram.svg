  <!-- Lines from root to top-level items (two sample lines to show connectivity) -->
  <!-- Left column connections (draw a few representative lines) -->
  <line x1="600" y1="60" x2="190" y2="137" class="line" />
  <line x1="600" y1="60" x2="190" y2="233" class="line" />
  <line x1="600" y1="60" x2="190" y2="323" class="line" />
  <line x1="600" y1="60" x2="190" y2="413" class="line" />
  <line x1="600" y1="60" x2="190" y2="503" class="line" />

  <!-- Right column connections (sample) -->
  <line x1="600" y1="60" x2="900" y2="143" class="line" />
  <line x1="600" y1="60" x2="900" y2="323" class="line" />
  <line x1="600" y1="60" x2="900" y2="503" class="line" />

</svg>
