    <text x="900" y="1313" class="node-text">Reservas</text>

    <!-- 33 Reportes (MENÚ) -->
    <rect x="760" y="1380" width="280" height="34" class="node"/>
    <text x="900" y="1403" class="node-text">Reportes (MENÚ)</text>

    <!-- subnodes Reportes -->
    <rect x="520" y="1360" width="200" height="30" class="node"/>
    <text x="620" y="1380" class="node-text">Reportes generales</text>
    <line x1="760" y1="1417" x2="720" y2="1417" class="line" />

    <rect x="520" y="1400" width="200" height="30" class="node"/>
    <text x="620" y="1420" class="node-text">Inventario</text>
    <line x1="760" y1="1457" x2="720" y2="1457" class="line" />

    <rect x="520" y="1440" width="200" height="30" class="node"/>
    <text x="620" y="1460" class="node-text">Finanzas</text>
    <line x1="760" y1="1497" x2="720" y2="1497" class="line" />

    <rect x="520" y="1480" width="200" height="30" class="node"/>
    <text x="620" y="1500" class="node-text">Gráficos y estadísticas</text>
    <line x1="760" y1="1537" x2="720" y2="1537" class="line" />

