<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="3600" viewBox="0 0 1200 3600">
  <style>
    .node { fill: #ffffff; stroke: #2b6cb0; stroke-width: 2; rx:8; ry:8 }
    .node-text { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#0a0a0a }
    .title { font-family: Arial, Helvetica, sans-serif; font-size:18px; font-weight:700; fill:#1a202c }
    .line { stroke:#94a3b8; stroke-width:1.5 }
  </style>

  <!-- Root -->
  <g>
    <rect x="460" y="20" width="280" height="40" class="node" rx="6" ry="6"/>
    <text x="600" y="47" text-anchor="middle" class="title">Administrar Empresa</text>
  </g>

  <!-- Left column nodes -->
  <!-- positions: x=120 for left column text boxes -->
  <!-- y spacing 80 starting at 120 -->

  <!-- List left column items -->
  <g id="left">
    <!-- 1 Inicio -->
    <rect x="80" y="120" width="220" height="34" class="node"/>
    <text x="190" y="143" class="node-text">Inicio</text>

    <!-- 2 Ventas -->
    <rect x="80" y="210" width="220" height="34" class="node"/>
    <text x="190" y="233" class="node-text">Ventas</text>

    <!-- 3 Carrito -->
    <rect x="80" y="300" width="220" height="34" class="node"/>
    <text x="190" y="323" class="node-text">Carrito de compras</text>

    <!-- 4 Venta pública y pagos -->
    <rect x="80" y="390" width="220" height="34" class="node"/>
    <text x="190" y="413" class="node-text">Venta pública y pagos</text>

    <!-- 5 Productos (MENÚ) -->
    <rect x="80" y="480" width="220" height="34" class="node"/>
    <text x="190" y="503" class="node-text">Productos (MENÚ)</text>

    <!-- subnodes Productos -->
    <rect x="340" y="460" width="220" height="30" class="node"/>
    <text x="450" y="480" class="node-text">Administrar productos</text>
    <line x1="300" y1="497" x2="340" y2="497" class="line" />

    <rect x="340" y="500" width="220" height="30" class="node"/>
    <text x="450" y="520" class="node-text">Bodegas</text>
    <line x1="300" y1="517" x2="340" y2="517" class="line" />

    <rect x="340" y="540" width="220" height="30" class="node"/>
    <text x="450" y="560" class="node-text">Categorías</text>
    <line x1="300" y1="557" x2="340" y2="557" class="line" />

    <rect x="340" y="580" width="220" height="30" class="node"/>
    <text x="450" y="600" class="node-text">Precios</text>
    <line x1="300" y1="597" x2="340" y2="597" class="line" />

    <!-- 6 Combos -->
