    <rect x="760" y="1600" width="280" height="34" class="node"/>
    <text x="900" y="1623" class="node-text">Calculadora</text>

    <!-- 35 Volver a empresas -->
    <rect x="760" y="1690" width="280" height="34" class="node"/>
    <text x="900" y="1713" class="node-text">Volver a empresas</text>
