    <rect x="80" y="1620" width="220" height="34" class="node"/>
    <text x="190" y="1643" class="node-text">Chat y tareas</text>

    <!-- 16 Clientes -->
    <rect x="80" y="1710" width="220" height="34" class="node"/>
    <text x="190" y="1733" class="node-text">Clientes</text>

    <!-- 17 Facturación electrónica -->
    <rect x="80" y="1800" width="220" height="34" class="node"/>
    <text x="190" y="1823" class="node-text">Facturación electrónica</text>

    <!-- 18 Facturas electrónicas -->
    <rect x="80" y="1890" width="220" height="34" class="node"/>
    <text x="190" y="1913" class="node-text">Facturas electrónicas</text>
  </g>

  <!-- Right column nodes -->
  <g id="right">
    <!-- starting x=760 -->
    <!-- 19 ERP extendido -->
    <rect x="760" y="120" width="280" height="34" class="node"/>
