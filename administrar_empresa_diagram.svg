    <!-- 30 Tarifas por día -->
    <rect x="760" y="1110" width="280" height="34" class="node"/>
    <text x="900" y="1133" class="node-text">Tarifas por día</text>

    <!-- 31 Estaciones -->
    <rect x="760" y="1200" width="280" height="34" class="node"/>
    <text x="900" y="1223" class="node-text">Estaciones</text>

    <!-- 32 Reservas -->
