<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contrato - Powerful Control System</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    .contract-shell { max-width: 980px; margin: 28px auto; padding: 16px; }
    .contract-card { padding: 24px; border-radius: 18px; }
    .contract-meta { display:flex; flex-wrap:wrap; gap:10px; margin:14px 0 18px; color:var(--muted); font-size:.95rem; }
    .contract-chip { padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid var(--border); }
    .contract-summary { font-size:1.05rem; color:var(--text); }
    .contract-content { white-space:pre-wrap; line-height:1.8; color:var(--text); background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:16px; padding:18px; margin-top:18px; }
    .contract-note { margin-top:18px; padding:14px 16px; border-radius:14px; background:rgba(37,99,235,.12); border:1px solid rgba(37,99,235,.28); }
    .contract-actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:22px; }
  </style>
</head>
<body class="form-bg-dark">
  <main class="contract-shell">
    <section class="card contract-card">
      <div class="page-header">
        <h1 id="contractTitle">Cargando contrato...</h1>
        <p id="contractSummary" class="contract-summary">Estamos consultando la version vigente del contrato.</p>
      </div>
      <div id="contractMeta" class="contract-meta"></div>
      <div id="contractStatus" class="form-help">Cargando...</div>
      <article id="contractContent" class="contract-content" hidden></article>
      <div id="contractNote" class="contract-note" hidden></div>
      <div class="contract-actions">
        <a class="btn secondary" href="/login.html">Volver al login</a>
        <a id="currentVersionLink" class="btn" href="/contrato.html" hidden>Ver version actual</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var titleEl = document.getElementById('contractTitle');
      var summaryEl = document.getElementById('contractSummary');
      var metaEl = document.getElementById('contractMeta');
      var statusEl = document.getElementById('contractStatus');
      var contentEl = document.getElementById('contractContent');
      var noteEl = document.getElementById('contractNote');
      var currentVersionLinkEl = document.getElementById('currentVersionLink');

      function qs(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name) || '';
      }

      function escapeHTML(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderContract(contract) {
        if (!contract) {
          statusEl.textContent = 'No se encontro informacion del contrato.';
          return;
        }

        titleEl.textContent = contract.titulo || 'Contrato vigente';
        summaryEl.textContent = contract.resumen || 'Contrato operativo vigente del servicio.';

        var chips = [];
        if (contract.version) chips.push('<span class="contract-chip">Version ' + escapeHTML(contract.version) + '</span>');
        if (contract.fecha_actualizacion) chips.push('<span class="contract-chip">Actualizado: ' + escapeHTML(contract.fecha_actualizacion) + '</span>');
        if (contract.usuario_creador) chips.push('<span class="contract-chip">Publicado por: ' + escapeHTML(contract.usuario_creador) + '</span>');
        metaEl.innerHTML = chips.join('');

        contentEl.textContent = contract.contenido || '';
        contentEl.hidden = false;
        statusEl.textContent = '';

        if (contract.nota_aceptacion) {
          noteEl.textContent = contract.nota_aceptacion;
          noteEl.hidden = false;
        } else {
          noteEl.hidden = true;
        }

        var requestedVersion = String(qs('version') || '').trim();
        if (requestedVersion) {
          currentVersionLinkEl.hidden = false;
          currentVersionLinkEl.href = '/contrato.html';
        }
      }

      function loadContract() {
        var version = String(qs('version') || '').trim();
        var url = '/api/public/contrato';
        if (version) {
          url += '?version=' + encodeURIComponent(version);
        }

        fetch(url, { credentials: 'same-origin' })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('HTTP ' + response.status);
            }
            return response.json();
          })
          .then(function (payload) {
            renderContract(payload && payload.contrato ? payload.contrato : null);
          })
          .catch(function (err) {
            statusEl.textContent = 'No se pudo cargar el contrato vigente. ' + (err && err.message ? err.message : String(err));
            summaryEl.textContent = 'Intenta de nuevo en unos segundos o abre la version actual mas tarde.';
          });
      }

      loadContract();
    })();
  </script>
</body>
</html>
