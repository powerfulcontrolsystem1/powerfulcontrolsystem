<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tienda publica</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <div class="page-header">
        <h1 id="vpStoreTitle">Tienda publica</h1>
      </div>
      <p id="vpStoreDesc" class="form-help">Cargando configuracion de tienda...</p>
      <p id="vpStoreMeta" class="form-help"></p>
      <div class="form-actions" style="justify-content:flex-start;">
        <button id="vpBtnRecargarCatalogo" type="button" class="btn secondary">Recargar catalogo</button>
        <button id="vpBtnConsultarEstado" type="button" class="btn secondary">Consultar estado de pago</button>
      </div>
      <div id="vpTopMsg" class="form-help"></div>
    </section>

    <section class="form creditos-section creditos-section-first">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Catalogo disponible</h2>
      </div>
      <div id="vpCatalogGrid" class="portal-grid"></div>
    </section>

    <section class="form creditos-section">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Resumen de compra</h2>
      </div>
      <div id="vpCartSummary" class="form-help">Aun no agregaste productos.</div>
      <div id="vpCartTotal" class="form-help"></div>
    </section>

    <section class="form creditos-section">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Pagar en línea</h2>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="vpPaymentMethod">Pasarela disponible</label>
          <select id="vpPaymentMethod" class="form-input"></select>
          <p id="vpPaymentHint" class="form-help">La tienda cargará las pasarelas activas para esta empresa.</p>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="vpBuyerName">Nombre completo</label>
          <input id="vpBuyerName" class="form-input" type="text" placeholder="Nombre y apellido">
        </div>
        <div class="form-col">
          <label class="form-label" for="vpBuyerEmail">Correo electronico</label>
          <input id="vpBuyerEmail" class="form-input" type="email" placeholder="correo@dominio.com">
        </div>
      </div>
      <div id="vpBuyerPhoneRow" class="form-row">
        <div class="form-col">
          <label id="vpBuyerPhoneLabel" class="form-label" for="vpBuyerPhone">Telefono Nequi (10 digitos CO)</label>
          <input id="vpBuyerPhone" class="form-input" type="tel" placeholder="3XXXXXXXXX" maxlength="10">
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label id="vpAcceptTermsLabel" class="form-help creditos-inline-check" for="vpAcceptTerms">
            <input id="vpAcceptTerms" type="checkbox">
            Acepto los términos de la pasarela seleccionada y el tratamiento de datos personales para procesar el pago.
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button id="vpBtnPagar" type="button" class="btn">Crear transaccion</button>
      </div>
      <div id="vpPayMsg" class="form-help"></div>
      <div id="vpPayResult" class="form-help"></div>
    </section>

    <section class="form creditos-section">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Estado de orden</h2>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="vpOrderCode">Codigo de orden</label>
          <input id="vpOrderCode" class="form-input" type="text" placeholder="VP-ORD-...">
        </div>
        <div class="form-col">
          <label class="form-label" for="vpTransactionId">Transaction ID (opcional)</label>
          <input id="vpTransactionId" class="form-input" type="text" placeholder="ID de pasarela">
        </div>
      </div>
      <div class="form-actions">
        <button id="vpBtnEstadoPago" type="button" class="btn secondary">Consultar estado</button>
      </div>
      <div id="vpStatusMsg" class="form-help"></div>
      <pre id="vpStatusPayload" class="backups-detail-pre">Sin consulta de estado.</pre>
    </section>
  </div>

  <script>
    (function () {
      var state = {
        empresaId: 0,
        empresaSlug: '',
        tienda: null,
        items: [],
	        cart: {},
	        paymentMethods: [],
	        returnProvider: ''
      };

      var topMsgEl = document.getElementById('vpTopMsg');
      var payMsgEl = document.getElementById('vpPayMsg');
      var payResultEl = document.getElementById('vpPayResult');
      var statusMsgEl = document.getElementById('vpStatusMsg');
      var statusPayloadEl = document.getElementById('vpStatusPayload');
      var catalogGridEl = document.getElementById('vpCatalogGrid');
      var cartSummaryEl = document.getElementById('vpCartSummary');
      var cartTotalEl = document.getElementById('vpCartTotal');
      var storeTitleEl = document.getElementById('vpStoreTitle');
      var storeDescEl = document.getElementById('vpStoreDesc');
      var storeMetaEl = document.getElementById('vpStoreMeta');
      var paymentMethodEl = document.getElementById('vpPaymentMethod');
      var paymentHintEl = document.getElementById('vpPaymentHint');
      var buyerPhoneRowEl = document.getElementById('vpBuyerPhoneRow');
      var buyerPhoneLabelEl = document.getElementById('vpBuyerPhoneLabel');
      var acceptTermsLabelEl = document.getElementById('vpAcceptTermsLabel');
      var epaycoScriptPromise = null;

      function setMsg(el, text, type) {
        if (!el) return;
        el.textContent = text || '';
        el.classList.remove('error', 'success');
        if (type) el.classList.add(type);
      }

      function escapeHTML(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function parseSlugFromPath() {
        var path = String(window.location.pathname || '').trim();
        var parts = path.split('/').filter(function (part) { return part; });
        if (parts.length === 2 && String(parts[1]).toLowerCase() === 'venta_publica.html') {
          return parts[0];
        }
        return '';
      }

      function parseSlugFromHost() {
        var host = String(window.location.hostname || '').trim().toLowerCase();
        if (!host || host === 'localhost' || host === '127.0.0.1' || host === '::1') {
          return '';
        }
        var rawDomains = String(window.VENTA_PUBLICA_BASE_DOMAINS || 'powerfulcontrolsystem.com');
        var baseDomains = rawDomains
          .split(',')
          .map(function (value) { return String(value || '').trim().toLowerCase().replace(/^https?:\/\//, '').replace(/\/.*/, ''); })
          .filter(function (value) { return value; });
        if (!baseDomains.length) {
          baseDomains = ['powerfulcontrolsystem.com'];
        }

        for (var i = 0; i < baseDomains.length; i++) {
          var base = baseDomains[i];
          if (host === base || host === 'www.' + base) {
            continue;
          }
          var suffix = '.' + base;
          if (host.length <= suffix.length || host.slice(-suffix.length) !== suffix) {
            continue;
          }
          var label = host.slice(0, host.length - suffix.length).trim().replace(/^\.+|\.+$/g, '');
          if (!label || label.indexOf('.') >= 0) {
            continue;
          }
          label = label.replace(/[^a-z0-9-]+/g, '-').replace(/^-+|-+$/g, '');
          if (label) {
            return label;
          }
        }
        return '';
      }

      function resolveContext() {
        var params = new URLSearchParams(window.location.search);
        state.empresaId = parseInt(params.get('empresa_id') || '0', 10) || 0;
        state.empresaSlug = String(params.get('empresa_slug') || '').trim();
        state.returnProvider = String(params.get('provider') || '').trim().toLowerCase();
        if (!state.empresaSlug) {
          state.empresaSlug = parseSlugFromPath();
        }
        if (!state.empresaSlug) {
          state.empresaSlug = parseSlugFromHost();
        }
        var orderCode = String(params.get('order_code') || params.get('codigo_orden') || '').trim();
        if (orderCode) {
          document.getElementById('vpOrderCode').value = orderCode;
        }
      }

      function formatMoney(value, currency) {
        var amount = Number(value || 0);
        var curr = String(currency || 'COP').trim().toUpperCase() || 'COP';
        try {
          return new Intl.NumberFormat('es-CO', { style: 'currency', currency: curr, maximumFractionDigits: 2 }).format(amount);
        } catch (_) {
          return amount.toFixed(2) + ' ' + curr;
        }
      }

      function buildURL(action, extraParams) {
        var url = new URL('/api/public/venta_publica', window.location.origin);
        if (action) url.searchParams.set('action', action);
        if (state.empresaId > 0) url.searchParams.set('empresa_id', String(state.empresaId));
        if (state.empresaSlug) url.searchParams.set('empresa_slug', state.empresaSlug);
        if (extraParams && typeof extraParams === 'object') {
          Object.keys(extraParams).forEach(function (key) {
            var value = extraParams[key];
            if (value === undefined || value === null || value === '') return;
            url.searchParams.set(key, String(value));
          });
        }
        return url;
      }

      async function requestJSON(method, action, extraParams, bodyObj) {
        var url = buildURL(action, extraParams);
        var options = {
          method: method,
          credentials: 'same-origin'
        };
        if (bodyObj) {
          options.headers = { 'Content-Type': 'application/json' };
          options.body = JSON.stringify(bodyObj);
        }
        var resp = await fetch(url.toString(), options);
        var text = await resp.text();
        var data = {};
        if (text) {
          try {
            data = JSON.parse(text);
          } catch (_) {
            data = { raw: text };
          }
        }
        if (!resp.ok) {
          throw new Error((data && (data.error || data.message)) || text || ('HTTP ' + resp.status));
        }
        return data;
      }

      function selectedPaymentMethod() {
        return String(paymentMethodEl && paymentMethodEl.value || '').trim().toLowerCase();
      }

      function renderPaymentOptions() {
        var methods = Array.isArray(state.paymentMethods) ? state.paymentMethods.slice() : [];
        if (!methods.length && state.tienda) {
          if (state.tienda.wompi_activo) methods.push('wompi_nequi');
          if (state.tienda.epayco_activo) methods.push('epayco');
        }
        methods = methods.filter(function (value, index, arr) { return value && arr.indexOf(value) === index; });
        paymentMethodEl.innerHTML = methods.map(function (method) {
          var label = method === 'epayco' ? 'Epayco Smart Checkout' : 'Wompi Nequi';
          return '<option value="' + escapeHTML(method) + '">' + escapeHTML(label) + '</option>';
        }).join('');
        if (!methods.length) {
          paymentMethodEl.innerHTML = '<option value="">Sin pasarelas activas</option>';
          paymentMethodEl.disabled = true;
          paymentHintEl.textContent = 'Esta tienda aún no tiene pasarelas activas. Contacta a la empresa.';
        } else {
          paymentMethodEl.disabled = false;
          var desired = state.returnProvider === 'epayco' ? 'epayco' : (state.returnProvider === 'wompi' ? 'wompi_nequi' : selectedPaymentMethod());
          if (desired && methods.indexOf(desired) >= 0) {
            paymentMethodEl.value = desired;
          }
        }
        syncPaymentForm();
      }

      function syncPaymentForm() {
        var method = selectedPaymentMethod();
        var isEpayco = method === 'epayco';
        buyerPhoneRowEl.style.display = isEpayco ? '' : '';
        buyerPhoneLabelEl.textContent = isEpayco ? 'Teléfono del comprador (opcional)' : 'Telefono Nequi (10 digitos CO)';
        document.getElementById('vpBuyerPhone').setAttribute('placeholder', isEpayco ? '3001234567' : '3XXXXXXXXX');
        acceptTermsLabelEl.lastChild.textContent = isEpayco
          ? ' Acepto los términos de Epayco y el tratamiento de datos personales para procesar el pago.'
          : ' Acepto términos de Wompi y tratamiento de datos personales para procesar el pago.';
        paymentHintEl.textContent = isEpayco
          ? 'Epayco abrirá un Smart Checkout seguro y luego regresará a esta página para verificar el estado.'
          : 'Wompi creará un cobro Nequi directo para esta orden pública.';
      }

      function loadEpaycoSmartCheckoutScript(scriptURL) {
        var resolvedURL = String(scriptURL || 'https://checkout.epayco.co/checkout-v2.js').trim();
        if (window.ePayco && window.ePayco.checkout && typeof window.ePayco.checkout.configure === 'function') {
          return Promise.resolve(window.ePayco);
        }
        if (epaycoScriptPromise) {
          return epaycoScriptPromise;
        }
        epaycoScriptPromise = new Promise(function (resolve, reject) {
          var script = document.createElement('script');
          script.src = resolvedURL;
          script.async = true;
          script.onload = function () {
            if (window.ePayco && window.ePayco.checkout && typeof window.ePayco.checkout.configure === 'function') {
              resolve(window.ePayco);
              return;
            }
            reject(new Error('No se pudo cargar checkout-v2.js de Epayco.'));
          };
          script.onerror = function () {
            reject(new Error('No se pudo cargar checkout-v2.js de Epayco.'));
          };
          document.head.appendChild(script);
        });
        return epaycoScriptPromise;
      }

      function renderCatalog() {
        if (!Array.isArray(state.items) || state.items.length === 0) {
          catalogGridEl.innerHTML = '<div class="portal-card"><p>No hay items publicos disponibles.</p></div>';
          return;
        }

        catalogGridEl.innerHTML = state.items.map(function (item) {
          var id = Number(item.id || 0);
          var qty = Number(state.cart[id] || 0);
          var stockLabel = state.tienda && state.tienda.mostrar_stock ? ('Stock: ' + Number(item.stock_publicado || 0).toFixed(2)) : 'Disponible';
          var image = item.imagen_url ? '<img src="' + escapeHTML(item.imagen_url) + '" alt="imagen item" style="max-width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:8px;">' : '';
          return '' +
            '<div class="portal-card dark-mode" data-item-id="' + id + '">' +
              image +
              '<h3>' + escapeHTML(item.nombre || 'Item') + '</h3>' +
              '<p>' + escapeHTML(item.descripcion || '') + '</p>' +
              '<p><strong>' + escapeHTML(formatMoney(item.precio || 0, item.moneda || (state.tienda && state.tienda.moneda) || 'COP')) + '</strong></p>' +
              '<p class="form-help">' + escapeHTML(stockLabel) + '</p>' +
	              '<div class="form-row" style="margin-bottom:0;">' +
	                '<div class="form-col"><input class="form-input vp-qty" type="number" min="0" step="1" value="' + qty + '"></div>' +
	                '<div class="form-col"><button type="button" class="btn secondary vp-add">Actualizar</button></div>' +
	              '</div>' +
            '</div>';
        }).join('');
      }

      function recomputeCart() {
        var ids = Object.keys(state.cart);
        if (ids.length === 0) {
          cartSummaryEl.textContent = 'Aun no agregaste productos.';
          cartTotalEl.textContent = '';
          return;
        }

        var lines = [];
        var total = 0;
        ids.forEach(function (idKey) {
          var id = Number(idKey);
          var qty = Number(state.cart[id] || 0);
          if (!isFinite(qty) || qty <= 0) return;
          var item = state.items.find(function (row) { return Number(row.id || 0) === id; });
          if (!item) return;
          var subtotal = Number(item.precio || 0) * qty;
          total += subtotal;
          lines.push(item.nombre + ' x ' + qty + ' = ' + formatMoney(subtotal, item.moneda || (state.tienda && state.tienda.moneda) || 'COP'));
        });

        if (lines.length === 0) {
          cartSummaryEl.textContent = 'Aun no agregaste productos.';
          cartTotalEl.textContent = '';
          return;
        }

        cartSummaryEl.innerHTML = lines.map(function (line) { return '- ' + escapeHTML(line); }).join('<br>');
        cartTotalEl.textContent = 'Total: ' + formatMoney(total, (state.tienda && state.tienda.moneda) || 'COP');
      }

      function collectCartItemsForPayload() {
        var payloadItems = [];
        Object.keys(state.cart).forEach(function (idKey) {
          var id = Number(idKey);
          var qty = Number(state.cart[id] || 0);
          if (!isFinite(qty) || qty <= 0) return;
          payloadItems.push({ item_id: id, cantidad: qty });
        });
        return payloadItems;
      }

      function updateStoreHeader() {
        var tienda = state.tienda || {};
        storeTitleEl.textContent = tienda.nombre_tienda || 'Tienda publica';
        storeDescEl.textContent = tienda.descripcion_tienda || 'Selecciona productos del catalogo y realiza pago en linea.';
        storeMetaEl.textContent = 'Empresa #' + Number(state.empresaId || 0) + ' | slug: ' + String(state.empresaSlug || '-') + ' | moneda: ' + String(tienda.moneda || 'COP') + ' | pagos: ' + String((tienda.payment_methods || []).join(', ') || 'sin activar');
      }

      async function loadCatalog() {
        setMsg(topMsgEl, 'Cargando catalogo...');
        try {
          var data = await requestJSON('GET', 'catalogo', null, null);
          state.empresaId = Number(data.empresa_id || state.empresaId || 0);
          state.empresaSlug = String(data.empresa_slug || state.empresaSlug || '');
          state.tienda = data.tienda || {};
          state.paymentMethods = Array.isArray(state.tienda.payment_methods) ? state.tienda.payment_methods : [];
          state.items = Array.isArray(data.items) ? data.items : [];
          updateStoreHeader();
          renderPaymentOptions();
          renderCatalog();
          recomputeCart();
          setMsg(topMsgEl, 'Catalogo cargado con ' + state.items.length + ' item(s).', 'success');
        } catch (err) {
          setMsg(topMsgEl, 'No se pudo cargar catalogo: ' + err.message, 'error');
          catalogGridEl.innerHTML = '<div class="portal-card"><p>Error de carga.</p></div>';
        }
      }

      async function createPayment() {
        setMsg(payMsgEl, 'Creando transaccion...');
        payResultEl.textContent = '';

        try {
          var items = collectCartItemsForPayload();
          if (items.length === 0) {
            throw new Error('Agrega al menos un item al carrito');
          }

          var buyerName = document.getElementById('vpBuyerName').value.trim();
          var buyerEmail = document.getElementById('vpBuyerEmail').value.trim();
          var buyerPhone = document.getElementById('vpBuyerPhone').value.trim();
          var acceptTerms = !!document.getElementById('vpAcceptTerms').checked;
          var paymentMethod = selectedPaymentMethod();

          if (!buyerName) throw new Error('Nombre completo es obligatorio');
          if (!buyerEmail) throw new Error('Correo electronico es obligatorio');
          if (!paymentMethod) throw new Error('No hay pasarelas activas para esta tienda');
          if (paymentMethod === 'wompi_nequi' && !/^3\d{9}$/.test(buyerPhone)) {
            throw new Error('Telefono Nequi invalido. Debe iniciar en 3 y tener 10 digitos');
          }

          var payload = {
            empresa_id: state.empresaId,
            empresa_slug: state.empresaSlug,
            metodo_pago: paymentMethod,
            comprador_nombre: buyerName,
            comprador_email: buyerEmail,
            comprador_telefono: buyerPhone,
            accept_terms: acceptTerms,
            items: items
          };

          var data = await requestJSON('POST', 'crear_pago', null, payload);
          setMsg(payMsgEl, 'Transaccion creada correctamente.', 'success');

          var order = data.order || {};
          var orderCode = order.codigo_orden || '';
          var txID = data.transaction_id || '';

          if (orderCode) {
            document.getElementById('vpOrderCode').value = orderCode;
          }
          if (txID) {
            document.getElementById('vpTransactionId').value = txID;
          }

          payResultEl.innerHTML = '' +
            'Orden: <strong>' + escapeHTML(orderCode || '-') + '</strong><br>' +
            'Transaccion: <strong>' + escapeHTML(txID || '-') + '</strong><br>' +
            'Proveedor: <strong>' + escapeHTML(data.provider || '-') + '</strong><br>' +
            'Estado proveedor: <strong>' + escapeHTML(data.status || '-') + '</strong><br>' +
            'Estado local: <strong>' + escapeHTML(data.status_local || '-') + '</strong>';

          if (String(data.provider || '').toLowerCase() === 'epayco') {
            var sessionId = String(data.checkout_session_id || data.session_id || (data.data && (data.data.sessionId || data.data.session_id)) || '').trim();
            var checkoutScriptURL = String(data.checkout_script_url || (data.data && data.data.script_url) || 'https://checkout.epayco.co/checkout-v2.js').trim();
            if (sessionId) {
              setMsg(payMsgEl, 'Abriendo Smart Checkout de Epayco...', 'success');
              var epaycoRuntime = await loadEpaycoSmartCheckoutScript(checkoutScriptURL);
              var checkout = epaycoRuntime.checkout.configure({
                sessionId: sessionId,
                type: 'standard',
                test: String(data.mode || '').trim().toLowerCase() === 'sandbox'
              });
              checkout.open();
            }
          }

          await consultStatus();
        } catch (err) {
          setMsg(payMsgEl, 'No se pudo crear la transaccion: ' + err.message, 'error');
        }
      }

      async function consultStatus() {
        var orderCode = document.getElementById('vpOrderCode').value.trim();
        var txID = document.getElementById('vpTransactionId').value.trim();

        if (!orderCode) {
          setMsg(statusMsgEl, 'Ingresa un codigo de orden para consultar estado.', 'error');
          return;
        }

        setMsg(statusMsgEl, 'Consultando estado de pago...');
        try {
          var data = await requestJSON('GET', 'estado_pago', {
            order_code: orderCode,
            transaction_id: txID || undefined,
            metodo_pago: selectedPaymentMethod() || undefined
          }, null);
          setMsg(statusMsgEl, 'Estado consultado correctamente.', 'success');
          statusPayloadEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          setMsg(statusMsgEl, 'No se pudo consultar estado: ' + err.message, 'error');
        }
      }

      catalogGridEl.addEventListener('click', function (ev) {
        var btn = ev.target && ev.target.closest ? ev.target.closest('.vp-add') : null;
        if (!btn) return;
        var card = btn.closest('[data-item-id]');
        if (!card) return;
        var itemId = Number(card.getAttribute('data-item-id') || 0);
        var qtyInput = card.querySelector('.vp-qty');
        var qty = Number(qtyInput && qtyInput.value ? qtyInput.value : 0);
        if (!isFinite(qty) || qty < 0) qty = 0;
        if (qty === 0) {
          delete state.cart[itemId];
        } else {
          state.cart[itemId] = Math.floor(qty);
        }
        recomputeCart();
      });

      document.getElementById('vpBtnRecargarCatalogo').addEventListener('click', loadCatalog);
      document.getElementById('vpBtnPagar').addEventListener('click', createPayment);
      document.getElementById('vpBtnEstadoPago').addEventListener('click', consultStatus);
      document.getElementById('vpBtnConsultarEstado').addEventListener('click', consultStatus);
      paymentMethodEl.addEventListener('change', syncPaymentForm);

      resolveContext();
      loadCatalog();

      if (document.getElementById('vpOrderCode').value.trim()) {
        consultStatus();
      }
    })();
  </script>
</body>
</html>
