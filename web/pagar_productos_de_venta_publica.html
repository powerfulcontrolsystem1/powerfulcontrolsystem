<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pagar productos de venta pública</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg-alt),var(--bg));color:var(--text);font-family:"Segoe UI",Arial,sans-serif}
    .pay{max-width:980px;margin:0 auto;padding:34px 16px;display:grid;grid-template-columns:minmax(0,.8fr) minmax(320px,1fr);gap:18px;align-items:start}
    .card{border:1px solid var(--border);border-radius:24px;background:var(--surface);box-shadow:0 18px 42px rgba(0,0,0,.14);padding:18px}
    .product-img{height:230px;border-radius:18px;background:var(--input-bg-soft);background-size:cover;background-position:center;display:grid;place-items:center;color:var(--muted);font-weight:800}
    .cart-list{display:grid;gap:10px}
    .cart-item{border:1px solid var(--border);border-radius:16px;padding:10px;background:var(--surface-soft);display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:center}
    .thumb{width:64px;height:64px;border-radius:14px;background:var(--input-bg-soft);background-size:cover;background-position:center}
    .mini{color:var(--muted);font-size:.88rem}
    .qty{width:78px;background:var(--input-bg-soft);border:1px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--text)}
    .price{font-size:1.6rem;font-weight:950}.methods{display:grid;gap:10px}.method{border:1px solid var(--border);border-radius:16px;padding:12px;background:var(--surface-soft)}
    .form-grid{display:grid;gap:10px}.result{white-space:pre-wrap;color:var(--muted)}
    @media(max-width:820px){.pay{grid-template-columns:1fr;padding:14px}.product-img{height:190px}}
  </style>
</head>
<body>
  <main class="pay">
    <section class="card">
      <div id="productImg" class="product-img">Producto</div>
      <h1 id="productName">Cargando producto...</h1>
      <p id="productDesc" class="form-help"></p>
      <div id="productPrice" class="price"></div>
      <a id="backLink" class="btn secondary" href="/venta_publica.html">Volver a la página</a>
    </section>
    <section class="card">
      <h2>Datos para pagar</h2>
      <p class="form-help">El pago se procesa con la pasarela configurada por esta empresa. El dinero llega directamente a su cuenta Wompi o Epayco.</p>
      <div class="form-help" style="margin-top:-6px;">
        ¿Tienes preguntas antes de pagar? <a href="#" id="privateMsgLink">Enviar mensaje privado a la empresa</a>
      </div>
      <div class="form-grid">
        <input id="buyerName" class="form-input" placeholder="Nombre completo">
        <input id="buyerEmail" class="form-input" placeholder="Correo electrónico">
        <input id="buyerPhone" class="form-input" placeholder="Celular (requerido para Wompi/Nequi)">
        <input id="qty" class="form-input" type="number" min="1" step="1" value="1">
      </div>
      <h3>Método de pago</h3>
      <div id="methods" class="methods"></div>
      <label class="form-help"><input id="terms" type="checkbox"> Acepto continuar con el pago y enviar mis datos a la pasarela seleccionada.</label>
      <div class="form-actions">
        <button id="payBtn" class="btn" type="button">Pagar</button>
      </div>
      <div id="msg" class="result"></div>
    </section>
  </main>
  <script>
    window.__pcsAutoInjectChatShell = true;
    window.__pcsPublicChatContext = { scope: 'venta_publica' };

    const params=new URLSearchParams(location.search);
    const state={
      slug:params.get('empresa_slug')||'',
      page:params.get('pagina_slug')||'',
      itemId:Number(params.get('item_id')||0),
      cartMode: String(params.get('cart')||'')==='1',
      data:null,
      item:null,
      cart:[],
      method:''
    };
    function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function money(v,c){return new Intl.NumberFormat('es-CO',{style:'currency',currency:c||'COP',maximumFractionDigits:0}).format(Number(v||0))}
    function setMsg(t,e){msg.textContent=t||'';msg.style.color=e?'#ef5350':''}
    function cartKey(){return 'pcs_cart_venta_publica_'+String(state.slug||'').trim();}
    function getCart(){try{const raw=localStorage.getItem(cartKey()); return raw?JSON.parse(raw):[];}catch(_){return [];}}
    function saveCart(items){try{localStorage.setItem(cartKey(), JSON.stringify(items||[]));}catch(_){}}
    function buildBackLink(){
      const back=new URL('/venta_publica.html',location.origin);
      back.searchParams.set('empresa_slug',state.data.empresa_slug||state.slug);
      if(state.page)back.searchParams.set('pagina_slug',state.page);
      backLink.href=back.pathname+back.search;
    }
    async function load(){
      try{
        let qs='action=catalogo&empresa_slug='+encodeURIComponent(state.slug);
        if(state.page)qs+='&pagina_slug='+encodeURIComponent(state.page);
        qs+='&limit=200&offset=0';
        const res=await fetch('/api/public/venta_publica?'+qs);
        const text=await res.text();
        const data=text?JSON.parse(text):{};
        if(!res.ok)throw new Error(data.error||text||'No se pudo cargar');
        state.data=data;
        if(!state.slug && data.empresa_slug) state.slug=data.empresa_slug;
        if(state.cartMode){
          const cart=getCart();
          if(!cart.length) throw new Error('Tu carrito está vacío.');
          const items=data.items||[];
          state.cart = cart.map(ci=>{
            const it = items.find(x=>Number(x.id)===Number(ci.id));
            if(!it) return null;
            return {id:Number(it.id), nombre:it.nombre||'', descripcion:it.descripcion||'', precio:Number(it.precio||0), moneda:it.moneda||((data.tienda&&data.tienda.moneda)||'COP'), imagen_url:it.imagen_url||'', qty:Math.max(1, Math.min(99, Math.trunc(Number(ci.qty||1))))};
          }).filter(Boolean);
          if(!state.cart.length) throw new Error('Los productos del carrito ya no están disponibles.');
          renderCartMode();
        } else {
          state.item=(data.items||[]).find(x=>Number(x.id)===state.itemId);
          if(!state.item)throw new Error('Producto no disponible en esta página.');
          renderSingleMode();
        }
        buildBackLink();
        renderPaymentMethods();
      }catch(e){setMsg(e.message,true);}
    }
    function renderPaymentMethods(){
      const m=(state.data.tienda&&state.data.tienda.payment_methods)||[];
      methods.innerHTML='';
      m.forEach(x=>{const label=x==='epayco'?'Epayco':'Wompi / Nequi'; methods.innerHTML+='<label class="method"><input name="method" type="radio" value="'+esc(x)+'"> '+label+'</label>';});
      const first=methods.querySelector('input');
      if(first){first.checked=true; state.method=first.value;}
      methods.querySelectorAll('input').forEach(i=>i.onchange=()=>state.method=i.value);
      if(!m.length) setMsg('Esta empresa aún no tiene una pasarela activa.',true);
    }
    function renderSingleMode(){
      const it=state.item;
      productName.textContent=it.nombre;
      productDesc.textContent=it.descripcion||'';
      productPrice.textContent=money(it.precio,it.moneda);
      if(it.imagen_url){productImg.style.backgroundImage='url('+it.imagen_url+')'; productImg.textContent='';}
      qty.style.display='';
    }
    function renderCartMode(){
      qty.style.display='none';
      productImg.style.display='none';
      productDesc.style.display='none';
      const moneda=((state.data.tienda&&state.data.tienda.moneda)||'COP');
      productName.textContent='Pago de carrito';
      const total = state.cart.reduce((a,x)=>a+(Number(x.precio||0)*Number(x.qty||0)),0);
      productPrice.textContent=money(total, moneda);
      const list=document.createElement('div');
      list.className='cart-list';
      state.cart.forEach(it=>{
        const div=document.createElement('div');
        div.className='cart-item';
        div.innerHTML=
          '<div class="thumb" style="'+(it.imagen_url?'background-image:url('+esc(it.imagen_url)+')':'')+'"></div>'+
          '<div><strong>'+esc(it.nombre||'Producto')+'</strong><div class="mini">'+money(it.precio,it.moneda)+'</div></div>'+
          '<div style="display:grid;gap:8px;justify-items:end">'+
            '<input class="qty" type="number" min="1" max="99" value="'+esc(it.qty||1)+'" data-qty="'+esc(it.id)+'">'+
            '<button class="btn secondary" type="button" data-del="'+esc(it.id)+'">Quitar</button>'+
          '</div>';
        list.appendChild(div);
      });
      // reemplaza el card izquierdo por lista
      const left=document.querySelector('main.pay > section.card');
      const old=list.cloneNode(true);
      left.appendChild(old);
      left.querySelectorAll('button[data-del]').forEach(b=>b.onclick=()=>{
        const id=Number(b.getAttribute('data-del')||0);
        state.cart = state.cart.filter(x=>Number(x.id)!==id);
        saveCart(state.cart.map(x=>({id:x.id,qty:x.qty})));
        location.reload();
      });
      left.querySelectorAll('input[data-qty]').forEach(inp=>inp.onchange=()=>{
        const id=Number(inp.getAttribute('data-qty')||0);
        const it=state.cart.find(x=>Number(x.id)===id);
        if(!it) return;
        it.qty=Math.max(1, Math.min(99, Math.trunc(Number(inp.value||1))));
        saveCart(state.cart.map(x=>({id:x.id,qty:x.qty})));
        location.reload();
      });
    }
    function loadScript(src){return new Promise((resolve,reject)=>{if(!src)return reject(new Error('Script de checkout no disponible')); const existing=document.querySelector('script[data-epayco-smart="1"]'); if(existing)return resolve(); const s=document.createElement('script'); s.src=src; s.async=true; s.dataset.epaycoSmart='1'; s.onload=resolve; s.onerror=()=>reject(new Error('No se pudo cargar Smart Checkout de Epayco')); document.head.appendChild(s);});}
    async function openEpaycoCheckout(data){await loadScript(data.checkout_script_url); if(!window.ePayco||!window.ePayco.checkout||!window.ePayco.checkout.configure)throw new Error('Smart Checkout de Epayco no quedó disponible'); const checkout=window.ePayco.checkout.configure({sessionId:data.session_id,type:data.checkout_type||'standard',test:String(data.mode||'sandbox').toLowerCase()!=='production'}); try{checkout.onErrors&&checkout.onErrors(e=>setMsg('Epayco reportó un error: '+JSON.stringify(e),true)); checkout.onClosed&&checkout.onClosed(()=>setMsg('Checkout cerrado. Puedes consultar el estado con la referencia: '+(data.reference||''),false));}catch(_){} checkout.open();}
    async function pay(){
      try{
        if(!state.data)throw new Error('Catálogo no cargado.');
        let items=[];
        if(state.cartMode){
          if(!state.cart.length) throw new Error('Tu carrito está vacío.');
          items = state.cart.map(x=>({item_id:Number(x.id),cantidad:Number(x.qty||1)}));
        } else {
          if(!state.item)throw new Error('Producto no disponible.');
          items=[{item_id:state.item.id,cantidad:Number(qty.value||1)}];
        }
        const payload={
          empresa_slug:state.data.empresa_slug||state.slug,
          metodo_pago:state.method,
          comprador_nombre:buyerName.value.trim(),
          comprador_email:buyerEmail.value.trim(),
          comprador_telefono:buyerPhone.value.trim(),
          accept_terms:terms.checked,
          items:items
        };
        setMsg('Creando pago...',false);
        const res=await fetch('/api/public/venta_publica?action=crear_pago',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const text=await res.text();
        const data=text?JSON.parse(text):{};
        if(!res.ok)throw new Error(data.error||text||'No se pudo crear el pago');
        if(data.provider==='epayco'&&data.session_id){
          setMsg('Abriendo Smart Checkout de Epayco...',false);
          await openEpaycoCheckout(data);
          return;
        }
        setMsg('Pago creado. Estado: '+(data.status_local||data.status||'pendiente')+'\\nReferencia: '+(data.reference||''),false);
      }catch(e){setMsg(e.message||String(e),true);}
    }
    payBtn.onclick=pay; load();

    // Mensaje privado desde checkout (crea conversación en Chat y tareas de la empresa)
    privateMsgLink.onclick = async function(ev){
      ev.preventDefault();
      try {
        const empresaSlug = String(state.data && state.data.empresa_slug ? state.data.empresa_slug : state.slug).trim();
        if (!empresaSlug) throw new Error('Empresa no disponible.');
        const nombre = String((buyerName && buyerName.value) || '').trim() || String(prompt('Tu nombre (opcional):') || '').trim();
        const contacto = String((buyerEmail && buyerEmail.value) || '').trim() || String((buyerPhone && buyerPhone.value) || '').trim() || String(prompt('Tu WhatsApp o correo (opcional):') || '').trim();
        const mensaje = String(prompt('Escribe tu mensaje para la empresa:') || '').trim();
        if (!mensaje) return;
        privateMsgLink.style.pointerEvents = 'none';
        const res = await fetch('/api/public/mensajes_privados', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            empresa_slug: empresaSlug,
            origen: 'venta_publica',
            origen_ref: 'checkout: item_id=' + String(state.itemId || 0),
            nombre: nombre,
            contacto: contacto,
            mensaje: mensaje
          })
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        if (!res.ok) throw new Error(data.error || text || ('HTTP ' + res.status));
        alert('Mensaje enviado. Si dejas tu contacto, la empresa podrá responderte.');
      } catch (e) {
        alert(e.message || 'No se pudo enviar el mensaje.');
      } finally {
        privateMsgLink.style.pointerEvents = '';
      }
    };
  </script>
  <script src="/js/ai_chat_drawer.js"></script>
</body>
</html>
