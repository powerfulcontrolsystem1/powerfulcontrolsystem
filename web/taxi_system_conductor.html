<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Taxi system conductor</title>
  <link rel="stylesheet" href="/estilos.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top left, rgba(49,157,231,.14), transparent 28%),linear-gradient(180deg,#07131f,#0d1f32);color:#eef4fb;font-family:"Segoe UI Variable","Segoe UI",sans-serif}
    .driver-shell{max-width:1100px;margin:0 auto;padding:18px;display:grid;gap:16px}
    .driver-card{background:rgba(11,26,42,.92);border:1px solid rgba(150,176,206,.16);border-radius:22px;box-shadow:0 24px 44px rgba(0,0,0,.28);padding:18px}
    .driver-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .driver-map{height:420px;border-radius:18px;overflow:hidden}
    .driver-offer{padding:14px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(150,176,206,.14)}
    @media (max-width: 980px){.driver-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="driver-shell">
    <section class="driver-card">
      <h1 style="margin:0 0 10px;">Portal móvil del conductor</h1>
      <p style="margin:0;color:#bdd1e4;">Conéctate con tu documento y PIN, activa tu GPS desde el celular, recibe alertas de servicios cercanos y actualiza el estado del viaje sin salir del navegador.</p>
    </section>

    <section class="driver-grid">
      <section class="driver-card">
        <h2 style="margin-top:0;">Acceso y presencia</h2>
        <form id="driverLoginForm" class="form">
          <div class="form-row">
            <div class="form-col"><label class="form-label" for="drvDocumentoLogin">Documento</label><input id="drvDocumentoLogin" class="form-input"></div>
            <div class="form-col"><label class="form-label" for="drvPinLogin">PIN</label><input id="drvPinLogin" class="form-input"></div>
          </div>
          <div class="form-actions"><button class="btn secondary" type="submit">Ingresar</button></div>
          <div id="driverLoginMsg" class="form-help"></div>
        </form>
        <hr style="border-color:rgba(150,176,206,.18);margin:18px 0;">
        <div class="form-row">
          <div class="form-col" style="display:flex;align-items:center;gap:8px;"><input id="driverOnline" type="checkbox"><label class="form-label" for="driverOnline" style="margin:0;">Estoy online</label></div>
          <div class="form-col" style="display:flex;align-items:center;gap:8px;"><input id="driverAvailable" type="checkbox" checked><label class="form-label" for="driverAvailable" style="margin:0;">Disponible para recibir carreras</label></div>
        </div>
        <div class="form-actions">
          <button id="btnSendPresence" class="btn secondary" type="button">Guardar presencia</button>
          <button id="btnSendDriverLocation" class="btn" type="button">Enviar GPS ahora</button>
        </div>
        <div id="driverPresenceMsg" class="form-help"></div>
      </section>
      <section class="driver-card">
        <h2 style="margin-top:0;">Mapa y servicio activo</h2>
        <div id="driverMap" class="driver-map"></div>
        <div id="driverTripBox" class="form-help" style="margin-top:12px;"></div>
      </section>
    </section>

    <section class="driver-grid">
      <section class="driver-card">
        <h2 style="margin-top:0;">Ofertas pendientes</h2>
        <div id="driverOffers" style="display:grid;gap:12px;"></div>
      </section>
      <section class="driver-card">
        <h2 style="margin-top:0;">Actualizar estado del viaje</h2>
        <div class="form-row">
          <div class="form-col"><label class="form-label" for="tripRequestId">Servicio</label><input id="tripRequestId" class="form-input" placeholder="ID del servicio activo"></div>
          <div class="form-col"><label class="form-label" for="tripState">Estado</label>
            <select id="tripState" class="form-input">
              <option value="en_camino">En camino</option>
              <option value="abordo">Cliente a bordo</option>
              <option value="completado">Completado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
        </div>
        <div class="form-row"><div class="form-col"><label class="form-label" for="tripNotes">Notas</label><textarea id="tripNotes" class="form-textarea"></textarea></div></div>
        <div class="form-actions"><button id="btnTripState" class="btn secondary" type="button">Actualizar estado</button></div>
        <div id="tripStateMsg" class="form-help"></div>
      </section>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/js/taxi_system_driver.js"></script>
</body>
</html>
