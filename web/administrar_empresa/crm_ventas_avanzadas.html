<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRM avanzado</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/js/empresa_submenu_context.js"></script>
  <style>
    .crm-redirect {
      width: min(720px, calc(100% - 28px));
      margin: 42px auto;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }
    .crm-redirect p { color: var(--muted); line-height: 1.55; }
  </style>
</head>
<body class="admin-subpage empresa-subpage">
  <main class="crm-redirect">
    <h1>CRM unificado</h1>
    <p>CRM avanzado ahora vive dentro del modulo CRM unificado, en el submenu Forecast y metas.</p>
    <a id="crmUnifiedLink" class="btn" href="/administrar_empresa/crm_comercial.html?tab=forecast">Abrir CRM unificado</a>
  </main>
  <script>
    (function () {
      var empresaID = 0;
      try {
        if (typeof window.__resolveEmpresaIdContext === "function") {
          empresaID = Number(window.__resolveEmpresaIdContext() || 0);
        }
      } catch (_) {}
      var url = new URL("/administrar_empresa/crm_comercial.html", window.location.origin);
      url.searchParams.set("tab", "forecast");
      if (empresaID > 0) url.searchParams.set("empresa_id", String(empresaID));
      var link = document.getElementById("crmUnifiedLink");
      if (link) link.href = url.pathname + url.search;
      window.setTimeout(function () {
        window.location.replace(url.pathname + url.search);
      }, 450);
    })();
  </script>
</body>
</html>
