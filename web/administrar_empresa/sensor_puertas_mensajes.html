<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mensajes de sensores (Puertas)</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h2>Mensajes de sensores por empresa</h2>
      </div>

      <div class="form">
        <p class="form-help">Esta página muestra las cadenas de texto recibidas desde las Raspberry Pi registradas para la empresa seleccionada.</p>
        <div id="messagesList">Cargando mensajes...</div>
      </div>
    </section>
  </div>

  <script>
    function parsePositiveInt(raw) {
      const n = Number(String(raw || '').trim());
      if (!Number.isFinite(n)) return 0;
      const v = Math.trunc(n);
      return v > 0 ? v : 0;
    }

    function resolveEmpresaId() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const own = parsePositiveInt(params.get('empresa_id') || params.get('id'));
        if (own > 0) return own;
      } catch (_) {}
      try {
        if (window.parent && window.parent !== window) {
          if (typeof window.parent.__resolveEmpresaIdContext === 'function') {
            const parentResolved = parsePositiveInt(window.parent.__resolveEmpresaIdContext());
            if (parentResolved > 0) return parentResolved;
          }
          const parentParams = new URLSearchParams(window.parent.location.search || '');
          const fromParent = parsePositiveInt(parentParams.get('empresa_id') || parentParams.get('id'));
          if (fromParent > 0) return fromParent;
        }
      } catch (_) {}
      try {
        const candidates = [
          sessionStorage.getItem('active_empresa_id'),
          sessionStorage.getItem('empresa_id'),
          localStorage.getItem('active_empresa_id'),
          localStorage.getItem('empresa_id')
        ];
        for (let i = 0; i < candidates.length; i++) {
          const parsed = parsePositiveInt(candidates[i]);
          if (parsed > 0) return parsed;
        }
      } catch (_) {}
      return 0;
    }

    const empresaId = resolveEmpresaId();

    function sanitize(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadMessages() {
      const container = document.getElementById('messagesList');
      container.innerHTML = 'Cargando mensajes...';
      if (!empresaId) { container.innerHTML = 'Falta empresa_id en la URL'; return; }
      try {
        const res = await fetch('/api/empresa/sensor_puertas/messages?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) { container.innerHTML = 'Error al cargar mensajes'; return; }
        const rows = await res.json();
        if (!Array.isArray(rows) || rows.length === 0) { container.innerHTML = '<p class="form-help">No hay mensajes.</p>'; return; }
        const html = rows.map(m => {
          return '<div class="table" style="margin-bottom:8px;padding:8px;border-radius:8px;border:1px solid var(--border)">' +
            '<div><strong>Device:</strong> ' + sanitize(m.device_id) + ' <small>Estación: ' + (m.estacion_id || 'N/A') + '</small></div>' +
            '<div><strong>Mensaje:</strong> ' + sanitize(m.message_text || m.message || '') + '</div>' +
            '<div class="form-help">Recibido: ' + sanitize(m.received_at || '') + '</div>' +
            '</div>';
        }).join('');
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = 'Error: ' + String(err);
      }
    }

    loadMessages();
  </script>
</body>
</html>
