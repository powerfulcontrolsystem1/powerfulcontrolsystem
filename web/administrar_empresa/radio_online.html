<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Radio online</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="admin-empresa-shell">
  <div class="page-shell">
    <section class="card">
      <h1>Radio online para acompañar la operación</h1>
      <p class="form-help">Activa una emisora sin salir del sistema. El reproductor se queda pequeño y fijo para que podamos seguir trabajando sin ruido visual.</p>
      <div class="radio-config-panel">
        <label class="radio-config-toggle" for="radioOnlineEnabled">
          <input id="radioOnlineEnabled" type="checkbox" checked>
          <span>
            <strong>Activar radio online</strong>
            <small>Controla el boton flotante, el panel de emisoras y el reproductor compacto.</small>
          </span>
        </label>
        <div id="radioOnlineStatus" class="form-help">Radio online activa.</div>
      </div>
      <div id="radioCatalogPage" class="radio-station-grid"></div>
    </section>
  </div>
  <script src="/js/radio_catalog.js"></script>
  <script src="/js/radio_online.js"></script>
</body>
</html>
