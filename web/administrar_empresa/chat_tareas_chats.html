<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat - Chat y tareas</title>
  <link rel="stylesheet" href="/estilos.css">
  <script>
    (function () {
      try {
        var c = (document.cookie || "").match(/(?:^|;)\s*pcs_theme=([^;]+)/);
        var t = "";
        try { t = window.localStorage.getItem("theme") || ""; } catch (e) {}
        if (!t && c) { try { t = decodeURIComponent(c[1]); } catch (e2) { t = c[1]; } }
        t = String(t || "").trim().toLowerCase();
        var ok = { dark: 1, "dark-violet": 1, "dark-emerald": 1, light: 1, "light-rose": 1, "light-gold": 1 };
        if (!ok[t]) t = "dark";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.classList.toggle("theme-light", t.indexOf("light") === 0);
        document.documentElement.classList.toggle("theme-dark", t.indexOf("light") !== 0);
      } catch (err) {}
    })();
  </script>
</head>
<body class="chat-workspace-shell chat-workspace--mail">
  <main class="container chat-workspace-page">
    <section class="chat-workspace-hero">
      <nav class="chat-workspace-subnav" aria-label="Submenu Chat y tareas">
        <a class="chat-workspace-tab active" href="/administrar_empresa/chat_tareas_chats.html">
          <span class="chat-workspace-tab-icon" aria-hidden="true">C</span>
          <span><strong>Chat</strong><small>Correo interno, conversaciones y mensajes.</small></span>
        </a>
        <a class="chat-workspace-tab" href="/administrar_empresa/chat_tareas_tareas.html">
          <span class="chat-workspace-tab-icon" aria-hidden="true">T</span>
          <span><strong>Tareas</strong><small>Asignaciones, responsables y seguimiento.</small></span>
        </a>
        <a class="chat-workspace-tab" href="/administrar_empresa/chat_tareas_agenda.html">
          <span class="chat-workspace-tab-icon" aria-hidden="true">A</span>
          <span><strong>Agenda</strong><small>Citas, reuniones y calendario empresarial.</small></span>
        </a>
      </nav>
    </section>

    <section class="chat-workspace-stage">
      <div class="chat-workspace-stage-head">
        <div></div>
        <span class="chat-workspace-stage-pill">Mensajeria</span>
      </div>
      <iframe id="chatWorkspaceFrame" class="chat-workspace-frame" data-src="/administrar_empresa/chat_y_tareas.html?view=chats" title="Chat"></iframe>
    </section>
  </main>

  <script>
    (function () {
      function syncFrame() {
        var frame = document.getElementById("chatWorkspaceFrame");
        if (!frame) return;
        var current = new URLSearchParams(window.location.search || "");
        var target = new URL(frame.getAttribute("data-src"), window.location.origin);
        current.forEach(function (value, key) {
          if (key !== "view") target.searchParams.set(key, value);
        });
        document.querySelectorAll(".chat-workspace-tab").forEach(function (link) {
          var url = new URL(link.getAttribute("href"), window.location.origin);
          current.forEach(function (value, key) {
            if (key !== "view") url.searchParams.set(key, value);
          });
          link.href = url.pathname + url.search;
        });
        frame.src = target.pathname + target.search;
      }
      syncFrame();
    })();
  </script>
</body>
</html>
