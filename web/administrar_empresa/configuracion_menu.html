  <script>
    (function bindFrecuenciaFPMenuVisibility(){
      var item = document.getElementById('menuFrecuenciaFP');
      if (!item || item.dataset.pcsBound === '1') return;
      item.dataset.pcsBound = '1';

      function setVisible(ok) {
        item.hidden = !ok;
      }

      async function check() {
        try {
          var res = await fetch('/api/empresa/frecuencia_fp/permitido', { method: 'GET' });
          var txt = await res.text();
          var data = {};
          try { data = txt ? JSON.parse(txt) : {}; } catch (e) { data = {}; }
          if (!res.ok) return setVisible(false);
          setVisible(!!(data && data.allowed));
        } catch (e) {
          setVisible(false);
        }
      }

      check();
    })();
  </script>
