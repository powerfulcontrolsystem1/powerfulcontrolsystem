<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirigiendo al carrito unificado</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h1 style="margin:0;">Carrito unificado</h1>
      </div>
      <p id="redirectMsg" class="form-help">Redirigiendo al carrito unificado de la estación...</p>
    </section>
  </div>

  <script>
    (function() {
      try {
        var params = new URLSearchParams(window.location.search || '');
        params.delete('variant');
        params.delete('view');
        window.location.replace('/administrar_empresa/carrito_de_compras.html?' + params.toString());
      } catch (err) {
        var box = document.getElementById('redirectMsg');
        if (box) {
          box.textContent = 'No se pudo redirigir automáticamente. Abre /administrar_empresa/carrito_de_compras.html con la misma estación.';
          box.className = 'error';
        }
      }
    })();
  </script>
</body>
</html>
