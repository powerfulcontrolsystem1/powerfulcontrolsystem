<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat IA centralizado</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h1 class="empresa-section-title">Chat IA centralizado</h1>
      </div>
      <p class="form-help">El proyecto ahora usa un solo chat de IA central para toda la plataforma.</p>
      <p class="form-help">Abriremos el asistente central en modo reportes para que continúes desde ahí.</p>
      <div class="form-actions">
        <button id="openCentralAI" class="btn" type="button">Abrir asistente IA central</button>
      </div>
      <div id="msg" class="form-help"></div>
    </section>
  </div>

  <script>
    (function(){
      function notifyParentOpenDrawer() {
        try {
          var payload = {
            type: 'pcs-ai-drawer-open',
            mode: 'reportes',
            prompt: 'Genera un reporte o responde una pregunta de reportes para la empresa actual.'
          };
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(payload, '*');
            return true;
          }
        } catch (error) {}
        return false;
      }

      function setMsg(text, isError) {
        var el = document.getElementById('msg');
        if (!el) return;
        el.textContent = text || '';
        el.classList.toggle('value-negative', !!isError);
      }

      function openCentral() {
        if (notifyParentOpenDrawer()) {
          setMsg('Solicitud enviada al asistente central.', false);
          return;
        }
        setMsg('No se pudo abrir el asistente central desde esta vista. Vuelve al panel principal y usa el botón flotante de IA.', true);
      }

      document.getElementById('openCentralAI').addEventListener('click', openCentral);
      window.setTimeout(openCentral, 250);
    })();
  </script>
</body>
</html>
