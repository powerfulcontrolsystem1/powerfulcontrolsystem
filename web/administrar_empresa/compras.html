<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Compras</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-module-header">
      <div>
        <h1>Compras</h1>
        <p id="empresaInfo">Empresa: cargando...</p>
      </div>
      <div class="empresa-module-kpis">
        <div class="kpi-box">
          <span class="kpi-label">Documentos</span>
          <strong id="kpiDocumentos">0</strong>
        </div>
        <div class="kpi-box">
          <span class="kpi-label">Borrador</span>
          <strong id="kpiBorrador">0</strong>
        </div>
        <div class="kpi-box">
          <span class="kpi-label">Emitidas</span>
          <strong id="kpiEmitidas">0</strong>
        </div>
        <div class="kpi-box">
          <span class="kpi-label">Recepcionadas</span>
          <strong id="kpiRecepcionadas">0</strong>
        </div>
        <div class="kpi-box">
          <span class="kpi-label">Contabilizadas</span>
          <strong id="kpiContabilizadas">0</strong>
        </div>
      </div>
    </section>

    <div id="messageBox" class="form-help"></div>

    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h2>Registrar documento de compra</h2>
      </div>

      <form id="docForm" class="form">
        <div class="form-row">
          <div class="form-col">
            <label class="form-label" for="proveedorSelect">Proveedor</label>
            <select id="proveedorSelect" class="form-input" required>
              <option value="">Seleccione proveedor</option>
            </select>
          </div>
          <div class="form-col">
            <label class="form-label" for="accionCreate">Acción inicial</label>
            <select id="accionCreate" class="form-input">
              <option value="crear">Guardar como borrador</option>
              <option value="emitir_orden">Emitir orden de compra</option>
            </select>
          </div>
          <div class="form-col">
            <label class="form-label" for="documentoCodigo">Código documento</label>
            <input id="documentoCodigo" class="form-input" placeholder="OC-2026-0001">
          </div>
        </div>

        <div class="form-row">
          <div class="form-col">
            <label class="form-label" for="montoTotal">Monto total</label>
            <input id="montoTotal" class="form-input" type="number" min="0" step="0.01" value="0">
          </div>
          <div class="form-col">
            <label class="form-label" for="moneda">Moneda</label>
            <input id="moneda" class="form-input" value="COP" maxlength="5">
          </div>
          <div class="form-col">
            <label class="form-label" for="periodoContable">Periodo contable</label>
            <input id="periodoContable" class="form-input" placeholder="YYYY-MM">
          </div>
        </div>

        <div class="form-row">
          <div class="form-col">
            <label class="form-label" for="observaciones">Observaciones</label>
            <textarea id="observaciones" class="form-textarea" placeholder="Notas de negociación, condiciones de entrega, prioridad..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn" type="submit">Guardar documento</button>
          <button id="btnLimpiarForm" class="btn secondary" type="button">Limpiar</button>
        </div>
      </form>
    </section>

    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h2>Documentos de compras</h2>
        <div class="empresa-inline-actions">
          <select id="filtroEstado" class="form-input">
            <option value="">Todos los estados</option>
            <option value="borrador">Borrador</option>
            <option value="emitida">Emitida</option>
            <option value="recepcionada">Recepcionada</option>
            <option value="contabilizada">Contabilizada</option>
          </select>
          <input id="filtroBusqueda" class="form-input" placeholder="Buscar por código u observaciones">
          <label class="empresa-config-check" for="filtroInactivos">
            <input id="filtroInactivos" type="checkbox">
            <span>Incluir inactivos</span>
          </label>
          <button id="btnFiltrar" class="btn secondary" type="button">Filtrar</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="table" id="docsTable">
          <thead>
            <tr>
              <th>Código</th>
              <th>Proveedor</th>
              <th>Estado documento</th>
              <th>Monto</th>
              <th>Periodo</th>
              <th>Estado</th>
              <th>Actualización</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
  (function () {
    function getQueryParam(name) {
      var params = new URLSearchParams(window.location.search || "");
      return params.get(name);
    }

    function formatMoney(value, moneda) {
      var amount = Number(value || 0);
      return new Intl.NumberFormat("es-CO", {
        style: "currency",
        currency: (moneda || "COP").toUpperCase(),
        maximumFractionDigits: 2
      }).format(amount);
    }

    function escapeHtml(raw) {
      return String(raw || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toPeriodoActual() {
      var now = new Date();
      var month = String(now.getMonth() + 1).padStart(2, "0");
      return now.getFullYear() + "-" + month;
    }

    var empresaID = Number(getQueryParam("empresa_id") || getQueryParam("id") || 0);
    var empresaInfo = document.getElementById("empresaInfo");
    var messageBox = document.getElementById("messageBox");
    var proveedorSelect = document.getElementById("proveedorSelect");
    var periodoContableInput = document.getElementById("periodoContable");

    var kpiDocumentos = document.getElementById("kpiDocumentos");
    var kpiBorrador = document.getElementById("kpiBorrador");
    var kpiEmitidas = document.getElementById("kpiEmitidas");
    var kpiRecepcionadas = document.getElementById("kpiRecepcionadas");
    var kpiContabilizadas = document.getElementById("kpiContabilizadas");

    var docsTableBody = document.querySelector("#docsTable tbody");
    var filtroEstado = document.getElementById("filtroEstado");
    var filtroBusqueda = document.getElementById("filtroBusqueda");
    var filtroInactivos = document.getElementById("filtroInactivos");

    var state = {
      proveedores: [],
      documentos: []
    };

    function showMessage(text, type) {
      messageBox.textContent = text || "";
      if (type === "error") {
        messageBox.style.color = "#ff7f7f";
        return;
      }
      if (type === "ok") {
        messageBox.style.color = "#7de09e";
        return;
      }
      messageBox.style.color = "";
    }

    async function apiRequest(path, options) {
      var resp = await fetch(path, Object.assign({ credentials: "same-origin" }, options || {}));
      if (!resp.ok) {
        var errorText = await resp.text();
        throw new Error(errorText || ("HTTP " + resp.status));
      }
      if (resp.status === 204) {
        return null;
      }
      return resp.json();
    }

    function proveedorNombreByID(id) {
      for (var i = 0; i < state.proveedores.length; i += 1) {
        if (Number(state.proveedores[i].id) === Number(id)) {
          return state.proveedores[i].nombre || ("Proveedor #" + id);
        }
      }
      return "Proveedor #" + id;
    }

    function estadoBadge(estadoDocumento) {
      var estado = String(estadoDocumento || "").toLowerCase();
      if (estado === "emitida") return '<span class="badge mid">emitida</span>';
      if (estado === "recepcionada") return '<span class="badge low">recepcionada</span>';
      if (estado === "contabilizada") return '<span class="badge low">contabilizada</span>';
      return '<span class="badge high">' + escapeHtml(estado || "borrador") + "</span>";
    }

    function accionesDocumento(doc) {
      var acciones = [];
      var estadoDoc = String(doc.estado_documento || "").toLowerCase();
      var estado = String(doc.estado || "activo").toLowerCase();
      var codigo = escapeHtml(doc.documento_codigo || "");
      var tipo = escapeHtml(doc.tipo_documento || "orden_compra");

      if (estado === "activo") {
        if (estadoDoc === "borrador" || estadoDoc === "pendiente_emision") {
          acciones.push('<button type="button" class="btn secondary" data-action="emitir_orden" data-codigo="' + codigo + '" data-tipo="' + tipo + '">Emitir</button>');
        }
        if (estadoDoc === "emitida" || estadoDoc === "recepcion_parcial") {
          acciones.push('<button type="button" class="btn secondary" data-action="recepcionar_compra" data-codigo="' + codigo + '" data-tipo="' + tipo + '">Recepcionar</button>');
        }
        if (estadoDoc === "recepcionada") {
          acciones.push('<button type="button" class="btn secondary" data-action="contabilizar_compra" data-codigo="' + codigo + '" data-tipo="' + tipo + '">Contabilizar</button>');
        }
        acciones.push('<button type="button" class="btn secondary" data-action="desactivar" data-codigo="' + codigo + '" data-tipo="' + tipo + '">Desactivar</button>');
      } else {
        acciones.push('<button type="button" class="btn secondary" data-action="activar" data-codigo="' + codigo + '" data-tipo="' + tipo + '">Activar</button>');
      }

      return acciones.join(" ");
    }

    function renderKPIs() {
      var borrador = 0;
      var emitidas = 0;
      var recepcionadas = 0;
      var contabilizadas = 0;

      state.documentos.forEach(function (doc) {
        var estado = String(doc.estado_documento || "").toLowerCase();
        if (estado === "emitida") emitidas += 1;
        else if (estado === "recepcionada") recepcionadas += 1;
        else if (estado === "contabilizada") contabilizadas += 1;
        else borrador += 1;
      });

      kpiDocumentos.textContent = String(state.documentos.length);
      kpiBorrador.textContent = String(borrador);
      kpiEmitidas.textContent = String(emitidas);
      kpiRecepcionadas.textContent = String(recepcionadas);
      kpiContabilizadas.textContent = String(contabilizadas);
    }

    function renderDocumentos() {
      if (!state.documentos.length) {
        docsTableBody.innerHTML = '<tr><td colspan="8">No hay documentos de compras para los filtros seleccionados.</td></tr>';
        renderKPIs();
        return;
      }

      var rows = state.documentos.map(function (doc) {
        return '<tr>' +
          '<td>' + escapeHtml(doc.documento_codigo || "") + '</td>' +
          '<td>' + escapeHtml(proveedorNombreByID(doc.proveedor_id)) + '</td>' +
          '<td>' + estadoBadge(doc.estado_documento) + '</td>' +
          '<td>' + escapeHtml(formatMoney(doc.monto_total, doc.moneda || "COP")) + '</td>' +
          '<td>' + escapeHtml(doc.periodo_contable || "") + '</td>' +
          '<td>' + escapeHtml(doc.estado || "activo") + '</td>' +
          '<td>' + escapeHtml(doc.fecha_actualizacion || doc.fecha_creacion || "") + '</td>' +
          '<td>' + accionesDocumento(doc) + '</td>' +
          '</tr>';
      });

      docsTableBody.innerHTML = rows.join("");
      renderKPIs();
    }

    async function loadProveedores() {
      var data = await apiRequest('/api/empresa/proveedores?empresa_id=' + encodeURIComponent(String(empresaID)) + '&include_inactive=1');
      state.proveedores = Array.isArray(data) ? data : [];

      var options = ['<option value="">Seleccione proveedor</option>'];
      state.proveedores.forEach(function (p) {
        if (String(p.estado || "activo").toLowerCase() !== "activo") {
          return;
        }
        options.push('<option value="' + escapeHtml(String(p.id)) + '">' + escapeHtml((p.nombre || "Proveedor") + ' (' + (p.codigo || ('ID-' + p.id)) + ')') + '</option>');
      });
      proveedorSelect.innerHTML = options.join("");
    }

    async function loadDocumentos() {
      var query = new URLSearchParams();
      query.set('empresa_id', String(empresaID));
      query.set('include_inactive', filtroInactivos.checked ? '1' : '0');
      var estadoDocumento = String(filtroEstado.value || '').trim();
      if (estadoDocumento) {
        query.set('estado_documento', estadoDocumento);
      }
      var q = String(filtroBusqueda.value || '').trim();
      if (q) {
        query.set('q', q);
      }

      var data = await apiRequest('/api/empresa/compras/documentos?' + query.toString());
      state.documentos = Array.isArray(data) ? data : [];
      renderDocumentos();
    }

    async function ejecutarAccion(codigoDocumento, tipoDocumento, accion) {
      var payload = {
        empresa_id: empresaID,
        documento_codigo: codigoDocumento,
        tipo_documento: tipoDocumento || 'orden_compra'
      };

      if (accion === 'desactivar' || accion === 'activar') {
        payload.accion = 'activar';
        payload.activo = accion === 'activar';
      } else {
        payload.accion = accion;
      }

      await apiRequest('/api/empresa/compras/documentos', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      showMessage('Documento ' + codigoDocumento + ' actualizado con acción: ' + accion + '.', 'ok');
      await loadDocumentos();
    }

    async function submitFormulario(event) {
      event.preventDefault();
      showMessage('');

      var proveedorID = Number(proveedorSelect.value || 0);
      if (!proveedorID) {
        showMessage('Debe seleccionar un proveedor activo.', 'error');
        return;
      }

      var payload = {
        empresa_id: empresaID,
        proveedor_id: proveedorID,
        documento_codigo: String(document.getElementById('documentoCodigo').value || '').trim(),
        accion: String(document.getElementById('accionCreate').value || 'crear').trim(),
        monto_total: Number(document.getElementById('montoTotal').value || 0),
        moneda: String(document.getElementById('moneda').value || 'COP').trim().toUpperCase(),
        periodo_contable: String(document.getElementById('periodoContable').value || '').trim(),
        observaciones: String(document.getElementById('observaciones').value || '').trim()
      };

      var resp = await apiRequest('/api/empresa/compras/documentos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      var resultado = (resp && resp.resultado) || {};
      showMessage('Documento guardado: ' + (resultado.documento_codigo || payload.documento_codigo || 'sin codigo') + '.', 'ok');
      document.getElementById('documentoCodigo').value = '';
      document.getElementById('observaciones').value = '';
      await loadDocumentos();
    }

    async function init() {
      if (!empresaID) {
        showMessage('empresa_id es obligatorio en la URL.', 'error');
        return;
      }

      empresaInfo.textContent = 'Empresa ID: ' + String(empresaID);
      periodoContableInput.value = toPeriodoActual();

      try {
        await loadProveedores();
        await loadDocumentos();
      } catch (err) {
        showMessage(err.message || 'No se pudo cargar módulo de compras.', 'error');
      }
    }

    document.getElementById('docForm').addEventListener('submit', function (event) {
      submitFormulario(event).catch(function (err) {
        showMessage(err.message || 'No se pudo guardar documento.', 'error');
      });
    });

    document.getElementById('btnLimpiarForm').addEventListener('click', function () {
      document.getElementById('documentoCodigo').value = '';
      document.getElementById('montoTotal').value = '0';
      document.getElementById('moneda').value = 'COP';
      document.getElementById('periodoContable').value = toPeriodoActual();
      document.getElementById('observaciones').value = '';
      document.getElementById('accionCreate').value = 'crear';
      showMessage('Formulario limpio.');
    });

    document.getElementById('btnFiltrar').addEventListener('click', function () {
      loadDocumentos().catch(function (err) {
        showMessage(err.message || 'No se pudo filtrar documentos.', 'error');
      });
    });

    docsTableBody.addEventListener('click', function (event) {
      var target = event.target;
      if (!target || target.tagName !== 'BUTTON') {
        return;
      }
      var accion = String(target.getAttribute('data-action') || '').trim();
      var codigo = String(target.getAttribute('data-codigo') || '').trim();
      var tipo = String(target.getAttribute('data-tipo') || 'orden_compra').trim();
      if (!accion || !codigo) {
        return;
      }
      ejecutarAccion(codigo, tipo, accion).catch(function (err) {
        showMessage(err.message || 'No se pudo ejecutar acción del documento.', 'error');
      });
    });

    init();
  })();
  </script>
</body>
</html>
