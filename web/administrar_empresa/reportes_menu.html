<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Centro de reportes</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/js/empresa_submenu_context.js"></script>
</head>
<body class="admin-empresa-shell">
  <div class="admin-layout">
    <aside class="admin-sidebar admin-sidebar-mobile-collapsible">
      <h2>Centro de reportes</h2>
      <ul class="nav" id="reportesSidebarNav">
        <li><a id="linkReportesEjecutivos" href="/administrar_empresa/reportes_ejecutivos.html" target="reportesContentFrame"><img class="icon" src="/img/analytics-color.svg" alt="">Centro de reportes</a></li>
        <li class="admin-menu-visibility-item">
          <button type="button" class="admin-menu-visibility-toggle" aria-controls="reportesSidebarNav" aria-expanded="true" data-show-label="Mostrar menu" data-hide-label="Ocultar menu">
            <span class="admin-menu-visibility-icon" aria-hidden="true">&#9776;</span>
            <span class="admin-menu-visibility-label">Ocultar menu</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="admin-content">
      <iframe name="reportesContentFrame" id="reportesContentFrame" src="/administrar_empresa/reportes_ejecutivos.html" title="Centro de reportes" class="admin-empresa-frame"></iframe>
    </main>
  </div>
  <script src="/js/administrar_empresa.js"></script>
  <script>
    (function(){
      function applySubpageFromQuery() {
        try {
          var params = new URLSearchParams(window.location.search);
          var sub = params.get('subpage');
          if (!sub) return;
          var iframe = document.getElementById('reportesContentFrame');
          if (!iframe) return;
          var src = sub.indexOf('/') === 0 ? sub : ('/administrar_empresa/' + sub);
          if (window.__empresaModuleGuard && typeof window.__empresaModuleGuard.withEmpresa === 'function') {
            src = window.__empresaModuleGuard.withEmpresa(src);
          }
          iframe.src = src;
        } catch (_) {}
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applySubpageFromQuery);
      } else {
        applySubpageFromQuery();
      }
    })();
  </script>
  <script src="/menu.js"></script>
</body>
</html>
