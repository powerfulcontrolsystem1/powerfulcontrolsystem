      var verticalesNuevos = {};
      (window.PCS_NUEVOS_VERTICALES || []).forEach(function (item) {
        verticalesNuevos[item.module] = [
          item.fullTitle || item.title,
          item.lead || item.summary || "",
          item.sections || ["Dashboard", "Configuracion", "Registros", "Seguimiento", "Aprobaciones", "Evidencias"]
        ];
      });

      function sectionIntent(label, idx) {
        var text = String(label || "").toLowerCase();
        if (/dashboard|tablero|panel|resumen|jornada/.test(text)) return "dashboard";
        if (/config|sla|calidad|riesgo|cumplimiento|auditoria/.test(text)) return "control";
        if (/aproba|validaci|cierre|entrega|firma|comision|liquidacion/.test(text)) return "aprobacion";
        if (/evidencia|document|certificado|reporte|boletin|resultado/.test(text)) return "evidencia";
        if (/seguimiento|agenda|tracking|check|asistencia|visita|ronda|incidente|novedad/.test(text)) return "seguimiento";
        if (/responsable|profesional|tecnico|guia|conductor|instructor|guarda/.test(text)) return "responsables";
        if (idx === 0) return "dashboard";
        if (idx === 4) return "aprobacion";
        if (idx === 5) return "evidencia";
        return "registros";
      }

      function sectionIcon(intent, idx) {
        return {
          dashboard: "/img/analytics-color.svg",
          control: "/img/settings-color.svg",
          registros: "/img/report.svg",
          seguimiento: "/img/network-color.svg",
          responsables: "/img/customer.svg",
          aprobacion: "/img/shield-license-color.svg",
          evidencia: "/img/excel.svg"
        }[intent] || ["/img/analytics-color.svg", "/img/settings-color.svg", "/img/report.svg", "/img/customer.svg", "/img/shield-license-color.svg", "/img/network-color.svg"][idx % 6];
      }

      function moduloColombiaUrl(module, title, lead, section, intent) {
        var view = intent || "dashboard";
        return "/administrar_empresa/modulo_colombia.html?module=" + encodeURIComponent(module) +
          "&title=" + encodeURIComponent(title) +
          "&lead=" + encodeURIComponent(lead) +
          "&section=" + encodeURIComponent(section || "") +
          "&intent=" + encodeURIComponent(intent || "") +
          "&view=" + encodeURIComponent(view);
      }

      Object.keys(verticalesNuevos).forEach(function (module) {
        var row = verticalesNuevos[module];
        var title = row[0];
        var summary = row[1];
        var labels = row[2];
        modules[module] = {
          title: title,
          summary: summary,
          defaultUrl: moduloColombiaUrl(module, title, summary, labels[0] || "Dashboard", "dashboard"),
          items: labels.map(function (label, idx) {
            var intent = sectionIntent(label, idx);
            return [label, sectionIcon(intent, idx), moduloColombiaUrl(module, title, summary, label, intent)];
          })
        };
      });

      function param(name) {
        try { return (new URLSearchParams(location.search || "")).get(name) || ""; } catch (_) { return ""; }
      }

      function esc(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
          return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char];
        });
      }

      var key = param("module") || param("modulo") || "";
      var cfg = modules[key] || modules.taxi;
      document.title = cfg.title + " - Menu";
      document.getElementById("moduleKicker").textContent = "Modulo";
      document.getElementById("moduleTitle").textContent = cfg.title;
      document.getElementById("moduleSummary").textContent = cfg.summary;
      document.getElementById("moduleSidebarNav").innerHTML = cfg.items.map(function (item) {
        return '<li><a href="' + esc(item[2]) + '" target="moduleContentFrame" data-submenu-link><img class="icon" src="' + esc(item[1]) + '" alt=""> ' + esc(item[0]) + '</a></li>';
      }).join("") + '<li class="admin-menu-visibility-item"><button type="button" class="admin-menu-visibility-toggle" aria-controls="moduleSidebarNav" aria-expanded="true" data-show-label="Mostrar menu" data-hide-label="Ocultar menu"><span class="admin-menu-visibility-icon" aria-hidden="true">&#9776;</span><span class="admin-menu-visibility-label">Ocultar menu</span></button></li>';
      document.getElementById("moduleContentFrame").setAttribute("src", cfg.defaultUrl);
    })();
  </script>
