<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat IA</title>
  <link rel="stylesheet" href="/estilos.css">
  <script>
    (function () {
      try {
        var k = "theme";
        var c = (document.cookie || "").match(/(?:^|;)\s*pcs_theme=([^;]+)/);
        var t = "";
        try { t = window.localStorage.getItem(k) || ""; } catch (e) {}
        if (!t && c) { try { t = decodeURIComponent(c[1]); } catch (e2) { t = c[1]; } }
        t = String(t || "").trim().toLowerCase();
        var ok = { dark: 1, "dark-violet": 1, "dark-emerald": 1, light: 1, "light-rose": 1, "light-gold": 1 };
        if (!ok[t]) t = "dark";
        var root = document.documentElement;
        root.setAttribute("data-theme", t);
        root.classList.toggle("theme-light", t.indexOf("light") === 0);
        root.classList.toggle("theme-dark", t.indexOf("light") !== 0);
      } catch (err) {}
    })();
  </script>
</head>
<body class="ai-gemini-body ai-gemini-app-body">
  <div class="ai-gemini-app">
    <aside class="ai-gemini-sidebar" aria-label="Conversaciones">
      <button type="button" id="btnNewChat" class="ai-gemini-new-chat">+ Nuevo chat</button>
      <div class="ai-gemini-sidebar-section-title">En este dispositivo</div>
      <div id="conversationList" class="ai-gemini-conv-list"></div>
      <div class="ai-gemini-sidebar-section-title">Historial en servidor</div>
      <div id="serverHistoryList" class="ai-gemini-conv-list ai-gemini-conv-list--server"></div>
    </aside>
    <main class="ai-gemini-main">
      <header class="ai-gemini-topbar">
        <div class="ai-gemini-topbar-inner">
          <span class="ai-gemini-logo-dot" aria-hidden="true"></span>
          <label class="ai-gemini-visually-hidden" for="modelSelect">Modelo de IA</label>
          <select id="modelSelect" class="ai-gemini-model-select"></select>
        </div>
        <div class="ai-gemini-topmeta">
          <span id="modelPill" class="ai-gemini-meta-pill" title="Modelo en uso"></span>
          <span id="usagePill" class="ai-gemini-meta-pill ai-gemini-meta-pill--soft" hidden></span>
        </div>
      </header>

      <div id="limitBanner" class="ai-gemini-limit-banner" role="alert" hidden></div>

      <section id="authPanel" class="ai-gemini-auth card" hidden>
        <h2 class="ai-gemini-auth-title">Inicia sesión con Google</h2>
        <p class="form-help">Para usar el chat empresarial debes autenticarte con Google.</p>
        <div class="form-actions">
          <a id="googleLoginLink" class="btn" href="/auth/google/login">Continuar con Google</a>
        </div>
        <div id="authMsg" class="form-help"></div>
      </section>

      <div class="ai-gemini-chat-area">
        <div id="aiDisabledBanner" class="ai-gemini-inline-alert" hidden></div>
        <div id="messagesList" class="ai-chat-messages ai-gemini-messages"></div>

        <form id="promptForm" class="ai-chat-form ai-gemini-form ai-gemini-composer">
          <label class="ai-gemini-visually-hidden" for="promptInput">Mensaje</label>
          <textarea id="promptInput" class="form-textarea ai-gemini-input" maxlength="2500" placeholder="Escribe tu consulta…" title="Enter envía · Mayús+Enter nueva línea"></textarea>
          <div class="form-help ai-gemini-enter-hint">Enter envía · Mayús+Enter nueva línea</div>
          <div class="ai-chat-actions">
            <button id="micBtn" class="btn secondary" type="button" title="Dictar">Dictar</button>
            <button id="sendBtn" class="btn" type="submit">Enviar</button>
            <button id="clearBtn" class="btn secondary" type="button">Limpiar vista</button>
          </div>
          <div id="chatMsg" class="form-help ai-gemini-form-msg"></div>
        </form>
      </div>
    </main>
  </div>

  <script>
    const state = {
      empresaID: 0,
      empresaNombre: "",
      models: [],
      modelID: "",
      modelDisplay: "",
      googleAccount: "",
      usage: null,
      loading: false,
      authRequired: false,
      aiDisabled: false,
      messages: [],
      conversations: [],
      activeConvId: null,
      serverHistoryItems: [],
      viewingServerReadOnly: false
    };

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function normalize(v) {
      return (v == null ? "" : String(v)).trim();
    }

    function escapeHtml(v) {
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function genConvId() {
      return "c-" + Date.now() + "-" + Math.floor(Math.random() * 1e6);
    }

    function convStorageKey() {
      return "pcs_gemini_chat_v1_" + String(state.empresaID || 0);
    }

    function loadConversationsFromStorage() {
      try {
        const raw = window.localStorage.getItem(convStorageKey());
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.list) && parsed.list.length) {
          state.conversations = parsed.list;
          state.activeConvId = parsed.activeId || parsed.list[0].id;
        }
      } catch (e) {}
    }

    function saveConversationsToStorage() {
      try {
        window.localStorage.setItem(convStorageKey(), JSON.stringify({
          list: state.conversations,
          activeId: state.activeConvId
        }));
      } catch (e) {}
    }

    function ensureDefaultConversation() {
      if (!state.conversations.length) {
        const id = genConvId();
        state.conversations.push({
          id: id,
          title: "Nuevo chat",
          messages: [],
          updatedAt: Date.now()
        });
        state.activeConvId = id;
        state.messages = [];
        saveConversationsToStorage();
        return;
      }
      const exists = state.conversations.some(function (x) { return x.id === state.activeConvId; });
      if (!state.activeConvId || !exists) {
        state.activeConvId = state.conversations[0].id;
      }
      const c = state.conversations.find(function (x) { return x.id === state.activeConvId; });
      if (c) {
        state.messages = (c.messages || []).map(function (m) {
          return { role: m.role, content: m.content, at: m.at || "" };
        });
      }
    }

    function syncActiveConversationFromState() {
      const c = state.conversations.find(function (x) { return x.id === state.activeConvId; });
      if (!c) return;
      c.messages = state.messages.map(function (m) {
        return { role: m.role, content: m.content, at: m.at || "" };
      });
      c.updatedAt = Date.now();
      const fu = state.messages.find(function (m) { return normalize(m.role) === "user" && normalize(m.content); });
      if (fu) {
        const t = normalize(fu.content);
        c.title = t.length > 52 ? (t.slice(0, 52) + "…") : t;
      }
      saveConversationsToStorage();
      renderSidebarLocal();
    }

    function broadcastPrecioUpdateFromAI(text) {
      try {
        const raw = normalize(text);
        if (!raw) return;
        if (raw.indexOf("resultado=ok") === -1) return;
        const idMatch = raw.match(/producto_id=(\d+)/i);
        const priceMatch = raw.match(/precio_nuevo=([0-9]+(?:\.[0-9]+)?)/i);
        if (!idMatch || !priceMatch) return;
        const payload = {
          type: "producto_precio_actualizado",
          empresa_id: Number(state.empresaID || 0),
          producto_id: Number(idMatch[1]),
          precio_nuevo: Number(priceMatch[1]),
          at: new Date().toISOString()
        };
        window.localStorage.setItem("pcs:last_ai_action", JSON.stringify(payload));
      } catch (e) {}
    }

    function setMsg(id, text, isError) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text || "";
      el.classList.toggle("ai-gemini-form-msg--error", !!isError);
    }

    function hideLimitBanner() {
      const el = document.getElementById("limitBanner");
      if (!el) return;
      el.hidden = true;
      el.textContent = "";
    }

    function showLimitBanner(payload, httpStatus) {
      const el = document.getElementById("limitBanner");
      if (!el) return;
      const code = normalize(payload && payload.code);
      const err = normalize(payload && payload.error);
      const lim = payload && payload.daily_limit != null ? String(payload.daily_limit) : "—";
      const us = payload && payload.daily_used != null ? String(payload.daily_used) : "—";
      const upUrl = normalize(payload && payload.upgrade_url);
      let msg = "";
      if (code === "free_tier_limit_reached" || httpStatus === 429) {
        msg = "Has alcanzado el límite diario de consultas con IA para esta empresa con el modelo seleccionado. "
          + "Las consultas se reinician cada día natural. "
          + "Resumen: usadas hoy " + us + ", límite configurado " + lim + ". "
          + (err ? ("Detalle: " + err + " ") : "")
          + (normalize(payload && payload.upgrade_message) || "Si tu organización tiene un plan ampliado, el administrador de la plataforma puede aumentar el tope desde configuración avanzada.")
          + (upUrl ? (" Más información: " + upUrl) : "");
      } else if (code === "ai_empresa_chat_blocked") {
        msg = "El chat con IA para empresas está bloqueado: el límite diario está en 0 o la función fue deshabilitada desde el panel de superadministración. Contacta al administrador de la plataforma para que habiliten consultas o suban el tope diario.";
      } else if (code === "ai_empresa_chat_disabled") {
        msg = "El chat con IA para empresas está desactivado en la configuración lógica del servicio. Un administrador de la plataforma debe activarlo de nuevo.";
      } else if (httpStatus === 503 && err) {
        msg = err;
      } else {
        msg = err || "No se pudo completar la consulta por un límite o restricción del servicio.";
      }
      el.textContent = msg;
      el.hidden = false;
    }

    function showAuthPanel(message) {
      state.authRequired = true;
      document.getElementById("authPanel").hidden = false;
      document.getElementById("promptInput").disabled = true;
      document.getElementById("sendBtn").disabled = true;
      setMsg("authMsg", message || "Se requiere autenticación con Google.", true);
      setMsg("chatMsg", "Inicia sesión con Google para continuar.", true);
    }

    function hideAuthPanel() {
      state.authRequired = false;
      document.getElementById("authPanel").hidden = true;
      document.getElementById("promptInput").disabled = !!state.aiDisabled;
      document.getElementById("sendBtn").disabled = !!state.aiDisabled;
      setMsg("authMsg", "", false);
    }

    function setAIDisabledState(message) {
      state.aiDisabled = true;
      const banner = document.getElementById("aiDisabledBanner");
      const modelSelect = document.getElementById("modelSelect");
      const text = normalize(message) || "La IA está desactivada desde configuración avanzada del panel super.";
      if (banner) {
        banner.hidden = false;
        banner.textContent = text;
        banner.classList.add("value-negative");
      }
      document.getElementById("promptInput").disabled = true;
      document.getElementById("sendBtn").disabled = true;
      if (modelSelect) modelSelect.disabled = true;
      setMsg("chatMsg", text, true);
    }

    function clearAIDisabledState() {
      state.aiDisabled = false;
      const banner = document.getElementById("aiDisabledBanner");
      if (banner) banner.classList.remove("value-negative");
      const modelSelect = document.getElementById("modelSelect");
      if (banner) {
        banner.hidden = true;
        banner.textContent = "";
      }
      document.getElementById("promptInput").disabled = !!state.authRequired;
      document.getElementById("sendBtn").disabled = !!state.authRequired;
      if (modelSelect) modelSelect.disabled = false;
    }

    async function apiFetch(url, options) {
      const response = await fetch(url, options || {});
      const ct = normalize(response.headers.get("content-type")).toLowerCase();
      let payload = null;

      if (ct.indexOf("application/json") >= 0) {
        payload = await response.json().catch(function () { return null; });
      } else {
        const txt = await response.text().catch(function () { return ""; });
        payload = txt ? { error: txt } : null;
      }

      if (!response.ok) {
        const err = new Error(normalize(payload && (payload.error || payload.message)) || ("HTTP " + response.status));
        err.status = response.status;
        err.payload = payload || {};
        throw err;
      }

      return payload || {};
    }

    function renderTopMeta() {
      const mp = document.getElementById("modelPill");
      if (mp) {
        mp.textContent = "Modelo: " + (state.modelDisplay || state.modelID || "—");
      }
      const up = document.getElementById("usagePill");
      if (up) {
        if (state.usage && (state.usage.daily_used != null || state.usage.daily_limit != null)) {
          const u = state.usage.daily_used != null ? state.usage.daily_used : "—";
          const l = state.usage.daily_limit != null ? state.usage.daily_limit : "—";
          const r = state.usage.daily_remaining != null ? state.usage.daily_remaining : "—";
          up.textContent = "Uso hoy: " + u + " / " + l + " · Restantes: " + r;
          up.hidden = false;
        } else {
          up.hidden = true;
          up.textContent = "";
        }
      }
    }

    function renderModelOptions() {
      const select = document.getElementById("modelSelect");
      if (!select) return;
      const items = Array.isArray(state.models) ? state.models : [];
      if (!items.length) {
        select.innerHTML = '<option value="">Sin modelos disponibles</option>';
        select.disabled = true;
        return;
      }
      select.innerHTML = items.map(function (item) {
        const id = normalize(item.id);
        const name = normalize(item.display_name) || id;
        const description = normalize(item.description);
        const selected = id === state.modelID ? " selected" : "";
        const suffix = description ? (" — " + description) : "";
        return "<option value=\"" + escapeHtml(id) + "\"" + selected + ">" + escapeHtml(name + suffix) + "</option>";
      }).join("");
      select.disabled = false;
    }

    function renderSidebarLocal() {
      const box = document.getElementById("conversationList");
      if (!box) return;
      const sorted = state.conversations.slice().sort(function (a, b) { return (b.updatedAt || 0) - (a.updatedAt || 0); });
      if (!sorted.length) {
        box.innerHTML = '<div class="ai-gemini-conv-empty">Sin chats guardados</div>';
        return;
      }
      box.innerHTML = sorted.map(function (c) {
        const active = c.id === state.activeConvId ? " is-active" : "";
        const title = escapeHtml(normalize(c.title) || "Chat");
        return "<button type=\"button\" class=\"ai-gemini-conv-item" + active + "\" data-conv-id=\"" + escapeHtml(c.id) + "\">" + title + "</button>";
      }).join("");
    }

    function renderServerHistorySidebar() {
      const box = document.getElementById("serverHistoryList");
      if (!box) return;
      const items = state.serverHistoryItems || [];
      if (!items.length) {
        box.innerHTML = '<div class="ai-gemini-conv-empty">Sin registros</div>';
        return;
      }
      box.innerHTML = items.map(function (item, idx) {
        const pregunta = normalize(item.pregunta);
        const title = pregunta.length > 56 ? (pregunta.slice(0, 56) + "…") : pregunta;
        const fecha = normalize(item.fecha_consulta);
        return "<button type=\"button\" class=\"ai-gemini-conv-item ai-gemini-conv-item--server\" data-srv-idx=\"" + idx + "\">" +
          "<span class=\"ai-gemini-conv-item-title\">" + escapeHtml(title || "Consulta") + "</span>" +
          "<span class=\"ai-gemini-conv-item-meta\">" + escapeHtml(fecha) + "</span></button>";
      }).join("");
    }

    async function shareAssistantText(text) {
      const t = normalize(text);
      if (!t) return;
      try {
        if (navigator.share) {
          await navigator.share({ title: "Respuesta IA", text: t });
          setMsg("chatMsg", "Compartido.", false);
          return;
        }
      } catch (e) {}
      try {
        await navigator.clipboard.writeText(t);
        setMsg("chatMsg", "Respuesta copiada al portapapeles.", false);
      } catch (e2) {
        setMsg("chatMsg", "No se pudo compartir ni copiar el texto.", true);
      }
    }

    function renderMessages() {
      const list = document.getElementById("messagesList");
      if (!state.messages.length) {
        list.innerHTML = '<div class="ai-chat-empty ai-gemini-welcome">Escribe abajo para comenzar. Puedes abrir consultas anteriores desde la izquierda o guardar varias conversaciones en este dispositivo.</div>';
        return;
      }

      list.innerHTML = state.messages.map(function (item, idx) {
        const role = normalize(item.role).toLowerCase();
        const cls = role === "assistant" ? "assistant" : (role === "user" ? "user" : "system");
        const label = role === "assistant" ? "IA" : (role === "user" ? "Tú" : "Aviso");
        const actionUI = (role === "assistant" && item.actionProposal && Array.isArray(item.actionProposal.actions) && item.actionProposal.actions.length)
          ? renderActionProposalHTML(item.actionProposal, idx)
          : "";
        const shareBtn = role === "assistant"
          ? "<button type=\"button\" class=\"btn secondary ai-gemini-share-btn\" data-share-index=\"" + idx + "\">Compartir</button>"
          : "";
        return "<article class=\"ai-chat-bubble " + cls + "\">" +
          "<header><strong>" + escapeHtml(label) + "</strong><span>" + escapeHtml(normalize(item.at)) + "</span>" + shareBtn + "</header>" +
          "<div class=\"ai-chat-content\">" + escapeHtml(normalize(item.content)) + "</div>" +
          actionUI +
          "</article>";
      }).join("");

      list.scrollTop = list.scrollHeight;
    }

    function appendMessage(role, content) {
      state.messages.push({
        role: normalize(role).toLowerCase(),
        content: normalize(content),
        at: new Date().toLocaleString("es-CO")
      });
      renderMessages();
      if (!state.viewingServerReadOnly) {
        syncActiveConversationFromState();
      }
    }

    function extractPCSActionBlock(text) {
      const raw = normalize(text);
      if (!raw) return { clean: raw, proposal: null };
      const marker = "\nPCS_ACTION\n";
      const idx = raw.lastIndexOf(marker);
      if (idx < 0) return { clean: raw, proposal: null };
      const before = raw.slice(0, idx).trim();
      const after = raw.slice(idx + marker.length).trim();
      if (!after) return { clean: before, proposal: null };
      try {
        const proposal = JSON.parse(after);
        if (!proposal || proposal.version !== 1 || !Array.isArray(proposal.actions)) {
          return { clean: raw, proposal: null };
        }
        return { clean: before, proposal: proposal };
      } catch (e) {
        return { clean: raw, proposal: null };
      }
    }

    function renderActionProposalHTML(proposal, msgIdx) {
      const actions = Array.isArray(proposal.actions) ? proposal.actions : [];
      if (!actions.length) return "";
      const rows = actions.map(function (a, i) {
        const title = escapeHtml(normalize(a.title) || ("Acción " + (i + 1)));
        const endpoint = escapeHtml(normalize(a.endpoint));
        const method = escapeHtml(normalize(a.method).toUpperCase());
        const body = a.body != null ? escapeHtml(JSON.stringify(a.body, null, 2)) : "";
        return "<div class=\"ai-action-item\">" +
          "<div class=\"ai-action-head\"><b>" + title + "</b><span class=\"ai-action-mini\">" + method + " " + endpoint + "</span></div>" +
          (body ? ("<pre class=\"ai-action-body\">" + body + "</pre>") : "") +
          "</div>";
      }).join("");
      const note = proposal.note ? ("<div class=\"ai-action-note\">" + escapeHtml(normalize(proposal.note)) + "</div>") : "";
      return "<section class=\"ai-action-card\" data-action-msg-idx=\"" + msgIdx + "\">" +
        "<div class=\"ai-action-title\">Acciones sugeridas (requieren confirmación)</div>" +
        note +
        rows +
        "<div class=\"ai-action-actions\">" +
          "<button type=\"button\" class=\"btn\" data-action-confirm=\"" + msgIdx + "\">Confirmar y ejecutar</button>" +
          "<button type=\"button\" class=\"btn secondary\" data-action-cancel=\"" + msgIdx + "\">Cancelar</button>" +
        "</div>" +
      "</section>";
    }

    async function executeActionProposal(msgIdx) {
      const m = state.messages[msgIdx];
      if (!m || !m.actionProposal || !Array.isArray(m.actionProposal.actions) || !m.actionProposal.actions.length) return;
      if (state.loading || state.authRequired || state.aiDisabled) return;
      if (state.viewingServerReadOnly) return;
      state.loading = true;
      setMsg("chatMsg", "Ejecutando acciones…", false);
      try {
        for (const act of m.actionProposal.actions) {
          const endpoint = normalize(act.endpoint);
          const method = normalize(act.method || "POST").toUpperCase();
          if (method === "DELETE") {
            throw new Error("Acción bloqueada: por política del chat IA no se permiten eliminaciones (DELETE). Solo se permiten POST/PUT.");
          }
          if (method === "OPEN") {
            if (!endpoint || endpoint[0] !== "/") {
              throw new Error("Acción OPEN bloqueada: la URL debe ser relativa (iniciar con /).");
            }
            try {
              window.open(endpoint, "_blank", "noopener,noreferrer");
              appendMessage("system", "Acción ejecutada: abrir vista — " + endpoint);
              continue;
            } catch (e) {
              throw new Error("No se pudo abrir la vista en una nueva pestaña.");
            }
          }
          const bodyObj = act.body != null ? act.body : null;
          const res = await fetch(endpoint, {
            method: method,
            headers: {
              "Content-Type": "application/json",
              "X-PCS-Source": "chat_ia",
              "X-PCS-Chat-Conversation-ID": String(state.activeConvId || "")
            },
            body: bodyObj ? JSON.stringify(bodyObj) : null
          });
          const ct = normalize(res.headers.get("content-type")).toLowerCase();
          let payload = null;
          if (ct.indexOf("application/json") >= 0) payload = await res.json().catch(function () { return null; });
          else payload = { error: await res.text().catch(function () { return "" }) };
          if (!res.ok) {
            throw new Error("Fallo al ejecutar acción: HTTP " + res.status + " — " + normalize(payload && (payload.error || payload.message)));
          }
          appendMessage("system", "Acción ejecutada: " + normalize(act.title) + ". Respuesta: " + JSON.stringify(payload || {}));
        }
        m.actionProposal = null;
        syncActiveConversationFromState();
        renderMessages();
        setMsg("chatMsg", "Acciones ejecutadas y registradas en auditoría.", false);
      } finally {
        state.loading = false;
      }
    }

    function cancelActionProposal(msgIdx) {
      const m = state.messages[msgIdx];
      if (!m || !m.actionProposal) return;
      m.actionProposal = null;
      syncActiveConversationFromState();
      renderMessages();
      setMsg("chatMsg", "Acciones canceladas.", false);
    }

    function buildHistoryPayload() {
      return state.messages
        .filter(function (item) {
          const role = normalize(item.role).toLowerCase();
          return role === "user" || role === "assistant";
        })
        .slice(-8)
        .map(function (item) {
          return {
            rol: normalize(item.role).toLowerCase(),
            contenido: normalize(item.content)
          };
        });
    }

    async function loadEmpresaNameBestEffort() {
      state.empresaNombre = "";
      try {
        const data = await apiFetch("/super/api/empresas?id=" + encodeURIComponent(state.empresaID));
        const nombre = normalize(data && (data.nombre || data.Nombre));
        if (nombre) {
          state.empresaNombre = nombre;
        }
      } catch (err) {
        state.empresaNombre = "";
      }
      try {
        document.title = state.empresaNombre
          ? ("Chat IA — " + state.empresaNombre)
          : ("Chat IA — Empresa " + state.empresaID);
      } catch (e) {}
    }

    async function loadChatModel() {
      const data = await apiFetch("/api/empresa/chat_con_inteligencia_artificial/modelos?empresa_id=" + encodeURIComponent(state.empresaID));
      clearAIDisabledState();
      hideLimitBanner();
      const modelos = Array.isArray(data.modelos) ? data.modelos : [];
      if (!modelos.length) {
        throw new Error("No hay modelos IA disponibles para esta empresa.");
      }

      state.models = modelos.map(function (item) {
        return {
          id: normalize(item.id),
          display_name: normalize(item.display_name),
          description: normalize(item.description)
        };
      });
      state.googleAccount = normalize(data.google_account || state.googleAccount);

      const modeloPreferido = normalize(data.modelo_preferido);
      const selectedModel = state.models.find(function (item) {
        return item.id === modeloPreferido;
      }) || state.models[0];

      state.modelID = normalize(selectedModel && selectedModel.id);
      state.modelDisplay = normalize(selectedModel && selectedModel.display_name) || "Modelo IA";

      renderModelOptions();
      renderTopMeta();

      if (modeloPreferido !== state.modelID) {
        await apiFetch("/api/empresa/chat_con_inteligencia_artificial/modelo_preferido", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            empresa_id: Number(state.empresaID),
            model_id: state.modelID
          })
        });
      }
    }

    async function onModelChange(ev) {
      const newModelID = normalize(ev && ev.target && ev.target.value);
      if (!newModelID || newModelID === state.modelID) {
        return;
      }
      await apiFetch("/api/empresa/chat_con_inteligencia_artificial/modelo_preferido", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          empresa_id: Number(state.empresaID),
          model_id: newModelID
        })
      });
      state.modelID = newModelID;
      const selectedModel = (state.models || []).find(function (item) { return item.id === newModelID; });
      state.modelDisplay = normalize(selectedModel && selectedModel.display_name) || newModelID;
      renderModelOptions();
      renderTopMeta();
      setMsg("chatMsg", "Modelo actualizado.", false);
    }

    function openConversation(convId) {
      syncActiveConversationFromState();
      const c = state.conversations.find(function (x) { return x.id === convId; });
      if (!c) return;
      state.activeConvId = convId;
      state.messages = (c.messages || []).map(function (m) {
        return { role: m.role, content: m.content, at: m.at || "" };
      });
      state.viewingServerReadOnly = false;
      hideLimitBanner();
      saveConversationsToStorage();
      renderSidebarLocal();
      renderMessages();
      document.getElementById("promptInput").disabled = !!state.authRequired || !!state.aiDisabled;
      document.getElementById("sendBtn").disabled = !!state.authRequired || !!state.aiDisabled;
    }

    function newChat() {
      syncActiveConversationFromState();
      const id = genConvId();
      state.conversations.unshift({ id: id, title: "Nuevo chat", messages: [], updatedAt: Date.now() });
      state.activeConvId = id;
      state.messages = [];
      state.viewingServerReadOnly = false;
      hideLimitBanner();
      saveConversationsToStorage();
      renderSidebarLocal();
      renderMessages();
      setMsg("chatMsg", "", false);
    }

    function openServerHistoryItem(idx) {
      const item = state.serverHistoryItems[idx];
      if (!item) return;
      state.viewingServerReadOnly = true;
      state.messages = [
        { role: "user", content: normalize(item.pregunta), at: normalize(item.fecha_consulta) },
        { role: "assistant", content: normalize(item.respuesta), at: normalize(item.fecha_consulta) }
      ];
      renderMessages();
      setMsg("chatMsg", "Vista de historial (solo lectura). Usa «Nuevo chat» para continuar conversando.", false);
      document.getElementById("promptInput").disabled = true;
      document.getElementById("sendBtn").disabled = true;
    }

    async function loadHistorial() {
      try {
        const data = await apiFetch("/api/empresa/chat_con_inteligencia_artificial/historial?empresa_id=" + encodeURIComponent(state.empresaID) + "&limit=30");
        clearAIDisabledState();
        state.serverHistoryItems = Array.isArray(data.items) ? data.items : [];
        renderServerHistorySidebar();
      } catch (err) {
        const payload = err && err.payload ? err.payload : {};
        if (err && err.status === 401) {
          showAuthPanel("Tu sesión no es válida o expiró. Inicia sesión con Google para continuar.");
          return;
        }
        if (normalize(payload.code) === "ai_disabled") {
          setAIDisabledState(payload.error);
          state.serverHistoryItems = [];
          renderServerHistorySidebar();
          return;
        }
        state.serverHistoryItems = [];
        renderServerHistorySidebar();
      }
    }

    async function onSendPrompt(ev) {
      ev.preventDefault();
      if (state.loading || state.authRequired || state.aiDisabled) return;
      if (state.viewingServerReadOnly) {
        setMsg("chatMsg", "Estás viendo el historial en solo lectura. Pulsa «Nuevo chat» para escribir de nuevo.", true);
        return;
      }

      const pregunta = normalize(document.getElementById("promptInput").value);
      if (!pregunta) {
        setMsg("chatMsg", "Escribe un mensaje.", true);
        return;
      }
      if (!state.modelID) {
        setMsg("chatMsg", "No hay modelo IA disponible.", true);
        return;
      }

      state.loading = true;
      hideLimitBanner();
      setMsg("chatMsg", "Generando respuesta…", false);
      appendMessage("user", pregunta);
      document.getElementById("promptInput").value = "";

      try {
        const data = await apiFetch("/api/empresa/chat_con_inteligencia_artificial/consultar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            empresa_id: Number(state.empresaID),
            model_id: state.modelID,
            pregunta: pregunta,
            historial: buildHistoryPayload(),
            temperatura: 0.2
          })
        });

        const parsed = extractPCSActionBlock(normalize(data.respuesta));
        state.messages.push({
          role: "assistant",
          content: normalize(parsed.clean),
          at: new Date().toLocaleString("es-CO"),
          actionProposal: parsed.proposal
        });
        renderMessages();
        if (!state.viewingServerReadOnly) {
          syncActiveConversationFromState();
        }
        broadcastPrecioUpdateFromAI(normalize(data.respuesta));
        state.googleAccount = normalize(data.google_account || state.googleAccount);
        state.usage = data.usage || null;
        renderTopMeta();
        hideAuthPanel();
        setMsg("chatMsg", "", false);
        loadHistorial();
      } catch (err) {
        const payload = err && err.payload ? err.payload : {};
        const st = err && err.status;
        if (err && err.status === 401) {
          appendMessage("system", "Sesión expirada o no autenticada.");
          showAuthPanel("Inicia sesión con Google.");
        } else if (normalize(payload.code) === "ai_disabled") {
          appendMessage("system", normalize(payload.error || "La IA está desactivada."));
          setAIDisabledState(payload.error);
        } else if (normalize(payload.code) === "free_tier_limit_reached" || st === 429 || normalize(payload.code) === "ai_empresa_chat_blocked") {
          appendMessage("system", normalize(payload.error || "Límite de uso alcanzado."));
          showLimitBanner(payload, st);
          setMsg("chatMsg", "Consulta no enviada por límite o restricción.", true);
        } else if (st === 503 && payload) {
          showLimitBanner(payload, st);
          setMsg("chatMsg", normalize(payload.error) || "Servicio no disponible.", true);
        } else {
          appendMessage("system", "Error: " + normalize(err.message));
          setMsg("chatMsg", err.message || "No se pudo procesar la consulta.", true);
        }
      } finally {
        state.loading = false;
      }
    }

    function bindEvents() {
      document.getElementById("clearBtn").addEventListener("click", function () {
        state.messages = [];
        const c = state.conversations.find(function (x) { return x.id === state.activeConvId; });
        if (c) {
          c.messages = [];
          c.title = "Nuevo chat";
          c.updatedAt = Date.now();
          saveConversationsToStorage();
          renderSidebarLocal();
        }
        renderMessages();
        setMsg("chatMsg", "Vista del chat actual limpiada.", false);
      });

      document.getElementById("promptForm").addEventListener("submit", onSendPrompt);
      document.getElementById("promptInput").addEventListener("keydown", function (ev) {
        if (ev.key !== "Enter" || ev.shiftKey) return;
        ev.preventDefault();
        const sendBtn = document.getElementById("sendBtn");
        if (sendBtn && !sendBtn.disabled) {
          document.getElementById("promptForm").requestSubmit();
        }
      });
      document.getElementById("btnNewChat").addEventListener("click", function () {
        newChat();
        document.getElementById("promptInput").disabled = !!state.authRequired || !!state.aiDisabled;
        document.getElementById("sendBtn").disabled = !!state.authRequired || !!state.aiDisabled;
      });

      document.getElementById("conversationList").addEventListener("click", function (ev) {
        const btn = ev.target && ev.target.closest ? ev.target.closest("[data-conv-id]") : null;
        if (!btn) return;
        openConversation(btn.getAttribute("data-conv-id"));
      });

      document.getElementById("serverHistoryList").addEventListener("click", function (ev) {
        const btn = ev.target && ev.target.closest ? ev.target.closest("[data-srv-idx]") : null;
        if (!btn) return;
        const idx = parseInt(btn.getAttribute("data-srv-idx"), 10);
        if (Number.isNaN(idx)) return;
        openServerHistoryItem(idx);
      });

      document.getElementById("messagesList").addEventListener("click", function (ev) {
        const b = ev.target && ev.target.closest ? ev.target.closest(".ai-gemini-share-btn") : null;
        if (!b) return;
        const i = parseInt(b.getAttribute("data-share-index"), 10);
        const m = state.messages[i];
        if (m && normalize(m.role) === "assistant") {
          shareAssistantText(m.content);
        }
      });

      document.getElementById("messagesList").addEventListener("click", function (ev) {
        const c = ev.target && ev.target.closest ? ev.target.closest("[data-action-confirm],[data-action-cancel]") : null;
        if (!c) return;
        const confirmIdx = c.getAttribute("data-action-confirm");
        const cancelIdx = c.getAttribute("data-action-cancel");
        if (confirmIdx != null) {
          const idx = parseInt(confirmIdx, 10);
          if (!Number.isNaN(idx)) {
            executeActionProposal(idx).catch(function (e) {
              appendMessage("system", "Error ejecutando acciones: " + normalize(e && e.message));
              setMsg("chatMsg", normalize(e && e.message) || "No se pudieron ejecutar las acciones.", true);
            });
          }
        } else if (cancelIdx != null) {
          const idx = parseInt(cancelIdx, 10);
          if (!Number.isNaN(idx)) cancelActionProposal(idx);
        }
      });

      setupSpeechToText();
      document.getElementById("modelSelect").addEventListener("change", function (ev) {
        onModelChange(ev).catch(function (err) {
          const payload = err && err.payload ? err.payload : {};
          if (normalize(payload.code) === "ai_disabled") {
            setAIDisabledState(payload.error);
            return;
          }
          setMsg("chatMsg", err.message || "No se pudo cambiar el modelo.", true);
        });
      });
    }

    function setupSpeechToText() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const btn = document.getElementById("micBtn");
      const input = document.getElementById("promptInput");
      if (!btn || !input) return;

      if (!SpeechRecognition) {
        btn.disabled = true;
        btn.title = "Tu navegador no soporta dictado.";
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "es-CO";
      recognition.interimResults = true;
      recognition.continuous = false;

      let listening = false;
      let finalText = "";

      function setListening(on) {
        listening = !!on;
        btn.textContent = listening ? "Detener" : "Dictar";
        btn.classList.toggle("danger", listening);
        btn.classList.toggle("secondary", !listening);
      }

      recognition.onresult = function (ev) {
        let interim = "";
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          const r = ev.results[i];
          const text = (r[0] && r[0].transcript) ? String(r[0].transcript) : "";
          if (r.isFinal) finalText += text;
          else interim += text;
        }
        const base = normalize(input.value);
        const combined = (base ? (base + " ") : "") + normalize(finalText + interim);
        input.value = combined.trim();
      };

      recognition.onerror = function (ev) {
        setListening(false);
        setMsg("chatMsg", "Dictado: " + (ev && ev.error ? ev.error : "error"), true);
      };

      recognition.onend = function () {
        setListening(false);
        finalText = "";
      };

      btn.addEventListener("click", function () {
        if (state.loading || state.authRequired || state.aiDisabled) return;
        if (listening) {
          try { recognition.stop(); } catch (e) {}
          setListening(false);
          return;
        }
        finalText = "";
        try {
          setMsg("chatMsg", "Dictado activo…", false);
          setListening(true);
          recognition.start();
        } catch (e) {
          setListening(false);
          setMsg("chatMsg", "No se pudo iniciar el dictado.", true);
        }
      });
    }

    async function init() {
      state.empresaID = Number(getQueryParam("empresa_id") || getQueryParam("id") || 0);
      if (!state.empresaID) {
        setMsg("chatMsg", "empresa_id es obligatorio en la URL.", true);
        showAuthPanel("No se detectó empresa_id. Vuelve al selector de empresas.");
        return;
      }

      loadConversationsFromStorage();
      ensureDefaultConversation();

      bindEvents();
      renderSidebarLocal();
      renderMessages();

      await loadEmpresaNameBestEffort();
      try {
        await loadChatModel();
        hideAuthPanel();
      } catch (err) {
        const payload = err && err.payload ? err.payload : {};
        if (err && err.status === 401) {
          showAuthPanel("Para usar el chat debes iniciar sesión con Google.");
        } else if (normalize(payload.code) === "ai_disabled") {
          setAIDisabledState(payload.error);
        } else {
          setMsg("chatMsg", err.message || "No se pudo cargar el modelo IA.", true);
        }
      }

      await loadHistorial();
      renderTopMeta();
    }

    init().catch(function (err) {
      setMsg("chatMsg", err.message || "No se pudo iniciar el chat.", true);
    });
  </script>
</body>
</html>
