<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inicio Empresa</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <h1>Panel de la Empresa</h1>
      <p id="empresaLabel">Cargando empresa...</p>
      <p>Desde este panel puedes gestionar productos, inventario y próximos módulos operativos por empresa.</p>
    </section>

    <!-- Se eliminó la sección 'Accesos directos' por solicitud: ahora la página muestra sólo el panel principal. -->
  </div>
  <script>
    (function(){
      function parsePositiveInt(raw) {
        const n = Number(String(raw || '').trim());
        if (!Number.isFinite(n)) return 0;
        const v = Math.trunc(n);
        return v > 0 ? v : 0;
      }

      function resolveEmpresaId() {
        try {
          const params = new URLSearchParams(window.location.search || '');
          const own = parsePositiveInt(params.get('empresa_id') || params.get('id'));
          if (own > 0) return own;
        } catch (_) {}
        try {
          if (window.parent && window.parent !== window) {
            if (typeof window.parent.__resolveEmpresaIdContext === 'function') {
              const parentResolved = parsePositiveInt(window.parent.__resolveEmpresaIdContext());
              if (parentResolved > 0) return parentResolved;
            }
            const parentParams = new URLSearchParams(window.parent.location.search || '');
            const fromParent = parsePositiveInt(parentParams.get('empresa_id') || parentParams.get('id'));
            if (fromParent > 0) return fromParent;
          }
        } catch (_) {}
        try {
          const candidates = [
            sessionStorage.getItem('active_empresa_id'),
            sessionStorage.getItem('empresa_id'),
            localStorage.getItem('active_empresa_id'),
            localStorage.getItem('empresa_id')
          ];
          for (let i = 0; i < candidates.length; i++) {
            const parsed = parsePositiveInt(candidates[i]);
            if (parsed > 0) return parsed;
          }
        } catch (_) {}
        return 0;
      }

      const empresaId = resolveEmpresaId();
      const label = document.getElementById('empresaLabel');
      const quickLinksBox = document.getElementById('quickLinks');
      const quickLinksHint = document.getElementById('quickLinksHint');
      const linksCatalog = [
        { pageKey: 'linkVentas', label: 'Ventas', href: '/administrar_empresa/ventas.html' },
        { pageKey: 'linkCarritoCompras', label: 'Carrito de compras', href: '/administrar_empresa/carrito_de_compras.html' },
        { pageKey: 'linkVentaPublica', label: 'Venta pública', href: '/administrar_empresa/venta_publica.html' },
        { pageKey: 'linkProductos', label: 'Productos', href: '/administrar_empresa/administrar_productos.html' },
        { pageKey: 'linkCompras', label: 'Compras', href: '/administrar_empresa/compras.html' },
        { pageKey: 'linkChatTareas', label: 'Chat y tareas', href: '/administrar_empresa/chat_y_tareas.html' },
        { pageKey: 'linkFinanzas', label: 'Finanzas', href: '/administrar_empresa/finanzas.html' },
        { pageKey: 'linkReportes', label: 'Reportes', href: '/administrar_empresa/reportes.html' },
      ];

      function withEmpresaParam(href){
        try {
          const u = new URL(href, window.location.origin);
          if (empresaId) u.searchParams.set('empresa_id', String(empresaId));
          return u.pathname + u.search;
        } catch (_) {
          return href;
        }
      }

      function renderQuickLinks(visibleMap){
        if (!quickLinksBox) return;
        const visible = linksCatalog.filter(function(item){
          if (!visibleMap || typeof visibleMap !== 'object') return true;
          if (!Object.prototype.hasOwnProperty.call(visibleMap, item.pageKey)) return true;
          return !!visibleMap[item.pageKey];
        });

        if (!visible.length) {
          quickLinksBox.innerHTML = '<div class="chat-empty">No hay módulos habilitados para tu perfil/licencia.</div>';
          if (quickLinksHint) quickLinksHint.textContent = 'No se detectaron accesos directos disponibles.';
          return;
        }

        quickLinksBox.innerHTML = visible.map(function(item){
          return '<a class="btn secondary inicio-link-btn" href="' + withEmpresaParam(item.href) + '">' + item.label + '</a>';
        }).join('');
        if (quickLinksHint) quickLinksHint.textContent = 'Se muestran los módulos habilitados para tu contexto actual.';
      }

      async function loadQuickLinksByPermissions(){
        if (!empresaId) {
          renderQuickLinks(null);
          return;
        }
        try {
          const resp = await fetch('/api/empresa/permisos_contexto?empresa_id=' + encodeURIComponent(String(empresaId)), { credentials: 'same-origin' });
          if (!resp.ok) {
            renderQuickLinks(null);
            if (quickLinksHint) quickLinksHint.textContent = 'No fue posible validar permisos, se muestran accesos base.';
            return;
          }
          const data = await resp.json();
          renderQuickLinks(data && data.paginas ? data.paginas : null);
        } catch (_) {
          renderQuickLinks(null);
          if (quickLinksHint) quickLinksHint.textContent = 'No fue posible validar permisos, se muestran accesos base.';
        }
      }

      if (!empresaId) {
        label.textContent = 'Empresa no definida.';
        if (quickLinksHint) quickLinksHint.textContent = 'empresa_id no definido en la URL.';
        return;
      }
      fetch('/super/api/empresas?id=' + empresaId, { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data && data.nombre) {
            label.textContent = 'Empresa: ' + data.nombre;
            document.title = 'Inicio - ' + data.nombre;
          } else {
            label.textContent = 'Empresa ID: ' + empresaId;
          }
        })
        .catch(() => {
          label.textContent = 'Empresa ID: ' + empresaId;
        });

      loadQuickLinksByPermissions();
    })();
  </script>
</body>
</html>
