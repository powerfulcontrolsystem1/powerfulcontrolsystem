<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Facturación electrónica - Menú</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/js/empresa_submenu_context.js"></script>
  <style>
    .facturacion-country-picker{margin:10px 0 14px;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface-soft)}
    .facturacion-country-picker label{display:block;margin-bottom:6px;color:var(--muted);font-size:.8rem;font-weight:800}
    .facturacion-country-picker select{width:100%;min-height:38px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);padding:8px 10px}
    .facturacion-country-picker p{margin:6px 0 0;color:var(--muted);font-size:.76rem;line-height:1.35}
  </style>
</head>
<body class="admin-empresa-shell">
  <div class="admin-layout">
    <aside class="admin-sidebar admin-sidebar-mobile-collapsible">
      <h2>Facturación electrónica</h2>
      <div class="facturacion-country-picker">
        <label for="facturacionPaisSelector">País fiscal</label>
        <select id="facturacionPaisSelector"></select>
        <p id="facturacionPaisSource">Detectando país de la empresa...</p>
      </div>
      <ul class="nav admin-nav-grouped" id="facturacionSidebarNav">
        <li hidden data-country-gated="CO"><a id="linkFacturacionMain" href="/administrar_empresa/facturacion_electronica.html" target="facturacionContentFrame"><img class="icon" src="/img/analytics-color.svg" alt="">Facturación electrónica</a></li>
        <li hidden data-country-gated="CO"><a id="linkPruebasDian" href="/administrar_empresa/facturacion_electronica_pruebas_dian.html" target="facturacionContentFrame"><img class="icon" src="/img/invoice.svg" alt="">Centro de habilitación DIAN</a></li>
        <li hidden data-country-gated="CO"><a id="linkTutorialDian" href="/administrar_empresa/facturacion_electronica_tutorial_dian.html" target="facturacionContentFrame" data-pcs-help-ai="off"><img class="icon" src="/img/report.svg" alt="">Tutorial DIAN</a></li>
        <li hidden data-country-gated="CO"><a id="linkProveedoresFirmaDigital" href="/administrar_empresa/proveedores_firma_digital.html" target="facturacionContentFrame"><img class="icon" src="/img/invoice.svg" alt="">Proveedores de firma digital</a></li>
        <li><a id="linkFacturasElectronicas" href="/administrar_empresa/facturas_electronicas.html" target="facturacionContentFrame"><img class="icon" src="/img/analytics-color.svg" alt="">Facturas electrónicas</a></li>
        <li><a id="linkAIUConstruccion" href="/administrar_empresa/aiu_construccion.html" target="facturacionContentFrame"><img class="icon" src="/img/invoice.svg" alt="">AIU construcción</a></li>
        <li class="admin-menu-visibility-item">
          <button type="button" class="admin-menu-visibility-toggle" aria-controls="facturacionSidebarNav" aria-expanded="true" data-show-label="Mostrar menú" data-hide-label="Ocultar menú">
            <span class="admin-menu-visibility-icon" aria-hidden="true">&#9776;</span>
            <span class="admin-menu-visibility-label">Ocultar menú</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="admin-content">
      <iframe name="facturacionContentFrame" id="facturacionContentFrame" src="/administrar_empresa/facturacion_electronica.html" title="Contenido de facturación" class="admin-empresa-frame"></iframe>
    </main>
  </div>
  <script src="/js/administrar_empresa.js"></script>
  <script>
    (function() {
      'use strict';

      var countryLinks = Array.prototype.slice.call(document.querySelectorAll('[data-country-gated] a[id]'));
      var frame = document.getElementById('facturacionContentFrame');
      var selector = document.getElementById('facturacionPaisSelector');
      var source = document.getElementById('facturacionPaisSource');
      var countryMenuState = {
        country: '',
        empresaId: 0,
        permissions: null
      };

      function setCountryLinkVisible(link, visible) {
        if (!link) return;
        var item = typeof link.closest === 'function' ? link.closest('li') : link.parentElement;
        if (!item) return;
        visible = !!visible;
        item.hidden = !visible;
        item.style.display = visible ? '' : 'none';
        link.setAttribute('data-country-visible', visible ? '1' : '0');
        if (!visible) link.classList.remove('active');
      }

      function resolveEmpresaId() {
        try {
          if (window.__empresaModuleGuard && typeof window.__empresaModuleGuard.resolveEmpresaId === 'function') {
            var guarded = Number(window.__empresaModuleGuard.resolveEmpresaId());
            if (guarded > 0) return Math.trunc(guarded);
          }
        } catch (_) {}
        try {
          var params = new URLSearchParams(window.location.search || '');
          var own = Number(params.get('empresa_id') || params.get('id') || 0);
          if (own > 0) return Math.trunc(own);
        } catch (_) {}
        try {
          var stored = Number(sessionStorage.getItem('active_empresa_id') || sessionStorage.getItem('empresa_id') || localStorage.getItem('active_empresa_id') || localStorage.getItem('empresa_id') || 0);
          if (stored > 0) return Math.trunc(stored);
        } catch (_) {}
        return 0;
      }

      function fetchJSON(url) {
        return fetch(url, { credentials: 'same-origin' }).then(function(resp) {
          if (!resp.ok) return null;
          return resp.json();
        }).catch(function() {
          return null;
        });
      }

      function actionAllowedFromRow(row, action) {
        if (!row || typeof row !== 'object') return false;
        action = String(action || 'C').toUpperCase();
        if (action === 'R' && (row.read === true || row.leer === true)) return true;
        if (action === 'C' && (row.create === true || row.crear === true)) return true;
        if (action === 'A' && (row.approve === true || row.aprobar === true)) return true;
        var acciones = row.acciones;
        if (acciones && typeof acciones === 'object') {
          if (action === 'R') return acciones.R === true || acciones.leer === true || acciones.read === true;
          if (action === 'C') return acciones.C === true || acciones.crear === true || acciones.create === true;
          if (action === 'A') return acciones.A === true || acciones.aprobar === true || acciones.approve === true;
        }
        return false;
      }

      function linkAllowedByLicenseAndRole(ctx, link) {
        if (!link || !ctx || typeof ctx !== 'object') return false;
        var pageKey = link.id || '';
        if (pageKey && ctx.paginas && Object.prototype.hasOwnProperty.call(ctx.paginas, pageKey)) {
          return ctx.paginas[pageKey] === true;
        }
        var ruleByLink = {
          linkFacturacionMain: { module: 'facturacion', action: 'C' },
          linkPruebasDian: { module: 'facturacion', action: 'A' },
          linkTutorialDian: { module: 'facturacion', action: 'R' },
          linkProveedoresFirmaDigital: { module: 'facturacion', action: 'R' }
        };
        var rule = ruleByLink[pageKey] || {};
        var expectedModule = rule.module || '';
        if (!expectedModule) return false;
        var modules = Array.isArray(ctx.modulos) ? ctx.modulos : [];
        for (var i = 0; i < modules.length; i += 1) {
          var row = modules[i] || {};
          var key = String(row.modulo || row.module || '').trim().toLowerCase();
          if (key === expectedModule) return actionAllowedFromRow(row, rule.action);
        }
        return false;
      }

      function countryMatches(link, country) {
        var item = typeof link.closest === 'function' ? link.closest('li') : link.parentElement;
        var allowedCountries = String(item && item.getAttribute('data-country-gated') || '').toUpperCase().split(',');
        return allowedCountries.some(function(raw) {
          return raw.trim() === country;
        });
      }

      function withEmpresaContext(rawHref, empresaId, country) {
        try {
          var url = new URL(rawHref, window.location.origin);
          if (empresaId > 0) url.searchParams.set('empresa_id', String(empresaId));
          if (country) url.searchParams.set('pais_codigo', String(country).toUpperCase());
          return url.pathname + url.search + url.hash;
        } catch (_) {
          return rawHref;
        }
      }

      function countryPage(country) {
        country = String(country || '').trim().toUpperCase();
        if (country === 'EC') return '/administrar_empresa/facturacion_electronica_ecuador.html';
        if (country === 'PA') return '/administrar_empresa/facturacion_electronica_panama.html';
        return '/administrar_empresa/facturacion_electronica.html';
      }

      function renderCountrySelector(items, selected) {
        if (!selector) return;
        var list = Array.isArray(items) && items.length ? items : [{ codigo: 'CO', nombre: 'Colombia', bandera: 'CO' }];
        selector.innerHTML = '';
        list.forEach(function(item) {
          var code = String(item.codigo || '').trim().toUpperCase();
          if (!code) return;
          var opt = document.createElement('option');
          opt.value = code;
          opt.textContent = String((item.bandera || '') + ' ' + (item.nombre || code)).trim();
          selector.appendChild(opt);
        });
        selector.value = selected || 'CO';
        if (!selector.value && selector.options.length) selector.selectedIndex = 0;
      }

      function applyCountryMenuState(navigate) {
        var country = String(countryMenuState.country || 'CO').trim().toUpperCase();
        var permissions = countryMenuState.permissions || {};
        countryLinks.forEach(function(link) {
          setCountryLinkVisible(link, countryMatches(link, country) && linkAllowedByLicenseAndRole(permissions, link));
        });
        if (selector && selector.value !== country) selector.value = country;
        if (source) source.textContent = country === 'CO'
          ? 'Colombia usa la configuración DIAN actual.'
          : 'El país seleccionado carga su página fiscal específica.';
        if (navigate && frame) {
          var target = withEmpresaContext(countryPage(country), countryMenuState.empresaId, country);
          if ((frame.getAttribute('src') || '') !== target) frame.setAttribute('src', target);
        }
      }

      function syncCountryMenu() {
        countryLinks.forEach(function(link) { setCountryLinkVisible(link, false); });
        var empresaId = resolveEmpresaId();
        if (!empresaId) return;
        var tz = '';
        try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch (_) {}
        var lang = '';
        try { lang = navigator.language || ''; } catch (_) {}
        var catalogURL = '/api/empresa/facturacion_electronica/paises_disponibles?empresa_id=' + encodeURIComponent(empresaId);
        var detectedURL = '/api/empresa/facturacion_electronica/pais_detectado?empresa_id=' + encodeURIComponent(empresaId) + '&tz=' + encodeURIComponent(tz) + '&lang=' + encodeURIComponent(lang);
        var permsURL = '/api/empresa/permisos_contexto?empresa_id=' + encodeURIComponent(empresaId);
        Promise.all([fetchJSON(catalogURL), fetchJSON(detectedURL), fetchJSON(permsURL)]).then(function(results) {
          var catalog = results[0] || {};
          var detected = results[1] || {};
          var permissions = results[2] || {};
          var country = String(detected.pais_codigo || 'CO').trim().toUpperCase();
          countryMenuState.country = country;
          countryMenuState.empresaId = empresaId;
          countryMenuState.permissions = permissions;
          renderCountrySelector(catalog.items || [], country);
          applyCountryMenuState(true);
        }).catch(function() {
          countryMenuState.country = 'CO';
          countryMenuState.empresaId = empresaId;
          countryMenuState.permissions = {};
          renderCountrySelector([], 'CO');
          applyCountryMenuState(true);
        });
      }

      if (selector) {
        selector.addEventListener('change', function() {
          countryMenuState.country = String(selector.value || 'CO').trim().toUpperCase();
          applyCountryMenuState(true);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', syncCountryMenu);
      } else {
        syncCountryMenu();
      }

    })();
  </script>
  <script src="/menu.js"></script>
</body>
</html>
