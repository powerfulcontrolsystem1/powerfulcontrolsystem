<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat y tareas</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page form-bg-dark">
  <div class="container chat-tareas-page">
    <div class="page-header">
      <h1 id="pageTitle">Chat y tareas</h1>
      <button id="reloadBtn" class="btn secondary" type="button">Actualizar</button>
    </div>

    <div class="chat-tareas-layout">
      <section class="card chat-panel conversaciones-panel">
        <div class="chat-panel-header">
          <h2>Conversaciones</h2>
        </div>

        <form id="convForm" class="chat-mini-form">
          <label class="form-label" for="convTitulo">Nueva conversación</label>
          <input id="convTitulo" class="form-input" required placeholder="Ej: Gestión pedido cliente X">
          <textarea id="convDescripcion" class="form-textarea" placeholder="Contexto o objetivo"></textarea>
          <div class="form-row compact-row">
            <div class="form-col">
              <label class="form-label" for="convPrioridad">Prioridad</label>
              <select id="convPrioridad" class="form-input">
                <option value="media">Media</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
                <option value="baja">Baja</option>
              </select>
            </div>
            <div class="form-col form-col-end">
              <button id="createConvBtn" class="btn" type="submit">Crear</button>
            </div>
          </div>
        </form>

        <div class="chat-search-row">
          <input id="convSearch" class="form-input" placeholder="Buscar conversación">
          <button id="convSearchBtn" class="btn secondary" type="button">Buscar</button>
        </div>

        <div id="convList" class="chat-conv-list">Cargando...</div>
        <div id="convMsg" class="form-help"></div>
      </section>

      <section class="card chat-panel mensajes-panel">
        <div class="chat-panel-header">
          <h2 id="activeConvTitle">Selecciona una conversación</h2>
          <div id="activeConvMeta" class="form-help"></div>
        </div>

        <div class="chat-participants-box">
          <div class="chat-participants-header">Participantes</div>
          <div id="participantsList" class="chat-participants-list">Sin participantes cargados.</div>
          <div class="chat-add-participant-row">
            <select id="participantSelect" class="form-input"></select>
            <button id="addParticipantBtn" class="btn secondary" type="button">Agregar</button>
          </div>
        </div>

        <div id="messagesList" class="chat-messages-list">Selecciona una conversación para ver mensajes.</div>

        <form id="messageForm" class="chat-message-form">
          <label class="form-label" for="messageText">Mensaje</label>
          <textarea id="messageText" class="form-textarea" placeholder="Escribe tu mensaje"></textarea>
          <div class="chat-attach-row">
            <input id="messageFile" class="form-input" type="file" accept="image/*,audio/*,.pdf,.txt,.csv,.json,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.rtf,.odt,.ods,.odp">
            <button id="sendMessageBtn" class="btn" type="submit">Enviar</button>
          </div>
          <div class="chat-voice-row">
            <button id="recordMessageVoiceBtn" class="btn secondary" type="button">Grabar voz</button>
            <button id="stopMessageVoiceBtn" class="btn secondary" type="button" disabled>Detener</button>
            <button id="clearMessageVoiceBtn" class="btn secondary" type="button" disabled>Limpiar voz</button>
          </div>
          <div id="messageVoiceStatus" class="form-help"></div>
        </form>
        <div id="messageMsg" class="form-help"></div>
      </section>

      <section class="card chat-panel tareas-panel">
        <div class="chat-panel-header">
          <h2>Tareas</h2>
        </div>

        <form id="taskForm" class="chat-mini-form">
          <input id="taskId" type="hidden">
          <label class="form-label" for="taskTitulo">Título</label>
          <input id="taskTitulo" class="form-input" required placeholder="Ej: Enviar cotización">
          <label class="form-label" for="taskDescripcion">Descripción</label>
          <textarea id="taskDescripcion" class="form-textarea" placeholder="Detalle breve"></textarea>

          <div class="form-row compact-row">
            <div class="form-col">
              <label class="form-label" for="taskPrioridad">Prioridad</label>
              <select id="taskPrioridad" class="form-input">
                <option value="media">Media</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
                <option value="baja">Baja</option>
              </select>
            </div>
            <div class="form-col">
              <label class="form-label" for="taskFechaLimite">Fecha límite</label>
              <input id="taskFechaLimite" class="form-input" type="datetime-local">
            </div>
          </div>

          <div class="form-row compact-row">
            <div class="form-col">
              <label class="form-label" for="taskAsignado">Asignar a</label>
              <select id="taskAsignado" class="form-input"></select>
            </div>
            <div class="form-col form-col-end">
              <button id="saveTaskBtn" class="btn" type="submit">Guardar</button>
            </div>
          </div>

          <div class="chat-voice-row">
            <button id="recordTaskVoiceBtn" class="btn secondary" type="button">Grabar voz tarea</button>
            <button id="stopTaskVoiceBtn" class="btn secondary" type="button" disabled>Detener</button>
            <button id="clearTaskVoiceBtn" class="btn secondary" type="button" disabled>Limpiar voz</button>
          </div>
          <audio id="taskVoicePreview" controls preload="none" style="display:none"></audio>
          <div id="taskVoiceStatus" class="form-help"></div>
        </form>

        <div class="chat-search-row">
          <select id="taskEstadoFilter" class="form-input">
            <option value="">Todas</option>
            <option value="pendiente">Pendientes</option>
            <option value="en_progreso">En progreso</option>
            <option value="bloqueada">Bloqueadas</option>
            <option value="completada">Completadas</option>
            <option value="cancelada">Canceladas</option>
          </select>
          <input id="taskSearch" class="form-input" placeholder="Buscar tarea">
          <button id="taskSearchBtn" class="btn secondary" type="button">Filtrar</button>
        </div>

        <div id="taskList" class="chat-task-list">Cargando tareas...</div>
        <div id="taskMsg" class="form-help"></div>
      </section>
    </div>

    <section class="card chat-calendar-card">
      <div class="chat-panel-header chat-calendar-header">
        <h2>Agente de citas y calendario</h2>
        <div class="chat-calendar-nav">
          <button id="calendarPrevBtn" class="btn secondary" type="button">Mes anterior</button>
          <div id="calendarMonthLabel" class="chat-calendar-month">-</div>
          <button id="calendarNextBtn" class="btn secondary" type="button">Mes siguiente</button>
          <button id="calendarTodayBtn" class="btn" type="button">Hoy</button>
        </div>
      </div>

      <div id="calendarReminderBanner" class="chat-reminder-banner" hidden></div>

      <div class="chat-calendar-layout">
        <div class="chat-calendar-main">
          <div class="chat-calendar-weekdays">
            <span>Lun</span>
            <span>Mar</span>
            <span>Mie</span>
            <span>Jue</span>
            <span>Vie</span>
            <span>Sab</span>
            <span>Dom</span>
          </div>
          <div id="calendarGrid" class="chat-calendar-grid">Cargando calendario...</div>
        </div>

        <aside class="chat-calendar-side">
          <form id="appointmentForm" class="chat-mini-form">
            <input id="appointmentId" type="hidden">
            <label class="form-label" for="appointmentTitle">Titulo de la cita</label>
            <input id="appointmentTitle" class="form-input" required placeholder="Ej: Reunion de seguimiento">

            <label class="form-label" for="appointmentDescription">Descripcion</label>
            <textarea id="appointmentDescription" class="form-textarea" placeholder="Objetivo o contexto"></textarea>

            <div class="form-row compact-row">
              <div class="form-col">
                <label class="form-label" for="appointmentType">Tipo</label>
                <select id="appointmentType" class="form-input">
                  <option value="reunion">Reunion</option>
                  <option value="llamada">Llamada</option>
                  <option value="seguimiento">Seguimiento</option>
                  <option value="capacitacion">Capacitacion</option>
                  <option value="otro">Otro</option>
                </select>
              </div>
              <div class="form-col">
                <label class="form-label" for="appointmentEstado">Estado</label>
                <select id="appointmentEstado" class="form-input">
                  <option value="programada">Programada</option>
                  <option value="completada">Completada</option>
                  <option value="cancelada">Cancelada</option>
                </select>
              </div>
            </div>

            <div class="form-row compact-row">
              <div class="form-col">
                <label class="form-label" for="appointmentStart">Fecha y hora inicio</label>
                <input id="appointmentStart" class="form-input" type="datetime-local" required>
              </div>
              <div class="form-col">
                <label class="form-label" for="appointmentEnd">Fecha y hora fin</label>
                <input id="appointmentEnd" class="form-input" type="datetime-local">
              </div>
            </div>

            <div class="form-row compact-row">
              <div class="form-col">
                <label class="form-label" for="appointmentReminder">Avisar antes (minutos)</label>
                <input id="appointmentReminder" class="form-input" type="number" min="1" max="10080" value="30">
              </div>
              <div class="form-col">
                <label class="form-label" for="appointmentConversation">Conversacion (opcional)</label>
                <select id="appointmentConversation" class="form-input">
                  <option value="0">Sin conversacion asociada</option>
                </select>
              </div>
            </div>

            <label class="form-label" for="appointmentLocation">Ubicacion</label>
            <input id="appointmentLocation" class="form-input" placeholder="Sala, enlace o referencia">

            <div class="form-actions">
              <button id="saveAppointmentBtn" class="btn" type="submit">Guardar cita</button>
              <button id="clearAppointmentBtn" class="btn secondary" type="button">Limpiar</button>
            </div>
          </form>

          <div class="chat-search-row">
            <select id="appointmentEstadoFilter" class="form-input">
              <option value="">Todas</option>
              <option value="programada">Programadas</option>
              <option value="completada">Completadas</option>
              <option value="cancelada">Canceladas</option>
            </select>
            <input id="appointmentSearch" class="form-input" placeholder="Buscar cita">
            <button id="appointmentSearchBtn" class="btn secondary" type="button">Filtrar</button>
          </div>

          <div id="appointmentList" class="chat-appointment-list">Cargando citas...</div>
          <div id="appointmentMsg" class="form-help"></div>
        </aside>
      </div>
    </section>
  </div>

  <script>
    const state = {
      empresaID: 0,
      empresaNombre: "",
      adminEmail: "",
      adminName: "",
      currentUserType: "admin",
      currentUserRefID: 0,
      currentUserName: "Administrador",
      currentUserEmail: "",
      users: [],
      conversaciones: [],
      conversacionID: 0,
      participantes: [],
      mensajes: [],
      tareas: [],
      convSearch: "",
      taskSearch: "",
	  taskEstadoFilter: "",
    pendingMessageVoice: null,
    pendingTaskVoice: null,
    citas: [],
    appointmentSearch: "",
    appointmentEstadoFilter: "",
    calendarYear: new Date().getFullYear(),
    calendarMonth: new Date().getMonth(),
    calendarSelectedDate: "",
    reminderShownKeys: {}
    };

    const messageVoiceRuntime = { recorder: null, stream: null, chunks: [], startedAt: 0, timer: 0 };
    const taskVoiceRuntime = { recorder: null, stream: null, chunks: [], startedAt: 0, timer: 0 };

    function pickVoiceMimeType() {
      const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/ogg", "audio/mp4"];
      if (!window.MediaRecorder || typeof window.MediaRecorder.isTypeSupported !== "function") {
        return "";
      }
      for (let i = 0; i < candidates.length; i += 1) {
        if (window.MediaRecorder.isTypeSupported(candidates[i])) return candidates[i];
      }
      return "";
    }

    function voiceExtensionByMime(mimeType) {
      const mime = normalize(mimeType).toLowerCase();
      if (mime.indexOf("ogg") >= 0) return ".ogg";
      if (mime.indexOf("mp4") >= 0) return ".m4a";
      if (mime.indexOf("webm") >= 0) return ".webm";
      return ".webm";
    }

    function stopVoiceStream(runtime) {
      if (!runtime || !runtime.stream) return;
      runtime.stream.getTracks().forEach(function (track) { track.stop(); });
      runtime.stream = null;
    }

    function clearVoiceTimer(runtime) {
      if (!runtime || !runtime.timer) return;
      window.clearInterval(runtime.timer);
      runtime.timer = 0;
    }

    function updateMessageVoiceUI() {
      const hasVoice = !!state.pendingMessageVoice;
      const recording = !!(messageVoiceRuntime.recorder && messageVoiceRuntime.recorder.state === "recording");
      document.getElementById("recordMessageVoiceBtn").disabled = recording;
      document.getElementById("stopMessageVoiceBtn").disabled = !recording;
      document.getElementById("clearMessageVoiceBtn").disabled = recording || !hasVoice;
      if (!hasVoice && !recording) {
        document.getElementById("messageVoiceStatus").textContent = "";
      }
    }

    function updateTaskVoiceUI() {
      const hasVoice = !!state.pendingTaskVoice;
      const recording = !!(taskVoiceRuntime.recorder && taskVoiceRuntime.recorder.state === "recording");
      document.getElementById("recordTaskVoiceBtn").disabled = recording;
      document.getElementById("stopTaskVoiceBtn").disabled = !recording;
      document.getElementById("clearTaskVoiceBtn").disabled = recording || !hasVoice;
      const preview = document.getElementById("taskVoicePreview");
      if (!hasVoice) {
        preview.pause();
        preview.removeAttribute("src");
        preview.style.display = "none";
      }
      if (!hasVoice && !recording) {
        document.getElementById("taskVoiceStatus").textContent = "";
      }
    }

    async function startVoiceRecording(kind) {
      const isMessage = kind === "message";
      const runtime = isMessage ? messageVoiceRuntime : taskVoiceRuntime;
      const statusId = isMessage ? "messageVoiceStatus" : "taskVoiceStatus";

      if (!window.MediaRecorder || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setHelp(statusId, "Tu navegador no soporta grabación de voz", true);
        return;
      }
      if (runtime.recorder && runtime.recorder.state === "recording") {
        return;
      }

      if (isMessage && state.pendingMessageVoice && state.pendingMessageVoice.url) {
        URL.revokeObjectURL(state.pendingMessageVoice.url);
        state.pendingMessageVoice = null;
      }
      if (!isMessage && state.pendingTaskVoice && state.pendingTaskVoice.url) {
        URL.revokeObjectURL(state.pendingTaskVoice.url);
        state.pendingTaskVoice = null;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = pickVoiceMimeType();
        const recorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);

        runtime.recorder = recorder;
        runtime.stream = stream;
        runtime.chunks = [];
        runtime.startedAt = Date.now();

        recorder.ondataavailable = function (ev) {
          if (ev.data && ev.data.size > 0) runtime.chunks.push(ev.data);
        };

        recorder.onstop = function () {
          clearVoiceTimer(runtime);
          stopVoiceStream(runtime);

          const duration = Math.max(1, Math.round((Date.now() - runtime.startedAt) / 1000));
          const finalMime = normalize(recorder.mimeType) || mimeType || "audio/webm";
          const blob = new Blob(runtime.chunks, { type: finalMime });
          runtime.recorder = null;
          runtime.chunks = [];

          if (!blob || !blob.size) {
            setHelp(statusId, "No se capturó audio. Intenta de nuevo.", true);
            if (isMessage) {
              state.pendingMessageVoice = null;
              updateMessageVoiceUI();
            } else {
              state.pendingTaskVoice = null;
              updateTaskVoiceUI();
            }
            return;
          }

          const fileName = (isMessage ? "mensaje" : "tarea") + "_" + Date.now() + voiceExtensionByMime(finalMime);
          const previewURL = URL.createObjectURL(blob);
          const payload = {
            blob: blob,
            mimeType: finalMime,
            durationSeg: duration,
            fileName: fileName,
            url: previewURL,
          };

          if (isMessage) {
            state.pendingMessageVoice = payload;
            setHelp(statusId, "Nota de voz lista (" + duration + "s)", false);
            updateMessageVoiceUI();
            return;
          }

          state.pendingTaskVoice = payload;
          const preview = document.getElementById("taskVoicePreview");
          preview.src = previewURL;
          preview.style.display = "";
          setHelp(statusId, "Nota de voz de tarea lista (" + duration + "s)", false);
          updateTaskVoiceUI();
        };

        recorder.onerror = function () {
          setHelp(statusId, "Error grabando nota de voz", true);
          clearVoiceTimer(runtime);
          stopVoiceStream(runtime);
          runtime.recorder = null;
          runtime.chunks = [];
          if (isMessage) updateMessageVoiceUI();
          else updateTaskVoiceUI();
        };

        recorder.start(250);
        setHelp(statusId, "Grabando... 0s", false);
        runtime.timer = window.setInterval(function () {
          if (!runtime.recorder || runtime.recorder.state !== "recording") return;
          const elapsed = Math.max(0, Math.round((Date.now() - runtime.startedAt) / 1000));
          setHelp(statusId, "Grabando... " + elapsed + "s", false);
        }, 1000);

        if (isMessage) updateMessageVoiceUI();
        else updateTaskVoiceUI();
      } catch (err) {
        setHelp(statusId, err.message || "No se pudo iniciar la grabación", true);
      }
    }

    function stopVoiceRecording(kind) {
      const runtime = kind === "message" ? messageVoiceRuntime : taskVoiceRuntime;
      if (!runtime.recorder || runtime.recorder.state !== "recording") return;
      runtime.recorder.stop();
      if (kind === "message") updateMessageVoiceUI();
      else updateTaskVoiceUI();
    }

    function clearVoiceRecording(kind) {
      const isMessage = kind === "message";
      const runtime = isMessage ? messageVoiceRuntime : taskVoiceRuntime;
      if (runtime.recorder && runtime.recorder.state === "recording") {
        return;
      }

      if (isMessage && state.pendingMessageVoice && state.pendingMessageVoice.url) {
        URL.revokeObjectURL(state.pendingMessageVoice.url);
        state.pendingMessageVoice = null;
        setHelp("messageVoiceStatus", "", false);
        updateMessageVoiceUI();
        return;
      }
      if (!isMessage && state.pendingTaskVoice && state.pendingTaskVoice.url) {
        URL.revokeObjectURL(state.pendingTaskVoice.url);
      }
      if (!isMessage) {
        state.pendingTaskVoice = null;
        setHelp("taskVoiceStatus", "", false);
        updateTaskVoiceUI();
      }
    }

    async function uploadTaskVoiceNote(tareaID, voicePayload) {
      if (!voicePayload || !voicePayload.blob || !tareaID) return;
      const fd = new FormData();
      fd.append("empresa_id", String(state.empresaID));
      fd.append("tarea_id", String(tareaID));
      fd.append("duracion_segundos", String(Number(voicePayload.durationSeg || 0)));
      fd.append("archivo", voicePayload.blob, voicePayload.fileName || ("tarea_" + tareaID + ".webm"));

      const resp = await fetch("/api/empresa/chat_tareas/tareas/nota_voz", {
        method: "POST",
        body: fd
      });
      await ensureOk(resp);
    }

    function getQueryParam(name) {
      const p = new URLSearchParams(window.location.search);
      return p.get(name);
    }

    function normalize(v) {
      return (v == null ? "" : String(v)).trim();
    }

    function escapeHtml(v) {
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setHelp(id, text, isError) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text || "";
      el.style.color = isError ? "#ef5350" : "";
    }

    async function ensureOk(resp) {
      if (resp.ok) return;
      const text = await resp.text();
      throw new Error(text || ("HTTP " + resp.status));
    }

    function formatDate(raw) {
      const value = normalize(raw);
      if (!value) return "-";
      const dt = new Date(value.replace(" ", "T"));
      if (Number.isNaN(dt.getTime())) return value;
      return dt.toLocaleString();
    }

    function getTaskStatusLabel(status) {
      switch (normalize(status).toLowerCase()) {
        case "pendiente": return "Pendiente";
        case "en_progreso": return "En progreso";
        case "bloqueada": return "Bloqueada";
        case "completada": return "Completada";
        case "cancelada": return "Cancelada";
        default: return "Pendiente";
      }
    }

    function getPriorityClass(priority) {
      const v = normalize(priority).toLowerCase();
      if (v === "urgente") return "urgent";
      if (v === "alta") return "high";
      if (v === "baja") return "low";
      return "mid";
    }

    function getTaskStatusClass(status) {
      const v = normalize(status).toLowerCase();
      if (v === "completada") return "done";
      if (v === "en_progreso") return "progress";
      if (v === "bloqueada") return "blocked";
      if (v === "cancelada") return "cancel";
      return "pending";
    }

    function pad2(n) {
      return String(Number(n || 0)).padStart(2, "0");
    }

    function parseDateValue(raw) {
      const value = normalize(raw);
      if (!value) return null;
      const candidate = value.replace(" ", "T");
      const dt = new Date(candidate);
      if (!Number.isNaN(dt.getTime())) return dt;
      return null;
    }

    function formatDateForDB(dateObj) {
      if (!(dateObj instanceof Date) || Number.isNaN(dateObj.getTime())) return "";
      const year = dateObj.getFullYear();
      const month = pad2(dateObj.getMonth() + 1);
      const day = pad2(dateObj.getDate());
      const hour = pad2(dateObj.getHours());
      const min = pad2(dateObj.getMinutes());
      const sec = pad2(dateObj.getSeconds());
      return year + "-" + month + "-" + day + " " + hour + ":" + min + ":" + sec;
    }

    function toDBDateTime(rawInput) {
      const value = normalize(rawInput);
      if (!value) return "";
      const dt = parseDateValue(value);
      if (!dt) {
        return value.replace("T", " ");
      }
      return formatDateForDB(dt);
    }

    function toDateTimeLocal(raw) {
      const dt = parseDateValue(raw);
      if (!dt) return "";
      const year = dt.getFullYear();
      const month = pad2(dt.getMonth() + 1);
      const day = pad2(dt.getDate());
      const hour = pad2(dt.getHours());
      const min = pad2(dt.getMinutes());
      return year + "-" + month + "-" + day + "T" + hour + ":" + min;
    }

    function toDateKey(raw) {
      const dt = parseDateValue(raw);
      if (!dt) {
        const v = normalize(raw);
        return v.length >= 10 ? v.slice(0, 10) : "";
      }
      const year = dt.getFullYear();
      const month = pad2(dt.getMonth() + 1);
      const day = pad2(dt.getDate());
      return year + "-" + month + "-" + day;
    }

    function getAppointmentStatusClass(status) {
      const v = normalize(status).toLowerCase();
      if (v === "completada") return "done";
      if (v === "cancelada") return "cancel";
      return "pending";
    }

    function getAppointmentStatusLabel(status) {
      const v = normalize(status).toLowerCase();
      if (v === "completada") return "Completada";
      if (v === "cancelada") return "Cancelada";
      return "Programada";
    }

    function resolveCurrentActorContext() {
      const sessionEmail = normalize(state.adminEmail).toLowerCase();
      const sessionName = normalize(state.adminName);

      const actor = {
        tipo: "admin",
        refID: 0,
        nombre: sessionName || state.adminEmail || "Administrador",
        email: normalize(state.adminEmail)
      };

      if (sessionEmail) {
        const match = state.users.find(function (u) {
          return normalize(u.email).toLowerCase() === sessionEmail;
        });
        if (match) {
          actor.tipo = "usuario";
          actor.refID = Number(match.id || 0);
          actor.nombre = normalize(match.nombre || match.name || match.email || actor.nombre);
          actor.email = normalize(match.email || actor.email);
        }
      }

      state.currentUserType = actor.tipo;
      state.currentUserRefID = actor.refID;
      state.currentUserName = actor.nombre;
      state.currentUserEmail = actor.email;
      return actor;
    }

    function formatMonthLabel(year, month) {
      const dt = new Date(year, month, 1);
      return dt.toLocaleDateString("es-ES", { month: "long", year: "numeric" });
    }

    function formatHourMinute(raw) {
      const dt = parseDateValue(raw);
      if (!dt) return "--:--";
      return pad2(dt.getHours()) + ":" + pad2(dt.getMinutes());
    }

    function getCalendarRange() {
      const firstDay = new Date(state.calendarYear, state.calendarMonth, 1, 0, 0, 0, 0);
      const lastDay = new Date(state.calendarYear, state.calendarMonth + 1, 0, 23, 59, 59, 0);
      const rangeStart = new Date(firstDay);
      rangeStart.setDate(rangeStart.getDate() - 8);
      const rangeEnd = new Date(lastDay);
      rangeEnd.setDate(rangeEnd.getDate() + 8);
      return {
        desde: formatDateForDB(rangeStart),
        hasta: formatDateForDB(rangeEnd)
      };
    }

    function citasDelDia(dateKey) {
      return state.citas
        .filter(function (c) {
          const estado = normalize(c.estado || "activo").toLowerCase();
          if (estado !== "activo") return false;
          return toDateKey(c.fecha_inicio) === dateKey;
        })
        .sort(function (a, b) {
          return normalize(a.fecha_inicio).localeCompare(normalize(b.fecha_inicio));
        });
    }

    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      const label = document.getElementById("calendarMonthLabel");
      if (!grid || !label) return;

      label.textContent = formatMonthLabel(state.calendarYear, state.calendarMonth);

      const first = new Date(state.calendarYear, state.calendarMonth, 1);
      const startWeekDay = (first.getDay() + 6) % 7;
      const daysInMonth = new Date(state.calendarYear, state.calendarMonth + 1, 0).getDate();
      const daysPrevMonth = new Date(state.calendarYear, state.calendarMonth, 0).getDate();

      let html = "";
      for (let i = 0; i < 42; i += 1) {
        let dayNumber = 0;
        let cellDate = null;
        let inCurrentMonth = true;

        if (i < startWeekDay) {
          dayNumber = daysPrevMonth - startWeekDay + i + 1;
          cellDate = new Date(state.calendarYear, state.calendarMonth - 1, dayNumber);
          inCurrentMonth = false;
        } else if (i >= startWeekDay + daysInMonth) {
          dayNumber = i - (startWeekDay + daysInMonth) + 1;
          cellDate = new Date(state.calendarYear, state.calendarMonth + 1, dayNumber);
          inCurrentMonth = false;
        } else {
          dayNumber = i - startWeekDay + 1;
          cellDate = new Date(state.calendarYear, state.calendarMonth, dayNumber);
        }

        const dateKey = toDateKey(formatDateForDB(cellDate));
        const dayCitas = citasDelDia(dateKey);
        const isToday = toDateKey(formatDateForDB(new Date())) === dateKey;
        const isSelected = state.calendarSelectedDate === dateKey;

        html += '<article class="chat-calendar-day' + (inCurrentMonth ? "" : " out-month") + (isToday ? " today" : "") + (isSelected ? " selected" : "") + '" data-date="' + dateKey + '">';
        html += '<div class="chat-calendar-day-top"><span>' + dayNumber + '</span><small>' + dayCitas.length + ' cita(s)</small></div>';
        html += '<div class="chat-calendar-events">';
        dayCitas.slice(0, 3).forEach(function (cita) {
          html += '<button type="button" class="chat-calendar-event ' + getAppointmentStatusClass(cita.estado_cita) + '" data-id="' + Number(cita.id || 0) + '">';
          html += escapeHtml(formatHourMinute(cita.fecha_inicio) + ' ' + normalize(cita.titulo || 'Cita'));
          html += '</button>';
        });
        if (dayCitas.length > 3) {
          html += '<div class="chat-calendar-more">+' + (dayCitas.length - 3) + ' mas</div>';
        }
        html += '</div>';
        html += '</article>';
      }

      grid.innerHTML = html;

      Array.from(grid.querySelectorAll(".chat-calendar-day")).forEach(function (cell) {
        cell.onclick = function () {
          const dateKey = normalize(cell.getAttribute("data-date"));
          state.calendarSelectedDate = dateKey;
          renderCalendar();
          const currentId = Number(document.getElementById("appointmentId").value || 0);
          if (!currentId && dateKey) {
            document.getElementById("appointmentStart").value = dateKey + "T09:00";
            document.getElementById("appointmentEnd").value = dateKey + "T10:00";
          }
        };
      });

      Array.from(grid.querySelectorAll(".chat-calendar-event")).forEach(function (btn) {
        btn.onclick = function (event) {
          event.stopPropagation();
          const citaID = Number(btn.getAttribute("data-id") || 0);
          if (!citaID) return;
          const cita = state.citas.find(function (item) { return Number(item.id || 0) === citaID; });
          if (!cita) return;
          fillAppointmentForm(cita);
        };
      });
    }

        html += '<span class="badge ' + getPriorityClass(cita.tipo_cita) + '">' + escapeHtml((cita.tipo_cita || "reunion").toUpperCase()) + '</span>';
        html += '</div>';
        html += '<div class="task-meta">Estado: <span class="task-status ' + getAppointmentStatusClass(cita.estado_cita) + '">' + escapeHtml(getAppointmentStatusLabel(cita.estado_cita)) + '</span> | Registro: ' + escapeHtml(normalize(cita.estado || "activo")) + '</div>';
        html += '<div class="task-meta">Inicio: ' + escapeHtml(formatDate(cita.fecha_inicio)) + ' | Fin: ' + escapeHtml(formatDate(cita.fecha_fin)) + '</div>';
        html += '<div class="task-meta">Recordatorio: ' + Number(cita.notificar_minutos_antes || 30) + ' min antes</div>';
        if (normalize(cita.ubicacion)) {
          html += '<div class="task-meta">Ubicacion: ' + escapeHtml(cita.ubicacion) + '</div>';
        }
        if (normalize(cita.descripcion)) {
          html += '<div class="task-desc">' + escapeHtml(cita.descripcion) + '</div>';
        }
        html += '<div class="task-actions">' + appointmentActionButtons(cita) + '</div>';
        html += '</article>';
      });

      box.innerHTML = html;

      Array.from(box.querySelectorAll(".appointment-edit")).forEach(function (btn) {
        btn.onclick = function () {
          const citaID = Number(btn.getAttribute("data-id") || 0);
          const cita = state.citas.find(function (row) { return Number(row.id || 0) === citaID; });
          if (!cita) return;
          fillAppointmentForm(cita);
        };
      });

      Array.from(box.querySelectorAll(".appointment-action")).forEach(function (btn) {
        btn.onclick = async function () {
          const citaID = Number(btn.getAttribute("data-id") || 0);
          const action = normalize(btn.getAttribute("data-action"));
          if (!citaID || !action) return;
          try {
            const url = new URL("/api/empresa/chat_tareas/citas", window.location.origin);
            url.searchParams.set("empresa_id", String(state.empresaID));
            url.searchParams.set("id", String(citaID));
            url.searchParams.set("action", action);
            const resp = await fetch(url.pathname + url.search, { method: "PUT" });
            await ensureOk(resp);
            await loadAppointments();
            setHelp("appointmentMsg", "Cita actualizada", false);
          } catch (err) {
            setHelp("appointmentMsg", err.message || "No se pudo actualizar la cita", true);
          }
        };
      });

      Array.from(box.querySelectorAll(".appointment-delete")).forEach(function (btn) {
        btn.onclick = async function () {
          const citaID = Number(btn.getAttribute("data-id") || 0);
          if (!citaID) return;
          if (!confirm("¿Eliminar esta cita?")) return;
          try {
            const url = new URL("/api/empresa/chat_tareas/citas", window.location.origin);
            url.searchParams.set("empresa_id", String(state.empresaID));
            url.searchParams.set("id", String(citaID));
            const resp = await fetch(url.pathname + url.search, { method: "DELETE" });
            await ensureOk(resp);
            await loadAppointments();
            clearAppointmentForm();
            setHelp("appointmentMsg", "Cita eliminada", false);
          } catch (err) {
            setHelp("appointmentMsg", err.message || "No se pudo eliminar la cita", true);
          }
        };
      });
    }

    function fillAppointmentForm(cita) {
      if (!cita) return;
      document.getElementById("appointmentId").value = Number(cita.id || 0);
      document.getElementById("appointmentTitle").value = normalize(cita.titulo);
      document.getElementById("appointmentDescription").value = normalize(cita.descripcion);
      document.getElementById("appointmentType").value = normalize(cita.tipo_cita || "reunion") || "reunion";
      document.getElementById("appointmentEstado").value = normalize(cita.estado_cita || "programada") || "programada";
      document.getElementById("appointmentStart").value = toDateTimeLocal(cita.fecha_inicio);
      document.getElementById("appointmentEnd").value = toDateTimeLocal(cita.fecha_fin || cita.fecha_inicio);
      document.getElementById("appointmentReminder").value = Number(cita.notificar_minutos_antes || 30);
      document.getElementById("appointmentLocation").value = normalize(cita.ubicacion);
      document.getElementById("appointmentConversation").value = String(Number(cita.conversacion_id || 0));
      state.calendarSelectedDate = toDateKey(cita.fecha_inicio);
      renderCalendar();
    }

    function clearAppointmentForm() {
      const form = document.getElementById("appointmentForm");
      if (!form) return;
      form.reset();
      document.getElementById("appointmentId").value = "";
      document.getElementById("appointmentType").value = "reunion";
      document.getElementById("appointmentEstado").value = "programada";
      document.getElementById("appointmentReminder").value = "30";
      document.getElementById("appointmentConversation").value = "0";
      const now = new Date();
      now.setMinutes(now.getMinutes() + 30);
      const end = new Date(now.getTime() + (60 * 60 * 1000));
      document.getElementById("appointmentStart").value = toDateTimeLocal(now);
      document.getElementById("appointmentEnd").value = toDateTimeLocal(end);
    }

    async function markAppointmentReminderAsSent(citaID) {
      const url = new URL("/api/empresa/chat_tareas/citas", window.location.origin);
      url.searchParams.set("empresa_id", String(state.empresaID));
      url.searchParams.set("id", String(citaID));
      url.searchParams.set("action", "marcar_recordatorio");
      const resp = await fetch(url.pathname + url.search, { method: "PUT" });
      await ensureOk(resp);
    }

    async function checkAppointmentReminders() {
      const banner = document.getElementById("calendarReminderBanner");
      if (!banner) return;

      const now = new Date();
      const reminders = [];
      for (let i = 0; i < state.citas.length; i += 1) {
        const cita = state.citas[i];
        if (normalize(cita.estado || "activo").toLowerCase() !== "activo") continue;
        if (normalize(cita.estado_cita || "programada").toLowerCase() !== "programada") continue;

        const start = parseDateValue(cita.fecha_inicio);
        if (!start) continue;

        const minsBefore = Number(cita.notificar_minutos_antes || 30);
        const diffMin = (start.getTime() - now.getTime()) / 60000;
        if (diffMin < 0 || diffMin > minsBefore) continue;

        const key = String(Number(cita.id || 0)) + "|" + String(start.getTime());
        if (state.reminderShownKeys[key]) continue;
        state.reminderShownKeys[key] = true;

        reminders.push(cita);
      }

      if (!reminders.length) {
        banner.hidden = true;
        banner.textContent = "";
        return;
      }

      const preview = reminders.slice(0, 3).map(function (cita) {
        return normalize(cita.titulo || "Cita") + " (" + formatHourMinute(cita.fecha_inicio) + ")";
      }).join(" | ");
      const extra = reminders.length > 3 ? (" y " + (reminders.length - 3) + " mas") : "";
      banner.hidden = false;
      banner.textContent = "Recordatorio: tienes citas proximas. " + preview + extra;

      for (let i = 0; i < reminders.length; i += 1) {
        const citaID = Number(reminders[i].id || 0);
        if (!citaID) continue;
        if (Number(reminders[i].recordatorio_enviado || 0) > 0) continue;
        try {
          await markAppointmentReminderAsSent(citaID);
          reminders[i].recordatorio_enviado = 1;
        } catch (_) {
          // El recordatorio visual ya se muestra; si falla el marcado se reintentará en la próxima carga.
        }
      }
    }

    async function loadAppointments() {
      const url = new URL("/api/empresa/chat_tareas/citas", window.location.origin);
      url.searchParams.set("empresa_id", String(state.empresaID));
      url.searchParams.set("include_inactive", "1");
      const range = getCalendarRange();
      url.searchParams.set("desde", range.desde);
      url.searchParams.set("hasta", range.hasta);
      if (state.appointmentEstadoFilter) url.searchParams.set("estado_cita", state.appointmentEstadoFilter);
      if (state.appointmentSearch) url.searchParams.set("q", state.appointmentSearch);

      const resp = await fetch(url.pathname + url.search);
      await ensureOk(resp);
      const rows = await resp.json();
      state.citas = Array.isArray(rows) ? rows : [];
      renderCalendar();
      renderAppointments();
      await checkAppointmentReminders();
    }

    async function loadCurrentConversationData() {
      await Promise.all([
        loadParticipantes(),
        loadMensajes(),
        loadTareas()
      ]);
    }

    document.getElementById("reloadBtn").onclick = async function () {
      try {
        await loadConversaciones();
        await loadCurrentConversationData();
        await loadAppointments();
        setHelp("convMsg", "Datos actualizados", false);
      } catch (err) {
        setHelp("convMsg", err.message || "No se pudo actualizar", true);
      }
    };

    document.getElementById("convForm").onsubmit = async function (e) {
      e.preventDefault();
      const payload = {
        empresa_id: state.empresaID,
        titulo: normalize(document.getElementById("convTitulo").value),
        descripcion: normalize(document.getElementById("convDescripcion").value),
        prioridad: normalize(document.getElementById("convPrioridad").value) || "media",
        estado_conversacion: "abierta"
      };
      if (!payload.titulo) {
        setHelp("convMsg", "El título es obligatorio", true);
        return;
      }
      try {
        const resp = await fetch("/api/empresa/chat_tareas/conversaciones", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        await ensureOk(resp);
        const body = await resp.json();
        document.getElementById("convForm").reset();
        state.conversacionID = Number(body.id || 0);
        await loadConversaciones();
        await loadCurrentConversationData();
        setHelp("convMsg", "Conversación creada", false);
      } catch (err) {
        setHelp("convMsg", err.message || "No se pudo crear la conversación", true);
      }
    };

    document.getElementById("convSearchBtn").onclick = async function () {
      state.convSearch = normalize(document.getElementById("convSearch").value);
      try {
        await loadConversaciones();
        await loadCurrentConversationData();
      } catch (err) {
        setHelp("convMsg", err.message || "No se pudo filtrar", true);
      }
    };

    document.getElementById("addParticipantBtn").onclick = async function () {
      if (!state.conversacionID) {
        setHelp("messageMsg", "Selecciona una conversación", true);
        return;
      }
      const raw = normalize(document.getElementById("participantSelect").value);
      if (!raw) {
        setHelp("messageMsg", "Selecciona un usuario", true);
        return;
      }
      const parts = raw.split("|");
      const id = Number(parts[0] || 0);
      const nombre = normalize(parts[1]);
      const email = normalize(parts[2]);
      try {
        const resp = await fetch("/api/empresa/chat_tareas/participantes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            empresa_id: state.empresaID,
            conversacion_id: state.conversacionID,
            participante_tipo: "usuario",
            participante_ref_id: id,
            nombre: nombre,
            email: email,
            estado: "activo"
          })
        });
        await ensureOk(resp);
        await loadParticipantes();
        setHelp("messageMsg", "Participante agregado", false);
      } catch (err) {
        setHelp("messageMsg", err.message || "No se pudo agregar participante", true);
      }
    };

    document.getElementById("messageForm").onsubmit = async function (e) {
      e.preventDefault();
      if (!state.conversacionID) {
        setHelp("messageMsg", "Selecciona una conversación", true);
        return;
      }

      const contenido = normalize(document.getElementById("messageText").value);
      const fileInput = document.getElementById("messageFile");
      const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
      const voicePayload = state.pendingMessageVoice;

      if (!contenido && !file && !voicePayload) {
        setHelp("messageMsg", "Escribe un mensaje o adjunta un archivo", true);
        return;
      }

      try {
        const actor = resolveCurrentActorContext();
        if (file || voicePayload) {
          const fd = new FormData();
          fd.append("empresa_id", String(state.empresaID));
          fd.append("conversacion_id", String(state.conversacionID));
          fd.append("contenido", contenido);
          fd.append("autor_tipo", actor.tipo || "admin");
          if (Number(actor.refID || 0) > 0) {
            fd.append("autor_ref_id", String(Number(actor.refID)));
          }
          fd.append("autor_nombre", actor.nombre || "Usuario");
          fd.append("autor_email", actor.email || "");
          if (file) {
            fd.append("archivo", file);
          } else {
            fd.append("archivo", voicePayload.blob, voicePayload.fileName || ("mensaje_" + Date.now() + ".webm"));
            fd.append("duracion_segundos", String(Number(voicePayload.durationSeg || 0)));
          }

          const resp = await fetch("/api/empresa/chat_tareas/mensajes/adjunto", {
            method: "POST",
            body: fd
          });
          await ensureOk(resp);
        } else {
          const resp = await fetch("/api/empresa/chat_tareas/mensajes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              empresa_id: state.empresaID,
              conversacion_id: state.conversacionID,
              autor_tipo: actor.tipo || "admin",
              autor_ref_id: Number(actor.refID || 0),
              autor_nombre: actor.nombre || "Usuario",
              autor_email: actor.email || "",
              contenido: contenido,
              tipo_mensaje: "texto"
            })
          });
          await ensureOk(resp);
        }

        document.getElementById("messageText").value = "";
        fileInput.value = "";
        clearVoiceRecording("message");
        await loadMensajes();
        await loadConversaciones();
        setHelp("messageMsg", "Mensaje enviado", false);
      } catch (err) {
        setHelp("messageMsg", err.message || "No se pudo enviar mensaje", true);
      }
    };

    document.getElementById("taskForm").onsubmit = async function (e) {
      e.preventDefault();
      const titulo = normalize(document.getElementById("taskTitulo").value);
      if (!titulo) {
        setHelp("taskMsg", "El título es obligatorio", true);
        return;
      }

      const assignRaw = normalize(document.getElementById("taskAsignado").value);
      const parts = assignRaw.split("|");
      const asignadoTipo = normalize(parts[0] || "usuario");
      const asignadoRefID = Number(parts[1] || 0);
      const asignadoNombre = normalize(parts[2] || "");
      const asignadoEmail = normalize(parts[3] || "");

      const payload = {
        empresa_id: state.empresaID,
        conversacion_id: state.conversacionID || 0,
        titulo: titulo,
        descripcion: normalize(document.getElementById("taskDescripcion").value),
        prioridad: normalize(document.getElementById("taskPrioridad").value) || "media",
        fecha_limite: normalize(document.getElementById("taskFechaLimite").value).replace("T", " "),
        asignado_tipo: asignadoTipo,
        asignado_ref_id: asignadoRefID,
        asignado_nombre: asignadoNombre,
        asignado_email: asignadoEmail,
        estado_tarea: "pendiente",
        porcentaje_avance: 0
      };

      const taskVoicePayload = state.pendingTaskVoice;

      try {
        const resp = await fetch("/api/empresa/chat_tareas/tareas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        await ensureOk(resp);
        const body = await resp.json();
        const tareaID = Number(body && body.id || 0);
        if (taskVoicePayload && tareaID > 0) {
          await uploadTaskVoiceNote(tareaID, taskVoicePayload);
        }
        document.getElementById("taskForm").reset();
        renderAssignOptions();
        clearVoiceRecording("task");
        await loadTareas();
        await loadConversaciones();
        setHelp("taskMsg", taskVoicePayload ? "Tarea creada con nota de voz" : "Tarea creada", false);
      } catch (err) {
        setHelp("taskMsg", err.message || "No se pudo crear la tarea", true);
      }
    };

    document.getElementById("taskSearchBtn").onclick = async function () {
      state.taskSearch = normalize(document.getElementById("taskSearch").value);
      state.taskEstadoFilter = normalize(document.getElementById("taskEstadoFilter").value);
      try {
        await loadTareas();
      } catch (err) {
        setHelp("taskMsg", err.message || "No se pudo filtrar tareas", true);
      }
    };

    document.getElementById("calendarPrevBtn").onclick = async function () {
      state.calendarMonth -= 1;
      if (state.calendarMonth < 0) {
        state.calendarMonth = 11;
        state.calendarYear -= 1;
      }
      try {
        await loadAppointments();
      } catch (err) {
        setHelp("appointmentMsg", err.message || "No se pudo cargar el calendario", true);
      }
    };

    document.getElementById("calendarNextBtn").onclick = async function () {
      state.calendarMonth += 1;
      if (state.calendarMonth > 11) {
        state.calendarMonth = 0;
        state.calendarYear += 1;
      }
      try {
        await loadAppointments();
      } catch (err) {
        setHelp("appointmentMsg", err.message || "No se pudo cargar el calendario", true);
      }
    };

    document.getElementById("calendarTodayBtn").onclick = async function () {
      const now = new Date();
      state.calendarYear = now.getFullYear();
      state.calendarMonth = now.getMonth();
      state.calendarSelectedDate = toDateKey(formatDateForDB(now));
      try {
        await loadAppointments();
      } catch (err) {
        setHelp("appointmentMsg", err.message || "No se pudo cargar el calendario", true);
      }
    };

    document.getElementById("appointmentSearchBtn").onclick = async function () {
      state.appointmentSearch = normalize(document.getElementById("appointmentSearch").value);
      state.appointmentEstadoFilter = normalize(document.getElementById("appointmentEstadoFilter").value);
      try {
        await loadAppointments();
      } catch (err) {
        setHelp("appointmentMsg", err.message || "No se pudo filtrar citas", true);
      }
    };

    document.getElementById("clearAppointmentBtn").onclick = function () {
      clearAppointmentForm();
      setHelp("appointmentMsg", "Formulario de cita reiniciado", false);
    };

    document.getElementById("appointmentForm").onsubmit = async function (e) {
      e.preventDefault();
      const citaID = Number(document.getElementById("appointmentId").value || 0);
      const fechaInicio = toDBDateTime(document.getElementById("appointmentStart").value);
      const fechaFinInput = normalize(document.getElementById("appointmentEnd").value);
      const fechaFin = toDBDateTime(fechaFinInput || document.getElementById("appointmentStart").value);
      const reminderRaw = Number(document.getElementById("appointmentReminder").value || 30);

      const payload = {
        empresa_id: state.empresaID,
        conversacion_id: Number(document.getElementById("appointmentConversation").value || 0),
        titulo: normalize(document.getElementById("appointmentTitle").value),
        descripcion: normalize(document.getElementById("appointmentDescription").value),
        tipo_cita: normalize(document.getElementById("appointmentType").value) || "reunion",
        fecha_inicio: fechaInicio,
        fecha_fin: fechaFin,
        ubicacion: normalize(document.getElementById("appointmentLocation").value),
        notificar_minutos_antes: Number.isFinite(reminderRaw) && reminderRaw > 0 ? reminderRaw : 30,
        estado_cita: normalize(document.getElementById("appointmentEstado").value) || "programada",
        visibilidad: "empresa",
        estado: "activo"
      };

      if (!payload.titulo) {
        setHelp("appointmentMsg", "El titulo de la cita es obligatorio", true);
        return;
      }
      if (!payload.fecha_inicio) {
        setHelp("appointmentMsg", "La fecha de inicio es obligatoria", true);
        return;
      }

      try {
        let resp;
        if (citaID > 0) {
          payload.id = citaID;
          resp = await fetch("/api/empresa/chat_tareas/citas", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        } else {
          resp = await fetch("/api/empresa/chat_tareas/citas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        }
        await ensureOk(resp);
        clearAppointmentForm();
        await loadAppointments();
        setHelp("appointmentMsg", citaID > 0 ? "Cita actualizada" : "Cita creada", false);
      } catch (err) {
        setHelp("appointmentMsg", err.message || "No se pudo guardar la cita", true);
      }
    };

    document.getElementById("recordMessageVoiceBtn").onclick = async function () {
      await startVoiceRecording("message");
    };
    document.getElementById("stopMessageVoiceBtn").onclick = function () {
      stopVoiceRecording("message");
    };
    document.getElementById("clearMessageVoiceBtn").onclick = function () {
      clearVoiceRecording("message");
    };

    document.getElementById("recordTaskVoiceBtn").onclick = async function () {
      await startVoiceRecording("task");
    };
    document.getElementById("stopTaskVoiceBtn").onclick = function () {
      stopVoiceRecording("task");
    };
    document.getElementById("clearTaskVoiceBtn").onclick = function () {
      clearVoiceRecording("task");
    };

    document.getElementById("messageFile").addEventListener("change", function () {
      if (this.files && this.files.length > 0) {
        clearVoiceRecording("message");
      }
    });

    (async function init() {
      state.empresaID = Number(getQueryParam("empresa_id") || 0);
      if (!state.empresaID) {
        document.getElementById("convList").textContent = "empresa_id requerido en la URL";
        document.getElementById("messagesList").textContent = "empresa_id requerido en la URL";
        document.getElementById("taskList").textContent = "empresa_id requerido en la URL";
        return;
      }

      try {
        updateMessageVoiceUI();
        updateTaskVoiceUI();
        await Promise.all([loadEmpresa(), loadMe(), loadUsers()]);
        await loadConversaciones();
        clearAppointmentForm();
        await loadCurrentConversationData();
        await loadAppointments();

        window.setInterval(function () {
          checkAppointmentReminders();
        }, 60000);

        window.setInterval(async function () {
          try {
            await loadAppointments();
          } catch (_) {
            // El usuario puede continuar operando chat/tareas aunque falle sincronizacion de citas.
          }
        }, 180000);
      } catch (err) {
        setHelp("convMsg", err.message || "Error cargando módulo", true);
        setHelp("messageMsg", err.message || "Error cargando módulo", true);
        setHelp("taskMsg", err.message || "Error cargando módulo", true);
        setHelp("appointmentMsg", err.message || "Error cargando módulo", true);
      }
    })();
  </script>
</body>
</html>
