<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Estación YouTube</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="youtube-station-browser-page">
  <section class="youtube-station-browser-shell" data-compact="0">
    <header class="youtube-station-browser-toolbar">
      <div>
        <strong>YouTube</strong>
        <span id="youtubeStationBrowserLabel" class="youtube-station-browser-label">Exploración embebida</span>
      </div>
      <div class="youtube-station-browser-actions">
        <div id="youtubeSearchBar" class="youtube-station-search-bar">
          <input id="youtubeSearchInput" class="form-input youtube-station-search-input" type="text" placeholder="Buscar en YouTube dentro de la estación">
          <button id="youtubeSearchBtn" class="btn secondary" type="button">Buscar</button>
        </div>
        <button id="youtubeStationHomeBtn" class="btn secondary" type="button">Inicio</button>
        <a id="youtubeStationBrowserLink" class="btn secondary" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">Abrir YouTube</a>
      </div>
    </header>
    <div class="youtube-station-browser-frame-wrap">
      <iframe id="youtubeStationFrame" style="width:100%;height:100%;border:0;" title="Explorador YouTube de la estación" loading="lazy" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
  </section>

  <script>
    function sanitizeText(value) {
      return String(value == null ? '' : value).trim();
    }

    function getParam(name) {
      try {
        var params = new URLSearchParams(window.location.search || '');
        return sanitizeText(params.get(name));
      } catch (err) {
        return '';
      }
    }

    function resolveQuery() {
      var query = getParam('query');
      return query || 'YouTube';
    }

    function resolveHomeQuery() {
      return 'YouTube oficial';
    }

    function buildExternalURL(query) {
      var clean = sanitizeText(query);
      if (!clean) return 'https://www.youtube.com/';
      return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(clean);
    }

    function buildEmbedURL(query, compact) {
      var clean = sanitizeText(query) || resolveHomeQuery();
      var params = new URLSearchParams();
      params.set('listType', 'search');
      params.set('list', clean);
      params.set('rel', '0');
      params.set('modestbranding', '1');
      params.set('playsinline', '1');
      params.set('autoplay', compact ? '1' : '0');
      params.set('mute', compact ? '1' : '0');
      return 'https://www.youtube-nocookie.com/embed?' + params.toString();
    }

    function updateBrowser(query, compact) {
      var clean = sanitizeText(query) || resolveHomeQuery();
      var frame = document.getElementById('youtubeStationFrame');
      var label = document.getElementById('youtubeStationBrowserLabel');
      var link = document.getElementById('youtubeStationBrowserLink');
      if (frame) frame.src = buildEmbedURL(clean, compact);
      if (label) label.textContent = compact ? 'Vista rápida embebida' : ('Resultados: ' + clean);
      if (link) link.href = buildExternalURL(clean);
      return clean;
    }

    window.__ytPlayWithSound = function () {
      var frame = document.getElementById('youtubeStationFrame');
      if (!frame) return;
      var currentQuery = sanitizeText(getParam('query')) || resolveHomeQuery();
      frame.src = buildEmbedURL(currentQuery, false);
    };

    window.__ytLoadSearch = function (q) {
      updateBrowser(q, false);
    };

    (function bootstrap() {
      var query = resolveQuery();
      var compact = getParam('compact') === '1';
      var shell = document.querySelector('.youtube-station-browser-shell');
      var label = document.getElementById('youtubeStationBrowserLabel');
      var link = document.getElementById('youtubeStationBrowserLink');
      var homeBtn = document.getElementById('youtubeStationHomeBtn');
      var searchBar = document.getElementById('youtubeSearchBar');
      var searchInput = document.getElementById('youtubeSearchInput');
      var searchBtn = document.getElementById('youtubeSearchBtn');

      if (shell) shell.dataset.compact = compact ? '1' : '0';
      if (label) label.textContent = compact ? 'Vista rápida embebida' : 'Portada de búsqueda de YouTube';
      if (link) link.href = 'https://www.youtube.com/';
      if (searchBar) searchBar.style.display = compact ? 'none' : 'flex';
      if (searchInput) searchInput.value = query === 'YouTube' ? '' : query;

      updateBrowser(query, compact);

      if (homeBtn) {
        homeBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          var defaultQuery = resolveHomeQuery();
          if (searchInput) searchInput.value = '';
          updateBrowser(defaultQuery, compact);
        });
      }

      if (searchBtn) {
        searchBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          var q = String((searchInput && searchInput.value) || '').trim();
          if (!q) q = resolveHomeQuery();
          if (typeof window.__ytLoadSearch === 'function') {
            window.__ytLoadSearch(q);
          }
        });
      }

      if (searchInput) {
        searchInput.addEventListener('keydown', function (ev) {
          if (ev.key !== 'Enter') return;
          ev.preventDefault();
          var q = String(searchInput.value || '').trim();
          if (!q) q = resolveHomeQuery();
          if (typeof window.__ytLoadSearch === 'function') {
            window.__ytLoadSearch(q);
          }
        });
      }
    })();
  </script>
</body>
</html>
