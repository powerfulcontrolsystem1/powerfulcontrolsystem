<body class="admin-empresa-shell">

        <li><a id="linkInventarioAvanzado" href="/administrar_empresa/inventario_avanzado.html" target="productosContentFrame"><img class="icon" src="/img/analytics-color.svg" alt="">Inventario avanzado</a></li>
        <li><a id="linkPreciosHistorial" href="/administrar_empresa/historial_productos.html" target="productosContentFrame"><img class="icon" src="/img/price-tag-color.svg" alt="">Historial de productos</a></li>
        <li><a id="linkBodegas" href="/administrar_empresa/bodega.html" target="productosContentFrame"><img class="icon" src="/img/warehouse-color.svg" alt="">Bodegas</a></li>
        <li><a id="linkCategorias" href="/administrar_empresa/productos/categorias.html" target="productosContentFrame"><img class="icon" src="/img/tags-color.svg" alt="">Categorías</a></li>
        <li><a id="linkCombosProductos" href="/administrar_empresa/combos_productos.html" target="productosContentFrame"><img class="icon" src="/img/shield-license-color.svg" alt="">Combos de productos</a></li>

        <li class="admin-menu-visibility-item">
          <button type="button" class="admin-menu-visibility-toggle" aria-controls="productosSidebarNav" aria-expanded="true" data-show-label="Mostrar menú" data-hide-label="Ocultar menú">
            <span class="admin-menu-visibility-icon" aria-hidden="true">☰</span>
            <span class="admin-menu-visibility-label">Ocultar menú</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="admin-content">
      <iframe name="productosContentFrame" id="productosContentFrame" src="/administrar_empresa/administrar_productos.html?view=productos&v=20260501-nuevo-producto-inline" title="Contenido de productos" class="admin-empresa-frame"></iframe>
    </main>
  </div>
    <script>
      (function() {
        const VERSION = '20260501-nuevo-producto-inline';

        function parsePositiveInt(raw) {
          const n = Number(String(raw || '').trim());
          if (!Number.isFinite(n)) return 0;
          const v = Math.trunc(n);
          return v > 0 ? v : 0;
        }

        window.__resolveEmpresaIdContext = function() {
          try {
            const params = new URLSearchParams(window.location.search || '');
            const own = parsePositiveInt(params.get('empresa_id') || params.get('id'));
            if (own > 0) return own;
          } catch (_) {}
          try {
            let ctx = window.parent;
            let depth = 0;
            while (ctx && ctx !== window && depth < 4) {
              try {
                if (typeof ctx.__resolveEmpresaIdContext === 'function') {
                  const resolved = parsePositiveInt(ctx.__resolveEmpresaIdContext());
                  if (resolved > 0) return resolved;
                }
              } catch (_) {}
              try {
                const parentParams = new URLSearchParams(ctx.location.search || '');
                const fromParent = parsePositiveInt(parentParams.get('empresa_id') || parentParams.get('id'));
                if (fromParent > 0) return fromParent;
              } catch (_) {}
              try {
                if (!ctx.parent || ctx.parent === ctx) break;
                ctx = ctx.parent;
              } catch (_) {
                break;
              }
              depth += 1;
            }
          } catch (_) {}
          try {
            const candidates = [
              sessionStorage.getItem('active_empresa_id'),
              sessionStorage.getItem('empresa_id'),
              localStorage.getItem('active_empresa_id'),
              localStorage.getItem('empresa_id')
            ];
            for (let i = 0; i < candidates.length; i += 1) {
              const parsed = parsePositiveInt(candidates[i]);
              if (parsed > 0) return parsed;
            }
          } catch (_) {}
          return 0;
        };

        function withEmpresaAndVersion(rawUrl) {
          try {
            const url = new URL(rawUrl, window.location.origin);
            const empresaId = window.__resolveEmpresaIdContext();
            if (empresaId > 0) url.searchParams.set('empresa_id', String(empresaId));
            if (!url.searchParams.get('v')) url.searchParams.set('v', VERSION);
            return url.pathname + url.search + url.hash;
          } catch (_) {
            return rawUrl;
          }
        }

        document.querySelectorAll('#productosSidebarNav a[href]').forEach(function(link) {
          link.setAttribute('href', withEmpresaAndVersion(link.getAttribute('href')));
        });
        const frame = document.getElementById('productosContentFrame');
        if (frame) {
          frame.setAttribute('src', withEmpresaAndVersion(frame.getAttribute('src') || '/administrar_empresa/administrar_productos.html?view=productos'));
        }
      })();
    </script>
    <script src="/js/administrar_empresa.js"></script>
    <script src="/menu.js"></script>
</body>
</html>
