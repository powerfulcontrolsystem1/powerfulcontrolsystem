<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administrar Productos - Menú</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="admin-empresa-shell">
  <div class="admin-layout">
    <aside class="admin-sidebar admin-sidebar-mobile-collapsible">
      <h2>Productos</h2>
      <ul class="nav" id="productosSidebarNav">
        <li><a id="linkProductosMain" href="/administrar_empresa/administrar_productos.html?view=productos" target="productosContentFrame"><img class="icon" src="/img/shield-license-color.svg" alt="">Inventario (Productos)</a></li>
        <li><a id="linkPreciosHistorial" href="/administrar_empresa/historial_productos.html" target="productosContentFrame"><img class="icon" src="/img/price-tag-color.svg" alt="">Historial de productos</a></li>
        <li><a id="linkBodegas" href="/administrar_empresa/bodega.html" target="productosContentFrame"><img class="icon" src="/img/warehouse-color.svg" alt="">Bodegas</a></li>
        <li><a id="linkCategorias" href="/administrar_empresa/productos/categorias.html" target="productosContentFrame"><img class="icon" src="/img/tags-color.svg" alt="">Categorías</a></li>
        <li><a id="linkCombosProductos" href="/administrar_empresa/productos/combos_productos.html" target="productosContentFrame"><img class="icon" src="/img/shield-license-color.svg" alt="">Combos de productos</a></li>
        <li class="admin-menu-visibility-item">
          <button type="button" class="admin-menu-visibility-toggle" aria-controls="productosSidebarNav" aria-expanded="true" data-show-label="Mostrar menú" data-hide-label="Ocultar menú">
            <span class="admin-menu-visibility-icon" aria-hidden="true">☰</span>
            <span class="admin-menu-visibility-label">Ocultar menú</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="admin-content">
      <iframe name="productosContentFrame" id="productosContentFrame" src="/administrar_empresa/administrar_productos.html?view=productos" title="Contenido de productos" class="admin-empresa-frame"></iframe>
    </main>
  </div>
    <script src="/js/administrar_empresa.js"></script>
    <script src="/menu.js"></script>
    <script>
      (function () {
        function initProductosSidebarToggle() {
          var sidebar = document.querySelector('.admin-sidebar.admin-sidebar-mobile-collapsible');
          var nav = document.getElementById('productosSidebarNav');
          var toggleBtn = sidebar && sidebar.querySelector('.admin-menu-visibility-toggle');
          var label = toggleBtn && toggleBtn.querySelector('.admin-menu-visibility-label');
          if (!sidebar || !nav || !toggleBtn || toggleBtn.dataset.pcsBound === '1') {
            return;
          }

          var mediaQuery = null;
          try {
            mediaQuery = window.matchMedia('(max-width: 640px)');
          } catch (e) {
            mediaQuery = null;
          }

          var showLabel = toggleBtn.getAttribute('data-show-label') || 'Mostrar menú';
          var hideLabel = toggleBtn.getAttribute('data-hide-label') || 'Ocultar menú';

          function isMobile() {
            return !!(mediaQuery && mediaQuery.matches);
          }

          function applyState(collapsed) {
            var shouldCollapse = !!collapsed && isMobile();
            sidebar.classList.toggle('is-collapsed', shouldCollapse);
            toggleBtn.setAttribute('aria-expanded', shouldCollapse ? 'false' : 'true');
            if (label) {
              label.textContent = shouldCollapse ? showLabel : hideLabel;
            }
          }

          toggleBtn.dataset.pcsBound = '1';
          toggleBtn.addEventListener('click', function () {
            if (!isMobile()) {
              return;
            }
            applyState(!sidebar.classList.contains('is-collapsed'));
          });

          nav.addEventListener('click', function (event) {
            var link = event.target && event.target.closest ? event.target.closest('a') : null;
            if (!link || !isMobile()) {
              return;
            }
            window.setTimeout(function () {
              applyState(true);
            }, 0);
          });

          if (mediaQuery) {
            var syncViewport = function () {
              applyState(false);
            };
            if (typeof mediaQuery.addEventListener === 'function') {
              mediaQuery.addEventListener('change', syncViewport);
            } else if (typeof mediaQuery.addListener === 'function') {
              mediaQuery.addListener(syncViewport);
            }
          }

          applyState(false);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initProductosSidebarToggle);
        } else {
          initProductosSidebarToggle();
        }
      })();
    </script>
</body>
</html>
