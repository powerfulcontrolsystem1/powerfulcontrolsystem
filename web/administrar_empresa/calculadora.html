<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Calculadora por empresa</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h1 style="margin:0;">Calculadora operativa por empresa</h1>
        <div class="empresa-inline-actions">
          <a id="linkReportesEmpresa" class="btn secondary" href="#">Abrir reportes</a>
          <a id="linkPanelEmpresa" class="btn" href="#">Ir al panel empresa</a>
        </div>
      </div>
      <p id="empresaCalcContexto" class="form-help"></p>

      <div class="calc-layout">
        <article class="card calc-card">
          <div class="calc-display-wrap">
            <div id="calcExpression" class="calc-expression">0</div>
            <div id="calcResult" class="calc-result">0</div>
          </div>

          <div class="calc-keypad" role="group" aria-label="Teclado de calculadora">
            <button type="button" class="calc-key util" data-action="clear">AC</button>
            <button type="button" class="calc-key util" data-action="backspace">BS</button>
            <button type="button" class="calc-key util" data-action="percent">%</button>
            <button type="button" class="calc-key operator" data-action="op" data-op="/">/</button>

            <button type="button" class="calc-key" data-action="digit" data-value="7">7</button>
            <button type="button" class="calc-key" data-action="digit" data-value="8">8</button>
            <button type="button" class="calc-key" data-action="digit" data-value="9">9</button>
            <button type="button" class="calc-key operator" data-action="op" data-op="*">*</button>

            <button type="button" class="calc-key" data-action="digit" data-value="4">4</button>
            <button type="button" class="calc-key" data-action="digit" data-value="5">5</button>
            <button type="button" class="calc-key" data-action="digit" data-value="6">6</button>
            <button type="button" class="calc-key operator" data-action="op" data-op="-">-</button>

            <button type="button" class="calc-key" data-action="digit" data-value="1">1</button>
            <button type="button" class="calc-key" data-action="digit" data-value="2">2</button>
            <button type="button" class="calc-key" data-action="digit" data-value="3">3</button>
            <button type="button" class="calc-key operator" data-action="op" data-op="+">+</button>

            <button type="button" class="calc-key util" data-action="toggle-sign">+/-</button>
            <button type="button" class="calc-key" data-action="digit" data-value="0">0</button>
            <button type="button" class="calc-key" data-action="decimal">.</button>
            <button type="button" class="calc-key operator" data-action="equals">=</button>

            <button type="button" class="calc-key mem" data-action="memory-clear">MC</button>
            <button type="button" class="calc-key mem" data-action="memory-recall">MR</button>
            <button type="button" class="calc-key mem" data-action="memory-plus">M+</button>
            <button type="button" class="calc-key mem" data-action="memory-minus">M-</button>
          </div>
        </article>

        <article class="card calc-card">
          <div class="empresa-section-header">
            <h2 style="margin:0;">Historial por empresa</h2>
            <div class="empresa-inline-actions">
              <button id="btnRefrescarHistorial" class="btn secondary" type="button">Actualizar</button>
              <button id="btnLimpiarHistorial" class="btn secondary" type="button">Limpiar</button>
            </div>
          </div>
          <p class="form-help">La calculadora registra operaciones por empresa con etiquetas y asociación a cliente/documento.</p>

          <div class="calc-config-row">
            <label class="empresa-config-check" for="calcCfgCarritos">
              <input id="calcCfgCarritos" type="checkbox" checked>
              <span>Integrar carritos</span>
            </label>
            <label class="empresa-config-check" for="calcCfgCotizaciones">
              <input id="calcCfgCotizaciones" type="checkbox" checked>
              <span>Integrar cotizaciones</span>
            </label>
            <button id="btnGuardarConfigCalc" class="btn" type="button">Guardar config</button>
          </div>

          <div class="calc-meta-grid">
            <div class="form-col">
              <label class="form-label" for="calcEtiquetas">Etiquetas (coma separadas)</label>
              <input id="calcEtiquetas" class="form-input" placeholder="cierre, mesa_2, ajuste">
            </div>
            <div class="form-col">
              <label class="form-label" for="calcCliente">Cliente</label>
              <select id="calcCliente" class="form-input"></select>
            </div>
            <div class="form-col">
              <label class="form-label" for="calcDocumentoTipo">Documento tipo</label>
              <input id="calcDocumentoTipo" class="form-input" placeholder="carrito, cotizacion, factura">
            </div>
            <div class="form-col">
              <label class="form-label" for="calcDocumentoCodigo">Documento codigo</label>
              <input id="calcDocumentoCodigo" class="form-input" placeholder="COD-001">
            </div>
            <div class="form-col">
              <label class="form-label" for="calcCarrito">Carrito</label>
              <select id="calcCarrito" class="form-input"></select>
            </div>
            <div class="form-col">
              <label class="form-label" for="calcCotizacion">Cotizacion</label>
              <select id="calcCotizacion" class="form-input"></select>
            </div>
          </div>

          <div class="calc-filter-row">
            <input id="calcDesde" type="date" class="form-input" title="Desde">
            <input id="calcHasta" type="date" class="form-input" title="Hasta">
            <input id="calcUsuarioFiltro" class="form-input" placeholder="Filtro usuario (correo)">
            <select id="calcExportFormat" class="form-input">
              <option value="json">JSON</option>
              <option value="csv">CSV</option>
              <option value="txt">TXT</option>
              <option value="xls">XLS</option>
              <option value="pdf">PDF</option>
            </select>
            <button id="btnExportarHistorial" class="btn" type="button">Exportar</button>
          </div>

          <div id="calcMessage" class="form-help"></div>
          <ul id="calcHistory" class="calc-history-list"></ul>
        </article>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || "");
      var empresaId = String(
        params.get("empresa_id") ||
        params.get("id") ||
        (function () {
          try {
            return localStorage.getItem("active_empresa_id") || "";
          } catch (e) {
            return "";
          }
        })()
      ).trim();

      if (empresaId) {
        try {
          localStorage.setItem("active_empresa_id", empresaId);
        } catch (e) {}
      }

      var empresaKey = empresaId || "global";
      var memoryKey = "calculator:empresa:" + empresaKey + ":memory";

      var expressionEl = document.getElementById("calcExpression");
      var resultEl = document.getElementById("calcResult");
      var historyEl = document.getElementById("calcHistory");
      var messageEl = document.getElementById("calcMessage");
      var empresaContextEl = document.getElementById("empresaCalcContexto");
      var linkReportes = document.getElementById("linkReportesEmpresa");
      var linkPanel = document.getElementById("linkPanelEmpresa");

      var currentValue = "0";
      var accumulator = null;
      var pendingOperator = "";
      var waitingForOperand = false;
      var memoryValue = loadMemory();
      var calcConfig = {
        integrar_carritos: true,
        integrar_cotizaciones: true
      };
      var references = {
        clientes: [],
        carritos: [],
        cotizaciones: []
      };
      var carritosById = {};
      var cotizacionesById = {};

      empresaContextEl.textContent = empresaId
        ? "Contexto activo: empresa_id=" + empresaId
        : "Debe indicar empresa_id para registrar operaciones y exportar historial.";

      setActionLinks();
      bindUI();
      renderHistory([]);
      updateDisplay();

      if (hasEmpresaContext()) {
        bootstrap();
      } else {
        setMessage("Sin empresa seleccionada: solo calculo local disponible.", true);
        disableEmpresaActions();
      }

      function hasEmpresaContext() {
        return !!empresaId;
      }

      function setActionLinks() {
        var reportesURL = new URL("/administrar_empresa/reportes.html", window.location.origin);
        var panelURL = new URL("/administrar_empresa.html", window.location.origin);
        if (empresaId) {
          reportesURL.searchParams.set("empresa_id", empresaId);
          panelURL.searchParams.set("empresa_id", empresaId);
        }
        linkReportes.setAttribute("href", reportesURL.pathname + reportesURL.search);
        linkPanel.setAttribute("href", panelURL.pathname + panelURL.search);
      }

      function bindUI() {
        document.querySelectorAll(".calc-keypad .calc-key").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var action = btn.getAttribute("data-action") || "";
            handleAction(action, btn);
          });
        });

        document.getElementById("btnRefrescarHistorial").addEventListener("click", function () {
          refreshHistory().catch(function (err) {
            setMessage(normalizeErrorMessage(err, "No se pudo actualizar historial."), true);
          });
        });

        document.getElementById("btnLimpiarHistorial").addEventListener("click", function () {
          clearHistory().catch(function (err) {
            setMessage(normalizeErrorMessage(err, "No se pudo limpiar historial."), true);
          });
        });

        document.getElementById("btnExportarHistorial").addEventListener("click", function () {
          exportHistory().catch(function (err) {
            setMessage(normalizeErrorMessage(err, "No se pudo exportar historial."), true);
          });
        });

        document.getElementById("btnGuardarConfigCalc").addEventListener("click", function () {
          saveConfig().catch(function (err) {
            setMessage(normalizeErrorMessage(err, "No se pudo guardar configuracion."), true);
          });
        });

        document.getElementById("calcCarrito").addEventListener("change", onCarritoSelected);
        document.getElementById("calcCotizacion").addEventListener("change", onCotizacionSelected);
      }

      function disableEmpresaActions() {
        [
          "btnRefrescarHistorial",
          "btnLimpiarHistorial",
          "btnExportarHistorial",
          "btnGuardarConfigCalc",
          "calcCfgCarritos",
          "calcCfgCotizaciones",
          "calcEtiquetas",
          "calcCliente",
          "calcDocumentoTipo",
          "calcDocumentoCodigo",
          "calcCarrito",
          "calcCotizacion",
          "calcDesde",
          "calcHasta",
          "calcUsuarioFiltro",
          "calcExportFormat"
        ].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.disabled = true;
        });
      }

      async function bootstrap() {
        await loadConfig();
        await loadReferences();
        await refreshHistory();
      }

      function normalizeErrorMessage(err, fallback) {
        if (!err) return fallback;
        var text = String(err.message || err || "").trim();
        return text || fallback;
      }

      function setMessage(text, isError) {
        messageEl.textContent = text || "";
        messageEl.style.color = isError ? "#ef5350" : "";
      }

      function formatNumber(value) {
        var n = Number(value);
        if (!Number.isFinite(n)) return "0";
        var rounded = Math.round((n + Number.EPSILON) * 1000000000) / 1000000000;
        return String(rounded);
      }

      function safeNumber(value) {
        var n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function symbolForOperator(operator) {
        switch (operator) {
          case "+":
            return "+";
          case "-":
            return "-";
          case "*":
            return "*";
          case "/":
            return "/";
          default:
            return "";
        }
      }

      function updateDisplay() {
        resultEl.textContent = currentValue;
        if (pendingOperator && accumulator !== null) {
          var right = waitingForOperand ? "..." : currentValue;
          expressionEl.textContent = formatNumber(accumulator) + " " + symbolForOperator(pendingOperator) + " " + right;
          return;
        }
        expressionEl.textContent = currentValue;
      }

      function handleAction(action, btn) {
        setMessage("", false);
        switch (action) {
          case "digit":
            inputDigit(btn.getAttribute("data-value") || "0");
            break;
          case "decimal":
            inputDecimal();
            break;
          case "toggle-sign":
            toggleSign();
            break;
          case "clear":
            clearAll();
            break;
          case "backspace":
            backspace();
            break;
          case "percent":
            applyPercent();
            break;
          case "op":
            setOperator(btn.getAttribute("data-op") || "");
            break;
          case "equals":
            evaluateExpression().catch(function (err) {
              setMessage(normalizeErrorMessage(err, "No se pudo registrar operacion."), true);
            });
            break;
          case "memory-clear":
            memoryValue = 0;
            persistMemory();
            setMessage("Memoria limpiada.", false);
            break;
          case "memory-recall":
            currentValue = formatNumber(memoryValue);
            waitingForOperand = false;
            updateDisplay();
            setMessage("Memoria recuperada: " + currentValue, false);
            break;
          case "memory-plus":
            memoryValue = safeNumber(memoryValue) + safeNumber(currentValue);
            persistMemory();
            setMessage("Memoria actual: " + formatNumber(memoryValue), false);
            break;
          case "memory-minus":
            memoryValue = safeNumber(memoryValue) - safeNumber(currentValue);
            persistMemory();
            setMessage("Memoria actual: " + formatNumber(memoryValue), false);
            break;
          default:
            break;
        }
      }

      function inputDigit(digit) {
        if (waitingForOperand) {
          currentValue = digit;
          waitingForOperand = false;
        } else {
          currentValue = currentValue === "0" ? digit : currentValue + digit;
        }
        updateDisplay();
      }

      function inputDecimal() {
        if (waitingForOperand) {
          currentValue = "0.";
          waitingForOperand = false;
          updateDisplay();
          return;
        }
        if (currentValue.indexOf(".") === -1) {
          currentValue += ".";
          updateDisplay();
        }
      }

      function toggleSign() {
        if (currentValue === "0") return;
        currentValue = currentValue.indexOf("-") === 0 ? currentValue.slice(1) : "-" + currentValue;
        updateDisplay();
      }

      function clearAll() {
        currentValue = "0";
        accumulator = null;
        pendingOperator = "";
        waitingForOperand = false;
        updateDisplay();
      }

      function backspace() {
        if (waitingForOperand) return;
        if (currentValue.length <= 1 || (currentValue.length === 2 && currentValue.indexOf("-") === 0)) {
          currentValue = "0";
        } else {
          currentValue = currentValue.slice(0, -1);
        }
        updateDisplay();
      }

      function applyPercent() {
        currentValue = formatNumber(safeNumber(currentValue) / 100);
        updateDisplay();
      }

      function setOperator(op) {
        if (!op) return;

        if (pendingOperator && waitingForOperand) {
          pendingOperator = op;
          updateDisplay();
          return;
        }

        if (accumulator === null) {
          accumulator = safeNumber(currentValue);
        } else if (pendingOperator) {
          var partial = calculate(accumulator, safeNumber(currentValue), pendingOperator);
          if (!Number.isFinite(partial)) {
            setMessage("Operacion no valida.", true);
            clearAll();
            return;
          }
          accumulator = partial;
          currentValue = formatNumber(partial);
        }

        pendingOperator = op;
        waitingForOperand = true;
        updateDisplay();
      }

      async function evaluateExpression() {
        if (!pendingOperator || accumulator === null) {
          setMessage("No hay operacion pendiente.", true);
          return;
        }

        var left = safeNumber(accumulator);
        var right = safeNumber(currentValue);
        var operator = pendingOperator;
        var result = calculate(left, right, operator);

        if (!Number.isFinite(result)) {
          setMessage("No se puede dividir por cero.", true);
          clearAll();
          return;
        }

        var expression = formatNumber(left) + " " + symbolForOperator(operator) + " " + formatNumber(right);
        currentValue = formatNumber(result);
        accumulator = null;
        pendingOperator = "";
        waitingForOperand = true;
        updateDisplay();

        if (!hasEmpresaContext()) {
          setMessage("Resultado calculado localmente (sin empresa_id).", false);
          return;
        }

        await persistOperation(expression, currentValue);
        setMessage("Operacion registrada en historial.", false);
      }

      function calculate(a, b, op) {
        switch (op) {
          case "+":
            return a + b;
          case "-":
            return a - b;
          case "*":
            return a * b;
          case "/":
            if (b === 0) return Number.NaN;
            return a / b;
          default:
            return Number.NaN;
        }
      }

      function buildApiURL(action, extraParams) {
        var url = new URL("/api/empresa/calculadora", window.location.origin);
        if (empresaId) {
          url.searchParams.set("empresa_id", empresaId);
        }
        if (action) {
          url.searchParams.set("action", action);
        }
        if (extraParams && typeof extraParams === "object") {
          Object.keys(extraParams).forEach(function (key) {
            var value = extraParams[key];
            if (value === undefined || value === null || String(value).trim() === "") {
              return;
            }
            url.searchParams.set(key, String(value));
          });
        }
        return url;
      }

      async function requestJSON(url, options) {
        var resp = await fetch(url.toString(), Object.assign({ credentials: "same-origin" }, options || {}));
        if (!resp.ok) {
          var text = "";
          try {
            text = await resp.text();
          } catch (e) {
            text = "";
          }
          throw new Error(text || ("HTTP " + resp.status));
        }
        return resp.json();
      }

      function normalizeBool(value, fallback) {
        if (value === undefined || value === null) return fallback;
        return Boolean(value);
      }

      async function loadConfig() {
        var data = await requestJSON(buildApiURL("config"));
        var cfg = data && data.configuracion ? data.configuracion : {};
        calcConfig.integrar_carritos = normalizeBool(cfg.integrar_carritos, true);
        calcConfig.integrar_cotizaciones = normalizeBool(cfg.integrar_cotizaciones, true);
        document.getElementById("calcCfgCarritos").checked = calcConfig.integrar_carritos;
        document.getElementById("calcCfgCotizaciones").checked = calcConfig.integrar_cotizaciones;
      }

      async function saveConfig() {
        if (!hasEmpresaContext()) {
          setMessage("No se puede guardar configuracion sin empresa_id.", true);
          return;
        }
        var payload = {
          empresa_id: Number(empresaId),
          integrar_carritos: !!document.getElementById("calcCfgCarritos").checked,
          integrar_cotizaciones: !!document.getElementById("calcCfgCotizaciones").checked
        };
        await requestJSON(buildApiURL("config"), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        calcConfig.integrar_carritos = payload.integrar_carritos;
        calcConfig.integrar_cotizaciones = payload.integrar_cotizaciones;
        await loadReferences();
        setMessage("Configuracion de integraciones actualizada.", false);
      }

      async function loadReferences() {
        var data = await requestJSON(buildApiURL("referencias", { limit: 200 }));
        references.clientes = Array.isArray(data.clientes) ? data.clientes : [];
        references.carritos = Array.isArray(data.carritos) ? data.carritos : [];
        references.cotizaciones = Array.isArray(data.cotizaciones) ? data.cotizaciones : [];
        renderReferenceSelects();
      }

      function populateSelect(selectId, rows, valueKey, labelBuilder, placeholder) {
        var select = document.getElementById(selectId);
        if (!select) return;
        var previous = String(select.value || "");
        select.innerHTML = "";
        var opt = document.createElement("option");
        opt.value = "";
        opt.textContent = placeholder;
        select.appendChild(opt);
        rows.forEach(function (row) {
          var o = document.createElement("option");
          o.value = String(row[valueKey] || "");
          o.textContent = labelBuilder(row);
          select.appendChild(o);
        });
        if (previous) {
          select.value = previous;
        }
      }

      function renderReferenceSelects() {
        carritosById = {};
        cotizacionesById = {};

        references.carritos.forEach(function (row) {
          carritosById[String(row.id || "")] = row;
        });
        references.cotizaciones.forEach(function (row) {
          cotizacionesById[String(row.id || "")] = row;
        });

        populateSelect(
          "calcCliente",
          references.clientes,
          "id",
          function (row) {
            var name = String(row.nombre_razon_social || "Cliente");
            var doc = String(row.numero_documento || "").trim();
            return doc ? (name + " (" + doc + ")") : name;
          },
          "Sin cliente"
        );

        populateSelect(
          "calcCarrito",
          references.carritos,
          "id",
          function (row) {
            var codigo = String(row.codigo || "").trim();
            var cliente = String(row.cliente_nombre || "").trim();
            var tail = cliente ? (" - " + cliente) : "";
            return "#" + String(row.id || "0") + " " + codigo + tail;
          },
          "Sin carrito"
        );

        populateSelect(
          "calcCotizacion",
          references.cotizaciones,
          "id",
          function (row) {
            var codigo = String(row.codigo || "").trim();
            var cliente = String(row.cliente_nombre || "").trim();
            return "#" + String(row.id || "0") + " " + codigo + (cliente ? (" - " + cliente) : "");
          },
          "Sin cotizacion"
        );

        document.getElementById("calcCarrito").disabled = !calcConfig.integrar_carritos;
        document.getElementById("calcCotizacion").disabled = !calcConfig.integrar_cotizaciones;
        if (!calcConfig.integrar_carritos) {
          document.getElementById("calcCarrito").value = "";
        }
        if (!calcConfig.integrar_cotizaciones) {
          document.getElementById("calcCotizacion").value = "";
        }
      }

      function onCarritoSelected() {
        var select = document.getElementById("calcCarrito");
        if (!select) return;
        var row = carritosById[String(select.value || "")];
        if (!row) return;
        if (row.cliente_id) {
          document.getElementById("calcCliente").value = String(row.cliente_id);
        }
        if (!String(document.getElementById("calcDocumentoTipo").value || "").trim()) {
          document.getElementById("calcDocumentoTipo").value = "carrito";
        }
        if (!String(document.getElementById("calcDocumentoCodigo").value || "").trim()) {
          document.getElementById("calcDocumentoCodigo").value = String(row.codigo || "");
        }
      }

      function onCotizacionSelected() {
        var select = document.getElementById("calcCotizacion");
        if (!select) return;
        var row = cotizacionesById[String(select.value || "")];
        if (!row) return;
        if (row.cliente_id) {
          document.getElementById("calcCliente").value = String(row.cliente_id);
        }
        if (!String(document.getElementById("calcDocumentoTipo").value || "").trim()) {
          document.getElementById("calcDocumentoTipo").value = "cotizacion";
        }
        if (!String(document.getElementById("calcDocumentoCodigo").value || "").trim()) {
          document.getElementById("calcDocumentoCodigo").value = String(row.codigo || "");
        }
      }

      function getHistoryFilters() {
        return {
          desde: String(document.getElementById("calcDesde").value || "").trim(),
          hasta: String(document.getElementById("calcHasta").value || "").trim(),
          usuario: String(document.getElementById("calcUsuarioFiltro").value || "").trim()
        };
      }

      function applyFiltersToURL(url, filters) {
        if (!filters) return;
        if (filters.desde) url.searchParams.set("desde", filters.desde);
        if (filters.hasta) url.searchParams.set("hasta", filters.hasta);
        if (filters.usuario) url.searchParams.set("usuario", filters.usuario);
      }

      async function refreshHistory() {
        if (!hasEmpresaContext()) {
          renderHistory([]);
          return;
        }
        var filters = getHistoryFilters();
        var url = buildApiURL("", { limit: 100, offset: 0 });
        applyFiltersToURL(url, filters);
        var data = await requestJSON(url);
        renderHistory(Array.isArray(data.rows) ? data.rows : []);
      }

      async function clearHistory() {
        if (!hasEmpresaContext()) {
          setMessage("No se puede limpiar historial sin empresa_id.", true);
          return;
        }
        var filters = getHistoryFilters();
        var payload = {
          empresa_id: Number(empresaId),
          desde: filters.desde,
          hasta: filters.hasta,
          usuario: filters.usuario
        };
        var response = await requestJSON(buildApiURL("limpiar"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        await refreshHistory();
        setMessage("Historial limpiado: " + String(response.desactivados || 0) + " registros.", false);
      }

      async function exportHistory() {
        if (!hasEmpresaContext()) {
          setMessage("No se puede exportar sin empresa_id.", true);
          return;
        }
        var format = String(document.getElementById("calcExportFormat").value || "json").trim().toLowerCase();
        var filters = getHistoryFilters();
        var url = buildApiURL("export", { format: format, limit: 2000, offset: 0 });
        applyFiltersToURL(url, filters);

        var resp = await fetch(url.toString(), { credentials: "same-origin" });
        if (!resp.ok) {
          var text = "";
          try {
            text = await resp.text();
          } catch (e) {
            text = "";
          }
          throw new Error(text || "No se pudo exportar historial.");
        }

        var blob = await resp.blob();
        var stamp = new Date().toISOString().slice(0, 19).replace(/[\-:T]/g, "");
        var a = document.createElement("a");
        var href = URL.createObjectURL(blob);
        a.href = href;
        a.download = "calculadora_" + empresaKey + "_" + stamp + "." + format;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(href);
        setMessage("Exportacion completada en formato " + format.toUpperCase() + ".", false);
      }

      async function persistOperation(expression, result) {
        var clienteSel = document.getElementById("calcCliente");
        var clienteID = parseInt(String(clienteSel.value || "0"), 10) || 0;
        var clienteNombre = "";
        if (clienteID > 0 && clienteSel.selectedIndex >= 0) {
          clienteNombre = String(clienteSel.options[clienteSel.selectedIndex].text || "").trim();
        }
        var carritoID = parseInt(String(document.getElementById("calcCarrito").value || "0"), 10) || 0;
        var cotizacionID = parseInt(String(document.getElementById("calcCotizacion").value || "0"), 10) || 0;
        if (!calcConfig.integrar_carritos) {
          carritoID = 0;
        }
        if (!calcConfig.integrar_cotizaciones) {
          cotizacionID = 0;
        }

        var payload = {
          empresa_id: Number(empresaId),
          expresion: expression,
          resultado: result,
          etiquetas_texto: String(document.getElementById("calcEtiquetas").value || "").trim(),
          cliente_id: clienteID,
          cliente_nombre: clienteNombre,
          documento_tipo: String(document.getElementById("calcDocumentoTipo").value || "").trim(),
          documento_codigo: String(document.getElementById("calcDocumentoCodigo").value || "").trim(),
          carrito_id: carritoID,
          cotizacion_id: cotizacionID,
          fecha_operacion: localDateTimeNow(),
          metadata: {
            origen: "web_calculadora",
            empresa_id: Number(empresaId)
          }
        };

        await requestJSON(buildApiURL(""), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        await refreshHistory();
      }

      function renderHistory(rows) {
        historyEl.innerHTML = "";
        if (!rows || !rows.length) {
          var empty = document.createElement("li");
          empty.className = "calc-history-empty";
          empty.textContent = "Sin operaciones registradas para los filtros actuales.";
          historyEl.appendChild(empty);
          return;
        }

        rows.forEach(function (item) {
          var li = document.createElement("li");
          li.className = "calc-history-item";

          var expr = document.createElement("div");
          expr.className = "calc-history-expression";
          expr.textContent = String(item.expresion || "");

          var res = document.createElement("div");
          res.className = "calc-history-result";
          res.textContent = "= " + String(item.resultado || "0");

          var tags = Array.isArray(item.etiquetas) ? item.etiquetas.join(", ") : "";
          var doc = [String(item.documento_tipo || "").trim(), String(item.documento_codigo || "").trim()].join(" ").trim();
          var metaParts = [
            formatTimestamp(item.fecha_operacion || item.fecha_creacion),
            item.usuario_creador ? ("usuario: " + item.usuario_creador) : "",
            item.cliente_nombre ? ("cliente: " + item.cliente_nombre) : "",
            tags ? ("tags: " + tags) : "",
            doc ? ("doc: " + doc) : ""
          ].filter(function (v) { return !!v; });

          var meta = document.createElement("div");
          meta.className = "calc-history-meta";
          meta.textContent = metaParts.join(" | ");

          li.appendChild(expr);
          li.appendChild(res);
          li.appendChild(meta);
          historyEl.appendChild(li);
        });
      }

      function localDateTimeNow() {
        var now = new Date();
        var yyyy = String(now.getFullYear());
        var mm = String(now.getMonth() + 1).padStart(2, "0");
        var dd = String(now.getDate()).padStart(2, "0");
        var hh = String(now.getHours()).padStart(2, "0");
        var mi = String(now.getMinutes()).padStart(2, "0");
        var ss = String(now.getSeconds()).padStart(2, "0");
        return yyyy + "-" + mm + "-" + dd + " " + hh + ":" + mi + ":" + ss;
      }

      function formatTimestamp(raw) {
        var dt = new Date(raw || "");
        if (Number.isNaN(dt.getTime())) return "Sin fecha";
        return dt.toLocaleString("es-CO");
      }

      function loadMemory() {
        try {
          var raw = localStorage.getItem(memoryKey);
          return safeNumber(raw || 0);
        } catch (e) {
          return 0;
        }
      }

      function persistMemory() {
        try {
          localStorage.setItem(memoryKey, String(formatNumber(memoryValue)));
        } catch (e) {}
      }
    })();
  </script>
</body>
</html>
