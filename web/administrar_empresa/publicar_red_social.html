<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Publicar en Red Social Empresarial</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    body{background:linear-gradient(180deg,var(--bg-alt),var(--bg));color:var(--text);padding:20px;min-height:100vh;font-family:"Segoe UI",Arial,sans-serif}
    .panel{background:linear-gradient(180deg,color-mix(in srgb,var(--surface-soft) 86%,var(--surface) 14%),var(--surface));padding:22px;border-radius:22px;max-width:980px;margin:0 auto;box-shadow:0 18px 34px color-mix(in srgb,var(--bg) 72%,transparent);border:1px solid var(--border)}
    .composer{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr);gap:20px;align-items:start}
    .grupo{margin-bottom:15px}.grupo label{display:block;font-weight:800;margin-bottom:6px}.grupo input,.grupo textarea{width:100%;padding:11px;border:1px solid var(--border);border-radius:12px;box-sizing:border-box;background:var(--input-bg);color:var(--text)}
    .preview-card,.pub-item{background:var(--surface-soft);border:1px solid var(--border);border-radius:18px;overflow:hidden}
    .preview-img{height:180px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 20%,transparent),color-mix(in srgb,var(--accent-2) 18%,transparent));background-size:cover;background-position:center;display:grid;place-items:center;color:var(--muted);font-weight:800}
    .preview-body{padding:15px}.preview-body h3{margin:0 0 8px}.preview-body p{color:var(--muted);white-space:pre-wrap}
    .listado{margin-top:26px}.pub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
    .pub-item{padding:14px;display:flex;flex-direction:column;gap:10px}.pub-item small{color:var(--muted);white-space:pre-wrap}.pub-delete-btn{align-self:flex-start;background:var(--danger);color:#fff;border:0;padding:8px 12px;border-radius:999px;cursor:pointer;font-weight:800}
    @media(max-width:760px){body{padding:12px}.composer{grid-template-columns:1fr}.panel{padding:16px}}
  </style>
</head>
<body>
  <div class="panel">
    <h2>Publicar en red social empresarial</h2>
    <p class="form-help">Crea posts tipo Facebook visibles en la red social entre empresas. Usa textos claros, imagen mediana y una llamada comercial directa.</p>
    <div class="composer">
      <div>
        <div class="grupo">
          <label>Título del post</label>
          <input type="text" id="pubNombre" placeholder="Ej. Nueva promoción de temporada">
        </div>
        <div class="grupo">
          <label>Contenido</label>
          <textarea id="pubDesc" rows="6" placeholder="Escribe la novedad, beneficio, precio o condiciones..."></textarea>
        </div>
        <div class="grupo">
          <label>Foto (URL)</label>
          <input type="text" id="pubFoto" placeholder="https://ejemplo.com/foto.jpg">
        </div>
        <button class="btn" onclick="crearPublicacion()">Publicar post</button>
      </div>
      <div class="preview-card">
        <div id="previewImg" class="preview-img">Vista previa</div>
        <div class="preview-body">
          <h3 id="previewTitle">Tu post empresarial</h3>
          <p id="previewDesc">El contenido aparecerá aquí antes de publicarlo.</p>
        </div>
      </div>
    </div>

    <div class="listado">
      <h3>Mis publicaciones</h3>
      <div id="misPublicaciones">Cargando...</div>
    </div>
  </div>

  <script>
    async function cargarPublicaciones() {
      try {
        const res = await fetch('/api/empresa/publicaciones', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('session_token') }});
        if (!res.ok) throw new Error('Error al cargar');
        const pubs = await res.json();
        const div = document.getElementById('misPublicaciones');
        div.innerHTML = '';
        if (pubs.length === 0) {
          div.innerHTML = '<p>No tienes publicaciones activas.</p>';
          return;
        }
        div.className = 'pub-grid';
        pubs.forEach(p => {
          div.innerHTML += `
            <div class="pub-item">
              <div>
                <strong>${p.nombre}</strong><br>
                <small>${p.descripcion}</small>
              </div>
              <button onclick="eliminarPublicacion(${p.id})" class="pub-delete-btn">Eliminar</button>
            </div>
          `;
        });
      } catch (e) {
        console.error(e);
        document.getElementById('misPublicaciones').innerHTML = 'Error cargando publicaciones.';
      }
    }

    async function crearPublicacion() {
      const nombre = document.getElementById('pubNombre').value;
      const desc = document.getElementById('pubDesc').value;
      const foto = document.getElementById('pubFoto').value;
      
      if (!nombre || !desc) {
        alert('Nombre y descripción son obligatorios');
        return;
      }
      
      try {
        const res = await fetch('/api/empresa/publicaciones', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('session_token')
          },
          body: JSON.stringify({ nombre: nombre, descripcion: desc, foto_url: foto, estado: 'activo' })
        });
        
        if (res.ok) {
          document.getElementById('pubNombre').value = '';
          document.getElementById('pubDesc').value = '';
          document.getElementById('pubFoto').value = '';
          alert('Publicado con éxito.');
          cargarPublicaciones();
        } else {
          alert('Error al publicar');
        }
      } catch (e) {
        console.error(e);
        alert('Error de conexión');
      }
    }

    async function eliminarPublicacion(id) {
      if (!confirm('¿Seguro que deseas eliminar esta publicación?')) return;
      try {
        const res = await fetch('/api/empresa/publicaciones/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('session_token') }
        });
        if (res.ok) {
          cargarPublicaciones();
        } else {
          alert('Error al eliminar');
        }
      } catch (e) {
        console.error(e);
      }
    }

    function bindPreview(){
      const n = document.getElementById('pubNombre');
      const d = document.getElementById('pubDesc');
      const f = document.getElementById('pubFoto');
      function update(){
        document.getElementById('previewTitle').textContent = n.value.trim() || 'Tu post empresarial';
        document.getElementById('previewDesc').textContent = d.value.trim() || 'El contenido aparecerá aquí antes de publicarlo.';
        const img = f.value.trim();
        const box = document.getElementById('previewImg');
        box.style.backgroundImage = img ? 'url(' + img + ')' : '';
        box.textContent = img ? '' : 'Vista previa';
      }
      [n,d,f].forEach(el => el.addEventListener('input', update));
      update();
    }
    bindPreview();
    cargarPublicaciones();
  </script>
</body>
</html>
