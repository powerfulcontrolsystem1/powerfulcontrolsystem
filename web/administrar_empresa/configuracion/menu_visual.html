<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Menu visible por empresa</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/js/empresa_submenu_context.js"></script>
  <style>
    .menu-visibility-grid{display:grid;gap:12px}
    .menu-visibility-group{border:1px solid var(--border);border-radius:8px;background:var(--surface);padding:12px}
    .menu-visibility-group h3{margin:0 0 8px;font-size:1rem}
    .menu-visibility-items{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}
    .menu-visibility-item{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--border);border-radius:8px;padding:9px 10px;background:var(--card)}
    .menu-visibility-item input{margin-top:3px}
    .menu-visibility-item strong{display:block;font-size:.92rem}
    .menu-visibility-item small{display:block;color:var(--muted);font-size:.76rem;margin-top:2px;word-break:break-word}
    .menu-visibility-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between}
  </style>
</head>
<body class="empresa-subpage" data-auto-estacion-labels="true">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <div>
          <h1 style="margin:0;">Menu visible por empresa</h1>
          <p id="empresaInfo" class="form-help" style="margin:6px 0 0 0;">Empresa: cargando...</p>
        </div>
        <button id="btnGuardarMenuVisual" type="button" class="btn">Guardar configuracion</button>
      </div>

      <p class="form-help">
        Esta configuracion solo oculta opciones del menu para todos los usuarios de la empresa.
        No cambia roles, permisos, licencias ni seguridad del backend.
      </p>

      <div class="menu-visibility-toolbar mt-12">
        <label class="form-help" style="display:flex;align-items:center;gap:8px;">
          <input id="menuVisualEnabled" type="checkbox" checked>
          Aplicar ocultamiento visual del menu
        </label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="btnMostrarTodo" class="btn secondary" type="button">Mostrar todo</button>
          <button id="btnOcultarNoCriticos" class="btn secondary" type="button">Ocultar soluciones especializadas</button>
        </div>
      </div>

      <div id="menuVisualGrid" class="menu-visibility-grid mt-12" aria-live="polite"></div>
      <p id="menuVisualMsg" class="form-help mt-12" role="status"></p>
    </section>
  </div>

  <script>
    (function(){
      const PREF_KEY = 'menu_visual_config';
      const NON_HIDEABLE = {
        linkPanelEmpresa: true,
        linkConfiguracion: true,
        linkConfiguracionMenuVisual: true,
        linkVolverEmpresas: true
      };
      const SPECIALIZED_IDS = {
        linkGimnasio: true,
        linkConsultorioOdontologico: true,
        linkDrogueriaFarmacia: true,
        linkParqueadero: true,
        linkReservasHotel: true,
        linkApartamentosTuristicos: true,
        linkPropiedadHorizontal: true,
        linkAlquileres: true,
        linkAIUConstruccion: true,
        linkTaxiSystem: true,
        linkDomicilios: true,
        linkTurnosAtencion: true
      };
      const FALLBACK_CATALOG = [
        { group: 'Operacion y ventas', items: [
          ['linkVentaDirecta', 'Venta directa'],
          ['linkEstaciones', 'Estaciones'],
          ['linkCorteCaja', 'Corte de Caja']
        ]},
        { group: 'Inventario y compras', items: [
          ['linkProductos', 'Productos'],
          ['linkCompras', 'Compras'],
          ['linkImportacionesCosteo', 'Importaciones y costeo'],
          ['linkProduccionMRP', 'Produccion / MRP'],
          ['linkLogisticaWMS', 'Logistica WMS']
        ]},
        { group: 'Finanzas y cumplimiento', items: [
          ['linkFinanzas', 'Centro financiero y contable'],
          ['linkNominaMenu', 'Nomina'],
          ['linkFacturacionElectronica', 'Facturacion electronica'],
          ['linkReportes', 'Reportes ejecutivos']
        ]},
        { group: 'CRM y clientes', items: [
          ['linkClientes', 'Clientes'],
          ['linkCRMComercial', 'CRM unificado']
        ]},
        { group: 'Canales digitales y colaboracion', items: [
          ['linkVentaPublica', 'Venta publica'],
          ['linkEmailCorporativo', 'E-mail Corporativo'],
          ['linkRedSocialComercial', 'Red social empresarial'],
          ['linkCodigosDescuento', 'Codigos de descuento'],
          ['linkChatIA', 'Asistente IA'],
          ['linkCentroIAEmpresarial', 'Centro IA empresarial']
        ]},
        { group: 'Personas y activos', items: [
          ['linkUsuarios', 'Usuarios'],
          ['linkPortalUsuarios', 'Login de usuarios'],
          ['linkMiHorario', 'Mi horario'],
          ['linkHorariosTrabajadores', 'Horarios laborales'],
          ['linkAsistenciaEmpleados', 'Asistencia de empleados'],
          ['linkCarnets', 'Carnets'],
          ['linkVehiculosRegistro', 'Registro de vehiculos'],
          ['linkHojaVidaOperativa', 'Historial de activos'],
          ['linkUbicacionGPS', 'Ubicacion GPS']
        ]},
        { group: 'Analisis y control', items: [
          ['linkAuditoria', 'Auditoria'],
          ['linkCalidadProcesos', 'Calidad y procesos'],
          ['linkControlElectrico', 'Domotica'],
          ['linkCamaras', 'Camaras'],
          ['linkEnergiaSolar', 'Energia solar'],
          ['linkGrafologia', 'GRAFOLOGIX'],
          ['linkOCR', 'OCR'],
          ['linkBolsa', 'Bolsa']
        ]},
        { group: 'Documentos, nube y soporte', items: [
          ['linkDocumentosOnlyOffice', 'OnlyOffice'],
          ['linkGestionDocumental', 'Gestion documental'],
          ['linkContratosObligaciones', 'Contratos'],
          ['linkSoporteRemoto', 'Soporte remoto']
        ]},
        { group: 'Soluciones por negocio', items: [
          ['linkGimnasio', 'Gimnasio'],
          ['linkConsultorioOdontologico', 'Odontologia'],
          ['linkDrogueriaFarmacia', 'Drogueria / Farmacia'],
          ['linkParqueadero', 'Parqueadero'],
          ['linkReservasHotel', 'Reservas'],
          ['linkApartamentosTuristicos', 'Apartamentos turisticos'],
          ['linkPropiedadHorizontal', 'Propiedad horizontal'],
          ['linkAlquileres', 'Alquiler'],
          ['linkAIUConstruccion', 'Construccion / AIU'],
          ['linkTaxiSystem', 'Taxi System'],
          ['linkDomicilios', 'Domicilios'],
          ['linkTurnosAtencion', 'Turnos de atencion']
        ]},
        { group: 'Administracion y licencia', items: [
          ['linkEmpresasCompartidas', 'Empresas compartidas'],
          ['linkBackups', 'Backup profesional'],
          ['linkLicenciaSistema', 'Licencia del sistema']
        ]}
      ];

      const params = new URLSearchParams(window.location.search || '');
      const empresaId = params.get('empresa_id') || params.get('id') || readEmpresaId();
      const grid = document.getElementById('menuVisualGrid');
      const msg = document.getElementById('menuVisualMsg');
      let catalog = [];
      let currentConfig = { enabled: true, hidden_links: [] };

      function readEmpresaId() {
        const keys = ['active_empresa_id','empresa_id','admin_empresa_id'];
        for (const store of [window.sessionStorage, window.localStorage]) {
          if (!store) continue;
          for (const key of keys) {
            const value = Number(store.getItem(key) || 0);
            if (Number.isFinite(value) && value > 0) return String(Math.trunc(value));
          }
        }
        return '';
      }

      function setMsg(text, isError) {
        msg.textContent = text || '';
        msg.style.color = isError ? '#b91c1c' : '';
      }

      function normalizeText(value) {
        return String(value == null ? '' : value).replace(/\s+/g, ' ').trim();
      }

      function collectCatalogFromTop() {
        try {
          const doc = window.top && window.top.document;
          if (!doc || doc === document) return [];
          const rows = [];
          doc.querySelectorAll('#adminSidebarNav .admin-nav-group').forEach(group => {
            const groupName = normalizeText(group.querySelector('.admin-nav-group-title') && group.querySelector('.admin-nav-group-title').textContent) || 'Menu principal';
            const items = [];
            group.querySelectorAll('.admin-nav-sublist a[id]').forEach(link => {
              const id = normalizeText(link.id);
              if (!id || NON_HIDEABLE[id]) return;
              items.push([id, normalizeText(link.textContent) || id]);
            });
            if (items.length) rows.push({ group: groupName, items });
          });
          return rows;
        } catch (e) {
          return [];
        }
      }

      function mergeCatalog(primary, fallback) {
        const seen = {};
        const out = [];
        function addGroup(row) {
          const items = [];
          (row.items || []).forEach(item => {
            const id = normalizeText(item[0]);
            if (!id || NON_HIDEABLE[id] || seen[id]) return;
            seen[id] = true;
            items.push([id, normalizeText(item[1]) || id]);
          });
          if (items.length) out.push({ group: normalizeText(row.group) || 'Menu', items });
        }
        (primary || []).forEach(addGroup);
        (fallback || []).forEach(addGroup);
        return out;
      }

      function normalizeConfig(raw) {
        const src = raw && typeof raw === 'object' ? raw : {};
        const rows = Array.isArray(src.hidden_links) ? src.hidden_links : (Array.isArray(src.hiddenLinks) ? src.hiddenLinks : []);
        return {
          enabled: src.enabled === undefined ? true : !!src.enabled,
          hidden_links: rows.map(normalizeText).filter(id => id && !NON_HIDEABLE[id])
        };
      }

      async function loadConfig() {
        if (!empresaId) return normalizeConfig(null);
        const res = await fetch('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId) + '&estacion_id=0', { credentials: 'same-origin' });
        if (!res.ok) throw new Error(await res.text() || 'No se pudo cargar la configuracion.');
        const data = await res.json();
        const prefs = Array.isArray(data && data.prefs) ? data.prefs : [];
        const pref = prefs.find(item => String(item && item.clave || '').trim() === PREF_KEY);
        if (!pref || !pref.valor) return normalizeConfig(null);
        try {
          return normalizeConfig(JSON.parse(pref.valor));
        } catch (_) {
          return normalizeConfig(null);
        }
      }

      function render() {
        const hidden = {};
        currentConfig.hidden_links.forEach(id => { hidden[id] = true; });
        document.getElementById('menuVisualEnabled').checked = currentConfig.enabled !== false;
        grid.innerHTML = '';
        catalog.forEach(group => {
          const section = document.createElement('section');
          section.className = 'menu-visibility-group';
          const title = document.createElement('h3');
          title.textContent = group.group;
          const items = document.createElement('div');
          items.className = 'menu-visibility-items';
          group.items.forEach(item => {
            const id = item[0];
            const label = item[1];
            const row = document.createElement('label');
            row.className = 'menu-visibility-item';
            row.innerHTML = '<input type="checkbox" data-menu-link-id=""><span><strong></strong><small></small></span>';
            const input = row.querySelector('input');
            input.setAttribute('data-menu-link-id', id);
            input.checked = !hidden[id];
            row.querySelector('strong').textContent = label;
            row.querySelector('small').textContent = id;
            items.appendChild(row);
          });
          section.appendChild(title);
          section.appendChild(items);
          grid.appendChild(section);
        });
      }

      function collectConfig() {
        const hidden = [];
        grid.querySelectorAll('input[data-menu-link-id]').forEach(input => {
          const id = input.getAttribute('data-menu-link-id');
          if (id && !input.checked && !NON_HIDEABLE[id]) hidden.push(id);
        });
        hidden.sort();
        return {
          version: 1,
          enabled: document.getElementById('menuVisualEnabled').checked,
          hidden_links: hidden,
          updated_at: new Date().toISOString()
        };
      }

      async function saveConfig() {
        if (!empresaId) throw new Error('No se encontro empresa_id.');
        const payload = collectConfig();
        const res = await fetch('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId), {
          method: 'PUT',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            estacion_id: 0,
            clave: PREF_KEY,
            valor: JSON.stringify(payload),
            observaciones: 'Ocultamiento visual de modulos del menu empresarial'
          })
        });
        if (!res.ok) throw new Error(await res.text() || 'No se pudo guardar la configuracion.');
        currentConfig = normalizeConfig(payload);
        try {
          window.top.postMessage({ type: 'pcs-menu-visual-config-updated', empresa_id: String(empresaId) }, window.location.origin);
        } catch (_) {}
        return payload;
      }

      document.getElementById('btnGuardarMenuVisual').addEventListener('click', async () => {
        const btn = document.getElementById('btnGuardarMenuVisual');
        btn.disabled = true;
        setMsg('Guardando configuracion...', false);
        try {
          const saved = await saveConfig();
          setMsg('Configuracion guardada. Modulos ocultos: ' + String(saved.hidden_links.length) + '.', false);
        } catch (err) {
          setMsg(err.message || 'No se pudo guardar.', true);
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('btnMostrarTodo').addEventListener('click', () => {
        grid.querySelectorAll('input[data-menu-link-id]').forEach(input => { input.checked = true; });
        setMsg('Todo queda visible al guardar.', false);
      });

      document.getElementById('btnOcultarNoCriticos').addEventListener('click', () => {
        grid.querySelectorAll('input[data-menu-link-id]').forEach(input => {
          const id = input.getAttribute('data-menu-link-id');
          if (SPECIALIZED_IDS[id]) input.checked = false;
        });
        setMsg('Soluciones especializadas marcadas para ocultar. Revisa y guarda.', false);
      });

      (async function init(){
        document.getElementById('empresaInfo').textContent = empresaId ? ('Empresa ID: ' + empresaId) : 'Empresa no detectada';
        catalog = mergeCatalog(collectCatalogFromTop(), FALLBACK_CATALOG);
        try {
          currentConfig = await loadConfig();
          render();
          setMsg('Selecciona los modulos que deben verse en el menu empresarial.', false);
        } catch (err) {
          currentConfig = normalizeConfig(null);
          render();
          setMsg(err.message || 'No se pudo cargar la configuracion.', true);
        }
      })();
    })();
  </script>
</body>
</html>
