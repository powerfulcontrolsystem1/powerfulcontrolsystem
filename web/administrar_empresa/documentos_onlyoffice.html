<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Documentos (OnlyOffice)</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    .oo-shell{width:min(1180px, calc(100% - 24px));margin:0 auto;padding:18px 0}
    .oo-grid{display:grid;grid-template-columns:1fr;gap:12px;align-items:start}
    .oo-list{display:grid;gap:8px}
    .oo-item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface-soft)}
    .oo-meta{display:flex;flex-direction:column;gap:2px}
    .oo-meta small{color:var(--muted)}
    .oo-kind{display:inline-flex;align-items:center;gap:8px}
    .oo-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:color-mix(in srgb, var(--surface-soft) 78%, var(--card));color:var(--text);font-weight:800;font-size:0.82rem}
    .oo-pill small{font-weight:800;color:var(--muted)}
    #editorFrame{width:100%;min-height:74vh;border:1px solid var(--border);border-radius:8px;background:var(--surface);overflow:hidden}
    @media(max-width:900px){#editorFrame{min-height:68vh}}
    .oo-app-icon{width:26px;height:26px;display:inline-block;vertical-align:middle}
    .oo-create-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    @media(max-width:860px){.oo-create-grid{grid-template-columns:1fr}}
    .oo-create-tile{
      display:flex;align-items:center;gap:12px;justify-content:flex-start;
      padding:12px 14px;border-radius:8px;border:1px solid var(--border);
      background:linear-gradient(180deg,color-mix(in srgb, var(--surface-soft) 68%, transparent),color-mix(in srgb, var(--surface) 78%, transparent)),var(--surface);
      cursor:pointer;font-weight:900;color:var(--text);
      transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }
    .oo-create-tile:hover{transform:translateY(-2px);box-shadow:0 16px 36px color-mix(in srgb, #020617 20%, transparent);border-color:color-mix(in srgb, var(--accent) 30%, var(--border) 70%)}
    .oo-create-tile .oo-app-icon{width:34px;height:34px}
    .oo-create-sub{font-size:.82rem;color:var(--muted);font-weight:800;margin-top:2px}
  </style>
</head>
<body class="empresa-subpage">
  <div class="oo-shell">
    <div class="empresa-section-header">
      <h1 class="empresa-section-title">Documentos</h1>
      <div class="empresa-inline-actions">
        <select id="newDocType" class="form-input" style="max-width:240px">
          <option value="word">Nuevo documento (Word)</option>
          <option value="excel">Nueva hoja (Excel)</option>
          <option value="powerpoint">Nueva presentación (PowerPoint)</option>
        </select>
        <button id="btnNewDoc" class="btn secondary" type="button">Crear</button>
        <input id="fileInput" class="form-input" type="file" accept=".doc,.docx,.xls,.xlsx,.ppt,.pptx">
        <button id="btnUpload" class="btn secondary" type="button">Subir</button>
        <button id="btnReload" class="btn" type="button">Actualizar</button>
      </div>
    </div>
    <div id="msg" class="form-help"></div>

    <div class="oo-grid mt-12">
      <section class="card empresa-section">
        <div class="empresa-section-header">
          <h2 class="m-0">Crear</h2>
        </div>
        <div class="form-help">Accesos tipo Office 365: crea un archivo nuevo con un clic.</div>
        <div class="oo-create-grid mt-10">
          <button class="oo-create-tile" id="tileWord" type="button">
            <span class="oo-app-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4" fill="#185abd"/><path d="M8 8h2l1 5 1-5h2l1 5 1-5h2l-2 8h-2l-1-4-1 4H12L10 8z" fill="#fff"/></svg>
            </span>
            <span>
              Documento (Word)
              <div class="oo-create-sub">.docx</div>
            </span>
          </button>
          <button class="oo-create-tile" id="tileExcel" type="button">
            <span class="oo-app-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4" fill="#107c41"/><path d="M9 8h2l1.3 2.3L13.6 8H16l-2.4 4 2.6 4H13.6l-1.4-2.4L10.8 16H8.4l2.6-4L9 8z" fill="#fff"/></svg>
            </span>
            <span>
              Hoja (Excel)
              <div class="oo-create-sub">.xlsx</div>
            </span>
          </button>
          <button class="oo-create-tile" id="tilePPT" type="button">
            <span class="oo-app-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4" fill="#d24726"/><path d="M10 8h3.2a2.4 2.4 0 0 1 0 4.8H12v3.2h-2V8zm2 1.7v1.6h1.2c.5 0 .8-.4.8-.8s-.3-.8-.8-.8H12z" fill="#fff"/></svg>
            </span>
            <span>
              Presentación (PowerPoint)
              <div class="oo-create-sub">.pptx</div>
            </span>
          </button>
        </div>
      </section>

      <section class="card empresa-section">
        <div class="empresa-section-header">
          <h2 class="m-0">Archivos de esta empresa</h2>
        </div>
        <div id="list" class="oo-list">Cargando...</div>
      </section>

      <section class="card empresa-section">
        <div class="empresa-section-header">
          <h2 class="m-0">Editor</h2>
        </div>
        <div class="form-help">El editor se abre aquí, debajo del listado, ocupando todo el ancho.</div>
        <div id="editorHost" class="mt-10">
          <div id="editorFrame" class="ai-gemini-chat-area" style="display:grid;place-items:center;color:var(--muted);">
            Selecciona un documento.
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function(){
      function q(name){ try{ return new URLSearchParams(location.search).get(name); }catch(_){ return null; } }
      function n(v){ var x=Number(String(v||'').trim()); return Number.isFinite(x)&&x>0?Math.trunc(x):0; }
      function txt(v){ return String(v==null?'':v).trim(); }
      function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function setMsg(m,e){ var el=document.getElementById('msg'); el.textContent=m||''; el.style.color=e?'var(--danger)':''; }
      function extOf(name){
        var s = String(name||'');
        var i = s.lastIndexOf('.');
        return i >= 0 ? s.slice(i+1).toLowerCase() : '';
      }
      function onlyOfficeKindLabelByExt(ext){
        ext = String(ext||'').toLowerCase();
        if(ext === 'doc' || ext === 'docx' || ext === 'odt' || ext === 'rtf' || ext === 'txt') return 'Documento (Word)';
        if(ext === 'xls' || ext === 'xlsx' || ext === 'ods' || ext === 'csv') return 'Hoja (Excel)';
        if(ext === 'ppt' || ext === 'pptx' || ext === 'odp') return 'Presentación (PowerPoint)';
        return 'Documento';
      }

      function onlyOfficeKindKeyByExt(ext){
        ext = String(ext||'').toLowerCase();
        if(ext === 'doc' || ext === 'docx' || ext === 'odt' || ext === 'rtf' || ext === 'txt') return 'word';
        if(ext === 'xls' || ext === 'xlsx' || ext === 'ods' || ext === 'csv') return 'excel';
        if(ext === 'ppt' || ext === 'pptx' || ext === 'odp') return 'powerpoint';
        return 'doc';
      }

      function appIconSVG(kind){
        kind = String(kind||'');
        if(kind === 'excel'){
          return '<svg class="oo-app-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4" fill="#107c41"/><path d="M9 8h2l1.3 2.3L13.6 8H16l-2.4 4 2.6 4H13.6l-1.4-2.4L10.8 16H8.4l2.6-4L9 8z" fill="#fff"/></svg>';
        }
        if(kind === 'powerpoint'){
          return '<svg class="oo-app-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4" fill="#d24726"/><path d="M10 8h3.2a2.4 2.4 0 0 1 0 4.8H12v3.2h-2V8zm2 1.7v1.6h1.2c.5 0 .8-.4.8-.8s-.3-.8-.8-.8H12z" fill="#fff"/></svg>';
        }
        // word
        return '<svg class="oo-app-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4" fill="#185abd"/><path d="M8 8h2l1 5 1-5h2l1 5 1-5h2l-2 8h-2l-1-4-1 4H12L10 8z" fill="#fff"/></svg>';
      }

      var empresaId = n(q('empresa_id')||q('id'));
      if(!empresaId){
        try{ if(parent && parent.__resolveEmpresaIdContext) empresaId=n(parent.__resolveEmpresaIdContext()); }catch(_){}
      }

      async function api(url, opts){
        var res = await fetch(url, Object.assign({credentials:'same-origin'}, opts||{}));
        var text = await res.text();
        var data = {};
        try{ data = text ? JSON.parse(text) : {}; }catch(_){ data = {raw:text}; }
        if(!res.ok) throw new Error(data.error||data.message||text||('HTTP '+res.status));
        return data;
      }

      function buildBase(action){
        var u = new URL('/api/empresa/documentos', location.origin);
        u.searchParams.set('empresa_id', String(empresaId));
        if(action) u.searchParams.set('action', action);
        return u;
      }

      async function loadList(){
        setMsg('Cargando documentos...', false);
        var data = await api(buildBase('list').toString());
        var items = Array.isArray(data.items)?data.items:[];
        var host = document.getElementById('list');
        if(!items.length){
          host.innerHTML = '<div class="form-help">Sin documentos. Sube un .docx/.xlsx/.pptx para empezar.</div>';
          setMsg('', false);
          return;
        }
        host.innerHTML = items.map(function(it){
          var ext = txt(it.ext) || extOf(it.name);
          var kind = onlyOfficeKindLabelByExt(ext);
          var kkey = onlyOfficeKindKeyByExt(ext);
          return ''+
            '<div class="oo-item">'+
              '<div class="oo-meta">'+
                '<strong>'+esc(it.name)+'</strong>'+
                '<div class="oo-kind">'+
                  '<span class="oo-pill">'+appIconSVG(kkey)+'<span>'+esc(kind)+'</span></span>'+
                  '<small>'+esc(ext||'')+' · '+esc(it.updated_at||'')+'</small>'+
                '</div>'+
              '</div>'+
              '<div class="empresa-inline-actions" style="min-width:auto">'+
                '<button class="btn secondary" data-open="'+esc(it.name)+'" data-kind="'+esc(kind)+'">Abrir ('+esc(kind)+')</button>'+
                '<a class="btn secondary" href="/api/empresa/documentos?empresa_id='+encodeURIComponent(empresaId)+'&action=editor_config&mode=view&file='+encodeURIComponent(it.name)+'" target="_blank" rel="noopener">Config</a>'+
              '</div>'+
            '</div>';
        }).join('');
        host.querySelectorAll('[data-open]').forEach(function(btn){
          btn.addEventListener('click', function(){
            openDoc(btn.getAttribute('data-open'));
          });
        });
        setMsg('', false);
      }

      function ensureOnlyOfficeScript(dsUrl){
        return new Promise(function(resolve, reject){
          var id = 'onlyoffice-api-script';
          if(document.getElementById(id)) return resolve();
          var s = document.createElement('script');
          s.id = id;
          s.src = String(dsUrl||'').replace(/\/+$/,'') + '/web-apps/apps/api/documents/api.js';
          s.onload = function(){ resolve(); };
          s.onerror = function(){ reject(new Error('No se pudo cargar api.js de OnlyOffice.')); };
          document.head.appendChild(s);
        });
      }

      async function openDoc(file){
        file = txt(file);
        if(!file) return;
        setMsg('Abriendo editor...', false);
        var cfgResp = await api('/api/empresa/documentos?empresa_id='+encodeURIComponent(empresaId)+'&action=editor_config&mode=edit&file='+encodeURIComponent(file));
        var dsUrl = txt(cfgResp.ds_url);
        var cfg = cfgResp.onlyofficeCfg || null;
        if(!dsUrl || !cfg) throw new Error('OnlyOffice no configurado.');
        await ensureOnlyOfficeScript(dsUrl);
        var frame = document.getElementById('editorFrame');
        frame.innerHTML = '<div id="onlyoffice-editor" style="width:100%;height:74vh;"></div>';
        // eslint-disable-next-line no-undef
        new DocsAPI.DocEditor('onlyoffice-editor', cfg);
        setMsg('Editor listo.', false);
      }

      async function upload(){
        var input = document.getElementById('fileInput');
        if(!input || !input.files || !input.files.length) throw new Error('Selecciona un archivo.');
        var f = input.files[0];
        var fd = new FormData();
        fd.append('file', f, f.name || 'documento');
        setMsg('Subiendo...', false);
        await api(buildBase('upload').toString(), {method:'POST', body: fd});
        input.value = '';
        setMsg('Documento subido.', false);
        await loadList();
      }

      async function createNew(tipo, defaultName){
        tipo = txt(tipo);
        var suggested = txt(defaultName);
        var name = '';
        try {
          name = txt(window.prompt('Nombre del archivo (opcional):', suggested));
        } catch (e) {
          name = suggested;
        }
        setMsg('Creando documento...', false);
        var url = buildBase('create').toString();
        var payload = { tipo: tipo };
        if(name) payload.nombre = name;
        var data = await api(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        await loadList();
        if(data && data.name){
          openDoc(data.name).catch(function(e){ setMsg(e.message||String(e), true); });
        }
      }

      document.getElementById('btnReload').addEventListener('click', function(){
        loadList().catch(function(e){ setMsg(e.message||String(e), true); });
      });
      document.getElementById('btnUpload').addEventListener('click', function(){
        upload().catch(function(e){ setMsg(e.message||String(e), true); });
      });
      document.getElementById('btnNewDoc').addEventListener('click', function(){
        var sel = document.getElementById('newDocType');
        var tipo = sel ? txt(sel.value) : 'word';
        var suggested = 'Documento.docx';
        if (tipo === 'excel') suggested = 'Hoja.xlsx';
        if (tipo === 'powerpoint') suggested = 'Presentacion.pptx';
        createNew(tipo, suggested).catch(function(e){ setMsg(e.message||String(e), true); });
      });

      var tileWord = document.getElementById('tileWord');
      if (tileWord) tileWord.addEventListener('click', function(){
        createNew('word', 'Documento.docx').catch(function(e){ setMsg(e.message||String(e), true); });
      });
      var tileExcel = document.getElementById('tileExcel');
      if (tileExcel) tileExcel.addEventListener('click', function(){
        createNew('excel', 'Hoja.xlsx').catch(function(e){ setMsg(e.message||String(e), true); });
      });
      var tilePPT = document.getElementById('tilePPT');
      if (tilePPT) tilePPT.addEventListener('click', function(){
        createNew('powerpoint', 'Presentacion.pptx').catch(function(e){ setMsg(e.message||String(e), true); });
      });

      if(!empresaId){
        setMsg('Falta empresa_id en la URL.', true);
        return;
      }
      loadList().catch(function(e){ setMsg(e.message||String(e), true); });
    })();
  </script>
</body>
</html>
