<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bodegas y traslados</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <main class="container empresa-module">
    <section class="card empresa-section">
      <h1>Bodegas y traslados</h1>
      <p class="form-help">Redirigiendo a la vista actual de inventario...</p>
    </section>
  </main>
  <script>
    (function(){
      var target = new URL('/administrar_empresa/administrar_productos.html', window.location.origin);
      target.searchParams.set('view', 'bodegas');
      try {
        var params = new URLSearchParams(window.location.search || '');
        params.forEach(function(value, key){
          if (key !== 'view') target.searchParams.set(key, value);
        });
      } catch (_) {}
      window.location.replace(target.pathname + target.search);
    })();
  </script>
</body>
</html>
