    <script>
      // Si esta página se carga embebida dentro del menú principal de productos,
      // ocultarla para evitar duplicados (el menú principal ya muestra la navegación).
      (function(){
        if (window.top !== window.self) {
          try {
            var parentDoc = window.parent && window.parent.document;
            if (parentDoc && parentDoc.getElementById('productosContentFrame')) {
              // No renderizamos el menú cuando estamos embebidos en el frame principal
              document.documentElement.style.display = 'none';
            }
          } catch (e) {
            // si cross-origin falla, no hacemos nada
          }
        }
      })();
    </script>
