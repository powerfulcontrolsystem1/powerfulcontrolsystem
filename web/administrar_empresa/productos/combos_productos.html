<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Combos de productos</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page form-bg-dark">
  <div class="container">
    <div class="page-header">
      <h1 id="pageTitle">Combos de productos</h1>
      <button id="nuevoComboBtn" class="btn add" type="button">Nuevo combo</button>
    </div>

    <p class="form-help" style="margin:0 0 12px 0;">
      Define recetas de combos con precio unico. Al vender un combo en el carrito, el inventario se descuenta automaticamente por ingrediente.
    </p>

    <form id="comboForm" class="form" style="display:none;">
      <input type="hidden" id="comboId">

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Nombre del combo</label>
          <input id="comboNombre" class="form-input" required placeholder="Ej: Plato ejecutivo">
        </div>
        <div class="form-col">
          <label class="form-label">Codigo</label>
          <input id="comboCodigo" class="form-input" placeholder="Opcional">
        </div>
      </div>

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Precio de venta</label>
          <input id="comboPrecio" type="number" min="0" step="0.01" class="form-input" value="0" required>
        </div>
        <div class="form-col">
          <label class="form-label">Impuesto %</label>
          <input id="comboImpuesto" type="number" min="0" max="100" step="0.01" class="form-input" value="0">
        </div>
        <div class="form-col">
          <label class="form-label">Unidad</label>
          <input id="comboUnidad" class="form-input" value="combo" placeholder="combo">
        </div>
      </div>

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Descripcion</label>
          <textarea id="comboDescripcion" class="form-textarea" placeholder="Opcional"></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Observaciones</label>
          <textarea id="comboObservaciones" class="form-textarea" placeholder="Opcional"></textarea>
        </div>
      </div>

      <div class="card empresa-section" >
        <div class="empresa-section-header">
          <h3 style="margin:0;">Ingredientes del combo</h3>
        </div>

        <div class="form-row">
          <div class="form-col">
            <label class="form-label">Producto ingrediente</label>
            <select id="ingredienteProducto" class="form-input"></select>
          </div>
          <div class="form-col" style="max-width:180px;">
            <label class="form-label">Cantidad</label>
            <input id="ingredienteCantidad" type="number" min="0.01" step="0.01" class="form-input" value="1">
          </div>
          <div class="form-col" style="max-width:180px;">
            <label class="form-label">Unidad</label>
            <input id="ingredienteUnidad" class="form-input" placeholder="unidad">
          </div>
          <div class="form-col" style="max-width:220px;display:flex;align-items:flex-end;">
            <button id="agregarIngredienteBtn" type="button" class="btn" style="width:100%;">Agregar ingrediente</button>
          </div>
        </div>

        <div id="ingredientesList" class="table-wrap" >Sin ingredientes agregados.</div>
      </div>

      <div class="form-actions" >
        <button type="submit" id="guardarComboBtn" class="btn">Guardar combo</button>
        <button type="button" id="cancelarComboBtn" class="btn secondary">Cancelar</button>
      </div>
      <div id="comboCostoInfo" class="form-help" ></div>
      <div id="comboMsg" class="form-help"></div>
    </form>

    <div id="comboSearchBlock" class="form" >
      <div class="form-row" style="margin-bottom:0;">
        <div class="form-col">
          <label class="form-label">Buscar combo</label>
          <input id="buscarCombo" class="form-input" placeholder="Buscar por nombre o codigo">
        </div>
        <div class="form-col" style="max-width:180px;display:flex;align-items:flex-end;">
          <button id="buscarComboBtn" type="button" class="btn secondary" style="width:100%;">Buscar</button>
        </div>
      </div>
    </div>

    <div id="combosList" >Cargando combos...</div>
  </div>

  <script>
    const state = {
      empresaID: 0,
      q: '',
      combos: [],
      productos: [],
      draftIngredientes: []
    };
  </script>
</body>
</html>
