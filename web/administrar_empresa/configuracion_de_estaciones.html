<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Configuración de estaciones</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <h1>Configuración de estaciones</h1>
      <p id="empresaInfo">Empresa: cargando...</p>
      <p class="form-help">Define cuántas estaciones quieres y el nombre de cada una. Ejemplo: Mesa 1, Habitación 1.</p>
    </section>

    <div id="messageBox" class="form-help"></div>

    <section class="card empresa-section">
      <form id="cantidadForm" class="form">
        <div class="form-row">
          <div class="form-col">
            <label class="form-label" for="cantidadEstaciones">Cantidad de estaciones</label>
            <input id="cantidadEstaciones" class="form-input" type="number" min="1" max="500" value="1" required>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn" type="submit">Generar estaciones</button>
        </div>
      </form>
    </section>

    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h2>Nombres de estaciones</h2>
        <div class="form-actions">
          <button id="btnInactivarCarritos" class="btn secondary" type="button">Inactivar carritos de estaciones</button>
          <button id="btnGuardarNombres" class="btn secondary" type="button">Guardar nombres</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="table" id="estacionesTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre de estación</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const empresaId = Number(new URLSearchParams(window.location.search).get('empresa_id') || 0);
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
      messageBox.textContent = text || '';
      messageBox.className = type === 'error' ? 'error' : (type === 'success' ? 'success' : 'form-help');
    }

    function sanitize(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function requestJSON(url, options) {
      const resp = await fetch(url, Object.assign({ credentials: 'same-origin' }, options || {}));
      const contentType = resp.headers.get('content-type') || '';
      let data = null;
      if (contentType.includes('application/json')) {
        data = await resp.json();
      } else {
        data = await resp.text();
      }
      if (!resp.ok) {
        const msg = typeof data === 'string' ? data : (data && data.error ? data.error : 'error de servidor');
        throw new Error(msg || ('HTTP ' + resp.status));
      }
      return data;
    }

    function getCarritoCodeForStation(stationID) {
      return 'EST-' + empresaId + '-' + stationID;
    }

    function normalizedCode(value) {
      return String(value || '').trim().toUpperCase();
    }

    function isStationCarrito(item) {
      const code = normalizedCode(item && item.codigo);
      const expectedPrefix = normalizedCode('EST-' + empresaId + '-');
      return !!code && code.startsWith(expectedPrefix);
    }

    function storageKey() {
      return 'estaciones_config_empresa_' + empresaId;
    }

    function readConfig() {
      if (!empresaId) return null;
      try {
        const raw = localStorage.getItem(storageKey());
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        return normalizeConfig(parsed);
      } catch (_) {
        return null;
      }
    }

    function normalizeConfig(cfg) {
      const cantidad = Math.max(1, Math.min(500, Number(cfg.cantidad || 1)));
      const estaciones = Array.isArray(cfg.estaciones) ? cfg.estaciones : [];
      const out = [];
      for (let i = 0; i < cantidad; i++) {
        const current = estaciones[i] || {};
        const nombre = String(current.nombre || '').trim();
        out.push({
          id: i + 1,
          nombre: nombre || ('Estación ' + (i + 1))
        });
      }
      return { cantidad, estaciones: out };
    }

    function saveConfig(cfg) {
      if (!empresaId) return;
      const normalized = normalizeConfig(cfg);
      localStorage.setItem(storageKey(), JSON.stringify(normalized));
    }

    function renderRows(cfg) {
      const tbody = document.querySelector('#estacionesTable tbody');
      if (!cfg.estaciones.length) {
        tbody.innerHTML = '<tr><td colspan="2">No hay estaciones configuradas.</td></tr>';
        return;
      }
      tbody.innerHTML = cfg.estaciones.map((est, idx) => {
        return '<tr>' +
          '<td>' + (idx + 1) + '</td>' +
          '<td><input class="form-input" data-idx="' + idx + '" value="' + sanitize(est.nombre) + '"></td>' +
          '</tr>';
      }).join('');
    }

    function applyCantidad(cantidad) {
      const current = readConfig() || { cantidad: 1, estaciones: [{ id: 1, nombre: 'Estación 1' }] };
      const cfg = normalizeConfig({ cantidad, estaciones: current.estaciones });
      saveConfig(cfg);
      document.getElementById('cantidadEstaciones').value = String(cfg.cantidad);
      renderRows(cfg);
      return cfg;
    }

    async function syncCarritosFromStations(cfg) {
      if (!empresaId || !cfg || !Array.isArray(cfg.estaciones) || !cfg.estaciones.length) {
        return { created: 0, updated: 0 };
      }

      const rows = await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&include_inactive=1');
      const existing = Array.isArray(rows) ? rows : [];
      const byCode = new Map();
      existing.forEach(item => {
        byCode.set(normalizedCode(item.codigo), item);
      });

      let created = 0;
      let updated = 0;

      for (const station of cfg.estaciones) {
        const stationID = Number(station.id || 0);
        if (!stationID) continue;
        const stationName = String(station.nombre || '').trim() || ('Estación ' + stationID);
        const code = getCarritoCodeForStation(stationID);
        const ref = 'ESTACION_' + stationID;
        const current = byCode.get(normalizedCode(code));

        if (!current) {
          const createdBody = await requestJSON('/api/empresa/carritos_compra', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              empresa_id: empresaId,
              codigo: code,
              nombre: stationName,
              canal_venta: 'mostrador',
              estado_carrito: 'cerrado',
              moneda: 'COP',
              referencia_externa: ref,
              observaciones: 'Carrito generado automáticamente para estación #' + stationID
            })
          });

          const createdID = Number((createdBody && createdBody.id) || 0);
          if (createdID > 0) {
            await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&id=' + encodeURIComponent(createdID) + '&action=desactivar', {
              method: 'PUT'
            });
            updated += 1;
          }

          created += 1;
          continue;
        }

        const requiresNameUpdate = String(current.nombre || '').trim() !== stationName;
        const requiresCodeUpdate = normalizedCode(current.codigo) !== normalizedCode(code);
        const requiresRefUpdate = !String(current.referencia_externa || '').trim();

        if (requiresNameUpdate || requiresCodeUpdate || requiresRefUpdate) {
          await requestJSON('/api/empresa/carritos_compra', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: Number(current.id || 0),
              empresa_id: empresaId,
              codigo: code,
              nombre: stationName,
              canal_venta: String(current.canal_venta || 'mostrador'),
              cliente_id: Number(current.cliente_id || 0),
              estado_carrito: String(current.estado_carrito || 'abierto'),
              moneda: String(current.moneda || 'COP'),
              referencia_externa: String(current.referencia_externa || ref),
              observaciones: String(current.observaciones || '')
            })
          });
          updated += 1;
        }

        if (String(current.estado || 'inactivo').toLowerCase() !== 'inactivo') {
          await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&id=' + encodeURIComponent(current.id) + '&action=desactivar', {
            method: 'PUT'
          });
          updated += 1;
        }

        if (String(current.estado_carrito || 'cerrado').toLowerCase() !== 'cerrado') {
          await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&id=' + encodeURIComponent(current.id) + '&action=cerrar', {
            method: 'PUT'
          });
          updated += 1;
        }
      }

      return { created, updated };
    }

    async function inactivarTodosLosCarritosEstacion() {
      if (!empresaId) {
        showMessage('No se encontró empresa_id para inactivar carritos.', 'error');
        return;
      }

      if (!confirm('Se inactivarán y cerrarán todos los carritos de estaciones de esta empresa. ¿Deseas continuar?')) {
        return;
      }

      showMessage('Inactivando carritos de estaciones...', 'help');
      const rows = await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&include_inactive=1');
      const allCarritos = Array.isArray(rows) ? rows : [];
      const stationCarritos = allCarritos.filter(isStationCarrito);

      if (!stationCarritos.length) {
        showMessage('No se encontraron carritos de estaciones para esta empresa.', 'success');
        return;
      }

      let procesados = 0;
      let actualizados = 0;
      let yaInactivos = 0;
      let errores = 0;

      for (const item of stationCarritos) {
        const carritoID = Number(item && item.id ? item.id : 0);
        if (!carritoID) {
          continue;
        }

        procesados += 1;
        let cambioAplicado = false;

        try {
          if (String(item.estado || 'inactivo').toLowerCase() !== 'inactivo') {
            await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&id=' + encodeURIComponent(carritoID) + '&action=desactivar', {
              method: 'PUT'
            });
            cambioAplicado = true;
          }

          if (String(item.estado_carrito || 'cerrado').toLowerCase() !== 'cerrado') {
            await requestJSON('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&id=' + encodeURIComponent(carritoID) + '&action=cerrar', {
              method: 'PUT'
            });
            cambioAplicado = true;
          }

          if (cambioAplicado) {
            actualizados += 1;
          } else {
            yaInactivos += 1;
          }
        } catch (err) {
          errores += 1;
          console.error('No se pudo inactivar carrito de estación', carritoID, err);
        }
      }

      if (errores > 0) {
        showMessage('Proceso finalizado con errores. Procesados: ' + procesados + ' | Actualizados: ' + actualizados + ' | Ya inactivos: ' + yaInactivos + ' | Errores: ' + errores + '.', 'error');
        return;
      }

      showMessage('Carritos de estaciones inactivados correctamente. Procesados: ' + procesados + ' | Actualizados: ' + actualizados + ' | Ya inactivos: ' + yaInactivos + '.', 'success');
    }

    function guardarNombres() {
      const current = readConfig() || { cantidad: 1, estaciones: [{ id: 1, nombre: 'Estación 1' }] };
      const inputs = document.querySelectorAll('#estacionesTable tbody input[data-idx]');
      const estaciones = current.estaciones.map((est, idx) => {
        const input = Array.from(inputs).find(x => Number(x.dataset.idx) === idx);
        const nombre = input ? String(input.value || '').trim() : '';
        return {
          id: est.id,
          nombre: nombre || ('Estación ' + est.id)
        };
      });
      saveConfig({ cantidad: current.cantidad, estaciones });
      renderRows(readConfig());
      showMessage('Nombres de estaciones guardados.', 'success');
    }

    async function cargarEmpresa() {
      const label = document.getElementById('empresaInfo');
      if (!empresaId) {
        label.textContent = 'Empresa no definida';
        return;
      }
      try {
        const resp = await fetch('/super/api/empresas?id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!resp.ok) throw new Error('No encontrada');
        const data = await resp.json();
        label.textContent = 'Empresa: ' + (data.nombre || 'Sin nombre');
      } catch (_) {
        label.textContent = 'Empresa no disponible';
      }
    }

    function wireEvents() {
      document.getElementById('cantidadForm').addEventListener('submit', async ev => {
        ev.preventDefault();
        const cantidad = Number(document.getElementById('cantidadEstaciones').value || 0);
        if (!cantidad || cantidad < 1) {
          showMessage('La cantidad debe ser mayor a 0.', 'error');
          return;
        }
        try {
          const cfg = applyCantidad(cantidad);
          const sync = await syncCarritosFromStations(cfg);
          showMessage('Estaciones generadas y carritos sincronizados. Creados: ' + sync.created + ' | Actualizados: ' + sync.updated + '.', 'success');
        } catch (err) {
          showMessage(err.message || 'No se pudieron sincronizar los carritos de estaciones.', 'error');
        }
      });
      document.getElementById('btnGuardarNombres').addEventListener('click', guardarNombres);
      document.getElementById('btnInactivarCarritos').addEventListener('click', () => {
        inactivarTodosLosCarritosEstacion().catch(err => {
          showMessage(err.message || 'No se pudo completar la inactivación de carritos.', 'error');
        });
      });
    }

    function bootstrap() {
      if (!empresaId) {
        showMessage('No se encontró empresa_id en la URL.', 'error');
      }
      wireEvents();
      cargarEmpresa();
      const cfg = readConfig() || normalizeConfig({ cantidad: 1, estaciones: [] });
      saveConfig(cfg);
      document.getElementById('cantidadEstaciones').value = String(cfg.cantidad);
      renderRows(cfg);
    }

    bootstrap();
  </script>
</body>
</html>
