<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reportes - Inventario</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/js/empresa_submenu_context.js"></script>
  <script src="/js/print_documents.js"></script>
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h1 style="margin:0;">Reportes de Inventario</h1>
        <div class="empresa-inline-actions">
          <button id="btnRefrescarInv" class="btn secondary" type="button">Refrescar</button>
          <button id="btnVerInvPDF" class="btn secondary" type="button">Ver PDF</button>
          <button id="btnImprimirInv" class="btn secondary" type="button">Imprimir</button>
          <button id="btnCompartirInvWhatsapp" class="btn secondary" type="button">WhatsApp</button>
          <button id="btnCompartirInvCorreo" class="btn secondary" type="button">Correo</button>
          <select id="exportFormat" class="form-input" style="max-width:160px;">
            <option value="csv">CSV</option>
            <option value="xls">XLS</option>
            <option value="pdf">PDF</option>
            <option value="json">JSON</option>
            <option value="txt">TXT</option>
          </select>
          <button id="btnExportarInv" class="btn secondary" type="button">Exportar</button>
        </div>
      </div>
      <p class="form-help">Reporte de stock por bodega y producto. Puedes verlo como documento (PDF), imprimirlo o exportarlo (CSV/XLS/JSON/TXT/PDF).</p>
      <div class="table-wrap">
        <table class="table" id="tablaInventario">
          <thead>
            <tr>
              <th>Producto</th>
              <th>SKU</th>
              <th>Bodega</th>
              <th>Existencia</th>
              <th>Stock mínimo</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="invMsg" class="form-help" style="margin-top:10px;"></div>
    </section>
  </div>

  <script>
    (function(){
      function getQueryParam(name) {
        try {
          return new URLSearchParams(window.location.search).get(name);
        } catch (e) {
          return "";
        }
      }

      function normalize(v){ return (v == null ? "" : String(v)).trim(); }

      var empresaId = normalize(getQueryParam("id") || getQueryParam("empresa_id"));
      var tbody = document.querySelector("#tablaInventario tbody");
      var msg = document.getElementById("invMsg");

      function setMsg(text, isErr){
        if (!msg) return;
        msg.textContent = text || "";
        msg.className = isErr ? "error" : "form-help";
      }

      function buildDatasetURL() {
        if (!empresaId) return "";
        return "/api/empresa/reportes?action=dataset&empresa_id=" + encodeURIComponent(empresaId) +
          "&dataset=" + encodeURIComponent("operativo_inventario_bodega");
      }

      function buildExportURL(format) {
        if (!empresaId) return "";
        format = normalize(format).toLowerCase() || "csv";
        return "/api/empresa/reportes?action=export&empresa_id=" + encodeURIComponent(empresaId) +
          "&dataset=" + encodeURIComponent("operativo_inventario_bodega") +
          "&format=" + encodeURIComponent(format);
      }

      function escapeHtml(v) {
        return String(v == null ? "" : v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderRows(ds) {
        if (!tbody) return;
        var rows = (ds && Array.isArray(ds.rows)) ? ds.rows : [];
        if (!rows.length) {
          tbody.innerHTML = "<tr><td colspan=\"5\" class=\"muted\">Sin datos para mostrar.</td></tr>";
          return;
        }
        // intenta mapear por claves comunes, pero si no existen, cae a vacío
        tbody.innerHTML = rows.map(function (r) {
          r = r || {};
          var producto = r.producto || r.nombre_producto || r.nombre || "";
          var sku = r.sku || r.SKU || r.codigo || r.codigo_barras || "";
          var bodega = r.bodega || r.nombre_bodega || r.bodega_nombre || "";
          var stock = r.existencia || r.stock_total || r.stock || r.cantidad || "";
          var min = r.stock_minimo || r.minimo || "";
          return "<tr>" +
            "<td>" + escapeHtml(producto) + "</td>" +
            "<td>" + escapeHtml(sku) + "</td>" +
            "<td>" + escapeHtml(bodega) + "</td>" +
            "<td>" + escapeHtml(stock) + "</td>" +
            "<td>" + escapeHtml(min) + "</td>" +
            "</tr>";
        }).join("");
      }

      async function loadDataset() {
        if (!empresaId) {
          setMsg("Falta empresa_id en la URL. Abre esta página desde el panel de la empresa.", true);
          return;
        }
        setMsg("Cargando inventario…", false);
        var url = buildDatasetURL();
        try {
          var res = await fetch(url, { credentials: "same-origin" });
          if (!res.ok) {
            var t = "";
            try { t = await res.text(); } catch (e) {}
            throw new Error("HTTP " + res.status + " " + normalize(t));
          }
          var ds = await res.json();
          renderRows(ds);
          setMsg("Inventario cargado. Registros: " + (ds && ds.row_count != null ? ds.row_count : ""), false);
        } catch (e) {
          setMsg(e.message || "No se pudo cargar el inventario.", true);
        }
      }

      function openExport(format) {
        var url = buildExportURL(format);
        if (!url) return;
        window.open(url, "_blank", "noopener,noreferrer");
      }

      var btnRefrescar = document.getElementById("btnRefrescarInv");
      var btnExportar = document.getElementById("btnExportarInv");
      var btnVerPDF = document.getElementById("btnVerInvPDF");
      var btnImprimir = document.getElementById("btnImprimirInv");
      var btnCompartirWhatsapp = document.getElementById("btnCompartirInvWhatsapp");
      var btnCompartirCorreo = document.getElementById("btnCompartirInvCorreo");
      var fmt = document.getElementById("exportFormat");

      if (btnRefrescar) btnRefrescar.addEventListener("click", function(){ loadDataset(); });
      if (btnExportar) btnExportar.addEventListener("click", function(){
        var f = fmt ? fmt.value : "csv";
        openExport(f);
      });
      if (btnVerPDF) btnVerPDF.addEventListener("click", function(){ openExport("pdf"); });
      if (btnImprimir) btnImprimir.addEventListener("click", function(){
        var url = buildExportURL("pdf");
        if (!url) return;
        var w = window.open(url, "_blank", "noopener,noreferrer");
        try {
          // impresión best-effort (depende del navegador)
          if (w) w.focus();
        } catch (e) {}
      });

      function compartirReporteInventario(channel) {
        var url = buildExportURL("pdf") || window.location.href;
        if (window.PCSPrint && typeof window.PCSPrint.shareDocument === "function") {
          window.PCSPrint.shareDocument({
            channel: channel,
            title: "Reporte de inventario",
            code: "inventario_empresa_" + String(empresaId || ""),
            company: "Empresa #" + String(empresaId || ""),
            message: "Reporte de stock por bodega y producto en formato PDF.",
            url: url
          });
          return;
        }
        var body = encodeURIComponent("Reporte de inventario\nEmpresa: " + String(empresaId || "") + "\nEnlace: " + url);
        var href = channel === "whatsapp" ? ("https://wa.me/?text=" + body) : ("mailto:?subject=Reporte de inventario&body=" + body);
        window.open(href, "_blank", "noopener,noreferrer");
      }

      if (btnCompartirWhatsapp) btnCompartirWhatsapp.addEventListener("click", function(){ compartirReporteInventario("whatsapp"); });
      if (btnCompartirCorreo) btnCompartirCorreo.addEventListener("click", function(){ compartirReporteInventario("email"); });

      loadDataset();
    })();
  </script>
</body>
</html>
