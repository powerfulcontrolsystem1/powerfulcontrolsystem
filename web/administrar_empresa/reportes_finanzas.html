<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reportes financieros</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/js/empresa_submenu_context.js"></script>
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <div>
          <h1 class="empresa-section-title">Reportes financieros</h1>
          <p class="form-help">Ingresos, egresos, balance y movimientos financieros del periodo.</p>
        </div>
        <div class="empresa-inline-actions">
          <input type="date" id="desde" class="form-input">
          <input type="date" id="hasta" class="form-input">
          <select id="formatoExport" class="form-input" style="max-width:150px;">
            <option value="pdf">PDF</option>
            <option value="csv">CSV</option>
            <option value="xls">XLS</option>
            <option value="json">JSON</option>
            <option value="txt">TXT</option>
          </select>
          <button id="btnAplicarFiltroFin" class="btn" type="button">Aplicar</button>
          <button id="btnExportarFin" class="btn secondary" type="button">Exportar</button>
        </div>
      </div>
      <div id="finMsg" class="form-help"></div>

      <div class="kpi-grid">
        <div class="kpi-box"><span class="kpi-label">Ingresos</span><strong id="kpiIngresos">--</strong></div>
        <div class="kpi-box"><span class="kpi-label">Egresos</span><strong id="kpiEgresos">--</strong></div>
        <div class="kpi-box"><span class="kpi-label">Balance</span><strong id="kpiBalance">--</strong></div>
        <div class="kpi-box"><span class="kpi-label">Movimientos</span><strong id="kpiMovimientos">0</strong></div>
      </div>

      <div class="table-wrap">
        <table class="table" id="tablaFinanzas">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Concepto</th>
              <th>Tipo</th>
              <th>Categoria</th>
              <th>Metodo</th>
              <th>Monto</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    (function(){
      var state = { empresaID: 0, dataset: null };

      function q(name) {
        try { return new URLSearchParams(window.location.search).get(name); } catch (_) { return ''; }
      }

      function normalize(value) {
        return String(value == null ? '' : value).trim();
      }

      function num(value) {
        var n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function money(value) {
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(num(value));
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setMsg(text, isError) {
        var el = document.getElementById('finMsg');
        if (!el) return;
        el.textContent = text || '';
        el.style.color = isError ? '#ef5350' : '';
      }

      function setDateDefaults() {
        var desde = document.getElementById('desde');
        var hasta = document.getElementById('hasta');
        var now = new Date();
        var first = new Date(now.getFullYear(), now.getMonth(), 1);
        if (desde && !desde.value) desde.value = first.toISOString().slice(0, 10);
        if (hasta && !hasta.value) hasta.value = now.toISOString().slice(0, 10);
      }

      function buildParams(action) {
        var params = new URLSearchParams();
        params.set('action', action);
        params.set('empresa_id', String(state.empresaID));
        params.set('dataset', 'contable_movimientos_financieros');
        params.set('max_rows', '500');
        var desde = normalize(document.getElementById('desde') && document.getElementById('desde').value);
        var hasta = normalize(document.getElementById('hasta') && document.getElementById('hasta').value);
        if (desde) params.set('desde', desde);
        if (hasta) params.set('hasta', hasta);
        return params;
      }

      async function requestJSON(url) {
        var res = await fetch(url, { credentials: 'same-origin' });
        if (!res.ok) {
          var body = '';
          try { body = await res.text(); } catch (_) {}
          throw new Error(body || ('HTTP ' + res.status));
        }
        return res.json();
      }

      function renderDataset(dataset) {
        state.dataset = dataset || {};
        var summary = state.dataset.summary || {};
        var rows = Array.isArray(state.dataset.rows) ? state.dataset.rows : [];
        document.getElementById('kpiIngresos').textContent = money(summary.ingresos);
        document.getElementById('kpiEgresos').textContent = money(summary.egresos);
        document.getElementById('kpiBalance').textContent = money(summary.balance);
        document.getElementById('kpiMovimientos').textContent = String(state.dataset.row_count != null ? state.dataset.row_count : rows.length);

        var tbody = document.querySelector('#tablaFinanzas tbody');
        if (!tbody) return;
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="muted">Sin movimientos financieros para el periodo.</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(function(row) {
          row = row || {};
          return '<tr>' +
            '<td>' + escapeHtml(row.fecha_movimiento || row.fecha || '') + '</td>' +
            '<td>' + escapeHtml(row.concepto || row.codigo || '') + '</td>' +
            '<td>' + escapeHtml(row.tipo_movimiento || row.tipo || '') + '</td>' +
            '<td>' + escapeHtml(row.categoria || '') + '</td>' +
            '<td>' + escapeHtml(row.metodo_pago || '') + '</td>' +
            '<td>' + escapeHtml(money(row.total_neto != null ? row.total_neto : row.monto)) + '</td>' +
            '<td>' + escapeHtml(row.estado || '') + '</td>' +
            '</tr>';
        }).join('');
      }

      async function loadFinanzas() {
        if (!state.empresaID) {
          setMsg('Falta empresa_id en la URL. Abre reportes desde el panel de la empresa.', true);
          return;
        }
        setMsg('Cargando reporte financiero...', false);
        var data = await requestJSON('/api/empresa/reportes?' + buildParams('dataset').toString());
        renderDataset(data);
        setMsg('Reporte financiero actualizado.', false);
      }

      async function exportFinanzas() {
        if (!state.empresaID) return;
        var formato = normalize(document.getElementById('formatoExport') && document.getElementById('formatoExport').value).toLowerCase() || 'pdf';
        var params = buildParams('export');
        params.set('format', formato);
        var res = await fetch('/api/empresa/reportes?' + params.toString(), { credentials: 'same-origin' });
        if (!res.ok) {
          var body = '';
          try { body = await res.text(); } catch (_) {}
          throw new Error(body || 'No se pudo exportar el reporte financiero.');
        }
        var blob = await res.blob();
        var stamp = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 14);
        var filename = 'reporte_financiero_empresa_' + state.empresaID + '_' + stamp + '.' + formato;
        var disposition = res.headers.get('Content-Disposition') || '';
        var match = disposition.match(/filename="?([^"]+)"?/i);
        if (match && match[1]) filename = match[1];
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(function(){ URL.revokeObjectURL(link.href); }, 0);
      }

      function bind() {
        document.getElementById('btnAplicarFiltroFin').addEventListener('click', function(){
          loadFinanzas().catch(function(err){ setMsg(err.message || 'No se pudo aplicar el filtro financiero.', true); });
        });
        document.getElementById('btnExportarFin').addEventListener('click', function(){
          exportFinanzas().then(function(){
            setMsg('Exportacion financiera generada.', false);
          }).catch(function(err){
            setMsg(err.message || 'No se pudo exportar el reporte financiero.', true);
          });
        });
      }

      function init() {
        state.empresaID = Number(q('empresa_id') || q('id') || 0);
        setDateDefaults();
        bind();
        loadFinanzas().catch(function(err){ setMsg(err.message || 'No se pudo cargar el reporte financiero.', true); });
      }

      init();
    })();
  </script>
</body>
</html>
