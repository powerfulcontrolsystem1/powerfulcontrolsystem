<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Configuración guiada</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>
  <main class="erp-shell" style="padding:20px;">
    <section class="erp-card">
      <div class="erp-kicker">Configuración guiada</div>
      <h1 style="margin:0 0 8px;">Onboarding asistido con robot IA</h1>
      <p id="guidedIntro" class="muted" style="margin:0 0 16px;">
        Vamos a convertir la preconfiguración inicial en una puesta en marcha real: estaciones, documento de venta, impresión y reglas básicas.
      </p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button id="guidedFormBtn" type="button" class="btn btn-primary">Abrir formulario guiado</button>
        <button id="guidedStartBtn" type="button" class="btn">Abrir chat IA</button>
        <button id="guidedReloadBtn" type="button" class="btn">Actualizar resumen</button>
      </div>
    </section>

    <section id="guidedFormCard" class="erp-card" style="display:none;margin-top:16px;">
      <div class="erp-kicker">Formulario guiado</div>
      <form id="guidedSetupForm">
        <div id="guidedQuestionsGrid" class="erp-metric-grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));"></div>
        <div style="display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap;margin-top:16px;">
          <span id="guidedFormStatus" class="muted" style="margin-right:auto;"></span>
          <button type="submit" class="btn btn-primary">Guardar configuracion guiada</button>
        </div>
      </form>
    </section>

    <section class="erp-card" style="margin-top:16px;">
      <div class="erp-kicker">Estado actual</div>
      <div id="guidedStatusGrid" class="erp-metric-grid"></div>
    </section>

    <section class="erp-card" style="margin-top:16px;">
      <div class="erp-kicker">Última aplicación</div>
      <div id="guidedLastSummary" class="muted">Aún no se ha guardado una configuración guiada.</div>
      <ul id="guidedPendingList" style="margin-top:12px;padding-left:18px;"></ul>
    </section>
  </main>

  <script>
    (function () {
      function parsePositiveInt(raw) {
        var n = Number(String(raw || '').trim());
        if (!Number.isFinite(n)) return 0;
        n = Math.trunc(n);
        return n > 0 ? n : 0;
      }

      function getEmpresaId() {
        try {
          var params = new URLSearchParams(window.location.search || '');
          var id = parsePositiveInt(params.get('empresa_id') || params.get('id') || '');
          if (id > 0) return String(id);
        } catch (e) {}
        try {
          if (window.parent && typeof window.parent.__resolveEmpresaIdContext === 'function') {
            var parentId = parsePositiveInt(window.parent.__resolveEmpresaIdContext());
            if (parentId > 0) return String(parentId);
          }
        } catch (e) {}
        return '';
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function fetchEstado() {
        var empresaId = getEmpresaId();
        if (!empresaId) {
          return Promise.reject(new Error('No se encontró la empresa activa.'));
        }
        return fetch('/api/empresa/configuracion_guiada?empresa_id=' + encodeURIComponent(empresaId), {
          credentials: 'same-origin'
        }).then(function (resp) {
          if (!resp.ok) {
            return resp.text().then(function (text) {
              throw new Error(text || 'No se pudo cargar la configuración guiada.');
            });
          }
          return resp.json();
        });
      }

      function renderStatus(data) {
        var estado = data && data.estado ? data.estado : {};
        var grid = document.getElementById('guidedStatusGrid');
        if (!grid) return;
        var items = [
          { label: 'Empresa', value: estado.empresa_nombre || 'Sin nombre' },
          { label: 'Tipo', value: estado.tipo_empresa_nombre || 'General' },
          { label: 'Estaciones', value: (estado.estaciones && estado.estaciones.cantidad) || 0 },
          { label: 'Venta directa', value: estado.operacion && estado.operacion.venta_directa_enabled ? 'Activa' : 'No definida' }
        ];
        grid.innerHTML = items.map(function (item) {
          return '<article class="erp-metric-card">' +
            '<span class="erp-metric-label">' + escapeHtml(item.label) + '</span>' +
            '<strong class="erp-metric-value">' + escapeHtml(item.value) + '</strong>' +
          '</article>';
        }).join('');

        var intro = document.getElementById('guidedIntro');
        if (intro) {
          intro.textContent = 'La empresa ' + (estado.empresa_nombre || 'actual') + ' puede terminar su puesta en marcha desde aquí. El robot hará preguntas cortas y aplicará la configuración base sin que tengas que recorrer todos los módulos.';
        }
      }

      function renderLastSummary(data) {
        var estado = data && data.estado ? data.estado : {};
        var summary = document.getElementById('guidedLastSummary');
        var pending = document.getElementById('guidedPendingList');
        if (!summary || !pending) return;

        var resumen = data && data.resumen ? data.resumen : null;
        if (!resumen) {
          summary.textContent = 'Aún no se ha guardado una configuración guiada.';
          pending.innerHTML = '';
          return;
        }

        summary.innerHTML =
          '<strong>' + escapeHtml(resumen.nombre_comercial || estado.empresa_nombre || 'Empresa') + '</strong>' +
          ' · Documento: ' + escapeHtml(resumen.modo_documento_venta || 'comprobante_pago') +
          ' · Estaciones: ' + escapeHtml(resumen.cantidad_estaciones || 0) +
          ' · Aplicado: ' + escapeHtml(resumen.aplicado_en || 'sin fecha');

        var pendientes = Array.isArray(data && data.pendientes) ? data.pendientes : [];
        pending.innerHTML = pendientes.map(function (item) {
          return '<li>' + escapeHtml(item) + '</li>';
        }).join('');
      }

      function renderQuestionInput(question) {
        var type = String(question && question.type || 'text').toLowerCase();
        var value = question && question.default_value != null ? String(question.default_value) : '';
        if (type === 'boolean') {
          return '<select class="form-input" data-guided-answer="' + escapeHtml(question.id) + '">' +
            '<option value="si"' + (value === 'si' || value === 'true' ? ' selected' : '') + '>Si</option>' +
            '<option value="no"' + (value === 'no' || value === 'false' ? ' selected' : '') + '>No</option>' +
          '</select>';
        }
        if (type === 'select' && Array.isArray(question.options)) {
          return '<select class="form-input" data-guided-answer="' + escapeHtml(question.id) + '">' +
            question.options.map(function (option) {
              option = String(option || '');
              return '<option value="' + escapeHtml(option) + '"' + (option === value ? ' selected' : '') + '>' + escapeHtml(option) + '</option>';
            }).join('') +
          '</select>';
        }
        if (type === 'textarea') {
          return '<textarea class="form-input" rows="3" data-guided-answer="' + escapeHtml(question.id) + '" placeholder="' + escapeHtml(question.placeholder || '') + '">' + escapeHtml(value) + '</textarea>';
        }
        return '<input class="form-input" data-guided-answer="' + escapeHtml(question.id) + '" type="' + (type === 'number' ? 'number' : 'text') + '" value="' + escapeHtml(value) + '" placeholder="' + escapeHtml(question.placeholder || '') + '">';
      }

      function renderGuidedForm(data) {
        var wizard = data && data.wizard ? data.wizard : {};
        var questions = Array.isArray(wizard.questions) ? wizard.questions : [];
        var grid = document.getElementById('guidedQuestionsGrid');
        if (!grid) return;
        grid.innerHTML = questions.map(function (question) {
          return '<label class="erp-metric-card" style="display:grid;gap:8px;text-align:left;">' +
            '<span class="erp-metric-label">' + escapeHtml(question.label || question.id || 'Pregunta') + (question.required ? ' *' : '') + '</span>' +
            '<span class="muted" style="font-size:.82rem;">' + escapeHtml(question.prompt || '') + '</span>' +
            renderQuestionInput(question || {}) +
            (question.help ? '<span class="muted" style="font-size:.78rem;">' + escapeHtml(question.help) + '</span>' : '') +
          '</label>';
        }).join('');
      }

      function saveGuidedForm() {
        var empresaId = getEmpresaId();
        var status = document.getElementById('guidedFormStatus');
        if (!empresaId) {
          if (status) status.textContent = 'No se encontro la empresa activa.';
          return Promise.resolve();
        }
        var answers = {};
        Array.prototype.forEach.call(document.querySelectorAll('#guidedQuestionsGrid [data-guided-answer]'), function (input) {
          answers[input.getAttribute('data-guided-answer')] = input.value;
        });
        if (status) status.textContent = 'Guardando configuracion...';
        return fetch('/api/empresa/configuracion_guiada?empresa_id=' + encodeURIComponent(empresaId) + '&action=aplicar', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json', 'X-PCS-Source': 'empresa_configuracion_guiada_form' },
          body: JSON.stringify({ answers: answers })
        }).then(function (resp) {
          if (!resp.ok) {
            return resp.text().then(function (text) {
              throw new Error(text || 'No se pudo guardar la configuracion guiada.');
            });
          }
          return resp.json();
        }).then(function (data) {
          if (status) status.textContent = (data.resultado && data.resultado.mensaje) || 'Configuracion guiada guardada.';
          return load();
        }).catch(function (err) {
          if (status) status.textContent = err.message || 'No se pudo guardar la configuracion guiada.';
        });
      }

      function notifyParentStart(data) {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: 'pcs-ai-config-wizard-start',
              payload: data
            }, '*');
          }
        } catch (e) {}
      }

      function load() {
        return fetchEstado().then(function (data) {
          window.__pcsGuidedSetupState = data;
          renderStatus(data);
          renderLastSummary(data);
          renderGuidedForm(data);
          return data;
        });
      }

      document.getElementById('guidedReloadBtn').addEventListener('click', function () {
        load().catch(function (err) {
          alert(err.message || 'No se pudo actualizar el resumen.');
        });
      });

      document.getElementById('guidedStartBtn').addEventListener('click', function () {
        var current = window.__pcsGuidedSetupState;
        if (current) {
          notifyParentStart(current);
          return;
        }
        load().then(function (data) {
          notifyParentStart(data);
        }).catch(function (err) {
          alert(err.message || 'No se pudo iniciar la configuración guiada.');
        });
      });

      document.getElementById('guidedFormBtn').addEventListener('click', function () {
        var card = document.getElementById('guidedFormCard');
        if (card) card.style.display = 'block';
        var current = window.__pcsGuidedSetupState;
        if (current) {
          renderGuidedForm(current);
        } else {
          load().catch(function (err) {
            alert(err.message || 'No se pudo abrir el formulario guiado.');
          });
        }
      });

      document.getElementById('guidedSetupForm').addEventListener('submit', function (event) {
        event.preventDefault();
        saveGuidedForm();
      });

      load().catch(function (err) {
        var summary = document.getElementById('guidedLastSummary');
        if (summary) {
          summary.textContent = err.message || 'No se pudo cargar la configuración guiada.';
        }
      });
    })();
  </script>
</body>
</html>
