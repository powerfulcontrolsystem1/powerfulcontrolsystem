<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Estaciones</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h2>Tarjetas de estaciones</h2>
      </div>
      <div id="estacionesGrid" class="portal-grid"></div>
    </section>
  </div>

  <script>
    function parsePositiveInt(raw) {
      const n = Number(String(raw || '').trim());
      if (!Number.isFinite(n)) return 0;
      const v = Math.trunc(n);
      return v > 0 ? v : 0;
    }

    function resolveEmpresaId() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const own = parsePositiveInt(params.get('empresa_id') || params.get('id'));
        if (own > 0) return own;
      } catch (_) {}
      try {
        if (window.parent && window.parent !== window) {
          if (typeof window.parent.__resolveEmpresaIdContext === 'function') {
            const parentResolved = parsePositiveInt(window.parent.__resolveEmpresaIdContext());
            if (parentResolved > 0) return parentResolved;
          }
          const parentParams = new URLSearchParams(window.parent.location.search || '');
          const fromParent = parsePositiveInt(parentParams.get('empresa_id') || parentParams.get('id'));
          if (fromParent > 0) return fromParent;
        }
      } catch (_) {}
      try {
        const candidates = [
          sessionStorage.getItem('active_empresa_id'),
          sessionStorage.getItem('empresa_id'),
          localStorage.getItem('active_empresa_id'),
          localStorage.getItem('empresa_id')
        ];
        for (let i = 0; i < candidates.length; i++) {
          const parsed = parsePositiveInt(candidates[i]);
          if (parsed > 0) return parsed;
        }
      } catch (_) {}
      return 0;
    }

    const empresaId = resolveEmpresaId();
    const state = {
      colores: {
        activo: '#d9fbe8',
        inactivo: '#fff9ef'
      },
      carritosPorCodigo: {},
      sensorsByEstacion: {}
    };

    function sanitize(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Server-backed config helpers (use empresa_estacion_prefs clave=estaciones_config, estacion_id=0)
    async function requestJSON(url, options) {
      const resp = await fetch(url, Object.assign({ credentials: 'same-origin' }, options || {}));
      const contentType = resp.headers.get('content-type') || '';
      let data = null;
      if (contentType.includes('application/json')) {
        data = await resp.json();
      } else {
        data = await resp.text();
      }
      if (!resp.ok) {
        const msg = typeof data === 'string' ? data : (data && data.error ? data.error : 'error de servidor');
        throw new Error(msg || ('HTTP ' + resp.status));
      }
      return data;
    }

    function normalizeConfig(cfg) {
      const cantidad = Math.max(1, Math.min(500, Number(cfg.cantidad || 1)));
      const estaciones = Array.isArray(cfg.estaciones) ? cfg.estaciones : [];
      const out = [];
      for (let i = 0; i < cantidad; i++) {
        const current = estaciones[i] || {};
        const nombre = String(current.nombre || '').trim();
        const ventaSimpleHabilitada = toBool(current.venta_simple_habilitada) || toBool(current.modo_venta_simple);
        out.push({
          id: i + 1,
          nombre: nombre || ('Estación ' + (i + 1)),
          venta_simple_habilitada: ventaSimpleHabilitada,
          mostrar_total: current.mostrar_total === undefined ? true : toBool(current.mostrar_total)
        });
      }
      const validSizes = ['small', 'medium', 'large'];
      const requested = String(cfg.card_size || cfg.cardSize || '').trim().toLowerCase();
      const card_size = validSizes.indexOf(requested) !== -1 ? requested : (cfg.card_size || 'medium');
      return { cantidad, estaciones: out, card_size };
    }

    function parseStationConfigValue(raw) {
      let current = raw;
      for (let i = 0; i < 3; i += 1) {
        if (typeof current !== 'string') break;
        const trimmed = current.trim();
        if (!trimmed) return null;
        try {
          current = JSON.parse(trimmed);
        } catch (_) {
          return null;
        }
      }
      if (!current || typeof current !== 'object') return null;
      return current;
    }

    async function getConfigFromServer() {
      if (!empresaId) return null;
      try {
        const data = await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId));
        const prefs = data && data.prefs ? data.prefs : [];
        if (!Array.isArray(prefs) || prefs.length === 0) return null;
        const pref = prefs.find(p => p && String(p.clave) === 'estaciones_config' && Number(p.estacion_id) === 0);
        if (!pref || !pref.valor) return null;
        const parsed = parseStationConfigValue(pref.valor);
        if (!parsed) return null;
        return normalizeConfig(parsed);
      } catch (err) {
        console.warn('getConfigFromServer error:', err);
        return null;
      }
    }

    async function saveConfigToServer(cfg) {
      if (!empresaId) throw new Error('empresa_id missing');
      const existing = await getConfigFromServer().catch(() => null);
      const normalized = normalizeConfig(cfg || {});
      if ((cfg == null || !('card_size' in cfg)) && existing && existing.card_size) {
        normalized.card_size = existing.card_size;
      }
      normalized.card_size = normalized.card_size || 'medium';
      const payload = { estacion_id: 0, clave: 'estaciones_config', valor: JSON.stringify(normalized) };
      const res = await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return res;
    }

    function applyCardSize(cfg) {
      try {
        const grid = document.getElementById('estacionesGrid');
        if (!grid) return;
        grid.classList.remove('station-size-small', 'station-size-medium', 'station-size-large');
        const size = (cfg && cfg.card_size) || 'medium';
        grid.classList.add('station-size-' + size);
      } catch (err) {
        console.warn('applyCardSize error', err);
      }
    }

    function normalizeText(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function normalizeCode(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function toBool(v) {
      if (typeof v === 'boolean') return v;
      if (typeof v === 'number') return v === 1;
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      return raw === '1' || raw === 'true' || raw === 'si' || raw === 'sí';
    }

    function normalizeColor(v, fallback) {
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      const base = String(fallback == null ? '' : fallback).trim().toLowerCase();
      const hex = raw || base;
      if (!hex || hex.length !== 7 || hex.charAt(0) !== '#') {
        return base || '#fff9ef';
      }
      for (let i = 1; i < hex.length; i++) {
        const c = hex.charCodeAt(i);
        const isDigit = c >= 48 && c <= 57;
        const isHex = c >= 97 && c <= 102;
        if (!isDigit && !isHex) {
          return base || '#fff9ef';
        }
      }
      return hex;
    }

    function formatStationEntryDateTime(rawValue) {
      const raw = String(rawValue == null ? '' : rawValue).trim();
      if (!raw) return '';

      const isoLike = raw.includes('T') ? raw : raw.replace(' ', 'T');
      const parsed = new Date(isoLike);
      if (Number.isNaN(parsed.getTime())) {
        return raw;
      }

      return parsed.toLocaleString('es-CO', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getCarritoCodeForStation(stationID) {
      return 'EST-' + empresaId + '-' + stationID;
    }

    function openStationCarrito(stationID, stationName, useSimpleSales) {
      if (!empresaId || !stationID) return;
      const carritoCode = getCarritoCodeForStation(stationID);
      const page = useSimpleSales ? '/administrar_empresa/ventas_simple.html' : '/administrar_empresa/carrito_de_compras.html';
      const url = page + '?empresa_id=' + encodeURIComponent(empresaId) +
        '&estacion_id=' + encodeURIComponent(stationID) +
        '&estacion_nombre=' + encodeURIComponent(stationName || ('Estación ' + stationID)) +
        '&carrito_codigo=' + encodeURIComponent(carritoCode);
      window.location.href = url;
    }

    function isCarritoOperativoActivo(carrito) {
      if (!carrito) return false;
      const estado = normalizeText(carrito.estado) || 'activo';
      const estadoCarrito = normalizeText(carrito.estado_carrito) || 'abierto';
      return estado === 'activo' && estadoCarrito !== 'cerrado';
    }

    async function loadColoresEstadoCarrito() {
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/configuracion_avanzada?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const cfg = await res.json();
        state.colores.activo = normalizeColor(cfg && cfg.color_carrito_activo, '#d9fbe8');
        state.colores.inactivo = normalizeColor(cfg && cfg.color_carrito_inactivo, '#fff9ef');
      } catch (err) {
        console.warn('No se pudieron cargar colores de estado de carrito:', err);
      }
    }

    async function loadEstadoCarritosEstacion() {
      state.carritosPorCodigo = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&include_inactive=1', { credentials: 'same-origin' });
        if (!res.ok) return;
        const carritos = await res.json();
        if (!Array.isArray(carritos)) return;

        carritos.forEach(item => {
          const code = normalizeCode(item && item.codigo);
          if (!code) return;
          state.carritosPorCodigo[code] = {
            activo: isCarritoOperativoActivo(item),
            activadoEn: String((item && item.activado_en) || '')
          };
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de carritos por estación:', err);
      }
    }

    // readConfig replaced by server-backed getConfigFromServer

    function renderEstaciones(cfg) {
      const grid = document.getElementById('estacionesGrid');
      if (!cfg || !cfg.estaciones || !cfg.estaciones.length) {
        grid.innerHTML = '<p class="form-help">No hay estaciones configuradas. Ve a Configuración de estaciones para crearlas.</p>';
        return;
      }
      grid.innerHTML = cfg.estaciones.map(est => {
        const stationID = Number(est.id || 0);
        const useSimpleSales = !!est.venta_simple_habilitada;
        const useMostrarTotal = est.mostrar_total === undefined ? true : !!est.mostrar_total;
        const carritoCode = getCarritoCodeForStation(stationID);
        const info = state.carritosPorCodigo[normalizeCode(carritoCode)] || null;
        const carritoActivo = !!(info && info.activo);
        const entradaLabel = carritoActivo ? formatStationEntryDateTime(info && info.activadoEn) : '';
        const entradaHtml = carritoActivo && entradaLabel
          ? '<p class="station-entry-time">Entrada: ' + sanitize(entradaLabel) + '</p>'
          : '';
        const badgeText = carritoActivo ? 'Carrito activo' : 'Carrito inactivo';
        const modeText = useSimpleSales ? 'Modo: Venta simple' : 'Modo: Carrito completo';
        const badgeClass = carritoActivo ? 'station-status-active' : 'station-status-inactive';
        const stationClass = carritoActivo ? 'station-card-active' : 'station-card-inactive';
        const stationColor = carritoActivo ? state.colores.activo : state.colores.inactivo;

        // Estado del sensor asociado a la estación (negro = no conectado/inactivo, verde = sensor activo)
        const sensor = (state.sensorsByEstacion && state.sensorsByEstacion[stationID]) ? state.sensorsByEstacion[stationID] : null;
        let sensorColor = '#000000';
        if (sensor && sensor.device_id) {
          const lastStateNormalized = normalizeText(sensor.last_state || '');
          const activeStates = ['1', 'true', 'si', 'sí', 'on', 'active', 'open', 'abierto', 'encendido', 'activo'];
          const isActive = activeStates.indexOf(lastStateNormalized) !== -1;
          sensorColor = isActive ? '#00c853' : '#000000';
          if (sensor.last_seen) {
            try {
              const parsed = new Date((sensor.last_seen || '').replace(' ', 'T'));
              if (!isNaN(parsed.getTime()) && (Date.now() - parsed.getTime()) > 120000) {
                sensorColor = '#000000';
              }
            } catch (err) {
              // ignore parse errors
            }
          }
        }

        return '<article class="portal-card ' + stationClass + '" style="--station-state-bg:' + sanitize(stationColor) + ';" data-estacion-id="' + stationID + '" data-estacion-nombre="' + sanitize(est.nombre) + '" data-venta-simple="' + (useSimpleSales ? '1' : '0') + '" data-mostrar-total="' + (useMostrarTotal ? '1' : '0') + '" tabindex="0" role="button" aria-label="Abrir estación ' + sanitize(est.nombre) + '">' +
          '<div class="station-sensor-indicator" style="background-color:' + sanitize(sensorColor) + '"></div>' +
          '<h3>' + sanitize(est.nombre) + '</h3>' +
          '<p>Estación #' + stationID + '</p>' +
          '<p class="station-mode-label">' + modeText + '</p>' +
          entradaHtml +
          '<span class="station-status-badge ' + badgeClass + '">' + badgeText + '</span>' +
          '</article>';
      }).join('');

      grid.querySelectorAll('.portal-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', ev => {
          const stationID = Number(card.getAttribute('data-estacion-id') || 0);
          const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
          const useSimpleSales = card.getAttribute('data-venta-simple') === '1';
          openStationCarrito(stationID, stationName, useSimpleSales);
        });
        card.addEventListener('keydown', ev => {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          ev.preventDefault();
          const stationID = Number(card.getAttribute('data-estacion-id') || 0);
          const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
          const useSimpleSales = card.getAttribute('data-venta-simple') === '1';
          openStationCarrito(stationID, stationName, useSimpleSales);
        });
      });
    }

    async function bootstrap() {
      let cfg = null;
      try {
        cfg = await getConfigFromServer();
      } catch (err) {
        console.warn('Error cargando config desde servidor', err);
      }
      if (!cfg) {
        cfg = normalizeConfig({ cantidad: 1, estaciones: [] });
        try { await saveConfigToServer(cfg); } catch (err) { console.warn('No se pudo guardar config por defecto', err); }
      }
      applyCardSize(cfg);
      await Promise.all([
        loadColoresEstadoCarrito(),
        loadEstadoCarritosEstacion(),
        loadSensorStates()
      ]);
      renderEstaciones(cfg);
    }

    // Cargar estado de sensores desde el backend (dispositivos registrados para la empresa)
    async function loadSensorStates() {
      state.sensorsByEstacion = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/sensor_puertas?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const devices = await res.json();
        if (!Array.isArray(devices)) return;
        devices.forEach(d => {
          const estId = Number(d && (d.estacion_id || 0)) || 0;
          const current = state.sensorsByEstacion[estId];
          const candidate = {
            device_id: d.device_id,
            last_state: d.last_state,
            last_seen: d.last_seen
          };

          if (!current) {
            state.sensorsByEstacion[estId] = candidate;
            return;
          }

          const currentTime = Date.parse(String(current.last_seen || '').replace(' ', 'T')) || 0;
          const candidateTime = Date.parse(String(candidate.last_seen || '').replace(' ', 'T')) || 0;
          if (candidateTime >= currentTime) {
            state.sensorsByEstacion[estId] = candidate;
          }
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de sensores:', err);
      }
    }

    bootstrap();
  </script>
</body>
</html>
