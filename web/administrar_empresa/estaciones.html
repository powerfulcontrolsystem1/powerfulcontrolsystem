<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Estaciones</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header" style="display:flex;align-items:center;gap:12px;">
      </div>
      <p id="estacionesStatus" class="form-help empresa-loading-status">Cargando estaciones...</p>
      <div id="estacionesGrid" class="portal-grid"></div>
    </section>
  </div>

  <script>
    function parsePositiveInt(raw) {
      const n = Number(String(raw || '').trim());
      if (!Number.isFinite(n)) return 0;
      const v = Math.trunc(n);
      return v > 0 ? v : 0;
    }

    function resolveEmpresaId() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const own = parsePositiveInt(params.get('empresa_id') || params.get('id'));
        if (own > 0) return own;
      } catch (_) {}
      try {
        if (window.parent && window.parent !== window) {
          if (typeof window.parent.__resolveEmpresaIdContext === 'function') {
            const parentResolved = parsePositiveInt(window.parent.__resolveEmpresaIdContext());
            if (parentResolved > 0) return parentResolved;
          }
          const parentParams = new URLSearchParams(window.parent.location.search || '');
          const fromParent = parsePositiveInt(parentParams.get('empresa_id') || parentParams.get('id'));
          if (fromParent > 0) return fromParent;
        }
      } catch (_) {}
      try {
        const candidates = [
          sessionStorage.getItem('active_empresa_id'),
          sessionStorage.getItem('empresa_id'),
          localStorage.getItem('active_empresa_id'),
          localStorage.getItem('empresa_id')
        ];
        for (let i = 0; i < candidates.length; i++) {
          const parsed = parsePositiveInt(candidates[i]);
          if (parsed > 0) return parsed;
        }
      } catch (_) {}
      return 0;
    }

    const empresaId = resolveEmpresaId();
    let stationConfig = null;
    const statusEl = document.getElementById('estacionesStatus');
    const state = {
      colores: {
        activo: '#d9fbe8',
        inactivo: '#fff9ef'
      },
      carritosPorCodigo: {},
      sensorsByEstacion: {}
    };

    function sanitize(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(message) {
      if (statusEl) {
        const text = String(message || '').trim();
        statusEl.textContent = text;
        statusEl.hidden = text === '';
      }
      const grid = document.getElementById('estacionesGrid');
      if (grid) {
        grid.setAttribute('aria-busy', statusEl && !statusEl.hidden ? 'true' : 'false');
      }
    }

    // Server-backed config helpers (use empresa_estacion_prefs clave=estaciones_config, estacion_id=0)
    async function requestJSON(url, options) {
      const resp = await fetch(url, Object.assign({ credentials: 'same-origin' }, options || {}));
      const contentType = resp.headers.get('content-type') || '';
      let data = null;
      if (contentType.includes('application/json')) {
        data = await resp.json();
      } else {
        data = await resp.text();
      }
      if (!resp.ok) {
        const msg = typeof data === 'string' ? data : (data && data.error ? data.error : 'error de servidor');
        throw new Error(msg || ('HTTP ' + resp.status));
      }
      return data;
    }

    function normalizeConfig(cfg) {
      const cantidad = Math.max(1, Math.min(500, Number(cfg.cantidad || 1)));
      const estaciones = Array.isArray(cfg.estaciones) ? cfg.estaciones : [];
      const out = [];

      function defaultUnifiedCartConfig() {
        return {
          mostrar_boton_buscar_productos: true,
          mostrar_busqueda_catalogo: true,
          mostrar_codigo_manual_item: true,
          mostrar_observaciones_item: true,
          mostrar_lector_codigo_barras: true,
          mostrar_descuentos: true,
          mostrar_propina: true,
          mostrar_comision: true,
          permitir_pago_mixto: true,
          mostrar_resumen_productos: true
        };
      }

      function normalizeUnifiedCartConfig(raw) {
        const base = defaultUnifiedCartConfig();
        const src = raw && typeof raw === 'object' ? raw : {};
        return {
          mostrar_boton_buscar_productos: src.mostrar_boton_buscar_productos === undefined ? base.mostrar_boton_buscar_productos : toBool(src.mostrar_boton_buscar_productos),
          mostrar_busqueda_catalogo: src.mostrar_busqueda_catalogo === undefined ? base.mostrar_busqueda_catalogo : toBool(src.mostrar_busqueda_catalogo),
          mostrar_codigo_manual_item: src.mostrar_codigo_manual_item === undefined ? base.mostrar_codigo_manual_item : toBool(src.mostrar_codigo_manual_item),
          mostrar_observaciones_item: src.mostrar_observaciones_item === undefined ? base.mostrar_observaciones_item : toBool(src.mostrar_observaciones_item),
          mostrar_lector_codigo_barras: src.mostrar_lector_codigo_barras === undefined ? base.mostrar_lector_codigo_barras : toBool(src.mostrar_lector_codigo_barras),
          mostrar_descuentos: src.mostrar_descuentos === undefined ? base.mostrar_descuentos : toBool(src.mostrar_descuentos),
          mostrar_propina: src.mostrar_propina === undefined ? base.mostrar_propina : toBool(src.mostrar_propina),
          mostrar_comision: src.mostrar_comision === undefined ? base.mostrar_comision : toBool(src.mostrar_comision),
          permitir_pago_mixto: src.permitir_pago_mixto === undefined ? base.permitir_pago_mixto : toBool(src.permitir_pago_mixto),
          mostrar_resumen_productos: src.mostrar_resumen_productos === undefined ? base.mostrar_resumen_productos : toBool(src.mostrar_resumen_productos)
        };
      }

      function normalizeStationCarritoConfig(raw) {
        const src = raw && typeof raw === 'object' ? raw : {};
        const nested = src.configuracion && typeof src.configuracion === 'object' ? src.configuracion : src;
        return {
          usar_configuracion_global: src.usar_configuracion_global === undefined ? true : toBool(src.usar_configuracion_global),
          configuracion: normalizeUnifiedCartConfig(nested)
        };
      }

      for (let i = 0; i < cantidad; i++) {
        const current = estaciones[i] || {};
        const nombre = String(current.nombre || '').trim();
        out.push({
          id: i + 1,
          nombre: nombre || ('Estación ' + (i + 1)),
          mostrar_total: current.mostrar_total === undefined ? true : toBool(current.mostrar_total),
          carrito: normalizeStationCarritoConfig(current.carrito || current.carrito_ui)
        });
      }
      const validSizes = ['small', 'medium', 'large'];
      const requested = String(cfg.card_size || cfg.cardSize || '').trim().toLowerCase();
      const card_size = validSizes.indexOf(requested) !== -1 ? requested : (cfg.card_size || 'medium');
      const cajaEnabledRaw = (cfg && (cfg.caja_enabled !== undefined ? cfg.caja_enabled : cfg.cajaEnabled)) || false;
      const caja_enabled = toBool(cajaEnabledRaw);
      const youtubeEnabledRaw = (cfg && (cfg.youtube_enabled !== undefined ? cfg.youtube_enabled : cfg.youtubeEnabled)) || false;
      const youtube_enabled = toBool(youtubeEnabledRaw);
      let youtube_query = String((cfg && (cfg.youtube_query !== undefined ? cfg.youtube_query : cfg.youtubeQuery)) || 'YouTube').trim();
      if (!youtube_query) youtube_query = 'YouTube';
      return {
        cantidad,
        estaciones: out,
        card_size,
        caja_enabled,
        youtube_enabled,
        youtube_query,
        carrito_ui_global: normalizeUnifiedCartConfig(cfg && (cfg.carrito_ui_global || cfg.carrito || cfg.carrito_configuracion_global))
      };
    }

    function parseStationConfigValue(raw) {
      let current = raw;
      for (let i = 0; i < 3; i += 1) {
        if (typeof current !== 'string') break;
        const trimmed = current.trim();
        if (!trimmed) return null;
        try {
          current = JSON.parse(trimmed);
        } catch (_) {
          return null;
        }
      }
      if (!current || typeof current !== 'object') return null;
      return current;
    }

    async function getConfigFromServer() {
      if (!empresaId) return null;
      try {
        const data = await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId));
        const prefs = data && data.prefs ? data.prefs : [];
        if (!Array.isArray(prefs) || prefs.length === 0) return null;
        const pref = prefs.find(p => p && String(p.clave) === 'estaciones_config' && Number(p.estacion_id) === 0);
        if (!pref || !pref.valor) return null;
        const parsed = parseStationConfigValue(pref.valor);
        if (!parsed) return null;
        return normalizeConfig(parsed);
      } catch (err) {
        console.warn('getConfigFromServer error:', err);
        return null;
      }
    }

    async function saveConfigToServer(cfg) {
      if (!empresaId) throw new Error('empresa_id missing');
      const existing = await getConfigFromServer().catch(() => null);
      const normalized = normalizeConfig(cfg || {});
      if ((cfg == null || !('card_size' in cfg)) && existing && existing.card_size) {
        normalized.card_size = existing.card_size;
      }
      normalized.card_size = normalized.card_size || 'medium';
      const payload = { estacion_id: 0, clave: 'estaciones_config', valor: JSON.stringify(normalized) };
      const res = await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return res;
    }

    function applyCardSize(cfg) {
      try {
        const grid = document.getElementById('estacionesGrid');
        if (!grid) return;
        grid.classList.remove('station-size-small', 'station-size-medium', 'station-size-large');
        const size = (cfg && cfg.card_size) || 'medium';
        grid.classList.add('station-size-' + size);
      } catch (err) {
        console.warn('applyCardSize error', err);
      }
    }

    function normalizeText(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function normalizeCode(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function toBool(v) {
      if (typeof v === 'boolean') return v;
      if (typeof v === 'number') return v === 1;
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      return raw === '1' || raw === 'true' || raw === 'si' || raw === 'sí';
    }

    function normalizeColor(v, fallback) {
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      const base = String(fallback == null ? '' : fallback).trim().toLowerCase();
      const hex = raw || base;
      if (!hex || hex.length !== 7 || hex.charAt(0) !== '#') {
        return base || '#fff9ef';
      }
      for (let i = 1; i < hex.length; i++) {
        const c = hex.charCodeAt(i);
        const isDigit = c >= 48 && c <= 57;
        const isHex = c >= 97 && c <= 102;
        if (!isDigit && !isHex) {
          return base || '#fff9ef';
        }
      }
      return hex;
    }

    function formatStationEntryDateTime(rawValue) {
      const raw = String(rawValue == null ? '' : rawValue).trim();
      if (!raw) return '';

      const isoLike = raw.includes('T') ? raw : raw.replace(' ', 'T');
      const parsed = new Date(isoLike);
      if (Number.isNaN(parsed.getTime())) {
        return raw;
      }

      return parsed.toLocaleString('es-CO', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getCarritoCodeForStation(stationID) {
      return 'EST-' + empresaId + '-' + stationID;
    }

    function openStationCarrito(stationID, stationName) {
      if (!empresaId || stationID == null) return;
      const carritoCode = getCarritoCodeForStation(stationID);
      const url = '/administrar_empresa/carrito_de_compras.html?empresa_id=' + encodeURIComponent(empresaId) +
        '&estacion_id=' + encodeURIComponent(stationID) +
        '&estacion_nombre=' + encodeURIComponent(stationName || ('Estación ' + stationID)) +
          '&carrito_codigo=' + encodeURIComponent(carritoCode);
      window.location.href = url;
    }

    function isCarritoOperativoActivo(carrito) {
      if (!carrito) return false;
      const estado = normalizeText(carrito.estado) || 'activo';
      const estadoCarrito = normalizeText(carrito.estado_carrito) || 'abierto';
      return estado === 'activo' && estadoCarrito !== 'cerrado';
    }

    async function loadColoresEstadoCarrito() {
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/configuracion_avanzada?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const cfg = await res.json();
        state.colores.activo = normalizeColor(cfg && cfg.color_carrito_activo, '#d9fbe8');
        state.colores.inactivo = normalizeColor(cfg && cfg.color_carrito_inactivo, '#fff9ef');
        // Leer configuración de formato monetario (usar_decimales, cantidad_decimales)
        try {
          var usar = true;
          var cantidad = 2;
          if (cfg && typeof cfg.usar_decimales !== 'undefined') usar = !!cfg.usar_decimales;
          if (cfg && typeof cfg.cantidad_decimales !== 'undefined') cantidad = Number(cfg.cantidad_decimales) || 0;
          state.formato = { usarDecimales: usar, cantidadDecimales: Math.max(0, Math.trunc(cantidad)) };
        } catch (e) {
          state.formato = { usarDecimales: true, cantidadDecimales: 2 };
        }
      } catch (err) {
        console.warn('No se pudieron cargar colores de estado de carrito:', err);
      }
    }

    async function loadEstadoCarritosEstacion() {
      state.carritosPorCodigo = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&include_inactive=1', { credentials: 'same-origin' });
        if (!res.ok) return;
        const carritos = await res.json();
        if (!Array.isArray(carritos)) return;

        carritos.forEach(item => {
          const code = normalizeCode(item && item.codigo);
          if (!code) return;
          state.carritosPorCodigo[code] = {
            activo: isCarritoOperativoActivo(item),
            activadoEn: String((item && item.activado_en) || '')
          };
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de carritos por estación:', err);
      }
    }

    // readConfig replaced by server-backed getConfigFromServer

    function formatMoney(v) {
      try {
        const n = Number(v || 0);
        var digits = 2;
        if (state && state.formato) {
          if (state.formato.usarDecimales === false) digits = 0;
          else if (typeof state.formato.cantidadDecimales === 'number') digits = Math.max(0, Math.trunc(state.formato.cantidadDecimales));
        }
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n);
      } catch (e) {
        if (state && state.formato && state.formato.usarDecimales === false) {
          return 'COP ' + String(Math.round(Number(v || 0)));
        }
        return 'COP ' + (Number(v || 0).toFixed(2));
      }
    }

    function getYouTubeStationQuery(cfg) {
      if (!cfg || typeof cfg !== 'object') return 'YouTube';
      const raw = String(cfg.youtube_query || '').trim();
      return raw || 'YouTube';
    }

    function buildYouTubeStationBrowserURL(cfg, compact) {
      const params = new URLSearchParams();
      params.set('query', getYouTubeStationQuery(cfg));
      if (compact) {
        params.set('compact', '1');
      }
      return '/administrar_empresa/youtube_station_browser.html?' + params.toString();
    }

    function generateCajaCardHtml() {
      return '<article class="portal-card station-card-inactive caja-card" id="cajaCard" data-estacion-id="0" data-estacion-nombre="Caja" data-venta-simple="1" tabindex="0" role="button" aria-label="Caja">' +
        '<div class="station-sensor-indicator" style="background-color:#000000"></div>' +
        '<h3 class="caja-title">Caja</h3>' +
        '<div class="caja-totals">' +
          '<div class="caja-row"><span class="caja-label">Efectivo</span><span class="caja-value" id="cajaEfectivoVal">' + formatMoney(0) + '</span></div>' +
          '<div class="caja-row"><span class="caja-label">Débito</span><span class="caja-value" id="cajaDebitoVal">' + formatMoney(0) + '</span></div>' +
          '<div class="caja-row"><span class="caja-label">Crédito</span><span class="caja-value" id="cajaCreditoVal">' + formatMoney(0) + '</span></div>' +
        '</div>' +
        '<div class="caja-actions"><button type="button" class="btn secondary ver-ultimos-movimientos">Ver últimos movimientos</button></div>' +
      '</article>';
    }

    function generateYouTubeCardHtml(cfg) {
      const browserSrc = sanitize(buildYouTubeStationBrowserURL(cfg, true));
      return '<article class="portal-card station-card-inactive youtube-station-card" id="youtubeStationCard" data-special-station="youtube" aria-label="Estación YouTube">' +
        '<button type="button" class="youtube-station-play" id="youtubeStationPlay" aria-label="Reproducir estación YouTube">▶</button>' +
        '<button type="button" class="youtube-station-expand" id="youtubeStationExpand" aria-label="Maximizar estación YouTube">[]</button>' +
        '<div class="youtube-station-head">' +
          '<h3>YouTube</h3>' +
          '<p>Vista embebida adaptable para esta estación.</p>' +
        '</div>' +
        '<div class="youtube-station-browser-preview">' +
          '<iframe class="youtube-station-preview-frame" src="' + browserSrc + '" title="Vista previa YouTube" loading="lazy" tabindex="-1" allow="autoplay; encrypted-media; fullscreen"></iframe>' +
        '</div>' +
      '</article>';
    }

    async function loadCajaTotals(cfg) {
      if (!empresaId) return;
      try {
        // Asegurar que tenemos la configuración de formato monetario antes de formatear
        if (!state.formato) {
          try {
            const cfgResp = await fetch('/api/empresa/configuracion_avanzada?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
            if (cfgResp && cfgResp.ok) {
              const cfgData = await cfgResp.json();
              var usar = true;
              var cantidad = 2;
              if (cfgData && typeof cfgData.usar_decimales !== 'undefined') usar = !!cfgData.usar_decimales;
              if (cfgData && typeof cfgData.cantidad_decimales !== 'undefined') cantidad = Number(cfgData.cantidad_decimales) || 0;
              state.formato = { usarDecimales: usar, cantidadDecimales: Math.max(0, Math.trunc(cantidad)) };
            }
          } catch (e) {
            // ignore and fall back to defaults in formatMoney
          }
        }
        const params = new URLSearchParams();
        params.set('empresa_id', String(empresaId));
        params.set('action', 'totales_pago');
        params.set('days', '7');
        if (cfg && cfg.estacion_id) params.set('estacion_id', String(cfg.estacion_id));
        const res = await fetch('/api/empresa/carritos_compra?' + params.toString(), { credentials: 'same-origin' });
        if (!res.ok) return;
        const payload = await res.json();
        const totals = payload && payload.totales ? payload.totales : {};
        const ef = Number(totals.efectivo || 0);
        const td = Number(totals.tarjeta_debito || 0);
        const tc = Number(totals.tarjeta_credito || 0);
        const elEf = document.getElementById('cajaEfectivoVal');
        const elTd = document.getElementById('cajaDebitoVal');
        const elTc = document.getElementById('cajaCreditoVal');
        if (elEf) elEf.textContent = formatMoney(ef);
        if (elTd) elTd.textContent = formatMoney(td);
        if (elTc) elTc.textContent = formatMoney(tc);
      } catch (err) {
        console.warn('No se pudieron cargar totales de Caja', err);
      }
    }

    function renderEstaciones(cfg) {
      const grid = document.getElementById('estacionesGrid');
      if (!cfg || !cfg.estaciones || !cfg.estaciones.length) {
        if (!(cfg && cfg.youtube_enabled) && !(cfg && cfg.caja_enabled)) {
          grid.innerHTML = '<p class="form-help">No hay estaciones configuradas. Ve a Configuración de estaciones para crearlas.</p>';
          return;
        }
      }
      let html = '';
      if (cfg && cfg.caja_enabled) {
        html += generateCajaCardHtml();
      }
      if (cfg && cfg.youtube_enabled) {
        html += generateYouTubeCardHtml(cfg);
      }
      if (!cfg || !cfg.estaciones || !cfg.estaciones.length) {
        grid.innerHTML = html;
        wireSpecialStationCards(cfg);
        return;
      }
      html += cfg.estaciones.map(est => {
        const stationID = Number(est.id || 0);
        const useMostrarTotal = est.mostrar_total === undefined ? true : !!est.mostrar_total;
        const carritoCode = getCarritoCodeForStation(stationID);
        const info = state.carritosPorCodigo[normalizeCode(carritoCode)] || null;
        const carritoActivo = !!(info && info.activo);
        const entradaLabel = carritoActivo ? formatStationEntryDateTime(info && info.activadoEn) : '';
        const entradaHtml = carritoActivo && entradaLabel
          ? '<p class="station-entry-time">Entrada: ' + sanitize(entradaLabel) + '</p>'
          : '';
        const stationClass = carritoActivo ? 'station-card-active' : 'station-card-inactive';
        const stationColor = carritoActivo ? state.colores.activo : state.colores.inactivo;

        // Estado del sensor asociado a la estación (negro = no conectado/inactivo, verde = sensor activo)
        const sensor = (state.sensorsByEstacion && state.sensorsByEstacion[stationID]) ? state.sensorsByEstacion[stationID] : null;
        let sensorColor = '#000000';
        if (sensor && sensor.device_id) {
          const lastStateNormalized = normalizeText(sensor.last_state || '');
          const activeStates = ['1', 'true', 'si', 'sí', 'on', 'active', 'open', 'abierto', 'encendido', 'activo'];
          const isActive = activeStates.indexOf(lastStateNormalized) !== -1;
          sensorColor = isActive ? '#00c853' : '#000000';
          if (sensor.last_seen) {
            try {
              const parsed = new Date((sensor.last_seen || '').replace(' ', 'T'));
              if (!isNaN(parsed.getTime()) && (Date.now() - parsed.getTime()) > 120000) {
                sensorColor = '#000000';
              }
            } catch (err) {
              // ignore parse errors
            }
          }
        }

          return '<article class="portal-card station-launch-card ' + stationClass + '" style="--station-state-bg:' + sanitize(stationColor) + ';" data-estacion-id="' + stationID + '" data-estacion-nombre="' + sanitize(est.nombre) + '" data-mostrar-total="' + (useMostrarTotal ? '1' : '0') + '" tabindex="0" role="button" aria-label="Abrir estación ' + sanitize(est.nombre) + '">' +
            '<div class="station-sensor-indicator" style="background-color:' + sanitize(sensorColor) + '"></div>' +
            '<h3>' + sanitize(est.nombre) + '</h3>' +
            entradaHtml +
            '</article>';
      }).join('');
      grid.innerHTML = html;

      grid.querySelectorAll('.station-launch-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', ev => {
          const stationID = Number(card.getAttribute('data-estacion-id') || 0);
          const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
          openStationCarrito(stationID, stationName);
        });
        card.addEventListener('keydown', ev => {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          ev.preventDefault();
          const stationID = Number(card.getAttribute('data-estacion-id') || 0);
          const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
          openStationCarrito(stationID, stationName);
        });
      });

      wireSpecialStationCards(cfg);

      // Si Caja está habilitada, adjuntar manejadores y cargar totales
      if (cfg && cfg.caja_enabled) {
        const cajaEl = document.getElementById('cajaCard');
        if (cajaEl) {
          cajaEl.classList.add('station-launch-card');
          cajaEl.style.cursor = 'pointer';
          cajaEl.addEventListener('click', () => { openStationCarrito(0, 'Caja', true); });
          cajaEl.addEventListener('keydown', ev => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); openStationCarrito(0, 'Caja', true); } });
          try {
            const movBtn = cajaEl.querySelector('.ver-ultimos-movimientos');
            if (movBtn) {
              movBtn.addEventListener('click', ev => {
                ev.stopPropagation();
                ev.preventDefault();
                const target = '/administrar_empresa/ultimos_movimientos_de_caja.html?empresa_id=' + encodeURIComponent(empresaId);
                window.location.href = target;
              });
              movBtn.addEventListener('keydown', ev => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                  ev.stopPropagation();
                  ev.preventDefault();
                  const target = '/administrar_empresa/ultimos_movimientos_de_caja.html?empresa_id=' + encodeURIComponent(empresaId);
                  window.location.href = target;
                }
              });
            }
          } catch (e) {
          }
        }
        loadCajaTotals(cfg).catch(() => {});
      }
    }

    function wireSpecialStationCards(cfg) {
      const expandBtn = document.getElementById('youtubeStationExpand');
      if (expandBtn) {
        expandBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          openYouTubeStationOverlay(cfg);
        });
      }

      const playBtn = document.getElementById('youtubeStationPlay');
      if (playBtn) {
        playBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          const youtubeCard = document.getElementById('youtubeStationCard');
          const iframe = youtubeCard ? youtubeCard.querySelector('iframe.youtube-station-preview-frame') : null;
          try {
            if (iframe && iframe.contentWindow && typeof iframe.contentWindow.__ytPlayWithSound === 'function') {
              iframe.contentWindow.__ytPlayWithSound();
              return;
            }
          } catch (e) {
            // fallback to opening overlay
          }
          openYouTubeStationOverlay(cfg);
        });
      }

      const youtubeCard = document.getElementById('youtubeStationCard');
      if (youtubeCard) {
        youtubeCard.addEventListener('keydown', ev => {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          ev.preventDefault();
          openYouTubeStationOverlay(cfg);
        });
      }
    }

    function ensureYouTubeStationOverlay() {
      let overlay = document.getElementById('youtubeStationOverlay');
      if (overlay) return overlay;

      overlay = document.createElement('div');
      overlay.id = 'youtubeStationOverlay';
      overlay.className = 'youtube-station-overlay';
      overlay.hidden = true;
      overlay.innerHTML = '' +
        '<div class="youtube-station-overlay-card" role="dialog" aria-modal="true" aria-labelledby="youtubeStationOverlayTitle">' +
          '<div class="youtube-station-overlay-head">' +
            '<div>' +
              '<strong id="youtubeStationOverlayTitle">Estación YouTube</strong>' +
              '<span>Vista ampliada con búsqueda y reproducción</span>' +
            '</div>' +
            '<div class="youtube-station-overlay-actions">' +
              '<button type="button" class="youtube-station-overlay-minimize btn secondary">Minimizar</button>' +
              '<button type="button" class="youtube-station-overlay-close btn secondary">Cerrar</button>' +
            '</div>' +
          '</div>' +
          '<iframe class="youtube-station-overlay-frame" title="Estación YouTube ampliada" loading="lazy" allow="autoplay; encrypted-media; fullscreen"></iframe>' +
        '</div>';
      document.body.appendChild(overlay);

      overlay.addEventListener('click', ev => {
        if (ev.target === overlay) {
          closeYouTubeStationOverlay();
        }
      });

      const closeBtn = overlay.querySelector('.youtube-station-overlay-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', ev => {
          ev.preventDefault();
          closeYouTubeStationOverlay();
        });
      }

      const minimizeBtn = overlay.querySelector('.youtube-station-overlay-minimize');
      if (minimizeBtn) {
        minimizeBtn.addEventListener('click', ev => {
          ev.preventDefault();
          closeYouTubeStationOverlay();
        });
      }

      document.addEventListener('keydown', ev => {
        if (ev.key === 'Escape') {
          closeYouTubeStationOverlay();
        }
      });

      return overlay;
    }

    function openYouTubeStationOverlay(cfg) {
      const overlay = ensureYouTubeStationOverlay();
      const frame = overlay.querySelector('.youtube-station-overlay-frame');
      if (frame) {
        frame.src = buildYouTubeStationBrowserURL(cfg, false);
      }
      overlay.hidden = false;
    }

    function closeYouTubeStationOverlay() {
      const overlay = document.getElementById('youtubeStationOverlay');
      if (!overlay) return;
      overlay.hidden = true;
      const frame = overlay.querySelector('.youtube-station-overlay-frame');
      if (frame) {
        frame.src = 'about:blank';
      }
    }

    async function bootstrap() {
      setStatus('Cargando estaciones...');
      try {
        let cfg = null;
        try {
          cfg = await getConfigFromServer();
        } catch (err) {
          console.warn('Error cargando config desde servidor', err);
        }
        if (!cfg) {
          cfg = normalizeConfig({ cantidad: 1, estaciones: [] });
          try { await saveConfigToServer(cfg); } catch (err) { console.warn('No se pudo guardar config por defecto', err); }
        }
        stationConfig = cfg;
        applyCardSize(stationConfig);
        await Promise.all([
          loadColoresEstadoCarrito(),
          loadEstadoCarritosEstacion(),
          loadSensorStates()
        ]);
        renderEstaciones(stationConfig);
        setStatus('');
      } catch (err) {
        console.error('Error cargando estaciones', err);
        const grid = document.getElementById('estacionesGrid');
        if (grid) {
          grid.innerHTML = '<p class="form-help">No se pudieron cargar las estaciones.</p>';
        }
        setStatus('Error cargando estaciones.');
      }

      
    }

    // Cargar estado de sensores desde el backend (dispositivos registrados para la empresa)
    async function loadSensorStates() {
      state.sensorsByEstacion = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/sensor_puertas?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const devices = await res.json();
        if (!Array.isArray(devices)) return;
        devices.forEach(d => {
          const estId = Number(d && (d.estacion_id || 0)) || 0;
          const current = state.sensorsByEstacion[estId];
          const candidate = {
            device_id: d.device_id,
            last_state: d.last_state,
            last_seen: d.last_seen
          };

          if (!current) {
            state.sensorsByEstacion[estId] = candidate;
            return;
          }

          const currentTime = Date.parse(String(current.last_seen || '').replace(' ', 'T')) || 0;
          const candidateTime = Date.parse(String(candidate.last_seen || '').replace(' ', 'T')) || 0;
          if (candidateTime >= currentTime) {
            state.sensorsByEstacion[estId] = candidate;
          }
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de sensores:', err);
      }
    }

    bootstrap();
  </script>
