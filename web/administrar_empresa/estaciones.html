<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Estaciones</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header estaciones-toolbar" style="display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap;">
        <button type="button" id="btnEstacionesThumbToggle" class="btn secondary estaciones-thumb-toggle" aria-pressed="false">Ver miniaturas</button>
      </div>
      <p id="estacionesStatus" class="form-help empresa-loading-status">Cargando estaciones...</p>
      <div id="estacionesGrid" class="portal-grid"></div>
    </section>
  </div>

  <script>
    const notesAlertState = {
      blinkId: null,
      audioContext: null,
      audioUnlocked: false,
      blinking: false
    };
    const notesRuntimeState = {
      tickId: null,
      notes: [],
      selectedNoteId: '',
      restored: false
    };

    function parsePositiveInt(raw) {
      const n = Number(String(raw || '').trim());
      if (!Number.isFinite(n)) return 0;
      const v = Math.trunc(n);
      return v > 0 ? v : 0;
    }

    function resolveEmpresaId() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const own = parsePositiveInt(params.get('empresa_id') || params.get('id'));
        if (own > 0) return own;
      } catch (_) {}
      try {
        if (window.parent && window.parent !== window) {
          if (typeof window.parent.__resolveEmpresaIdContext === 'function') {
            const parentResolved = parsePositiveInt(window.parent.__resolveEmpresaIdContext());
            if (parentResolved > 0) return parentResolved;
          }
          const parentParams = new URLSearchParams(window.parent.location.search || '');
          const fromParent = parsePositiveInt(parentParams.get('empresa_id') || parentParams.get('id'));
          if (fromParent > 0) return fromParent;
        }
      } catch (_) {}
      try {
        const candidates = [
          sessionStorage.getItem('active_empresa_id'),
          sessionStorage.getItem('empresa_id'),
          localStorage.getItem('active_empresa_id'),
          localStorage.getItem('empresa_id')
        ];
        for (let i = 0; i < candidates.length; i++) {
          const parsed = parsePositiveInt(candidates[i]);
          if (parsed > 0) return parsed;
        }
      } catch (_) {}
      return 0;
    }

    const empresaId = resolveEmpresaId();
    let stationConfig = null;
    const statusEl = document.getElementById('estacionesStatus');
    const state = {
      colores: {
        activo: '#d9fbe8',
        inactivo: '#fff9ef',
        disponible: '#fff9ef',
        ocupada: '#d9fbe8',
        sucia: '#ffe0e0',
        alertaTiempo: '#fff3cd'
      },
      carritosPorCodigo: {},
      sensorsByEstacion: {},
      stationCardUI: {
        mostrar_cliente_nombre: true,
        mostrar_tarifa_resumen: true,
        mostrar_hora_extra: true,
        alerta_10_min: true,
        marcar_sucia_al_pagar: true,
        abrir_carrito_al_activar: true
      },
      dirtyByEstacion: {}
    };

    function sanitize(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(message) {
      if (statusEl) {
        const text = String(message || '').trim();
        statusEl.textContent = text;
        statusEl.hidden = text === '';
      }
      const grid = document.getElementById('estacionesGrid');
      if (grid) {
        grid.setAttribute('aria-busy', statusEl && !statusEl.hidden ? 'true' : 'false');
      }
    }

    // Server-backed config helpers (use empresa_estacion_prefs clave=estaciones_config, estacion_id=0)
    async function requestJSON(url, options) {
      const resp = await fetch(url, Object.assign({ credentials: 'same-origin' }, options || {}));
      const contentType = resp.headers.get('content-type') || '';
      let data = null;
      if (contentType.includes('application/json')) {
        data = await resp.json();
      } else {
        data = await resp.text();
      }
      if (!resp.ok) {
        const msg = typeof data === 'string' ? data : (data && data.error ? data.error : 'error de servidor');
        throw new Error(msg || ('HTTP ' + resp.status));
      }
      return data;
    }

    function normalizeConfig(cfg) {
      const cantidad = Math.max(1, Math.min(500, Number(cfg.cantidad || 1)));
      const estaciones = Array.isArray(cfg.estaciones) ? cfg.estaciones : [];
      const out = [];

      function defaultUnifiedCartConfig() {
        return {
          mostrar_boton_buscar_productos: true,
          mostrar_busqueda_catalogo: true,
          mostrar_codigo_manual_item: true,
          mostrar_observaciones_item: true,
          mostrar_lector_codigo_barras: true,
          mostrar_descuentos: true,
          mostrar_propina: true,
          mostrar_comision: true,
          permitir_pago_mixto: true,
          mostrar_resumen_productos: true
        };
      }

      function normalizeUnifiedCartConfig(raw) {
        const base = defaultUnifiedCartConfig();
        const src = raw && typeof raw === 'object' ? raw : {};
        return {
          mostrar_boton_buscar_productos: src.mostrar_boton_buscar_productos === undefined ? base.mostrar_boton_buscar_productos : toBool(src.mostrar_boton_buscar_productos),
          mostrar_busqueda_catalogo: src.mostrar_busqueda_catalogo === undefined ? base.mostrar_busqueda_catalogo : toBool(src.mostrar_busqueda_catalogo),
          mostrar_codigo_manual_item: src.mostrar_codigo_manual_item === undefined ? base.mostrar_codigo_manual_item : toBool(src.mostrar_codigo_manual_item),
          mostrar_observaciones_item: src.mostrar_observaciones_item === undefined ? base.mostrar_observaciones_item : toBool(src.mostrar_observaciones_item),
          mostrar_lector_codigo_barras: src.mostrar_lector_codigo_barras === undefined ? base.mostrar_lector_codigo_barras : toBool(src.mostrar_lector_codigo_barras),
          mostrar_descuentos: src.mostrar_descuentos === undefined ? base.mostrar_descuentos : toBool(src.mostrar_descuentos),
          mostrar_propina: src.mostrar_propina === undefined ? base.mostrar_propina : toBool(src.mostrar_propina),
          mostrar_comision: src.mostrar_comision === undefined ? base.mostrar_comision : toBool(src.mostrar_comision),
          permitir_pago_mixto: src.permitir_pago_mixto === undefined ? base.permitir_pago_mixto : toBool(src.permitir_pago_mixto),
          mostrar_resumen_productos: src.mostrar_resumen_productos === undefined ? base.mostrar_resumen_productos : toBool(src.mostrar_resumen_productos)
        };
      }

      function normalizeStationCarritoConfig(raw) {
        const src = raw && typeof raw === 'object' ? raw : {};
        const nested = src.configuracion && typeof src.configuracion === 'object' ? src.configuracion : src;
        return {
          usar_configuracion_global: src.usar_configuracion_global === undefined ? true : toBool(src.usar_configuracion_global),
          configuracion: normalizeUnifiedCartConfig(nested)
        };
      }

      for (let i = 0; i < cantidad; i++) {
        const current = estaciones[i] || {};
        const nombre = String(current.nombre || '').trim();
        out.push({
          id: i + 1,
          nombre: nombre || ('Estación ' + (i + 1)),
          mostrar_fecha_hora_inicio: current.mostrar_fecha_hora_inicio === undefined ? true : toBool(current.mostrar_fecha_hora_inicio),
          mostrar_fecha_hora_fin_tarifa: current.mostrar_fecha_hora_fin_tarifa === undefined ? true : toBool(current.mostrar_fecha_hora_fin_tarifa),
          mostrar_total: current.mostrar_total === undefined ? true : toBool(current.mostrar_total),
          carrito: normalizeStationCarritoConfig(current.carrito || current.carrito_ui)
        });
      }
      const validSizes = ['small', 'medium', 'large'];
      const requested = String(cfg.card_size || cfg.cardSize || '').trim().toLowerCase();
      const card_size = validSizes.indexOf(requested) !== -1 ? requested : (cfg.card_size || 'medium');
      const cajaEnabledRaw = (cfg && (cfg.caja_enabled !== undefined ? cfg.caja_enabled : cfg.cajaEnabled)) || false;
      const caja_enabled = toBool(cajaEnabledRaw);
      const youtubeEnabledRaw = (cfg && (cfg.youtube_enabled !== undefined ? cfg.youtube_enabled : cfg.youtubeEnabled)) || false;
      const youtube_enabled = toBool(youtubeEnabledRaw);
      let youtube_query = String((cfg && (cfg.youtube_query !== undefined ? cfg.youtube_query : cfg.youtubeQuery)) || 'YouTube').trim();
      if (!youtube_query) youtube_query = 'YouTube';
      const notasEnabledRaw = (cfg && (cfg.notas_enabled !== undefined ? cfg.notas_enabled : cfg.notasEnabled)) || false;
      const notas_enabled = toBool(notasEnabledRaw);
      const caja_placement = normalizeSpecialPlacement(cfg && (cfg.caja_placement !== undefined ? cfg.caja_placement : cfg.cajaPlacement));
      const youtube_placement = normalizeSpecialPlacement(cfg && (cfg.youtube_placement !== undefined ? cfg.youtube_placement : cfg.youtubePlacement));
      const notas_placement = normalizeSpecialPlacement(cfg && (cfg.notas_placement !== undefined ? cfg.notas_placement : cfg.notasPlacement));
      const notas_text = String((cfg && (cfg.notas_text !== undefined ? cfg.notas_text : cfg.notasText)) || '').trim();
      const notas_default_minutes = normalizeNotesDefaultMinutes(cfg && (cfg.notas_default_minutes !== undefined ? cfg.notas_default_minutes : cfg.notasDefaultMinutes));
      const notas_repeat_minutes = normalizeNotesRepeatMinutes(cfg && (cfg.notas_repeat_minutes !== undefined ? cfg.notas_repeat_minutes : cfg.notasRepeatMinutes));
      const notas_beep_enabled = cfg && (cfg.notas_beep_enabled !== undefined ? cfg.notas_beep_enabled : cfg.notasBeepEnabled);
      const notas_blink_enabled = cfg && (cfg.notas_blink_enabled !== undefined ? cfg.notas_blink_enabled : cfg.notasBlinkEnabled);
      const iaPedidosEnabledRaw = (cfg && (cfg.ia_pedidos_enabled !== undefined ? cfg.ia_pedidos_enabled : cfg.iaPedidosEnabled)) || false;
      const ia_pedidos_enabled = toBool(iaPedidosEnabledRaw);
      const ia_pedidos_placement = normalizeSpecialPlacement(cfg && (cfg.ia_pedidos_placement !== undefined ? cfg.ia_pedidos_placement : cfg.iaPedidosPlacement));
      return {
        cantidad,
        estaciones: out,
        card_size,
        caja_enabled,
        caja_placement,
        youtube_enabled,
        youtube_placement,
        youtube_query,
        notas_enabled,
        notas_placement,
        notas_text,
        notas_default_minutes,
        notas_repeat_minutes,
        notas_beep_enabled: notas_beep_enabled === undefined ? true : toBool(notas_beep_enabled),
        notas_blink_enabled: notas_blink_enabled === undefined ? true : toBool(notas_blink_enabled),
        ia_pedidos_enabled,
        ia_pedidos_placement,
        carrito_ui_global: normalizeUnifiedCartConfig(cfg && (cfg.carrito_ui_global || cfg.carrito || cfg.carrito_configuracion_global)),
        station_card_ui: cfg && cfg.station_card_ui && typeof cfg.station_card_ui === 'object' ? cfg.station_card_ui : {}
      };
    }

    function normalizeSpecialPlacement(raw) {
      const value = String(raw == null ? '' : raw).trim().toLowerCase();
      return value === 'after' ? 'after' : 'before';
    }

    function normalizeNotesDefaultMinutes(raw) {
      let value = Number(String(raw == null ? '' : raw).trim());
      if (!Number.isFinite(value)) return 5;
      value = Math.trunc(value);
      if (value < 1) return 1;
      if (value > 1440) return 1440;
      return value;
    }

    function normalizeNotesRepeatMinutes(raw) {
      let value = Number(String(raw == null ? '' : raw).trim());
      if (!Number.isFinite(value)) return 0;
      value = Math.trunc(value);
      if (value < 0) return 0;
      if (value > 1440) return 1440;
      return value;
    }

    function notesRuntimeStorageKey() {
      return 'pcs_estaciones_notas_runtime_' + String(empresaId || 0);
    }

    function createRuntimeNote(cfg, seed) {
      const src = seed && typeof seed === 'object' ? seed : {};
      const id = String(src.id || ('note-' + Date.now() + '-' + Math.floor(Math.random() * 100000)));
      return {
        id,
        text: String(src.text == null ? '' : src.text).trim(),
        duration_minutes: normalizeNotesDefaultMinutes(src.duration_minutes == null ? (cfg && cfg.notas_default_minutes) : src.duration_minutes),
        repeat_minutes: normalizeNotesRepeatMinutes(src.repeat_minutes == null ? (cfg && cfg.notas_repeat_minutes) : src.repeat_minutes),
        status: String(src.status || 'idle').trim().toLowerCase() === 'running' ? 'running' : (String(src.status || 'idle').trim().toLowerCase() === 'expired' ? 'expired' : 'idle'),
        target_time_ms: src.target_time_ms ? Number(src.target_time_ms) : 0,
        alert_active: !!src.alert_active,
        last_alert_at: src.last_alert_at ? Number(src.last_alert_at) : 0
      };
    }

    function saveNotesRuntimeState() {
      if (!empresaId) return;
      try {
        window.localStorage.setItem(notesRuntimeStorageKey(), JSON.stringify({
          notes: notesRuntimeState.notes,
          selected_note_id: notesRuntimeState.selectedNoteId
        }));
      } catch (err) {
        console.warn('No se pudo persistir runtime de notas', err);
      }
    }

    function loadNotesRuntimeState(cfg) {
      if (notesRuntimeState.restored) return;
      notesRuntimeState.restored = true;
      let parsed = null;
      try {
        const raw = window.localStorage.getItem(notesRuntimeStorageKey());
        parsed = raw ? JSON.parse(raw) : null;
      } catch (err) {
        parsed = null;
      }
      const list = parsed && Array.isArray(parsed.notes) ? parsed.notes : [];
      notesRuntimeState.notes = list.map(note => createRuntimeNote(cfg, note));
      if (!notesRuntimeState.notes.length) {
        notesRuntimeState.notes = [createRuntimeNote(cfg, {
          text: cfg && cfg.notas_text ? cfg.notas_text : '',
          duration_minutes: cfg && cfg.notas_default_minutes,
          repeat_minutes: cfg && cfg.notas_repeat_minutes
        })];
      }
      notesRuntimeState.selectedNoteId = String((parsed && parsed.selected_note_id) || notesRuntimeState.notes[0].id || '');
      saveNotesRuntimeState();
    }

    function getSelectedRuntimeNote() {
      if (!notesRuntimeState.notes.length) return null;
      let found = notesRuntimeState.notes.find(note => note.id === notesRuntimeState.selectedNoteId) || null;
      if (!found) {
        found = notesRuntimeState.notes[0];
        notesRuntimeState.selectedNoteId = found ? found.id : '';
      }
      return found;
    }

    function anyNotesAlertActive() {
      return notesRuntimeState.notes.some(note => !!note.alert_active);
    }

    function stopNotesTick() {
      if (notesRuntimeState.tickId) {
        window.clearInterval(notesRuntimeState.tickId);
        notesRuntimeState.tickId = null;
      }
    }

    function clearNoteAlert(note) {
      if (!note) return;
      note.alert_active = false;
      note.last_alert_at = 0;
    }

    function updateNotesCardAlertVisual(cfg) {
      const card = document.getElementById('notasStationCard');
      if (!card) return;
      const active = anyNotesAlertActive();
      card.classList.toggle('notas-station-expired', active);
      if (active && cfg && cfg.notas_blink_enabled) {
        startNotasBlink();
      } else {
        stopNotasBlink();
      }
    }

    function renderNotesCardState(cfg) {
      loadNotesRuntimeState(cfg || stationConfig || {});
      const listEl = document.getElementById('notasStationList');
      const textEl = document.getElementById('notasStationTextarea');
      const minutesEl = document.getElementById('notasStationMinutesInput');
      const repeatEl = document.getElementById('notasStationRepeatInput');
      const selected = getSelectedRuntimeNote();
      if (!selected) return;

      if (listEl) {
        const now = Date.now();
        listEl.innerHTML = notesRuntimeState.notes.map((note, index) => {
          let statusLabel = 'Lista';
          if (note.alert_active) {
            statusLabel = 'Alerta';
          } else if (note.status === 'running' && note.target_time_ms) {
            const remaining = Math.max(0, Math.ceil((note.target_time_ms - now) / 1000));
            statusLabel = 'Corre ' + formatCountdown(remaining);
          } else if (note.status === 'expired') {
            statusLabel = 'Vencida';
          }
          const title = sanitize((note.text || '').split('\n')[0] || ('Nota ' + (index + 1)));
          return '<button type="button" class="notas-station-list-item' + (note.id === selected.id ? ' is-active' : '') + (note.alert_active ? ' has-alert' : '') + '" data-note-id="' + sanitize(note.id) + '">' +
            '<span class="notas-station-list-title">' + title + '</span>' +
            '<span class="notas-station-list-status">' + sanitize(statusLabel) + '</span>' +
          '</button>';
        }).join('');
      }

      if (textEl && document.activeElement !== textEl) {
        textEl.value = selected.text || '';
      }
      if (minutesEl && document.activeElement !== minutesEl) {
        minutesEl.value = String(normalizeNotesDefaultMinutes(selected.duration_minutes));
      }
      if (repeatEl && document.activeElement !== repeatEl) {
        repeatEl.value = String(normalizeNotesRepeatMinutes(selected.repeat_minutes));
      }

      if (selected.alert_active) {
        const repeatMinutes = normalizeNotesRepeatMinutes(selected.repeat_minutes);
        if (selected.status === 'running' && selected.target_time_ms && repeatMinutes > 0) {
          const nextSeconds = Math.max(0, Math.ceil((selected.target_time_ms - Date.now()) / 1000));
          updateNotasCountdownLabel('Alerta activa. Próxima repetición en ' + formatCountdown(nextSeconds), true);
        } else {
          updateNotasCountdownLabel('Alerta activa. Detén la nota para silenciarla.', true);
        }
      } else if (selected.status === 'running' && selected.target_time_ms) {
        const remainingSeconds = Math.max(0, Math.ceil((selected.target_time_ms - Date.now()) / 1000));
        updateNotasCountdownLabel('Recordatorio en ' + formatCountdown(remainingSeconds), false);
      } else if (selected.status === 'expired') {
        updateNotasCountdownLabel('Recordatorio vencido', true);
      } else {
        updateNotasCountdownLabel('Listo para programar', false);
      }

      updateNotesCardAlertVisual(cfg || stationConfig || {});
    }

    function processNotesRuntimeTick(cfg) {
      const now = Date.now();
      let changed = false;
      let triggeredAlert = false;
      let triggeredNote = null;
      notesRuntimeState.notes.forEach(note => {
        if (note.status !== 'running' || !note.target_time_ms) {
          return;
        }
        if (now < note.target_time_ms) {
          return;
        }
        if (!note.alert_active) {
          note.alert_active = true;
          note.last_alert_at = now;
          triggeredAlert = true;
          if (!triggeredNote) {
            triggeredNote = note;
          }
        }
        const repeatMinutes = normalizeNotesRepeatMinutes(note.repeat_minutes);
        if (repeatMinutes > 0) {
          note.target_time_ms = now + (repeatMinutes * 60 * 1000);
          note.status = 'running';
        } else {
          note.status = 'expired';
          note.target_time_ms = 0;
        }
        changed = true;
      });
      if (changed) {
        saveNotesRuntimeState();
      }
      if (anyNotesAlertActive() && cfg && cfg.notas_blink_enabled) {
        startNotasBlink();
      }
      if (triggeredAlert && cfg && cfg.notas_beep_enabled) {
        playNotesBeep();
      }
      if (triggeredAlert && triggeredNote) {
        notifyRobotNotesReminder(triggeredNote);
      }
      renderNotesCardState(cfg);
    }

    function ensureNotesTick(cfg) {
      if (notesRuntimeState.tickId) return;
      notesRuntimeState.tickId = window.setInterval(() => {
        processNotesRuntimeTick(cfg || stationConfig || {});
      }, 250);
    }

    function parseStationConfigValue(raw) {
      let current = raw;
      for (let i = 0; i < 3; i += 1) {
        if (typeof current !== 'string') break;
        const trimmed = current.trim();
        if (!trimmed) return null;
        try {
          current = JSON.parse(trimmed);
        } catch (_) {
          return null;
        }
      }
      if (!current || typeof current !== 'object') return null;
      return current;
    }

    async function getConfigFromServer() {
      if (!empresaId) return null;
      try {
        const data = await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId));
        const prefs = data && data.prefs ? data.prefs : [];
        if (!Array.isArray(prefs) || prefs.length === 0) return null;
        const pref = prefs.find(p => p && String(p.clave) === 'estaciones_config' && Number(p.estacion_id) === 0);
        if (!pref || !pref.valor) return null;
        const parsed = parseStationConfigValue(pref.valor);
        if (!parsed) return null;
        const normalized = normalizeConfig(parsed);
        const ui = normalized.station_card_ui && typeof normalized.station_card_ui === 'object' ? normalized.station_card_ui : {};
        state.stationCardUI = Object.assign({}, state.stationCardUI, {
          mostrar_cliente_nombre: ui.mostrar_cliente_nombre === undefined ? true : !!ui.mostrar_cliente_nombre,
          mostrar_tarifa_resumen: ui.mostrar_tarifa_resumen === undefined ? true : !!ui.mostrar_tarifa_resumen,
          mostrar_hora_extra: ui.mostrar_hora_extra === undefined ? true : !!ui.mostrar_hora_extra,
          alerta_10_min: ui.alerta_10_min === undefined ? true : !!ui.alerta_10_min,
          marcar_sucia_al_pagar: ui.marcar_sucia_al_pagar === undefined ? true : !!ui.marcar_sucia_al_pagar,
          abrir_carrito_al_activar: ui.abrir_carrito_al_activar === undefined ? true : !!ui.abrir_carrito_al_activar
        });

        state.dirtyByEstacion = {};
        prefs.forEach(function(p) {
          if (!p) return;
          if (String(p.clave) !== 'estacion_estado_sucia') return;
          const estId = Number(p.estacion_id || 0);
          if (estId <= 0) return;
          const v = String(p.valor || '').trim().toLowerCase();
          if (v === '1' || v === 'true' || v === 'sucia') {
            state.dirtyByEstacion[estId] = true;
          }
        });

        return normalized;
      } catch (err) {
        console.warn('getConfigFromServer error:', err);
        return null;
      }
    }

    async function saveConfigToServer(cfg) {
      if (!empresaId) throw new Error('empresa_id missing');
      const existing = await getConfigFromServer().catch(() => null);
      const normalized = normalizeConfig(cfg || {});
      if ((cfg == null || !('card_size' in cfg)) && existing && existing.card_size) {
        normalized.card_size = existing.card_size;
      }
      normalized.card_size = normalized.card_size || 'medium';
      const payload = { estacion_id: 0, clave: 'estaciones_config', valor: JSON.stringify(normalized) };
      const res = await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      return res;
    }

    function applyCardSize(cfg) {
      try {
        const grid = document.getElementById('estacionesGrid');
        if (!grid) return;
        grid.classList.remove('station-size-small', 'station-size-medium', 'station-size-large');
        const size = (cfg && cfg.card_size) || 'medium';
        grid.classList.add('station-size-' + size);
      } catch (err) {
        console.warn('applyCardSize error', err);
      }
    }

    function normalizeText(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function normalizeCode(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function parseStationIDFromCarritoRef(value) {
      const text = String(value == null ? '' : value).trim();
      if (!text) return 0;
      let match = /^ESTACION[_-](\d+)$/i.exec(text);
      if (match) return Number(match[1] || 0) || 0;
      match = /^EST-(\d+)-(\d+)$/i.exec(text);
      if (match && Number(match[1] || 0) === Number(empresaId || 0)) {
        return Number(match[2] || 0) || 0;
      }
      return 0;
    }

    function resolveStationIDFromCarrito(item) {
      if (!item) return 0;
      return parseStationIDFromCarritoRef(item.referencia_externa) ||
        parseStationIDFromCarritoRef(item.codigo) ||
        0;
    }

    function toBool(v) {
      if (typeof v === 'boolean') return v;
      if (typeof v === 'number') return v === 1;
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      return raw === '1' || raw === 'true' || raw === 'si' || raw === 'sí';
    }

    function normalizeColor(v, fallback) {
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      const base = String(fallback == null ? '' : fallback).trim().toLowerCase();
      const hex = raw || base;
      if (!hex || hex.length !== 7 || hex.charAt(0) !== '#') {
        return base || '#fff9ef';
      }
      for (let i = 1; i < hex.length; i++) {
        const c = hex.charCodeAt(i);
        const isDigit = c >= 48 && c <= 57;
        const isHex = c >= 97 && c <= 102;
        if (!isDigit && !isHex) {
          return base || '#fff9ef';
        }
      }
      return hex;
    }

    function formatStationEntryDateTime(rawValue) {
      const raw = String(rawValue == null ? '' : rawValue).trim();
      if (!raw) return '';

      const isoLike = raw.includes('T') ? raw : raw.replace(' ', 'T');
      const parsed = new Date(isoLike);
      if (Number.isNaN(parsed.getTime())) {
        return raw;
      }

      return parsed.toLocaleString('es-CO', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatStationActiveDuration(rawStart) {
      const raw = String(rawStart || '').trim();
      if (!raw) return '';
      const isoLike = raw.includes('T') ? raw : raw.replace(' ', 'T');
      const startDate = new Date(isoLike);
      if (Number.isNaN(startDate.getTime())) return '';

      const diffMs = Date.now() - startDate.getTime();
      if (diffMs <= 0) return '0 min';

      const totalMinutes = Math.floor(diffMs / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours > 0) {
        return hours + ' h' + (minutes > 0 ? ' ' + minutes + ' min' : '');
      }
      return minutes + ' min';
    }

    function getCarritoCodeForStation(stationID) {
      return 'EST-' + empresaId + '-' + stationID;
    }

    function openStationCarrito(stationID, stationName) {
      if (!empresaId || stationID == null) return;
      const carritoCode = getCarritoCodeForStation(stationID);
      const url = '/administrar_empresa/carrito_de_compras.html?empresa_id=' + encodeURIComponent(empresaId) +
        '&estacion_id=' + encodeURIComponent(stationID) +
        '&estacion_nombre=' + encodeURIComponent(stationName || ('Estación ' + stationID)) +
          '&carrito_codigo=' + encodeURIComponent(carritoCode);
      window.location.href = url;
    }

    function isCarritoOperativoActivo(carrito) {
      if (!carrito) return false;
      const estado = normalizeText(carrito.estado) || 'activo';
      const estadoCarrito = normalizeText(carrito.estado_carrito) || 'abierto';
      return estado === 'activo' && estadoCarrito !== 'cerrado';
    }

    async function loadColoresEstadoCarrito() {
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/configuracion_avanzada?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const cfg = await res.json();
        state.colores.activo = normalizeColor(cfg && cfg.color_carrito_activo, '#d9fbe8');
        state.colores.inactivo = normalizeColor(cfg && cfg.color_carrito_inactivo, '#fff9ef');
        state.colores.disponible = normalizeColor(cfg && cfg.color_estacion_disponible, state.colores.inactivo || '#fff9ef');
        state.colores.ocupada = normalizeColor(cfg && cfg.color_estacion_ocupada, state.colores.activo || '#d9fbe8');
        state.colores.sucia = normalizeColor(cfg && cfg.color_estacion_sucia, '#ffe0e0');
        state.colores.alertaTiempo = normalizeColor(cfg && cfg.color_estacion_alerta_tiempo, '#fff3cd');
        // Leer configuración de formato monetario (usar_decimales, cantidad_decimales)
        try {
          var usar = true;
          var cantidad = 2;
          if (cfg && typeof cfg.usar_decimales !== 'undefined') usar = !!cfg.usar_decimales;
          if (cfg && typeof cfg.cantidad_decimales !== 'undefined') cantidad = Number(cfg.cantidad_decimales) || 0;
          state.formato = { usarDecimales: usar, cantidadDecimales: Math.max(0, Math.trunc(cantidad)) };
        } catch (e) {
          state.formato = { usarDecimales: true, cantidadDecimales: 2 };
        }
      } catch (err) {
        console.warn('No se pudieron cargar colores de estado de carrito:', err);
      }
    }

    async function loadEstadoCarritosEstacion() {
      state.carritosPorCodigo = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&include_inactive=1', { credentials: 'same-origin' });
        if (!res.ok) return;
        const carritos = await res.json();
        if (!Array.isArray(carritos)) return;

        carritos.forEach(item => {
          const stationID = resolveStationIDFromCarrito(item);
          const info = {
            id: Number(item && item.id ? item.id : 0),
            estacionID: stationID,
            activo: isCarritoOperativoActivo(item),
            estado: String((item && item.estado) || ''),
            estadoCarrito: String((item && item.estado_carrito) || ''),
            estadoVenta: String((item && item.estado_venta) || ''),
            activadoEn: String((item && item.activado_en) || ''),
            pagadoEn: String((item && item.pagado_en) || ''),
            total: Number(item && item.total ? item.total : 0),
            clienteNombre: String((item && item.cliente_nombre) || ''),
            tarifaPorMinutos: item && item.tarifa_por_minutos ? item.tarifa_por_minutos : null,
            tarifaPorDia: item && item.tarifa_por_dia ? item.tarifa_por_dia : null
          };
          const code = normalizeCode(item && item.codigo);
          const ref = normalizeCode(item && item.referencia_externa);
          const canonical = stationID > 0 ? normalizeCode(getCarritoCodeForStation(stationID)) : '';
          const stationKey = stationID > 0 ? ('station:' + stationID) : '';
          [code, ref, canonical, stationKey].forEach(key => {
            if (key) state.carritosPorCodigo[key] = info;
          });
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de carritos por estación:', err);
      }
    }

    function parseMaybeLocalDateTime(raw) {
      const s = String(raw || '').trim();
      if (!s) return 0;
      const t = Date.parse(s.replace(' ', 'T'));
      if (Number.isFinite(t)) return t;
      return 0;
    }

    function buildStationRuntimeMeta(info, stationCfg) {
    const cfg = stationCfg && typeof stationCfg === 'object' ? stationCfg : {};
    const data = info && typeof info === 'object' ? info : null;
    const activo = !!(data && data.activo);
    const inicio = activo && cfg.mostrar_fecha_hora_inicio !== false ? formatStationEntryDateTime(data && data.activadoEn) : '';
    const fin = activo && cfg.mostrar_fecha_hora_fin_tarifa !== false ? resolveFinLabel(data) : '';
    const total = activo && cfg.mostrar_total !== false ? formatMoney(data && typeof data.total !== 'undefined' ? data.total : 0) : '';
    const cliente = activo && state.stationCardUI.mostrar_cliente_nombre !== false ? String((data && data.clienteNombre) || '').trim() : '';
    const tarifaResumen = activo && state.stationCardUI.mostrar_tarifa_resumen !== false ? buildTarifaResumen(data) : '';
    const horaExtra = activo && state.stationCardUI.mostrar_hora_extra !== false ? buildHoraExtraLabel(data) : '';
    const duracionActiva = activo ? formatStationActiveDuration(data && data.activadoEn) : '';
    const alerta = activo && state.stationCardUI.alerta_10_min !== false ? isTarifaWithinAlertWindow(data) : false;
    return { activo, inicio, fin, total, cliente, tarifaResumen, horaExtra, duracionActiva, alerta };
    }

    function resolveFinLabel(data) {
      if (!data) return '';
      const tpd = data.tarifaPorDia;
      if (tpd && typeof tpd === 'object') {
        const rawStart = String(data.activadoEn || '').trim();
        const startMs = parseMaybeLocalDateTime(rawStart);
        if (!startMs) return '';
        const start = new Date(startMs);
        const outTime = String(tpd.hora_check_out || '12:00').trim();
        const parts = outTime.split(':');
        const hh = Number(parts[0] || 0);
        const mm = Number(parts[1] || 0);
        const salida = new Date(start.getTime());
        salida.setHours(Number.isFinite(hh) ? hh : 12, Number.isFinite(mm) ? mm : 0, 0, 0);
        if (salida.getTime() <= start.getTime()) {
          salida.setDate(salida.getDate() + 1);
        }
        return formatStationEntryDateTime(salida.toISOString());
      }
      const tpm = data.tarifaPorMinutos;
      if (tpm && typeof tpm === 'object' && tpm.fecha_fin_tarifa_actual) {
        return formatStationEntryDateTime(tpm.fecha_fin_tarifa_actual);
      }
      return '';
    }

    function buildTarifaResumen(data) {
      if (!data) return '';
      const tpd = data.tarifaPorDia;
      if (tpd && typeof tpd === 'object') {
        const svc = String(tpd.servicio_nombre || 'tarifa por día').trim();
        return svc ? ('Tarifa: ' + svc) : '';
      }
      const tpm = data.tarifaPorMinutos;
      if (tpm && typeof tpm === 'object') {
        const mb = Number(tpm.minutos_base || 0);
        const me = Number(tpm.minutos_extra || 0);
        if (mb > 0 && me > 0) return 'Tarifa: ' + mb + ' min + ' + me + ' min extra';
        if (mb > 0) return 'Tarifa: ' + mb + ' min';
        return 'Tarifa: por minutos';
      }
      return '';
    }

    function buildHoraExtraLabel(data) {
      const tpm = data && data.tarifaPorMinutos ? data.tarifaPorMinutos : null;
      if (!tpm) return '';
      const bloques = Number(tpm.bloques_extra || 0);
      return bloques > 0 ? ('Hora extra: ' + bloques) : '';
    }

    function stripStationRowPrefix(value, prefix) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      const normalizedPrefix = String(prefix || '').trim();
      if (!normalizedPrefix) return raw;
      const lower = raw.toLowerCase();
      const prefixLower = normalizedPrefix.toLowerCase();
      return lower.indexOf(prefixLower) === 0 ? raw.slice(normalizedPrefix.length).trim() : raw;
    }

    function stationMetaRowHtml(key, label, value, visible) {
      const text = String(value || '').trim();
      const isVisible = visible !== false && text !== '';
      return '<div class="station-data-row station-meta-' + sanitize(key) + '-row"' + (isVisible ? '' : ' hidden') + '>' +
        '<span class="station-data-label">' + sanitize(label) + '</span>' +
        '<span class="station-data-value station-meta-' + sanitize(key) + '">' + sanitize(text) + '</span>' +
        '</div>';
    }

    function setStationMetaRow(card, key, value, visible) {
      if (!card) return;
      const row = card.querySelector('.station-meta-' + key + '-row');
      const valueEl = card.querySelector('.station-meta-' + key);
      const text = String(value || '').trim();
      const show = visible !== false && text !== '';
      if (valueEl) valueEl.textContent = text;
      if (row) row.hidden = !show;
    }

    function isTarifaWithinAlertWindow(data) {
      const tpm = data && data.tarifaPorMinutos ? data.tarifaPorMinutos : null;
      if (!tpm || !tpm.fecha_fin_tarifa_actual) return false;
      const endMs = parseMaybeLocalDateTime(tpm.fecha_fin_tarifa_actual);
      if (!endMs) return false;
      const now = Date.now();
      const diff = endMs - now;
      return diff > 0 && diff <= 10 * 60 * 1000;
    }

    function refreshStationCardSummaries() {
    const grid = document.getElementById('estacionesGrid');
    if (!grid || !stationConfig || !Array.isArray(stationConfig.estaciones)) return;
    grid.querySelectorAll('.station-launch-card[data-estacion-id]').forEach(card => {
    const stationID = Number(card.getAttribute('data-estacion-id') || 0);
    if (!stationID) return;
    const stationCfg = stationConfig.estaciones.find(function (est) {
      return Number(est && est.id) === stationID;
    }) || null;
    const info = findStationCarritoInfo(stationID);
    const meta = buildStationRuntimeMeta(info, stationCfg || {});
    const isDirty = !!state.dirtyByEstacion[stationID];
    card.classList.toggle('station-card-active', meta.activo && !isDirty);
    card.classList.toggle('station-card-inactive', !meta.activo && !isDirty);
    card.classList.toggle('station-card-dirty', isDirty);
    card.classList.toggle('station-card-alert', meta.alerta && !isDirty);
    const bg = isDirty ? state.colores.sucia : (meta.alerta ? state.colores.alertaTiempo : (meta.activo ? state.colores.ocupada : state.colores.disponible));
    card.style.setProperty('--station-state-bg', bg);

    const estado = isDirty ? 'Sucia' : (meta.activo ? (meta.alerta ? 'Alerta' : 'Ocupada') : 'Disponible');
    setStationMetaRow(card, 'estado', estado, true);
    setStationMetaRow(card, 'cliente', meta.cliente, meta.cliente);
    setStationMetaRow(card, 'tarifa', stripStationRowPrefix(meta.tarifaResumen, 'Tarifa:'), meta.tarifaResumen);
    setStationMetaRow(card, 'duration', meta.duracionActiva, meta.duracionActiva);
    setStationMetaRow(card, 'start', meta.inicio, stationCfg && stationCfg.mostrar_fecha_hora_inicio !== false && meta.inicio);
    setStationMetaRow(card, 'end', meta.fin, stationCfg && stationCfg.mostrar_fecha_hora_fin_tarifa !== false && meta.fin);
    setStationMetaRow(card, 'extra', stripStationRowPrefix(meta.horaExtra, 'Hora extra:'), meta.horaExtra);
    setStationMetaRow(card, 'total', meta.total, stationCfg && stationCfg.mostrar_total !== false && meta.total);
    });
    }

    async function refreshStationPageState() {
      if (!empresaId) return;
      try {
        const cfg = await getConfigFromServer();
        if (cfg) {
          stationConfig = cfg;
          applyCardSize(stationConfig);
          renderEstaciones(stationConfig);
        }
        await Promise.all([
          loadColoresEstadoCarrito(),
          loadEstadoCarritosEstacion(),
          loadSensorStates()
        ]);
        refreshStationCardSummaries();
      } catch (err) {
        console.warn('No se pudo refrescar estado de estaciones:', err);
      }
    }

    function refreshStationPageStateIfVisible() {
      if (document.visibilityState === 'visible') {
        refreshStationPageState();
      }
    }

    function setupStationPageRefresh() {
      window.addEventListener('pageshow', function (event) {
        if (event.persisted || document.visibilityState === 'visible') {
          refreshStationPageState();
        }
      });
      window.addEventListener('focus', refreshStationPageStateIfVisible);
      document.addEventListener('visibilitychange', refreshStationPageStateIfVisible);
    }

    async function clearDirtyState(stationID) {
      const id = Number(stationID || 0);
      if (!empresaId || id <= 0) return;
      await requestJSON('/api/empresa/estacion_prefs?empresa_id=' + encodeURIComponent(empresaId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estacion_id: id, clave: 'estacion_estado_sucia', valor: '0' })
      });
      if (!state.dirtyByEstacion) state.dirtyByEstacion = {};
      delete state.dirtyByEstacion[id];
      refreshStationCardSummaries();
    }

    function shouldOpenCartWhenStationClicked() {
      return !state.stationCardUI || state.stationCardUI.abrir_carrito_al_activar !== false;
    }

    function findStationCarritoInfo(stationID) {
      const code = normalizeCode(getCarritoCodeForStation(stationID));
      const stationKey = 'station:' + Number(stationID || 0);
      if (!state.carritosPorCodigo) return null;
      return state.carritosPorCodigo[code] || state.carritosPorCodigo[stationKey] || null;
    }

    function isNoopStationActivationError(message) {
      const msg = normalizeText(message);
      return msg.indexOf('ya se encuentra activa') !== -1 ||
        msg.indexOf('ya se encuentra activa y abierta') !== -1 ||
        msg.indexOf('venta ya se encuentra activa') !== -1;
    }

    async function activateStationWithoutOpening(stationID, stationName) {
      const id = Number(stationID || 0);
      if (!empresaId || id <= 0) return;
      let info = findStationCarritoInfo(id);
      if (!info || !Number(info.id || 0)) {
        await loadEstadoCarritosEstacion();
        info = findStationCarritoInfo(id);
      }
      const carritoID = Number(info && info.id ? info.id : 0);
      if (!carritoID) {
        throw new Error('No se encontro el carrito asociado a ' + (stationName || ('estacion ' + id)) + '. Guarda o sincroniza las estaciones primero.');
      }
      if (info && info.activo) {
        refreshStationCardSummaries();
        return;
      }

      const params = new URLSearchParams();
      params.set('empresa_id', String(empresaId));
      params.set('id', String(carritoID));
      params.set('action', 'activar_estacion');
      if (info && String(info.pagadoEn || '').trim()) {
        params.set('reset_items', '1');
      }

      try {
        await requestJSON('/api/empresa/carritos_compra?' + params.toString(), { method: 'PUT' });
      } catch (err) {
        const message = err && err.message ? err.message : String(err || '');
        if (!isNoopStationActivationError(message)) {
          throw err;
        }
      }
      await Promise.all([
        loadColoresEstadoCarrito(),
        loadEstadoCarritosEstacion()
      ]);
      refreshStationCardSummaries();
      setStatus('');
    }

    function handleStationCardActivation(ev, card) {
      const stationID = Number(card.getAttribute('data-estacion-id') || 0);
      const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
      if (state.stationCardUI && state.stationCardUI.marcar_sucia_al_pagar && state.dirtyByEstacion && state.dirtyByEstacion[stationID]) {
        if (ev) {
          ev.preventDefault();
          ev.stopPropagation();
        }
        clearDirtyState(stationID).catch(function(err) {
          console.warn('No se pudo limpiar estacion sucia', err);
        });
        return;
      }

      if (shouldOpenCartWhenStationClicked()) {
        openStationCarrito(stationID, stationName);
        return;
      }

      if (ev) {
        ev.preventDefault();
        ev.stopPropagation();
      }
      card.setAttribute('aria-busy', 'true');
      setStatus('Activando ' + (stationName || ('estacion ' + stationID)) + '...');
      activateStationWithoutOpening(stationID, stationName)
        .catch(function(err) {
          console.warn('No se pudo activar estacion sin abrir carrito', err);
          setStatus('No se pudo activar la estacion: ' + (err && err.message ? err.message : 'error de servidor'));
        })
        .finally(function() {
          card.removeAttribute('aria-busy');
        });
    }

    // readConfig replaced by server-backed getConfigFromServer

    function formatMoney(v) {
      try {
        const n = Number(v || 0);
        var digits = 2;
        if (state && state.formato) {
          if (state.formato.usarDecimales === false) digits = 0;
          else if (typeof state.formato.cantidadDecimales === 'number') digits = Math.max(0, Math.trunc(state.formato.cantidadDecimales));
        }
        return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n);
      } catch (e) {
        if (state && state.formato && state.formato.usarDecimales === false) {
          return 'COP ' + String(Math.round(Number(v || 0)));
        }
        return 'COP ' + (Number(v || 0).toFixed(2));
      }
    }

    function getYouTubeStationQuery(cfg) {
      if (!cfg || typeof cfg !== 'object') return '';
      const raw = String(cfg.youtube_query || '').trim();

    function unlockNotesAudio() {
      if (notesAlertState.audioUnlocked) return true;
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return false;
        if (!notesAlertState.audioContext) {
          notesAlertState.audioContext = new Ctx();
        }
        if (notesAlertState.audioContext.state === 'suspended') {
          notesAlertState.audioContext.resume();
        }
        notesAlertState.audioUnlocked = true;
        return true;
      } catch (err) {
        return false;
      }
    }

    function playNotesBeep() {
      try {
        if (!unlockNotesAudio() || !notesAlertState.audioContext) {
          return false;
        }
        const ctx = notesAlertState.audioContext;
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.14, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.36);
        return true;
      } catch (err) {
        return false;
      }
    }

    function parseYouTubeReferenceFromText(text) {
      const raw = String(text || '').trim();
      const urlMatch = raw.match(/(https?:\/\/[^\s]+)/i);
      if (urlMatch) {
        return urlMatch[1];
      }
      const idMatch = raw.match(/([A-Za-z0-9_-]{11})/);
      if (idMatch) {
        return idMatch[1];
      }
      const playlistMatch = raw.match(/(PL|UU|LL|FL|RD|OLAK5uy_|UL)[A-Za-z0-9_-]{8,}/i);
      if (playlistMatch) {
        return playlistMatch[0];
      }
      return '';
    }

    async function requestYouTubeIARecommendations() {
      if (!empresaId) {
        setYouTubeIAStatus('No se encontró empresa activa para IA.', 'error');
        return;
      }
      const prompt = 'Eres un asistente de operaciones de estaciones. Sugiere una lista de reproducción de música actual y amigable para clientes en una estación empresarial. Responde con un enlace de YouTube o un ID de video/playlist válido y una breve explicación.';
      setYouTubeIAStatus('Consultando IA para sugerencias de música...', 'help');
      const recommendations = [];
      try {
        const payload = {
          empresa_id: empresaId,
          pregunta: prompt,
          historial: []
        };
        const data = await requestJSON('/api/empresa/chat_con_inteligencia_artificial/consultar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const answer = String(data && data.respuesta ? data.respuesta : '').trim();
        if (!answer) {
          throw new Error('La IA no devolvió sugerencias válidas.');
        }
        const reference = parseYouTubeReferenceFromText(answer);
        if (reference) {
          let targetUrl = reference;
          if (!/^https?:\/\//i.test(targetUrl)) {
            if (/^[A-Za-z0-9_-]{11}$/.test(targetUrl)) {
              targetUrl = 'https://www.youtube.com/watch?v=' + encodeURIComponent(targetUrl);
            } else if (/^(PL|UU|LL|FL|RD|OLAK5uy_|UL)/i.test(targetUrl)) {
              targetUrl = 'https://www.youtube.com/playlist?list=' + encodeURIComponent(targetUrl);
            }
          }
          recommendations.push({ label: answer.split('\n')[0] || 'Playlist de YouTube sugerida', url: targetUrl, value: targetUrl });
          setYouTubeIAStatus('Sugerencia IA lista. Puedes cargarla en la estación.', 'success');
        } else {
          recommendations.push({ label: answer, url: '', value: '' });
          setYouTubeIAStatus('La IA respondió, pero no se pudo extraer un enlace o ID de YouTube automáticamente.', 'error');
        }
      } catch (err) {
        console.error('Error solicitando recomendaciones IA para YouTube:', err);
        setYouTubeIAStatus('Error consultando IA: ' + (err && err.message ? err.message : 'falló la petición'), 'error');
      }
      setYouTubeIASuggestions(recommendations);
    }

    async function loadCajaTotals(cfg) {
      if (!empresaId) return;
      try {
        // Asegurar que tenemos la configuración de formato monetario antes de formatear
        if (!state.formato) {
          try {
            const cfgResp = await fetch('/api/empresa/configuracion_avanzada?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
            if (cfgResp && cfgResp.ok) {
              const cfgData = await cfgResp.json();
              var usar = true;
              var cantidad = 2;
              if (cfgData && typeof cfgData.usar_decimales !== 'undefined') usar = !!cfgData.usar_decimales;
              if (cfgData && typeof cfgData.cantidad_decimales !== 'undefined') cantidad = Number(cfgData.cantidad_decimales) || 0;
              state.formato = { usarDecimales: usar, cantidadDecimales: Math.max(0, Math.trunc(cantidad)) };
            }
          } catch (e) {
            // ignore and fall back to defaults in formatMoney
          }
        }
        const params = new URLSearchParams();
        params.set('empresa_id', String(empresaId));
        params.set('action', 'totales_pago');
        params.set('days', '7');
        if (cfg && cfg.estacion_id) params.set('estacion_id', String(cfg.estacion_id));
        const res = await fetch('/api/empresa/carritos_compra?' + params.toString(), { credentials: 'same-origin' });
        if (!res.ok) return;
        const payload = await res.json();
        const totals = payload && payload.totales ? payload.totales : {};
        const ef = Number(totals.efectivo || 0);
        const td = Number(totals.tarjeta_debito || 0);
        const tc = Number(totals.tarjeta_credito || 0);
        const elEf = document.getElementById('cajaEfectivoVal');
        const elTd = document.getElementById('cajaDebitoVal');
        const elTc = document.getElementById('cajaCreditoVal');
        if (elEf) elEf.textContent = formatMoney(ef);
        if (elTd) elTd.textContent = formatMoney(td);
        if (elTc) elTc.textContent = formatMoney(tc);
      } catch (err) {
        console.warn('No se pudieron cargar totales de Caja', err);
      }
    }

    function renderEstaciones(cfg) {
      const grid = document.getElementById('estacionesGrid');
      if (!cfg || !cfg.estaciones || !cfg.estaciones.length) {
        if (!(cfg && cfg.youtube_enabled) && !(cfg && cfg.caja_enabled) && !(cfg && cfg.notas_enabled) && !(cfg && cfg.ia_pedidos_enabled)) {
          grid.innerHTML = '<p class="form-help">No hay estaciones configuradas. Ve a Configuración de estaciones para crearlas.</p>';
          return;
        }
      }
      let html = '';
      const beforeSpecial = [];
      const afterSpecial = [];

      function pushSpecial(target, enabled, renderer) {
        if (!enabled) return;
        target.push(renderer());
      }

      pushSpecial(cfg && cfg.caja_placement === 'after' ? afterSpecial : beforeSpecial, cfg && cfg.caja_enabled, () => generateCajaCardHtml());
      pushSpecial(cfg && cfg.youtube_placement === 'after' ? afterSpecial : beforeSpecial, cfg && cfg.youtube_enabled, () => generateYouTubeCardHtml(cfg));
      pushSpecial(cfg && cfg.notas_placement === 'after' ? afterSpecial : beforeSpecial, cfg && cfg.notas_enabled, () => generateNotasCardHtml(cfg));
      pushSpecial(cfg && cfg.ia_pedidos_placement === 'after' ? afterSpecial : beforeSpecial, cfg && cfg.ia_pedidos_enabled, () => generateIAPedidosCardHtml());

      html += beforeSpecial.join('');
      if (!cfg || !cfg.estaciones || !cfg.estaciones.length) {
        html += afterSpecial.join('');
        grid.innerHTML = html;
        wireSpecialStationCards(cfg);
        return;
      }
      html += cfg.estaciones.map(est => {
        const stationID = Number(est.id || 0);
        const useMostrarInicio = est.mostrar_fecha_hora_inicio === undefined ? true : !!est.mostrar_fecha_hora_inicio;
        const useMostrarFinTarifa = est.mostrar_fecha_hora_fin_tarifa === undefined ? true : !!est.mostrar_fecha_hora_fin_tarifa;
        const useMostrarTotal = est.mostrar_total === undefined ? true : !!est.mostrar_total;
        const carritoCode = getCarritoCodeForStation(stationID);
        const info = findStationCarritoInfo(stationID);
        const meta = buildStationRuntimeMeta(info, est);
        const carritoActivo = meta.activo;
        const isDirty = !!state.dirtyByEstacion[stationID];
        const stationClass = isDirty ? 'station-card-dirty' : (carritoActivo ? 'station-card-active' : 'station-card-inactive');
        const stationColor = isDirty ? state.colores.sucia : (meta.alerta ? state.colores.alertaTiempo : (carritoActivo ? state.colores.ocupada : state.colores.disponible));
        const estado = isDirty ? 'Sucia' : (carritoActivo ? (meta.alerta ? 'Alerta' : 'Ocupada') : 'Disponible');

        // Estado del sensor asociado a la estación (negro = no conectado/inactivo, verde = sensor activo)
        const sensor = (state.sensorsByEstacion && state.sensorsByEstacion[stationID]) ? state.sensorsByEstacion[stationID] : null;
        let sensorColor = '#000000';
        if (sensor && sensor.device_id) {
          const lastStateNormalized = normalizeText(sensor.last_state || '');
          const activeStates = ['1', 'true', 'si', 'sí', 'on', 'active', 'open', 'abierto', 'encendido', 'activo'];
          const isActive = activeStates.indexOf(lastStateNormalized) !== -1;
          sensorColor = isActive ? '#00c853' : 'var(--station-sensor-default)';
          if (sensor.last_seen) {
            try {
              const parsed = new Date((sensor.last_seen || '').replace(' ', 'T'));
                if (!isNaN(parsed.getTime()) && (Date.now() - parsed.getTime()) > 120000) {
                sensorColor = 'var(--station-sensor-default)';
              }
            } catch (err) {
              // ignore parse errors
            }
          }
        }

          const stationDataHtml = '<div class="station-data">' +
            stationMetaRowHtml('estado', 'Estado', estado, true) +
            stationMetaRowHtml('cliente', 'Cliente', meta.cliente, !!meta.cliente) +
            stationMetaRowHtml('tarifa', 'Tarifa', stripStationRowPrefix(meta.tarifaResumen, 'Tarifa:'), !!meta.tarifaResumen) +
            stationMetaRowHtml('duration', 'Duracion', meta.duracionActiva, !!meta.duracionActiva) +
            stationMetaRowHtml('start', 'Inicio', meta.inicio, useMostrarInicio && !!meta.inicio) +
            stationMetaRowHtml('end', 'Fin', meta.fin, useMostrarFinTarifa && !!meta.fin) +
            stationMetaRowHtml('extra', 'Extra', stripStationRowPrefix(meta.horaExtra, 'Hora extra:'), !!meta.horaExtra) +
            stationMetaRowHtml('total', 'Total', meta.total, useMostrarTotal && !!meta.total) +
          '</div>';
          return '<article class="portal-card station-launch-card ' + stationClass + '" style="--station-state-bg:' + sanitize(stationColor) + ';" data-estacion-id="' + stationID + '" data-estacion-nombre="' + sanitize(est.nombre) + '" data-mostrar-total="' + (useMostrarTotal ? '1' : '0') + '" tabindex="0" role="button" aria-label="Abrir estación ' + sanitize(est.nombre) + '">' +
            '<div class="station-sensor-indicator" data-sensor-color="' + sanitize(sensorColor) + '"></div>' +
            '<h3>' + sanitize(est.nombre) + '</h3>' +
            stationDataHtml +
            '</article>';
      }).join('');
          html += afterSpecial.join('');
      grid.innerHTML = html;
      // Aplicar color de sensor desde data-attribute para cada indicador (soporta var(--station-sensor-default))
      grid.querySelectorAll('.station-sensor-indicator[data-sensor-color]').forEach(function(el){
        try { el.style.backgroundColor = el.getAttribute('data-sensor-color'); } catch (e) {}
      });

      grid.querySelectorAll('.station-launch-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', ev => {
          handleStationCardActivation(ev, card);
        });
        card.addEventListener('keydown', ev => {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          ev.preventDefault();
          handleStationCardActivation(ev, card);
        });
      });

      wireSpecialStationCards(cfg);
      refreshStationCardSummaries();

      // Si Caja está habilitada, adjuntar manejadores y cargar totales
      if (cfg && cfg.caja_enabled) {
        const cajaEl = document.getElementById('cajaCard');
        if (cajaEl) {
          cajaEl.classList.add('station-launch-card');
          cajaEl.style.cursor = 'pointer';
          cajaEl.addEventListener('click', () => { openStationCarrito(0, 'Caja', true); });
          cajaEl.addEventListener('keydown', ev => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); openStationCarrito(0, 'Caja', true); } });
          try {
            const movBtn = cajaEl.querySelector('.ver-ultimos-movimientos');
            if (movBtn) {
              movBtn.addEventListener('click', ev => {
                ev.stopPropagation();
                ev.preventDefault();
                const target = '/administrar_empresa/ultimos_movimientos_de_caja.html?empresa_id=' + encodeURIComponent(empresaId);
                window.location.href = target;
              });
              movBtn.addEventListener('keydown', ev => {
                if (ev.key === 'Enter' || ev.key === ' ') {
                  ev.stopPropagation();
                  ev.preventDefault();
                  const target = '/administrar_empresa/ultimos_movimientos_de_caja.html?empresa_id=' + encodeURIComponent(empresaId);
                  window.location.href = target;
                }
              });
            }
          } catch (e) {
          }
        }
        loadCajaTotals(cfg).catch(() => {});
      }
    }

    function wireSpecialStationCards(cfg) {
      loadNotesRuntimeState(cfg || stationConfig || {});

      const notasField = document.getElementById('notasStationTextarea');
      if (notasField) {
        notasField.addEventListener('click', ev => {
          ev.stopPropagation();
          unlockNotesAudio();
        });
        notasField.addEventListener('input', () => {
          setNotasInlineMessage('', 'help');
        });
      }

      const notasMinutes = document.getElementById('notasStationMinutesInput');
      if (notasMinutes) {
        notasMinutes.addEventListener('click', ev => {
          ev.stopPropagation();
          unlockNotesAudio();
        });
      }

      const notasRepeat = document.getElementById('notasStationRepeatInput');
      if (notasRepeat) {
        notasRepeat.addEventListener('click', ev => {
          ev.stopPropagation();
          unlockNotesAudio();
        });
      }

      const notasList = document.getElementById('notasStationList');
      if (notasList) {
        notasList.addEventListener('click', ev => {
          const button = ev.target && ev.target.closest ? ev.target.closest('[data-note-id]') : null;
          if (!button) return;
          ev.preventDefault();
          ev.stopPropagation();
          selectRuntimeNote(button.getAttribute('data-note-id'));
        });
      }

      const notasAddBtn = document.getElementById('notasStationAddBtn');
      if (notasAddBtn) {
        notasAddBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          addRuntimeNote(cfg || stationConfig || {});
        });
      }

      const notasStartBtn = document.getElementById('notasStationStartBtn');
      if (notasStartBtn) {
        notasStartBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          unlockNotesAudio();
          startNotasTimer(cfg || stationConfig || {});
        });
      }

      const notasStopBtn = document.getElementById('notasStationStopBtn');
      if (notasStopBtn) {
        notasStopBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          stopNotasTimer('Temporizador detenido');
          setNotasInlineMessage('Alerta detenida.', 'success');
        });
      }

      const notasSaveBtn = document.getElementById('notasStationSaveBtn');
      if (notasSaveBtn) {
        notasSaveBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          saveNotasConfigFromCard();
        });
      }

      const notasDeleteBtn = document.getElementById('notasStationDeleteBtn');
      if (notasDeleteBtn) {
        notasDeleteBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          deleteSelectedRuntimeNote(cfg || stationConfig || {});
        });
      }

      const notasCard = document.getElementById('notasStationCard');
      if (notasCard) {
        notasCard.addEventListener('click', ev => {
          const interactive = ev.target && ev.target.closest ? ev.target.closest('button, a, input, textarea, select, label') : null;
          if (interactive) {
            ev.stopPropagation();
            unlockNotesAudio();
          }
        });
      }

      renderNotesCardState(cfg || stationConfig || {});
      ensureNotesTick(cfg || stationConfig || {});

      const sourceInput = document.getElementById('youtubeStationSourceInput');
      if (sourceInput) {
        syncYouTubeOpenLinkFromValue(sourceInput.value);
        sourceInput.addEventListener('click', ev => {
          ev.stopPropagation();
        });
        sourceInput.addEventListener('keydown', ev => {
          ev.stopPropagation();
          if (ev.key === 'Enter') {
            ev.preventDefault();
            saveYouTubeSourceFromCard();
          }
        });
        sourceInput.addEventListener('input', ev => {
          syncYouTubeOpenLinkFromValue(ev.target && ev.target.value);
        });
      }

      const saveBtn = document.getElementById('youtubeStationSaveBtn');
      if (saveBtn) {
        saveBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          saveYouTubeSourceFromCard();
        });
      }
      initializeYouTubeIAButtons();

      const openLinkBtn = document.getElementById('youtubeStationOpenLinkBtn');
      if (openLinkBtn) {
        openLinkBtn.addEventListener('click', ev => {
          ev.stopPropagation();
        });
      }

      const expandBtn = document.getElementById('youtubeStationExpand');
      if (expandBtn) {
        expandBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          openYouTubeStationOverlay(cfg);
        });
      }

      const playBtn = document.getElementById('youtubeStationPlay');
      if (playBtn) {
        playBtn.addEventListener('click', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          const youtubeCard = document.getElementById('youtubeStationCard');
          const iframe = youtubeCard ? youtubeCard.querySelector('iframe.youtube-station-preview-frame') : null;
          try {
            if (iframe && iframe.contentWindow && typeof iframe.contentWindow.__ytPlayWithSound === 'function') {
              iframe.contentWindow.__ytPlayWithSound();
              return;
            }
          } catch (e) {
            // fallback to opening overlay
          }
          openYouTubeStationOverlay(cfg);
        });
      }

      const youtubeCard = document.getElementById('youtubeStationCard');
      if (youtubeCard) {
        youtubeCard.addEventListener('click', ev => {
          const interactive = ev.target && ev.target.closest ? ev.target.closest('button, a, input, textarea, select, label') : null;
          if (interactive) {
            ev.stopPropagation();
          }
        });
        youtubeCard.addEventListener('keydown', ev => {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          ev.preventDefault();
          openYouTubeStationOverlay(cfg);
        });
      }

      const iaPedidosCard = document.getElementById('iaPedidosStationCard');
      if (iaPedidosCard) {
        iaPedidosCard.addEventListener('click', ev => {
          if (ev.target && ev.target.closest && ev.target.closest('iframe')) {
            ev.stopPropagation();
          }
        });
      }
    }

    function wireEstacionesMobileThumbToggle() {
      const btn = document.getElementById('btnEstacionesThumbToggle');
      const grid = document.getElementById('estacionesGrid');
      if (!btn || !grid) return;
      const key = 'pcs_estaciones_thumb_mobile_' + String(empresaId || 0);
      function applyThumbState(on) {
        grid.classList.toggle('estaciones-thumb-mobile', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.textContent = on ? 'Vista normal' : 'Ver miniaturas';
      }
      let stored = false;
      try {
        stored = window.sessionStorage.getItem(key) === '1';
      } catch (e) {
        stored = false;
      }
      applyThumbState(stored);
      btn.addEventListener('click', () => {
        const next = !grid.classList.contains('estaciones-thumb-mobile');
        try {
          window.sessionStorage.setItem(key, next ? '1' : '0');
        } catch (e) {}
        applyThumbState(next);
      });
    }

    function ensureYouTubeStationOverlay() {
      let overlay = document.getElementById('youtubeStationOverlay');
      if (overlay) return overlay;

      overlay = document.createElement('div');
      overlay.id = 'youtubeStationOverlay';
      overlay.className = 'youtube-station-overlay';
      overlay.hidden = true;
      overlay.innerHTML = '' +
        '<div class="youtube-station-overlay-card" role="dialog" aria-modal="true" aria-labelledby="youtubeStationOverlayTitle">' +
          '<div class="youtube-station-overlay-head">' +
            '<div>' +
              '<strong id="youtubeStationOverlayTitle">Estación YouTube</strong>' +
              '<span>Vista ampliada con búsqueda y reproducción</span>' +
            '</div>' +
            '<div class="youtube-station-overlay-actions">' +
              '<button type="button" class="youtube-station-overlay-minimize btn secondary">Minimizar</button>' +
              '<button type="button" class="youtube-station-overlay-close btn secondary">Cerrar</button>' +
            '</div>' +
          '</div>' +
          '<iframe class="youtube-station-overlay-frame" title="Estación YouTube ampliada" loading="lazy" allow="autoplay; encrypted-media; fullscreen"></iframe>' +
        '</div>';
      document.body.appendChild(overlay);

      overlay.addEventListener('click', ev => {
        if (ev.target === overlay) {
          closeYouTubeStationOverlay();
        }
      });

      const closeBtn = overlay.querySelector('.youtube-station-overlay-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', ev => {
          ev.preventDefault();
          closeYouTubeStationOverlay();
        });
      }

      const minimizeBtn = overlay.querySelector('.youtube-station-overlay-minimize');
      if (minimizeBtn) {
        minimizeBtn.addEventListener('click', ev => {
          ev.preventDefault();
          closeYouTubeStationOverlay();
        });
      }

      document.addEventListener('keydown', ev => {
        if (ev.key === 'Escape') {
          closeYouTubeStationOverlay();
        }
      });

      return overlay;
    }

    function openYouTubeStationOverlay(cfg) {
      const overlay = ensureYouTubeStationOverlay();
      const frame = overlay.querySelector('.youtube-station-overlay-frame');
      if (frame) {
        frame.src = buildYouTubeStationBrowserURL(cfg, false);
      }
      overlay.hidden = false;
    }

    function closeYouTubeStationOverlay() {
      const overlay = document.getElementById('youtubeStationOverlay');
      if (!overlay) return;
      overlay.hidden = true;
      const frame = overlay.querySelector('.youtube-station-overlay-frame');
      if (frame) {
        frame.src = 'about:blank';
      }
    }

    async function bootstrap() {
      setStatus('Cargando estaciones...');
      try {
        let cfg = null;
        try {
          cfg = await getConfigFromServer();
        } catch (err) {
          console.warn('Error cargando config desde servidor', err);
        }
        if (!cfg) {
          cfg = normalizeConfig({ cantidad: 1, estaciones: [] });
          try { await saveConfigToServer(cfg); } catch (err) { console.warn('No se pudo guardar config por defecto', err); }
        }
        stationConfig = cfg;
        applyCardSize(stationConfig);
        await Promise.all([
          loadColoresEstadoCarrito(),
          loadEstadoCarritosEstacion(),
          loadSensorStates()
        ]);
        renderEstaciones(stationConfig);
        wireEstacionesMobileThumbToggle();
        setupStationPageRefresh();
        window.setInterval(async function () {
          if (document.visibilityState !== 'visible') return;
          try {
            await refreshStationPageState();
          } catch (err) {
            console.warn('No se pudo refrescar el estado de estaciones en segundo plano:', err);
          }
        }, 10000);
        setStatus('');
      } catch (err) {
        console.error('Error cargando estaciones', err);
        const grid = document.getElementById('estacionesGrid');
        if (grid) {
          grid.innerHTML = '<p class="form-help">No se pudieron cargar las estaciones.</p>';
        }
        setStatus('Error cargando estaciones.');
      }

      
    }

    // Cargar estado de sensores desde el backend (dispositivos registrados para la empresa)
    async function loadSensorStates() {
      state.sensorsByEstacion = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/sensor_puertas?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const devices = await res.json();
        if (!Array.isArray(devices)) return;
        devices.forEach(d => {
          const estId = Number(d && (d.estacion_id || 0)) || 0;
          const current = state.sensorsByEstacion[estId];
          const candidate = {
            device_id: d.device_id,
            last_state: d.last_state,
            last_seen: d.last_seen
          };

          if (!current) {
            state.sensorsByEstacion[estId] = candidate;
            return;
          }

          const currentTime = Date.parse(String(current.last_seen || '').replace(' ', 'T')) || 0;
          const candidateTime = Date.parse(String(candidate.last_seen || '').replace(' ', 'T')) || 0;
          if (candidateTime >= currentTime) {
            state.sensorsByEstacion[estId] = candidate;
          }
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de sensores:', err);
      }
    }

    bootstrap();
  </script>
