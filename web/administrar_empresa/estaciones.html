<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Estaciones</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="empresa-subpage">
  <div class="container empresa-module">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h2>Tarjetas de estaciones</h2>
      </div>
      <div id="estacionesGrid" class="portal-grid"></div>
    </section>
  </div>

  <script>
    const empresaId = Number(new URLSearchParams(window.location.search).get('empresa_id') || 0);
    const state = {
      colores: {
        activo: '#d9fbe8',
        inactivo: '#fff9ef'
      },
      carritosPorCodigo: {},
      sensorsByEstacion: {}
    };

    function sanitize(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function storageKey() {
      return 'estaciones_config_empresa_' + empresaId;
    }

    function normalizeText(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function normalizeCode(v) {
      return String(v == null ? '' : v).trim().toLowerCase();
    }

    function toBool(v) {
      if (typeof v === 'boolean') return v;
      if (typeof v === 'number') return v === 1;
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      return raw === '1' || raw === 'true' || raw === 'si' || raw === 'sí';
    }

    function normalizeColor(v, fallback) {
      const raw = String(v == null ? '' : v).trim().toLowerCase();
      const base = String(fallback == null ? '' : fallback).trim().toLowerCase();
      const hex = raw || base;
      if (!hex || hex.length !== 7 || hex.charAt(0) !== '#') {
        return base || '#fff9ef';
      }
      for (let i = 1; i < hex.length; i++) {
        const c = hex.charCodeAt(i);
        const isDigit = c >= 48 && c <= 57;
        const isHex = c >= 97 && c <= 102;
        if (!isDigit && !isHex) {
          return base || '#fff9ef';
        }
      }
      return hex;
    }

    function formatStationEntryDateTime(rawValue) {
      const raw = String(rawValue == null ? '' : rawValue).trim();
      if (!raw) return '';

      const isoLike = raw.includes('T') ? raw : raw.replace(' ', 'T');
      const parsed = new Date(isoLike);
      if (Number.isNaN(parsed.getTime())) {
        return raw;
      }

      return parsed.toLocaleString('es-CO', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getCarritoCodeForStation(stationID) {
      return 'EST-' + empresaId + '-' + stationID;
    }

    function openStationCarrito(stationID, stationName, useSimpleSales) {
      if (!empresaId || !stationID) return;
      const carritoCode = getCarritoCodeForStation(stationID);
      const page = useSimpleSales ? '/administrar_empresa/ventas_simple.html' : '/administrar_empresa/carrito_de_compras.html';
      const url = page + '?empresa_id=' + encodeURIComponent(empresaId) +
        '&estacion_id=' + encodeURIComponent(stationID) +
        '&estacion_nombre=' + encodeURIComponent(stationName || ('Estación ' + stationID)) +
        '&carrito_codigo=' + encodeURIComponent(carritoCode);
      window.location.href = url;
    }

    function isCarritoOperativoActivo(carrito) {
      if (!carrito) return false;
      const estado = normalizeText(carrito.estado) || 'activo';
      const estadoCarrito = normalizeText(carrito.estado_carrito) || 'abierto';
      return estado === 'activo' && estadoCarrito !== 'cerrado';
    }

    async function loadColoresEstadoCarrito() {
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/configuracion_avanzada?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const cfg = await res.json();
        state.colores.activo = normalizeColor(cfg && cfg.color_carrito_activo, '#d9fbe8');
        state.colores.inactivo = normalizeColor(cfg && cfg.color_carrito_inactivo, '#fff9ef');
      } catch (err) {
        console.warn('No se pudieron cargar colores de estado de carrito:', err);
      }
    }

    async function loadEstadoCarritosEstacion() {
      state.carritosPorCodigo = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/carritos_compra?empresa_id=' + encodeURIComponent(empresaId) + '&include_inactive=1', { credentials: 'same-origin' });
        if (!res.ok) return;
        const carritos = await res.json();
        if (!Array.isArray(carritos)) return;

        carritos.forEach(item => {
          const code = normalizeCode(item && item.codigo);
          if (!code) return;
          state.carritosPorCodigo[code] = {
            activo: isCarritoOperativoActivo(item),
            activadoEn: String((item && item.activado_en) || '')
          };
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de carritos por estación:', err);
      }
    }

    function readConfig() {
      if (!empresaId) return null;
      try {
        const raw = localStorage.getItem(storageKey());
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        const cantidad = Math.max(1, Math.min(500, Number(parsed.cantidad || 1)));
        const estacionesRaw = Array.isArray(parsed.estaciones) ? parsed.estaciones : [];
        const estaciones = [];
        for (let i = 0; i < cantidad; i++) {
          const est = estacionesRaw[i] || {};
          const nombre = String(est.nombre || '').trim();
          const ventaSimpleHabilitada = toBool(est.venta_simple_habilitada) || toBool(est.modo_venta_simple);
          estaciones.push({ id: i + 1, nombre: nombre || ('Estación ' + (i + 1)), venta_simple_habilitada: ventaSimpleHabilitada });
        }
        return { cantidad, estaciones };
      } catch (_) {
        return null;
      }
    }

    function renderEstaciones(cfg) {
      const grid = document.getElementById('estacionesGrid');
      if (!cfg || !cfg.estaciones || !cfg.estaciones.length) {
        grid.innerHTML = '<p class="form-help">No hay estaciones configuradas. Ve a Configuración de estaciones para crearlas.</p>';
        return;
      }
      grid.innerHTML = cfg.estaciones.map(est => {
        const stationID = Number(est.id || 0);
        const useSimpleSales = !!est.venta_simple_habilitada;
        const carritoCode = getCarritoCodeForStation(stationID);
        const info = state.carritosPorCodigo[normalizeCode(carritoCode)] || null;
        const carritoActivo = !!(info && info.activo);
        const entradaLabel = carritoActivo ? formatStationEntryDateTime(info && info.activadoEn) : '';
        const entradaHtml = carritoActivo && entradaLabel
          ? '<p class="station-entry-time">Entrada: ' + sanitize(entradaLabel) + '</p>'
          : '';
        const badgeText = carritoActivo ? 'Carrito activo' : 'Carrito inactivo';
        const modeText = useSimpleSales ? 'Modo: Venta simple' : 'Modo: Carrito completo';
        const badgeClass = carritoActivo ? 'station-status-active' : 'station-status-inactive';
        const stationClass = carritoActivo ? 'station-card-active' : 'station-card-inactive';
        const stationColor = carritoActivo ? state.colores.activo : state.colores.inactivo;

        // Estado del sensor asociado a la estación (negro = no conectado/inactivo, verde = sensor activo)
        const sensor = (state.sensorsByEstacion && state.sensorsByEstacion[stationID]) ? state.sensorsByEstacion[stationID] : null;
        let sensorColor = '#000000';
        if (sensor && sensor.device_id) {
          const lastStateNormalized = normalizeText(sensor.last_state || '');
          const activeStates = ['1','true','si','on','active','open'];
          const isActive = activeStates.indexOf(lastStateNormalized) !== -1;
          sensorColor = isActive ? '#00c853' : '#000000';
          if (sensor.last_seen) {
            try {
              const parsed = new Date((sensor.last_seen || '').replace(' ', 'T'));
              if (!isNaN(parsed.getTime()) && (Date.now() - parsed.getTime()) > 120000) {
                sensorColor = '#000000';
              }
            } catch (err) {
              // ignore parse errors
            }
          }
        }

        return '<article class="portal-card ' + stationClass + '" style="--station-state-bg:' + sanitize(stationColor) + ';" data-estacion-id="' + stationID + '" data-estacion-nombre="' + sanitize(est.nombre) + '" data-venta-simple="' + (useSimpleSales ? '1' : '0') + '" tabindex="0" role="button" aria-label="Abrir estación ' + sanitize(est.nombre) + '">' +
          '<div class="station-sensor-indicator" style="background-color:' + sanitize(sensorColor) + '"></div>' +
          '<h3>' + sanitize(est.nombre) + '</h3>' +
          '<p>Estación #' + stationID + '</p>' +
          '<p class="station-mode-label">' + modeText + '</p>' +
          entradaHtml +
          '<span class="station-status-badge ' + badgeClass + '">' + badgeText + '</span>' +
          '</article>';
      }).join('');

      grid.querySelectorAll('.portal-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', ev => {
          const stationID = Number(card.getAttribute('data-estacion-id') || 0);
          const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
          const useSimpleSales = card.getAttribute('data-venta-simple') === '1';
          openStationCarrito(stationID, stationName, useSimpleSales);
        });
        card.addEventListener('keydown', ev => {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          ev.preventDefault();
          const stationID = Number(card.getAttribute('data-estacion-id') || 0);
          const stationName = String(card.getAttribute('data-estacion-nombre') || '').trim();
          const useSimpleSales = card.getAttribute('data-venta-simple') === '1';
          openStationCarrito(stationID, stationName, useSimpleSales);
        });
      });
    }

    async function bootstrap() {
      const cfg = readConfig();
      await Promise.all([
        loadColoresEstadoCarrito(),
        loadEstadoCarritosEstacion(),
        loadSensorStates()
      ]);
      renderEstaciones(cfg);
    }

    // Cargar estado de sensores desde el backend (dispositivos registrados para la empresa)
    async function loadSensorStates() {
      state.sensorsByEstacion = {};
      if (!empresaId) return;
      try {
        const res = await fetch('/api/empresa/sensor_puertas?empresa_id=' + encodeURIComponent(empresaId), { credentials: 'same-origin' });
        if (!res.ok) return;
        const devices = await res.json();
        if (!Array.isArray(devices)) return;
        devices.forEach(d => {
          const estId = Number(d && (d.estacion_id || 0)) || 0;
          state.sensorsByEstacion[estId] = {
            device_id: d.device_id,
            last_state: d.last_state,
            last_seen: d.last_seen
          };
        });
      } catch (err) {
        console.warn('No se pudo cargar estado de sensores:', err);
      }
    }

    bootstrap();
  </script>
</body>
</html>
