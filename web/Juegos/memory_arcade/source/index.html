<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Memoria Arcade</title>
  <link rel="stylesheet" href="/Juegos/open_game_source.css">
  <script src="/Juegos/open_game_embed.js"></script>
  <style>
    .memory-board { display:grid; grid-template-columns:repeat(4, minmax(62px, 110px)); gap:10px; }
    .card {
      aspect-ratio: 1;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      background: linear-gradient(135deg, #0f766e, #1e293b);
      color: #fef3c7;
      font-size: clamp(1.6rem, 8vw, 3.2rem);
      font-weight: 900;
      box-shadow: 0 14px 24px rgba(0,0,0,.25);
    }
    .card.open, .card.done { background: linear-gradient(135deg, #facc15, #fb7185); color:#111827; }
    .card.done { opacity: .78; }
    @media (max-width:680px){ .memory-board{ width:min(94vw, 390px); gap:7px; grid-template-columns:repeat(4,1fr);} }
  </style>
</head>
<body>
  <div class="game-root">
    <div class="game-hud"><span><strong>Memoria</strong></span><span>Movimientos: <strong id="moves">0</strong></span><span>Parejas: <strong id="pairs">0</strong>/8</span><span hidden>Record: <strong id="score" data-score="0">0</strong></span></div>
    <div class="game-board-wrap"><div id="board" class="memory-board game-board"></div><div id="message" class="game-message" hidden></div></div>
    <div class="game-actions"><button id="reset" class="game-btn" type="button">Nuevo</button></div>
  </div>
  <script>
    (function(){
      var icons = ["7","K","A","Q","J","9","8","$"], cards = [], first = null, lock = false, moves = 0, pairs = 0;
      var board = document.getElementById("board"), movesEl = document.getElementById("moves"), pairsEl = document.getElementById("pairs"), scoreEl = document.getElementById("score"), msg = document.getElementById("message");
      function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
      function reset(){
        cards = shuffle(icons.concat(icons)).map(function(v,i){ return {v:v,i:i,open:false,done:false}; });
        first = null; lock = false; moves = 0; pairs = 0; scoreEl.textContent = "0"; scoreEl.setAttribute("data-score", "0"); msg.hidden = true; render();
      }
      function choose(card){
        if(lock || card.open || card.done) return;
        card.open = true;
        if(!first){ first = card; render(); return; }
        moves++;
        if(first.v === card.v){
          first.done = card.done = true; first = null; pairs++;
          if(pairs === icons.length) { var record = Math.max(1, 10000 - (moves * 100)); scoreEl.textContent = String(record); scoreEl.setAttribute("data-score", String(record)); msg.textContent = "Completado en " + moves + " movimientos."; msg.hidden = false; }
          render(); return;
        }
        lock = true; render();
        setTimeout(function(){ first.open = false; card.open = false; first = null; lock = false; render(); }, 650);
      }
      function render(){
        movesEl.textContent = moves; pairsEl.textContent = pairs; board.innerHTML = "";
        cards.forEach(function(card){
          var b=document.createElement("button"); b.type="button"; b.className="card";
          if(card.open) b.classList.add("open"); if(card.done) b.classList.add("done");
          b.textContent = (card.open || card.done) ? card.v : "?";
          b.onclick=function(){ choose(card); };
          board.appendChild(b);
        });
      }
      document.getElementById("reset").onclick = reset;
      window.addEventListener("keydown", function(e){ if(e.key==="r" || e.key==="R") reset(); });
      reset();
    }());
  </script>
</body>
</html>
