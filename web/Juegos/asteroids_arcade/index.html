<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Asteroids Arcade</title>
  <link rel="stylesheet" href="/estilos.css">
  <link rel="stylesheet" href="/Juegos/arcade_embed.css">
  <script src="/menu.js"></script>
</head>
<body>
  <main class="arcade-shell">
    <header class="arcade-header">
      <a class="btn secondary" href="/Juegos/menu_juegos.html">Volver a juegos</a>
      <div><h1>Asteroids Arcade</h1><p>Nave vectorial, asteroides, disparos, sonido local y controles clasicos de rotacion y propulsion.</p></div>
      <span class="arcade-license">MIT</span>
    </header>
    <section class="arcade-panel">
      <iframe class="arcade-frame" data-arcade-frame data-arcade-aspect="0.62" title="Asteroids Arcade" src="./source/index.html"></iframe>
      <div class="arcade-controls">
        <button class="arcade-key" type="button" data-key="32" data-mode="tap">Iniciar/Fuego</button>
        <button class="arcade-key" type="button" data-key="37">Girar izq</button>
        <button class="arcade-key" type="button" data-key="38">Motor</button>
        <button class="arcade-key" type="button" data-key="39">Girar der</button>
      </div>
    </section>
  </main>
  <script src="/Juegos/arcade_embed.js"></script>
</body>
</html>
