<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Clásico</title>
    <link rel="stylesheet" href="../estilos.css">
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: #fff; font-family: sans-serif; }
        #menu, #game-container { margin-top: 50px; text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        .btn:hover { background: #2980b9; }
        canvas { background: #000; border: 4px solid #555; }
        #instructions { display: none; margin: 20px; max-width: 600px; background: #333; padding: 20px; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Tetris Clásico</h1>
        <button class="btn" id="btn-play">Jugar</button>
        <button class="btn" id="btn-inst">Instrucciones</button>
        <div id="instructions">
            <p><strong>Instrucciones:</strong></p>
            <ul>
                <li>Usa las flechas Izquierda/Derecha para mover.</li>
                <li>Usa flecha Arriba para rotar.</li>
                <li>Usa flecha Abajo para caer rápido.</li>
                <li>Completa líneas completas para ganar puntos y avanzar de nivel.</li>
            </ul>
        </div>
    </div>
    <div id="game-container" style="display:none;">
        <h3>Tetris - Puntos: <span id="score">0</span> | Nivel: <span id="level">1</span></h3>
        <canvas id="gameCanvas" width="200" height="400"></canvas>
    </div>

    <script src="../menu.js"></script>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, type, duration) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        document.getElementById('btn-inst').addEventListener('click', () => {
            const inst = document.getElementById('instructions');
            inst.style.display = inst.style.display === 'block' ? 'none' : 'block';
            playBeep(400, 'sine', 0.1);
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ROWS = 20;
        const COLS = 10;
        const SQ = 20;
        const VACANT = "black"; 

        function drawSquare(x, y, color){
            ctx.fillStyle = color;
            ctx.fillRect(x*SQ, y*SQ, SQ, SQ);
            ctx.strokeStyle = "white";
            ctx.strokeRect(x*SQ, y*SQ, SQ, SQ);
        }

        let board = [];
        for(let r = 0; r < ROWS; r++){
            board[r] = [];
            for(let c = 0; c < COLS; c++){
                board[r][c] = VACANT;
            }
        }

        function drawBoard(){
            for(let r = 0; r < ROWS; r++){
                for(let c = 0; c < COLS; c++){
                    drawSquare(c, r, board[r][c]);
                }
            }
        }

        const PIECES = [
            [ [[1, 1], [1, 1]], "yellow" ], // O
            [ [[0, 1, 0], [1, 1, 1]], "purple" ], // T
            [ [[1, 0, 0], [1, 1, 1]], "orange" ], // L (J reversed)
            [ [[1, 1, 1, 1]], "cyan" ], // I
            [ [[0, 1, 1], [1, 1, 0]], "green" ], // S
            [ [[1, 1, 0], [0, 1, 1]], "red" ], // Z
            [ [[0, 0, 1], [1, 1, 1]], "blue" ] // J
        ];

        function Piece(tetromino, color){
            this.tetromino = tetromino;
            this.color = color;
            this.tetrominoN = 0;
            this.activeTetromino = this.tetromino[this.tetrominoN];
            this.x = 3;
            this.y = -2;
        }

        Piece.prototype.fill = function(color){
            for(let r = 0; r < this.activeTetromino.length; r++){
                for(let c = 0; c < this.activeTetromino[r].length; c++){
                    if(this.activeTetromino[r][c]){
                        drawSquare(this.x + c, this.y + r, color);
                    }
                }
            }
        }

        Piece.prototype.draw = function(){ this.fill(this.color); }
        Piece.prototype.unDraw = function(){ this.fill(VACANT); }

        Piece.prototype.moveDown = function(){
            if(!this.collision(0, 1, this.activeTetromino)){
                this.unDraw();
                this.y++;
                this.draw();
            } else {
                this.lock();
                p = randomPiece();
            }
        }

        Piece.prototype.moveRight = function(){
            if(!this.collision(1, 0, this.activeTetromino)){
                this.unDraw(); this.x++; this.draw();
            }
        }

        Piece.prototype.moveLeft = function(){
            if(!this.collision(-1, 0, this.activeTetromino)){
                this.unDraw(); this.x--; this.draw();
            }
        }

        Piece.prototype.rotate = function(){
            let nextPattern = this.activeTetromino[0].map((val, index) => this.activeTetromino.map(row => row[index]).reverse());
            if(!this.collision(0, 0, nextPattern)){
                this.unDraw();
                this.activeTetromino = nextPattern;
                this.draw();
            }
        }

        let score = 0, level = 1, gameOver = false, linesCleared = 0;
        Piece.prototype.lock = function(){
            for(let r = 0; r < this.activeTetromino.length; r++){
                for(let c = 0; c < this.activeTetromino[r].length; c++){
                    if(!this.activeTetromino[r][c]) continue;
                    if(this.y + r < 0){
                        gameOver = true;
                        playBeep(100, 'sawtooth', 1);
                        setTimeout(endGameProcess, 500);
                        break;
                    }
                    board[this.y+r][this.x+c] = this.color;
                }
            }
            if(gameOver) return;

            let lines = 0;
            for(let r = 0; r < ROWS; r++){
                let isFull = true;
                for(let c = 0; c < COLS; c++){
                    isFull = isFull && (board[r][c] !== VACANT);
                }
                if(isFull){
                    lines++;
                    for(let y = r; y > 1; y--){
                        for(let c = 0; c < COLS; c++){
                            board[y][c] = board[y-1][c];
                        }
                    }
                    for(let c = 0; c < COLS; c++){ board[0][c] = VACANT; }
                }
            }
            if(lines > 0) {
                playBeep(800, 'sine', 0.2);
                linesCleared += lines;
                score += lines * 100 * level;
                level = Math.floor(linesCleared / 5) + 1;
                document.getElementById('score').innerText = score;
                document.getElementById('level').innerText = level;
            }
            drawBoard();
        }

        Piece.prototype.collision = function(x, y, piece){
            for(let r = 0; r < piece.length; r++){
                for(let c = 0; c < piece[r].length; c++){
                    if(!piece[r][c]) continue;
                    let newX = this.x + c + x;
                    let newY = this.y + r + y;
                    if(newX < 0 || newX >= COLS || newY >= ROWS) return true;
                    if(newY < 0) continue;
                    if(board[newY][newX] !== VACANT) return true;
                }
            }
            return false;
        }

        function randomPiece(){
            let r = Math.floor(Math.random() * PIECES.length);
            return new Piece(PIECES[r][0], PIECES[r][1]);
        }

        let p;
        let dropStart = Date.now();

        function drop(){
            if(gameOver) return;
            let now = Date.now();
            let speed = Math.max(100, 1000 - (level * 100));
            if(now - dropStart > speed){
                p.moveDown();
                dropStart = Date.now();
            }
            if(!gameOver) requestAnimationFrame(drop);
        }

        document.addEventListener('keydown', (e) => {
            if(gameOver) return;
            if(e.key === "ArrowLeft"){ p.moveLeft(); p.dropStart = Date.now(); }
            else if(e.key === "ArrowUp"){ p.rotate(); p.dropStart = Date.now(); }
            else if(e.key === "ArrowRight"){ p.moveRight(); p.dropStart = Date.now(); }
            else if(e.key === "ArrowDown"){ p.moveDown(); }
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            playBeep(600, 'square', 0.2);
            gameOver = false; score = 0; level = 1; linesCleared = 0;
            document.getElementById('score').innerText = score; document.getElementById('level').innerText = level;
            for(let r = 0; r < ROWS; r++) for(let c = 0; c < COLS; c++) board[r][c] = VACANT;
            drawBoard();
            p = randomPiece();
            drop();
        });

        function endGameProcess() {
            let name = prompt("Juego Terminado. Puntaje: " + score + "\nIngresa tu nombre:");
            if(name){
                fetch('/api/public/juegos/records', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ juego: "Tetris", nombre_jugador: name, puntaje: score, nivel: level })
                }).catch(console.error);
            }
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
        }
    </script>
</body>
</html>
