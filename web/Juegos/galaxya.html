<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxya</title>
    <link rel="stylesheet" href="../estilos.css">
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: #fff; font-family: sans-serif; }
        #menu, #game-container { margin-top: 50px; text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        .btn:hover { background: #2980b9; }
        canvas { background: #000; border: 4px solid #444; }
        #instructions { display: none; margin: 20px; max-width: 600px; background: #333; padding: 20px; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Galaxya</h1>
        <button class="btn" id="btn-play">Jugar</button>
        <button class="btn" id="btn-inst">Instrucciones</button>
        <div id="instructions">
            <p><strong>Instrucciones:</strong></p>
            <ul>
                <li>Usa las flechas Izquierda/Derecha para mover la nave.</li>
                <li>Presiona Espacio para disparar a los alienígenas.</li>
                <li>Si los alienígenas llegan abajo o te tocan, pierdes.</li>
            </ul>
        </div>
    </div>
    <div id="game-container" style="display:none;">
        <h3>Galaxya - Puntos: <span id="score">0</span> | Nivel: <span id="level">1</span></h3>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
    </div>

    <script src="../menu.js"></script>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, type, duration) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        document.getElementById('btn-inst').addEventListener('click', () => {
            const inst = document.getElementById('instructions');
            inst.style.display = inst.style.display === 'block' ? 'none' : 'block';
            playBeep(400, 'sine', 0.1);
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0, level = 1, gameOver = false, animationId;
        let ship = { x: 180, width: 40, height: 20, speed: 5 };
        let bullets = [];
        let enemies = [];
        let enemySpeed = 1;
        let keys = {};

        function initLevel() {
            enemies = [];
            for(let r=0; r<3+level; r++){
                for(let c=0; c<8; c++){
                    enemies.push({ x: 30 + c*40, y: 30 + r*30, width: 25, height: 20, alive: true });
                }
            }
            enemySpeed = 1 + (level * 0.2);
        }

        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            playBeep(600, 'square', 0.2);
            score = 0; level = 1; gameOver = false;
            initLevel();
            updateUI();
            cancelAnimationFrame(animationId);
            gameLoop();
        });

        document.addEventListener('keydown', (e) => { keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });
        document.addEventListener('keydown', (e) => {
            if(gameOver) return;
            if(e.key === ' ' || e.key === 'Spacebar'){
                bullets.push({ x: ship.x + ship.width/2 - 2, y: canvas.height - ship.height - 10, width: 4, height: 10 });
                playBeep(800, 'square', 0.1);
            }
        });

        let enemyDirection = 1;

        function gameLoop() {
            if(gameOver) return;
            animationId = requestAnimationFrame(gameLoop);
            
            // Mover nave
            if(keys['ArrowLeft'] && ship.x > 0) ship.x -= ship.speed;
            if(keys['ArrowRight'] && ship.x < canvas.width - ship.width) ship.x += ship.speed;

            // Mover balas
            for(let i=bullets.length-1; i>=0; i--){
                bullets[i].y -= 7;
                if(bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Mover enemigos
            let moveDown = false;
            for(let e of enemies){
                if(e.alive){
                    e.x += enemySpeed * enemyDirection;
                    if(e.x <= 0 || e.x + e.width >= canvas.width){
                        moveDown = true;
                    }
                }
            }
            if(moveDown){
                enemyDirection *= -1;
                for(let e of enemies) if(e.alive) e.y += 20;
            }

            // Colisiones balas-enemigos
            for(let i=bullets.length-1; i>=0; i--){
                for(let e of enemies){
                    if(e.alive && bullets[i] && bullets[i].x < e.x + e.width && bullets[i].x + bullets[i].width > e.x &&
                       bullets[i].y < e.y + e.height && bullets[i].height + bullets[i].y > e.y) {
                        e.alive = false;
                        bullets.splice(i, 1);
                        score += 10;
                        updateUI();
                        playBeep(200, 'sawtooth', 0.1);
                        break;
                    }
                }
            }

            // Chequear victoria / Game Over
            let anyAlive = false;
            for(let e of enemies){
                if(e.alive) {
                    anyAlive = true;
                    if(e.y + e.height >= canvas.height - ship.height){
                        gameOver = true;
                        playBeep(100, 'sawtooth', 1);
                        setTimeout(endGameProcess, 500);
                        return;
                    }
                }
            }
            if(!anyAlive){
                level++;
                score += 500;
                playBeep(1200, 'square', 0.5);
                updateUI();
                initLevel();
            }

            draw();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // Nave
            ctx.fillStyle = 'cyan';
            ctx.fillRect(ship.x, canvas.height - ship.height, ship.width, ship.height);

            // Balas
            ctx.fillStyle = 'yellow';
            for(let b of bullets) ctx.fillRect(b.x, b.y, b.width, b.height);

            // Enemigos
            ctx.fillStyle = 'red';
            for(let e of enemies){
                if(e.alive){
                    ctx.fillRect(e.x, e.y, e.width, e.height);
                }
            }
        }

        function endGameProcess() {
            let name = prompt("Juego Terminado. Puntaje: " + score + "\nIngresa tu nombre:");
            if(name){
                fetch('/api/public/juegos/records', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ juego: "Galaxya", nombre_jugador: name, puntaje: score, nivel: level })
                }).catch(console.error);
            }
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
        }
    </script>
</body>
</html>
