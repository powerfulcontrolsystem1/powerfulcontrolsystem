<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Emulador N64</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    .n64-shell {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding-top: 52px;
      box-sizing: border-box;
    }

    .n64-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
    }

    .n64-header h1 {
      margin: 0;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      letter-spacing: 0;
    }

    .n64-header p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .86rem;
    }

    .n64-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    @media (max-width: 720px) {
      .n64-shell {
        padding-top: 44px;
      }

      .n64-header {
        padding: 6px 8px;
      }

      .n64-header p {
        display: none;
      }

      .n64-header .btn {
        min-height: 34px;
        padding: 0 10px;
      }
    }
  </style>
</head>
<body>
  <main class="n64-shell">
    <header class="n64-header">
      <div>
        <h1>Emulador N64</h1>
        <p>Vista tactil del emulador web con ROMs legales y controles para celular.</p>
      </div>
      <a class="btn secondary" href="/Juegos/menu_juegos.html">Volver</a>
    </header>
    <iframe class="n64-frame" title="Emulador N64" src="/emulador/"></iframe>
  </main>
</body>
</html>
