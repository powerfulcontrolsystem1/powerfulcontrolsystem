<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Space Dock 3D</title>
  <link rel="stylesheet" href="/Juegos/open_game_source.css">
  <script src="/Juegos/open_game_embed.js"></script>
  <style>#game{width:100%;height:100%;min-height:340px;border-radius:8px;border:1px solid rgba(56,189,248,.35);}</style>
</head>
<body>
  <div class="game-root">
    <div class="game-hud"><span><strong>Space Dock 3D</strong></span><span>Energia: <strong id="energy">100</strong></span><span>Puntos: <strong id="score">0</strong></span></div>
    <div class="game-board-wrap"><canvas id="game"></canvas><div id="message" class="game-message">Esquiva rocas rojas y recoge energia verde.</div></div>
    <div class="game-actions"><button class="game-btn" data-act="up">Arriba</button><button class="game-btn" data-act="left">Izq</button><button class="game-btn" data-act="down">Abajo</button><button class="game-btn" data-act="right">Der</button><button class="game-btn" data-act="reset">Nuevo</button></div>
  </div>
  <script src="/Juegos/webgl_arcade_engine.js"></script>
  <script>
    (function(){
      var renderer=PCSWebGLArcade.createRenderer(document.getElementById("game")), keys=PCSWebGLArcade.bindKeys();
      var ship={x:0,y:0}, rocks=[], energy=100, score=0, speed=.36, spawn=0, over=false, last=0;
      var energyEl=document.getElementById("energy"), scoreEl=document.getElementById("score"), msg=document.getElementById("message");
      function reset(){ ship.x=0; ship.y=0; rocks=[]; energy=100; score=0; speed=.36; spawn=0; over=false; msg.textContent="Esquiva rocas rojas y recoge energia verde."; msg.hidden=false; setTimeout(function(){ if(!over) msg.hidden=true; },1200); }
      function move(dx,dy){ if(over){ reset(); return; } ship.x=Math.max(-2.8,Math.min(2.8,ship.x+dx)); ship.y=Math.max(-1.9,Math.min(1.9,ship.y+dy)); }
      function tick(t){
        var dt=Math.min(32,t-last||16)/16; last=t;
        if(keys.ArrowLeft) move(-.12*dt,0); if(keys.ArrowRight) move(.12*dt,0); if(keys.ArrowUp) move(0,.12*dt); if(keys.ArrowDown) move(0,-.12*dt); if(keys.r||keys.R) reset();
        if(!over){
          score+=dt; energy-=.018*dt; speed+=.0005*dt; spawn-=dt;
          if(spawn<=0){ rocks.push({x:(Math.random()*5.6)-2.8,y:(Math.random()*3.8)-1.9,z:-60,type:Math.random()<.22?"energy":"rock",rot:Math.random()*6}); spawn=18-Math.min(8,speed*10); }
          rocks.forEach(function(r){ r.z+=speed*dt; r.rot+=.03*dt; });
          rocks=rocks.filter(function(r){ return r.z<7; });
          rocks.forEach(function(r){
            if(r.z>1.3 && r.z<3.2 && Math.abs(r.x-ship.x)<.65 && Math.abs(r.y-ship.y)<.65){
              if(r.type==="energy"){ energy=Math.min(100,energy+22); r.z=9; score+=120; }
              else { energy-=28; r.z=9; if(navigator.vibrate) navigator.vibrate(70); }
            }
          });
          if(energy<=0){ over=true; msg.textContent="Nave perdida. Puntos: "+Math.floor(score)+". Pulsa Nuevo."; msg.hidden=false; }
        }
        draw(t*.001); requestAnimationFrame(tick);
      }
      function draw(time){
        var p=renderer.clear([.01,.015,.04]), view=renderer.translate(p,0,0,-8);
        for(var i=0;i<34;i++){ var z=-i*2.4+(time*3%2.4); renderer.drawCube(view,-3.5,2.4,z,.035,.035,.035,[.8,.9,1],0,0); renderer.drawCube(view,3.4,-2.2,z,.03,.03,.03,[.8,.9,1],0,0); }
        renderer.drawCube(view,ship.x,ship.y,2,.62,.18,.84,[.24,.75,1],0,time*.9);
        renderer.drawCube(view,ship.x,ship.y-.28,2.25,.38,.08,.38,[.98,.78,.20],0,time*.9);
        rocks.forEach(function(r){ var c=r.type==="energy"?[.22,.9,.35]:[.92,.22,.22]; var s=r.type==="energy"?.32:.5; renderer.drawCube(view,r.x,r.y,r.z,s,s,s,c,r.rot,r.rot*.7); });
        energyEl.textContent=Math.max(0,Math.floor(energy)); scoreEl.textContent=Math.floor(score);
      }
      document.querySelectorAll("[data-act]").forEach(function(b){ b.onclick=function(){ var a=b.dataset.act; if(a==="reset") reset(); else move(a==="right"?.38:a==="left"?-.38:0,a==="up"?.38:a==="down"?-.38:0); }; });
      reset(); requestAnimationFrame(tick);
    }());
  </script>
</body>
</html>
