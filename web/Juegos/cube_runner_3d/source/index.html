<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cube Runner 3D</title>
  <link rel="stylesheet" href="/Juegos/open_game_source.css">
  <script src="/Juegos/open_game_embed.js"></script>
  <style>#game{width:100%;height:100%;min-height:340px;border-radius:8px;border:1px solid rgba(250,204,21,.3);}</style>
</head>
<body>
  <div class="game-root">
    <div class="game-hud"><span><strong>Cube Runner 3D</strong></span><span>Dist: <strong id="score">0</strong></span><span>Vel: <strong id="speed">1</strong></span></div>
    <div class="game-board-wrap"><canvas id="game"></canvas><div id="message" class="game-message">Flechas para cambiar de carril. Espacio para saltar.</div></div>
    <div class="game-actions"><button class="game-btn" data-act="left">Izq</button><button class="game-btn" data-act="jump">Saltar</button><button class="game-btn" data-act="right">Der</button><button class="game-btn" data-act="reset">Nuevo</button></div>
  </div>
  <script src="/Juegos/webgl_arcade_engine.js"></script>
  <script>
    (function(){
      var renderer = PCSWebGLArcade.createRenderer(document.getElementById("game")), keys = PCSWebGLArcade.bindKeys();
      var lane=0, targetLane=0, y=0, vy=0, obstacles=[], score=0, speed=0.42, over=false, last=0, spawn=0;
      var scoreEl=document.getElementById("score"), speedEl=document.getElementById("speed"), msg=document.getElementById("message");
      function reset(){ lane=0; targetLane=0; y=0; vy=0; obstacles=[]; score=0; speed=.42; over=false; spawn=0; msg.textContent="Flechas para cambiar de carril. Espacio para saltar."; msg.hidden=false; setTimeout(function(){ if(!over) msg.hidden=true; },1200); }
      function input(act){ if(over){ reset(); return; } if(act==="left") targetLane=Math.max(-1,targetLane-1); if(act==="right") targetLane=Math.min(1,targetLane+1); if(act==="jump" && y<=.01) vy=.28; }
      function tick(t){
        var dt=Math.min(32,t-last||16)/16; last=t;
        if(keys.ArrowLeft){ input("left"); keys.ArrowLeft=false; } if(keys.ArrowRight){ input("right"); keys.ArrowRight=false; } if(keys[" "]){ input("jump"); keys[" "]=false; } if(keys.r||keys.R){ reset(); }
        if(!over){
          speed += .0008*dt; score += speed*dt; spawn -= dt;
          if(spawn<=0){ obstacles.push({lane:Math.floor(Math.random()*3)-1,z:-55}); spawn=34-Math.min(18,speed*10); }
          lane += (targetLane-lane)*.22*dt; y=Math.max(0,y+vy*dt); vy-=.018*dt; if(y===0)vy=0;
          obstacles.forEach(function(o){ o.z += speed*dt; });
          obstacles = obstacles.filter(function(o){ return o.z<8; });
          obstacles.forEach(function(o){ if(Math.abs(o.lane-lane)<.45 && o.z>1.2 && o.z<3.4 && y<.75){ over=true; msg.textContent="Choque. Distancia: "+Math.floor(score)+". Pulsa Nuevo."; msg.hidden=false; if(navigator.vibrate) navigator.vibrate([80,40,80]); } });
        }
        draw(t*.001); requestAnimationFrame(tick);
      }
      function draw(time){
        var p=renderer.clear([.02,.03,.07]), view=renderer.translate(p,0,-1.8,-8), x=lane*2.2;
        renderer.drawCube(view,0,-1.2,-18,3.8,.08,42,[.10,.16,.27],0,0);
        for(var i=0;i<26;i++){ renderer.drawCube(view,-2.4,-.9,-i*3, .08,.08,1.2,[.95,.78,.20],0,0); renderer.drawCube(view,2.4,-.9,-i*3,.08,.08,1.2,[.95,.78,.20],0,0); }
        renderer.drawCube(view,x,-.45+y,2,.52,.52,.52,[.20,.78,.98],time, time*.7);
        obstacles.forEach(function(o){ renderer.drawCube(view,o.lane*2.2,-.52,o.z,.62,.62,.62,[.96,.22,.22],time*.8, time*.3); });
        scoreEl.textContent=Math.floor(score); speedEl.textContent=(speed*2.3).toFixed(1);
      }
      document.querySelectorAll("[data-act]").forEach(function(b){ b.onclick=function(){ input(b.dataset.act); if(b.dataset.act==="reset") reset(); }; });
      reset(); requestAnimationFrame(tick);
    }());
  </script>
</body>
</html>
