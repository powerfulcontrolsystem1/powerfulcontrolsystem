<head>
  <script src='classic-tetris.js'></script>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .tetris-root {
      user-select: none;
      color: #fff;
      background-color: #000;
      font: 17px georgia;
      min-height: 100dvh;
      display: grid;
      justify-items: center;
      align-content: start;
    }

    .tetris-panel {
      width: min(100vw, 520px);
    }

    #tetris-canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100dvh - 42px);
    }

    .tetris-actions {
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .tetris-actions {
        font-size: 0.78rem;
        padding: 3px 5px;
      }

      .tetris-actions input,
      .tetris-actions button {
        min-height: 28px;
      }
    }
  </style>
  <script>
  window.addEventListener('load', event => {
    const canvas = document.getElementById('tetris-canvas');
    const tetris = new ClassicTetris(canvas);
    window.PCSTetrisScore = 0;
    function report(final, score, level) {
      window.PCSTetrisScore = Number(score || 0);
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'pcs-game-score', juego: 'tetris_arcade', puntaje: window.PCSTetrisScore, nivel: Number(level || 1), final: Boolean(final) }, window.location.origin);
        }
      } catch (error) {}
    }
    tetris.on(ClassicTetris.SCORE_CHANGE, event => report(false, event.newScore, tetris.level || 1));
    tetris.on(ClassicTetris.GAME_OVER, event => report(true, event.score, event.level || tetris.level || 1));
    document.getElementById('start-stop-btn').addEventListener('click', event => {
      const startLevel = document.getElementById('level-input').value;
      tetris.setStartLevel(startLevel);
      tetris.togglePlayPause();
    });
    document.getElementById('quit-btn').addEventListener('click', event => {
      tetris.quit();
    });
  });
  </script>
</head>
<body>
  <div class='tetris-root'>
    <div class='tetris-panel'>
      <canvas id='tetris-canvas' class='canvas' width='520' height='600'></canvas>
      <div class='tetris-actions'>
        <label for='level-input'>Start level:</label>
        <input id='level-input' name='level-input' type='number' min='0' max='19' value='5'></input>
        <button id='start-stop-btn'>Play/Pause</button>
        <button id='quit-btn'>Quit</button>
      </div>
    </div>
  </div>
</body>
