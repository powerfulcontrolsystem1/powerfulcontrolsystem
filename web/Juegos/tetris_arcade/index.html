<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tetris Arcade</title>
  <link rel="stylesheet" href="/estilos.css">
  <link rel="stylesheet" href="/Juegos/arcade_embed.css">
  <script src="/menu.js"></script>
</head>
<body>
  <main class="arcade-shell">
    <header class="arcade-header">
      <a class="btn secondary" href="/Juegos/menu_juegos.html">Volver a juegos</a>
      <div><h1>Tetris Arcade</h1><p>Bloques clasicos con seleccion de nivel, pausa, pieza fantasma, hard drop y soporte tactil del juego original.</p></div>
      <span class="arcade-license">MIT</span>
    </header>
    <section class="arcade-panel">
      <iframe class="arcade-frame" data-arcade-frame title="Tetris Arcade" src="./source/index.html"></iframe>
      <div class="arcade-controls">
        <button class="arcade-key" type="button" data-key="37">Izq</button>
        <button class="arcade-key" type="button" data-key="39">Der</button>
        <button class="arcade-key" type="button" data-key="38" data-mode="tap">Rotar</button>
        <button class="arcade-key" type="button" data-key="40">Bajar</button>
        <button class="arcade-key" type="button" data-key="32" data-mode="tap">Drop</button>
      </div>
    </section>
  </main>
  <script src="/Juegos/arcade_embed.js"></script>
</body>
</html>
