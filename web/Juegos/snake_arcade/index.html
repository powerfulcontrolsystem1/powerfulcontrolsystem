<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Snake Arcade</title>
  <link rel="stylesheet" href="/estilos.css">
  <link rel="stylesheet" href="/Juegos/arcade_embed.css">
  <script src="/menu.js"></script>
</head>
<body>
  <main class="arcade-shell">
    <header class="arcade-header">
      <a class="btn secondary" href="/Juegos/menu_juegos.html">Volver a juegos</a>
      <div><h1>Snake Arcade</h1><p>Serpiente clasica responsive con puntaje, velocidad progresiva, comida y reinicio.</p></div>
      <span class="arcade-license">MIT</span>
    </header>
    <section class="arcade-panel">
      <iframe class="arcade-frame" data-arcade-frame title="Snake Arcade" src="./source/index.html"></iframe>
      <div class="arcade-controls">
        <button class="arcade-key" type="button" data-key="38" data-mode="tap">Arriba</button>
        <button class="arcade-key" type="button" data-key="37" data-mode="tap">Izq</button>
        <button class="arcade-key" type="button" data-key="40" data-mode="tap">Abajo</button>
        <button class="arcade-key" type="button" data-key="39" data-mode="tap">Der</button>
      </div>
    </section>
  </main>
  <script src="/Juegos/arcade_embed.js"></script>
</body>
</html>
