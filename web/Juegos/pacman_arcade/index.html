<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Pacman Arcade</title>
  <link rel="stylesheet" href="/estilos.css">
  <link rel="stylesheet" href="./pcs-pacman-arcade.css">
  <script src="/menu.js"></script>
</head>
<body>
  <main class="pacman-page">
    <header class="pacman-header">
      <a class="btn secondary" href="/Juegos/menu_juegos.html">Volver a juegos</a>
      <div>
        <p class="pacman-kicker">Arcade clasico</p>
        <h1>Pacman Arcade</h1>
      </div>
      <p class="pacman-help">PC: flechas, N inicia, P pausa, S sonido.</p>
    </header>

    <section class="pacman-stage" aria-label="Pacman arcade">
      <div id="shim" aria-hidden="true">shim</div>
      <div id="pacman" class="pacman-canvas-host"></div>

      <div class="pacman-touch-controls" aria-label="Controles tactiles">
        <button class="arcade-key arcade-key-start" type="button" data-key="78">Nuevo</button>
        <button class="arcade-key arcade-key-up" type="button" data-key="38" aria-label="Arriba">▲</button>
        <button class="arcade-key arcade-key-sound" type="button" data-key="83" aria-label="Sonido">Sonido</button>
        <button class="arcade-key arcade-key-left" type="button" data-key="37" aria-label="Izquierda">◀</button>
        <button class="arcade-key arcade-key-down" type="button" data-key="40" aria-label="Abajo">▼</button>
        <button class="arcade-key arcade-key-right" type="button" data-key="39" aria-label="Derecha">▶</button>
        <button class="arcade-key arcade-key-pause" type="button" data-key="80">Pausa</button>
      </div>
    </section>
  </main>

  <script src="./pacman.js"></script>
  <script src="./modernizr-1.5.min.js"></script>
  <script>
    (function () {
      var gameHost = document.getElementById("pacman");
      var touchStart = null;

      function dispatchGameKey(code) {
        ["keydown", "keypress"].forEach(function (type) {
          var event = new Event(type, { bubbles: true, cancelable: true });
          Object.defineProperty(event, "keyCode", { value: code });
          Object.defineProperty(event, "which", { value: code });
          document.dispatchEvent(event);
        });
      }

      function unlockGameAudio() {
        if (window.PACMAN && typeof PACMAN.unlockAudio === "function") {
          PACMAN.unlockAudio();
        }
      }

      function handleSwipe(deltaX, deltaY) {
        if (Math.max(Math.abs(deltaX), Math.abs(deltaY)) < 18) {
          dispatchGameKey(80);
          return;
        }
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          dispatchGameKey(deltaX > 0 ? 39 : 37);
        } else {
          dispatchGameKey(deltaY > 0 ? 40 : 38);
        }
      }

      document.querySelectorAll(".arcade-key").forEach(function (button) {
        button.addEventListener("pointerdown", unlockGameAudio, { passive: true });

        button.addEventListener("click", function () {
          unlockGameAudio();
          dispatchGameKey(Number(button.dataset.key));
          if (navigator.vibrate && button.dataset.key !== "83") {
            navigator.vibrate(18);
          }
        });
      });

      gameHost.addEventListener("pointerdown", function (event) {
        unlockGameAudio();
        touchStart = { x: event.clientX, y: event.clientY };
      }, { passive: true });

      gameHost.addEventListener("pointerup", function (event) {
        if (!touchStart) {
          return;
        }
        handleSwipe(event.clientX - touchStart.x, event.clientY - touchStart.y);
        touchStart = null;
      }, { passive: true });

      if (Modernizr.canvas && Modernizr.localstorage && Modernizr.audio && (Modernizr.audio.ogg || Modernizr.audio.mp3)) {
        window.setTimeout(function () {
          PACMAN.init(gameHost, "./");
        }, 0);
      } else {
        gameHost.innerHTML = "<p class='pacman-error'>Este navegador no tiene canvas, audio o almacenamiento local compatible.</p>";
      }
    }());
  </script>
</body>
</html>
