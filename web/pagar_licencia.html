<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pagar Licencia</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Pagar Licencia</h2>
      <ul class="nav">
        <li><a href="/seleccionar_empresa.html"><img class="icon" src="/img/company-briefcase-color.svg" alt="">Volver a empresas</a></li>
        <li><a href="/elegir_licencia.html"><img class="icon" src="/img/shield-license-color.svg" alt="">Elegir otra licencia</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="container">
        <div class="page-header">
          <h1 id="pageTitle">Pagar Licencia</h1>
        </div>

        <div id="payment" class="card">Cargando...</div>
      </div>
    </main>
  </div>

  <script>
    (function(){
      function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m] }) }
      async function run(){
        const params = new URLSearchParams(window.location.search);
        const licenciaId = params.get('licencia_id');
        const empresaId = params.get('empresa_id');
        const status = params.get('status');

        const container = document.getElementById('payment');
        if (status){
          if (status === 'success') container.innerHTML = '<div class="success">Pago completado correctamente. Gracias.</div>';
          else if (status === 'failure') container.innerHTML = '<div class="error">El pago fue rechazado o cancelado.</div>';
          else container.innerHTML = '<div class="muted">Estado de pago: '+escapeHtml(status)+'</div>';
          return;
        }

        if (!licenciaId){ container.innerText = 'ID de licencia no proporcionado.'; return }

        try{
          // obtener info del usuario para correo de Wompi
          let adminEmail = '';
          try{
            const meRes = await fetch('/me');
            if (meRes.ok) {
              const me = await meRes.json();
              adminEmail = me.email || me.Email || '';
            }
          }catch(e){ /* no auth info */ }

          const [res, empRes, methodsRes] = await Promise.all([
          fetch('/super/api/licencias'),
          fetch('/super/api/empresas'),
          fetch('/api/public/licencias/payment_methods')
          ]);
          if (!res.ok) { container.innerText = 'Error al obtener licencias'; return }
          if (!methodsRes.ok) { container.innerText = 'Error al obtener métodos de pago disponibles'; return }
          const licencias = await res.json();
          const empresas = empRes.ok ? await empRes.json() : [];
          const methodsPayload = await methodsRes.json();
          const paymentProviders = Array.isArray(methodsPayload.providers) ? methodsPayload.providers : [];
          const epaycoProvider = paymentProviders.find(function(provider){ return provider && provider.id === 'epayco'; }) || null;
          const wompiProvider = paymentProviders.find(function(provider){ return provider && provider.id === 'wompi'; }) || null;
          const availableMethods = [];
          if (epaycoProvider && epaycoProvider.available) availableMethods.push('epayco');
          if (wompiProvider && wompiProvider.available) availableMethods.push('wompi');
          const paymentCards = [];
          if (epaycoProvider && epaycoProvider.available) {
          paymentCards.push(''+
            '<button id="selectEpaycoCard" type="button" class="payment-method-card payment-method-card-licenses payment-method-epayco">'+
            '<span class="payment-method-badge">Epayco</span>'+
            '<span class="method-name">Epayco</span>'+
            '<span class="method-desc">Tarjeta, PSE y otros</span>'+
            '</button>'
          );
          }
          if (wompiProvider && wompiProvider.available) {
          paymentCards.push(''+
            '<button id="selectWompiCard" type="button" class="payment-method-card payment-method-card-licenses payment-method-wompi">'+
            '<span class="payment-method-badge">Wompi</span>'+
            '<span class="method-name">Wompi</span>'+
            '<span class="method-desc">Nequi / Tarjeta</span>'+
            '</button>'
          );
          }
          const lic = (licencias||[]).find(function(x){ return String(x.id) === String(licenciaId) });
          if (!lic){ container.innerText = 'Licencia no encontrada.'; return }

          container.innerHTML = ''+
            '<div class="payment-licencia-summary">'+
              '<div class="payment-licencia-info">'+
                '<h2>'+escapeHtml(lic.nombre||lic.Nombre||'')+'</h2>'+
                '<p class="muted small">' + (empresaId ? ('Empresa: ' + escapeHtml((empresas.find(function(x){ return String(x.id) === String(empresaId) })||{}).nombre || '')) : '') + '</p>'+
                '<p class="card-desc">'+escapeHtml(lic.descripcion||lic.Descripcion||'')+'</p>'+
                '<p><strong>Duración:</strong> '+escapeHtml(String(lic.duracion_dias||lic.DuracionDias||''))+' días</p>'+
              '</div>'+
              '<div class="payment-licencia-price">$ '+escapeHtml(String(lic.valor||lic.Valor||0))+'</div>'+
            '</div>'+
            '<div class="form-row" style="margin-top:12px;">'+
              '<div class="form-col">'+
                '<label class="form-label" for="discountCode">Código de descuento (opcional)</label>'+
                '<input id="discountCode" class="form-input" type="text" placeholder="Código de descuento">'+
              '</div>'+
              '<div class="form-col">'+
                '<label class="form-label" for="asesorId">Código vendedor (opcional)</label>'+
                '<input id="asesorId" class="form-input" type="text" placeholder="Código del vendedor">'+
              '</div>'+
            '</div>'+
              '<h3 class="payment-method-title">Selecciona el método de pago</h3>'+
              (paymentCards.length
              ? '<div class="payment-method-selector payment-method-selector-licenses">' + paymentCards.join('') + '</div>'
              : '<div class="form-help error">Actualmente no hay métodos de pago activos. Activa Epayco o Wompi desde configuración avanzada.</div>')+
              ((epaycoProvider && epaycoProvider.available)
              ? '<div id="epaycoPanel" class="payment-method-panel payment-method-panel-epayco">'+
                '<div class="method-panel-heading">Epayco</div>'+
                '<label for="epaycoEmail" class="muted small">Correo del cliente (recomendado):</label>'+
                '<input id="epaycoEmail" class="payment-method-input" type="email" placeholder="cliente@correo.com">'+
                '<div class="small payment-method-hint">Epayco admite tarjetas y PSE según configuración.</div>'+
                '<label class="small payment-method-check"><input id="epaycoTermsChk" type="checkbox"> Acepto términos y tratamiento de datos</label>'+
                '<button id="payEpaycoBtn" class="btn secondary payment-btn-epayco" type="button">Pagar con Epayco</button>'+
                '<div id="epaycoStatus" class="small payment-method-status"></div>'+
                '</div>'
              : '')+
              ((wompiProvider && wompiProvider.available)
              ? '<div id="wompiPanel" class="payment-method-panel payment-method-panel-wompi" style="display:none;">'+
                '<div class="method-panel-heading">Wompi</div>'+
                '<label for="wompiPhone" class="muted small">Celular Nequi (10 dígitos):</label>'+
                '<input id="wompiPhone" class="payment-method-input" type="text" inputmode="numeric" maxlength="10" placeholder="3991111111">'+
                '<div id="wompiSandboxHint" class="small payment-method-hint">En sandbox: 3991111111 aprueba, 3992222222 declina.</div>'+
                '<label class="small payment-method-check"><input id="wompiTermsChk" type="checkbox"> Acepto términos y tratamiento de datos</label>'+
                '<div id="wompiTermsLinks" class="small payment-method-links"></div>'+
                '<button id="payWompiBtn" class="btn secondary payment-btn-wompi" type="button">Pagar con Wompi (Nequi)</button>'+
                '<div id="wompiStatus" class="small payment-method-status"></div>'+
                '</div>'
              : '');

          const selectWompiCard = document.getElementById('selectWompiCard');
          const selectEpaycoCard = document.getElementById('selectEpaycoCard');
          const wompiPanel = document.getElementById('wompiPanel');
          const epaycoPanel = document.getElementById('epaycoPanel');

          function setPaymentMethod(method){
          if (!availableMethods.length) return;
          const normalizedInput = String(method || '').toLowerCase();
          const normalized = availableMethods.indexOf(normalizedInput) >= 0 ? normalizedInput : availableMethods[0];
            const isWompi = normalized === 'wompi';
            const isEpayco = normalized === 'epayco';
            if (selectWompiCard) selectWompiCard.classList.toggle('active', isWompi);
            if (selectEpaycoCard) selectEpaycoCard.classList.toggle('active', isEpayco);
            if (wompiPanel) { wompiPanel.classList.toggle('active', isWompi); wompiPanel.style.display = isWompi ? '' : 'none'; }
            if (epaycoPanel) { epaycoPanel.classList.toggle('active', isEpayco); epaycoPanel.style.display = isEpayco ? '' : 'none'; }
          }

          if (selectWompiCard) selectWompiCard.addEventListener('click', function(){ setPaymentMethod('wompi'); });
          if (selectEpaycoCard) selectEpaycoCard.addEventListener('click', function(){ setPaymentMethod('epayco'); });

          const preferredProvider = String(params.get('provider') || params.get('metodo') || params.get('method') || '').toLowerCase();
          if (availableMethods.length) {
          if (availableMethods.indexOf(preferredProvider) >= 0) setPaymentMethod(preferredProvider);
          else setPaymentMethod(methodsPayload.default_method || availableMethods[0]);
          }

          const payWompiBtn = document.getElementById('payWompiBtn');
          const wompiPhoneInput = document.getElementById('wompiPhone');
          const wompiTermsChk = document.getElementById('wompiTermsChk');
          const discountCodeInput = document.getElementById('discountCode');
          const asesorIdInput = document.getElementById('asesorId');
          const wompiStatus = document.getElementById('wompiStatus');
          const wompiTermsLinks = document.getElementById('wompiTermsLinks');
          const wompiSandboxHint = document.getElementById('wompiSandboxHint');

          const payEpaycoBtn = document.getElementById('payEpaycoBtn');
          const epaycoEmailInput = document.getElementById('epaycoEmail');
          const epaycoTermsChk = document.getElementById('epaycoTermsChk');
          const epaycoStatus = document.getElementById('epaycoStatus');

          if (wompiProvider && wompiProvider.available) {
          try{
            const termsRes = await fetch('/wompi/terms');
            if (termsRes.ok) {
            const terms = await termsRes.json();
            const linkA = terms.acceptance_permalink ? ('<a href="'+escapeHtml(terms.acceptance_permalink)+'" target="_blank" rel="noopener">Términos</a>') : 'Términos';
            const linkB = terms.personal_data_permalink ? ('<a href="'+escapeHtml(terms.personal_data_permalink)+'" target="_blank" rel="noopener">Datos personales</a>') : 'Datos personales';
            if (wompiTermsLinks) wompiTermsLinks.innerHTML = linkA + ' · ' + linkB;
            const wompiMode = String(terms.mode || '').toLowerCase();
            if (wompiMode.includes('sandbox')) {
              if (terms.sandbox_phone_approved && terms.sandbox_phone_declined) {
              if (wompiSandboxHint) wompiSandboxHint.textContent = 'Sandbox activo: ' + terms.sandbox_phone_approved + ' aprueba, ' + terms.sandbox_phone_declined + ' declina.';
              }
            } else {
              if (wompiSandboxHint) wompiSandboxHint.textContent = 'Modo producción activo para Nequi.';
            }
            } else {
            if (wompiTermsLinks) wompiTermsLinks.textContent = 'No se pudieron cargar los términos de Wompi.';
            }
          }catch(e){
            if (wompiTermsLinks) wompiTermsLinks.textContent = 'No se pudieron cargar los términos de Wompi.';
          }
          }

          // Wompi (Nequi) payment handler
          if (payWompiBtn) payWompiBtn.addEventListener('click', async function(){
            const phone = String((wompiPhoneInput && wompiPhoneInput.value) || '').trim();
            if (!/^3\d{9}$/.test(phone)) {
              wompiStatus.textContent = 'Ingresa un celular válido de Nequi (10 dígitos, inicia por 3).';
              return;
            }
            if (!wompiTermsChk.checked) {
              wompiStatus.textContent = 'Debes aceptar términos y autorización de datos para pagar con Nequi.';
              return;
            }

            payWompiBtn.disabled = true;
            payWompiBtn.textContent = 'Enviando a Wompi...';
            wompiStatus.textContent = '';
            try {
              const payload = {
                licencia_id: Number(licenciaId),
                phone_number: phone,
                accept_terms: true
              };
              if (empresaId) payload.empresa_id = Number(empresaId);
              if (adminEmail) payload.customer_email = adminEmail;
              try { const code = String((discountCodeInput && discountCodeInput.value) || '').trim(); if (code) payload.discount_code = code; } catch(e){}
              try { const aId = String((asesorIdInput && asesorIdInput.value) || '').trim(); if (aId) { payload.asesor_id = aId; payload.vendedor_id = aId; } } catch(e){}

              const wompiRes = await fetch('/wompi/create_transaction_nequi', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });

              const raw = await wompiRes.text();
              let data = null;
              try { data = JSON.parse(raw); } catch(e) { data = null; }
              if (!wompiRes.ok) {
                const msg = data && data.error ? data.error : raw;
                wompiStatus.textContent = 'Error Wompi: ' + msg;
                if (data && data.acceptance_permalink && data.personal_data_permalink) {
                  wompiTermsLinks.innerHTML = '<a href="'+escapeHtml(data.acceptance_permalink)+'" target="_blank" rel="noopener">Términos</a> · <a href="'+escapeHtml(data.personal_data_permalink)+'" target="_blank" rel="noopener">Datos personales</a>';
                }
                payWompiBtn.disabled = false;
                payWompiBtn.textContent = 'Pagar con Wompi (Nequi)';
                return;
              }

              const txId = data && (data.transaction_id || (data.data && data.data.id));
              if (!txId) {
                wompiStatus.textContent = 'No se recibió transaction_id de Wompi.';
                payWompiBtn.disabled = false;
                payWompiBtn.textContent = 'Pagar con Wompi (Nequi)';
                return;
              }

              wompiStatus.textContent = 'Solicitud enviada. Revisa y acepta en tu app Nequi. Estado: ' + (data.status || 'PENDING');

              let tries = 0;
              const maxTries = 30;
              const finalStates = ['APPROVED','DECLINED','ERROR','VOIDED','CANCELED'];
              const poll = async function(){
                tries++;
                try {
                  const stRes = await fetch('/wompi/transaction_status?id=' + encodeURIComponent(txId));
                  if (stRes.ok) {
                    const stData = await stRes.json();
                    const st = String(stData.status || '').toUpperCase();
                    wompiStatus.textContent = 'Estado Wompi: ' + (st || 'PENDING');
                    if (st === 'APPROVED') {
                      window.location.href = '/pagar_licencia.html?status=success&provider=wompi';
                      return;
                    }
                    if (finalStates.indexOf(st) >= 0) {
                      payWompiBtn.disabled = false;
                      payWompiBtn.textContent = 'Pagar con Wompi (Nequi)';
                      return;
                    }
                  }
                } catch (errPoll) {
                  // continuar polling temporalmente
                }
                if (tries < maxTries) {
                  setTimeout(poll, 3000);
                } else {
                  wompiStatus.textContent = 'Tiempo de espera agotado. Verifica el estado en unos segundos.';
                  payWompiBtn.disabled = false;
                  payWompiBtn.textContent = 'Pagar con Wompi (Nequi)';
                }
              };
              setTimeout(poll, 2500);
            } catch (err) {
              wompiStatus.textContent = 'Error enviando pago Wompi: ' + (err && err.message ? err.message : String(err));
              payWompiBtn.disabled = false;
              payWompiBtn.textContent = 'Pagar con Wompi (Nequi)';
            }
          });

          // Epayco payment handler (checkout + polling de estado)
          if (payEpaycoBtn) payEpaycoBtn.addEventListener('click', async function(){
            const email = String((epaycoEmailInput && epaycoEmailInput.value) || '').trim();
            if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
              epaycoStatus.textContent = 'Ingresa un correo válido para Epayco.';
              return;
            }
            if (!epaycoTermsChk.checked) {
              epaycoStatus.textContent = 'Debes aceptar términos y autorización de datos para pagar con Epayco.';
              return;
            }

            payEpaycoBtn.disabled = true;
            payEpaycoBtn.textContent = 'Enviando a Epayco...';
            epaycoStatus.textContent = '';
            try {
              const payload = {
                licencia_id: Number(licenciaId),
                customer_email: email
              };
              if (empresaId) payload.empresa_id = Number(empresaId);
              try { const code = String((discountCodeInput && discountCodeInput.value) || '').trim(); if (code) payload.discount_code = code; } catch(e){}
              try { const aId = String((asesorIdInput && asesorIdInput.value) || '').trim(); if (aId) { payload.asesor_id = aId; payload.vendedor_id = aId; } } catch(e){}

              const epayRes = await fetch('/epayco/create_transaction', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });
              const raw = await epayRes.text();
              let data = null;
              try { data = JSON.parse(raw); } catch(e) { data = null; }
              if (!epayRes.ok) {
                const msg = data && data.error ? data.error : raw;
                epaycoStatus.textContent = 'Error Epayco: ' + msg;
                payEpaycoBtn.disabled = false;
                payEpaycoBtn.textContent = 'Pagar con Epayco';
                return;
              }

              const txId = data && (data.transaction_id || (data.data && data.data.id));
              if (!txId) {
                epaycoStatus.textContent = 'No se recibió transaction_id de Epayco.';
                payEpaycoBtn.disabled = false;
                payEpaycoBtn.textContent = 'Pagar con Epayco';
                return;
              }

              const checkoutUrl = data && (data.checkout_url || (data.data && data.data.checkout_url));
              if (checkoutUrl) {
                const popup = window.open(checkoutUrl, '_blank', 'noopener,noreferrer');
                if (!popup) {
                  epaycoStatus.innerHTML = 'Solicitud enviada. Abre la pasarela de Epayco aquí: <a href="' + escapeHtml(checkoutUrl) + '" target="_blank" rel="noopener">Abrir Epayco</a>.';
                } else {
                  epaycoStatus.textContent = 'Solicitud enviada. Se abrió Epayco en una pestaña nueva. Estado: ' + (data.status || 'PENDING');
                }
              } else {
                epaycoStatus.textContent = 'Solicitud enviada. Completa el pago en la pasarela. Estado: ' + (data.status || 'PENDING');
              }

              let tries = 0;
              const maxTries = 30;
              const finalStates = ['APPROVED','DECLINED','ERROR','VOIDED','CANCELED'];
              const poll = async function(){
                tries++;
                try {
                  const stRes = await fetch('/epayco/transaction_status?id=' + encodeURIComponent(txId));
                  if (stRes.ok) {
                    const stData = await stRes.json();
                    const st = String(stData.status || '').toUpperCase();
                    epaycoStatus.textContent = 'Estado Epayco: ' + (st || 'PENDING');
                    if (st === 'APPROVED') {
                      window.location.href = '/pagar_licencia.html?status=success&provider=epayco';
                      return;
                    }
                    if (finalStates.indexOf(st) >= 0) {
                      payEpaycoBtn.disabled = false;
                      payEpaycoBtn.textContent = 'Pagar con Epayco';
                      return;
                    }
                  }
                } catch (errPoll) {
                  // continuar polling temporalmente
                }
                if (tries < maxTries) {
                  setTimeout(poll, 3000);
                } else {
                  epaycoStatus.textContent = 'Tiempo de espera agotado. Verifica el estado en unos segundos.';
                  payEpaycoBtn.disabled = false;
                  payEpaycoBtn.textContent = 'Pagar con Epayco';
                }
              };
              setTimeout(poll, 2500);
            } catch (err) {
              epaycoStatus.textContent = 'Error enviando pago Epayco: ' + (err && err.message ? err.message : String(err));
              payEpaycoBtn.disabled = false;
              payEpaycoBtn.textContent = 'Pagar con Epayco';
            }
          });

        }catch(err){ console.error(err); container.innerText = 'Error: ' + (err && err.message ? err.message : String(err)); }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run); else run();
    })();
  </script>
</body>
</html>
