<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pagar Licencia</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
  <script src="/js/nuevos_verticales_catalogo.js"></script>
</head>
<body class="checkout-licencia-page">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Pagar Licencia</h2>
      <ul class="nav">
        <li><a href="/seleccionar_empresa.html"><img class="icon" src="/img/company-briefcase-color.svg" alt="">Volver a empresas</a></li>
        <li><a href="/elegir_licencia.html"><img class="icon" src="/img/shield-license-color.svg" alt="">Elegir otra licencia</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="container">
        <div class="page-header">
          <h1 id="pageTitle">Pagar Licencia</h1>
        </div>

        <div id="payment" class="card checkout-payment-shell">Cargando...</div>
      </div>
    </main>
  </div>

  <script>
    window.__pcsAutoInjectChatShell = true;
    window.__pcsPublicChatContext = { scope: 'portal' };

    (function(){
      const pendingPaymentKey = 'pcs_licencia_payment_pending_v1';

      function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m] }) }
      function normalizeImage(raw) {
        const value = String(raw || '').trim();
        if (!value || value.indexOf('/img/') !== 0 || value.indexOf('..') >= 0) return '/img/shield-license-color.svg';
        return value;
      }
      const verticalCatalog = Array.isArray(window.PCS_NUEVOS_VERTICALES) ? window.PCS_NUEVOS_VERTICALES.slice() : [];
      const verticalByModule = {};
      verticalCatalog.forEach(function(item){
        const module = String(item && item.module || '').trim().toLowerCase();
        if (module) verticalByModule[module] = item;
      });
      function normalizeSearchText(raw) {
        let value = String(raw || '').trim().toLowerCase();
        if (value.normalize) value = value.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return value;
      }
      function splitCSV(raw) {
        return String(raw || '').split(',').map(function(part){ return String(part || '').trim().toLowerCase(); }).filter(Boolean);
      }
      function resolveLicenseVertical(lic, tipoNombre) {
        const modules = splitCSV(lic && (lic.modulos_habilitados || lic.ModulosHab || lic.modulosHab));
        for (let i = 0; i < modules.length; i += 1) {
          if (verticalByModule[modules[i]]) return verticalByModule[modules[i]];
        }
        const haystack = normalizeSearchText([
          tipoNombre,
          lic && (lic.tipo_nombre || lic.TipoNombre || lic.tipoNombre),
          lic && (lic.nombre || lic.Nombre),
          lic && (lic.descripcion || lic.Descripcion)
        ].join(' '));
        for (let j = 0; j < verticalCatalog.length; j += 1) {
          const item = verticalCatalog[j];
          const title = normalizeSearchText([item.title, item.fullTitle, item.module].join(' '));
          const compactModule = normalizeSearchText(String(item.module || '').replace(/_/g, ' '));
          if ((title && haystack.indexOf(title) >= 0) || (compactModule && haystack.indexOf(compactModule) >= 0)) return item;
        }
        return null;
      }
      function resolveLicenseVisual(lic, tipoNombre) {
        const vertical = resolveLicenseVertical(lic, tipoNombre);
        return {
          vertical: vertical,
          icon: normalizeImage((vertical && vertical.icon) || '/img/shield-license-color.svg'),
          label: vertical ? (vertical.fullTitle || vertical.title || vertical.module) : ''
        };
      }
      function formatCurrency(value){
        const amount = Number(value || 0);
        if (Number.isNaN(amount)) return '$ 0';
        try {
          return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(amount);
        } catch (err) {
          return '$ ' + String(amount);
        }
      }
      function normalizeProvider(raw){
        const value = String(raw || '').trim().toLowerCase();
        if (value === 'nequi' || value === 'wompi') return 'wompi';
        if (value === 'epayco') return 'epayco';
        return '';
      }
      function normalizeStatus(raw){
        const value = String(raw || '').trim().toUpperCase();
        if (!value) return '';
        if (['SUCCESS','APPROVED','ACCEPTED','OK','ACREDITADA','ACREDITADO','ACEPTADA','ACEPTADO','APROBADA','APROBADO','1'].indexOf(value) >= 0) return 'APPROVED';
        if (['FAILURE','DECLINED','REJECTED','RECHAZADA','RECHAZADO','CANCELADA','CANCELADO','ANULADA','ANULADO','2'].indexOf(value) >= 0) return 'DECLINED';
        if (['PENDING','PENDIENTE','EN_PROCESO','3'].indexOf(value) >= 0) return 'PENDING';
        if (['ERROR','FAILED','FALLIDA','FALLIDO','4'].indexOf(value) >= 0) return 'ERROR';
        return value;
      }
      function providerLabel(provider){
        if (provider === 'epayco') return 'Epayco';
        if (provider === 'wompi') return 'Wompi';
        return 'la pasarela';
      }
      function originalButtonLabel(provider){
        return provider === 'epayco' ? 'Pagar con Epayco' : 'Pagar con Wompi';
      }
      function isSuccessStatus(status){ return normalizeStatus(status) === 'APPROVED'; }
      function isFinalStatus(status){
        const value = normalizeStatus(status);
        return ['APPROVED','DECLINED','ERROR','VOIDED','CANCELED','FAILED'].indexOf(value) >= 0;
      }
      function readPendingPayment(){
        try {
          const raw = localStorage.getItem(pendingPaymentKey);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          const createdAt = Number(parsed && parsed.createdAt || 0);
          if (createdAt > 0 && (Date.now() - createdAt) > (6 * 60 * 60 * 1000)) {
            localStorage.removeItem(pendingPaymentKey);
            return null;
          }
          return parsed;
        } catch (err) {
          return null;
        }
      }
      function savePendingPayment(payment){
        try {
          localStorage.setItem(pendingPaymentKey, JSON.stringify(payment || {}));
        } catch (err) {}
      }
      function clearPendingPayment(){
        try {
          localStorage.removeItem(pendingPaymentKey);
        } catch (err) {}
      }
      function matchesPendingContext(pending, licenciaId, empresaId){
        if (!pending) return false;
        if (licenciaId && String(pending.licenciaId || '') !== String(licenciaId)) return false;
        return String(pending.empresaId || '') === String(empresaId || '');
      }
      function buildReturnContext(params, licenciaId, empresaId){
        const pending = readPendingPayment();
        let provider = normalizeProvider(params.get('provider') || params.get('metodo') || params.get('method'));
        let status = normalizeStatus(params.get('x_response') || params.get('x_transaction_state') || params.get('response') || params.get('status'));
        if (!status) status = normalizeStatus(params.get('x_cod_response') || params.get('cod_response'));
        const epaycoGatewayReference = String(params.get('x_ref_payco') || params.get('ref_payco') || '').trim();
        const invoiceReference = String(params.get('x_id_invoice') || params.get('invoice') || '').trim();
        let transactionId = String(params.get('x_transaction_id') || params.get('transaction_id') || params.get('id') || epaycoGatewayReference || '').trim();
        let reference = String(invoiceReference || params.get('reference') || params.get('ref') || epaycoGatewayReference || '').trim();

        if (matchesPendingContext(pending, licenciaId, empresaId)) {
          if (!provider) provider = normalizeProvider(pending.provider);
          if (!status) status = normalizeStatus(pending.status);
          if (!transactionId) transactionId = String(pending.transactionId || '').trim();
          if (!reference || reference === epaycoGatewayReference) reference = String(pending.reference || reference || '').trim();
        }

        return {
          provider: provider,
          status: status,
          transactionId: transactionId,
          reference: reference,
          gatewayReference: epaycoGatewayReference,
          rawParams: Object.fromEntries(params.entries()),
          hasReturn: !!(provider || status || transactionId || reference)
        };
      }
      function renderFeedback(target, kind, title, body){
        if (!target) return;
        const className = kind === 'success' ? 'success' : (kind === 'error' ? 'error' : 'muted');
        target.innerHTML = '<div class="' + className + '"><strong>' + escapeHtml(title) + '</strong><div>' + escapeHtml(body) + '</div></div>';
      }
      function buildSuccessPageURL(provider, context, licenciaId, empresaId){
        const target = new URL('/epayco/pago_exitoso.html', window.location.origin);
        const normalizedProvider = normalizeProvider(provider || (context && context.provider) || '');
        if (normalizedProvider) target.searchParams.set('provider', normalizedProvider);
        if (licenciaId) target.searchParams.set('licencia_id', String(licenciaId));
        if (empresaId) target.searchParams.set('empresa_id', String(empresaId));
        if (context && context.reference) target.searchParams.set('reference', String(context.reference));
        if (context && context.transactionId) target.searchParams.set('transaction_id', String(context.transactionId));
        return target.toString();
      }
      function redirectToSuccessPage(provider, context, licenciaId, empresaId){
        if (!licenciaId || !empresaId) return false;
        window.location.replace(buildSuccessPageURL(provider, context, licenciaId, empresaId));
        return true;
      }
      function syncStatusText(target, text){ if (target) target.textContent = text || ''; }
      function extractResponseContext(data, fallback){
        const payload = data && data.data && typeof data.data === 'object' ? data.data : null;
        const context = fallback || {};
        return {
          provider: normalizeProvider((data && data.provider) || context.provider),
          status: normalizeStatus((data && data.status) || (payload && payload.status) || context.status),
          transactionId: String((data && (data.transaction_id || data.id)) || (payload && (payload.id || payload.transaction_id)) || context.transactionId || '').trim(),
          reference: String((data && (data.reference || data.ref)) || (payload && (payload.reference || payload.invoice || payload.x_id_invoice)) || context.reference || '').trim(),
          gatewayReference: String((data && (data.x_ref_payco || data.ref_payco || data.gateway_reference)) || (payload && (payload.x_ref_payco || payload.ref_payco)) || context.gatewayReference || '').trim()
        };
      }
      function hasBackendActivationDecision(data){
        return !!(data && typeof data === 'object' && Object.prototype.hasOwnProperty.call(data, 'activated'));
      }
      let epaycoCheckoutScriptPromises = {};
      function loadEpaycoSmartCheckoutScript(scriptURL){
        const resolvedURL = String(scriptURL || 'https://checkout.epayco.co/checkout-v2.js').trim();
        const loadedForURL = Array.prototype.some.call(document.scripts || [], function(existing){
          return existing && existing.getAttribute && existing.getAttribute('data-epayco-checkout-url') === resolvedURL;
        });
        if (loadedForURL && window.ePayco && window.ePayco.checkout && typeof window.ePayco.checkout.configure === 'function') {
          return Promise.resolve(window.ePayco);
        }
        if (epaycoCheckoutScriptPromises[resolvedURL]) return epaycoCheckoutScriptPromises[resolvedURL];
        epaycoCheckoutScriptPromises[resolvedURL] = new Promise(function(resolve, reject){
          const script = document.createElement('script');
          script.src = resolvedURL;
          script.async = true;
          script.setAttribute('data-epayco-checkout-url', resolvedURL);
          script.onload = function(){
            if (window.ePayco && window.ePayco.checkout && typeof window.ePayco.checkout.configure === 'function') {
              resolve(window.ePayco);
              return;
            }
            delete epaycoCheckoutScriptPromises[resolvedURL];
            reject(new Error('La librería de Epayco no quedó disponible en la página.'));
          };
          script.onerror = function(){
            delete epaycoCheckoutScriptPromises[resolvedURL];
            reject(new Error('No se pudo cargar la librería de checkout de Epayco.'));
          };
          document.head.appendChild(script);
        });
        return epaycoCheckoutScriptPromises[resolvedURL];
      }
      function preferredEpaycoCheckoutType(rawType){
        const requested = String(rawType || '').trim().toLowerCase();
        const isMobile = window.matchMedia && window.matchMedia('(max-width: 760px)').matches;
        if (isMobile) return 'onpage';
        return requested === 'onpage' ? 'onpage' : 'standard';
      }
      function openEpaycoSmartCheckout(epaycoRuntime, sessionId, rawType, mode){
        if (!epaycoRuntime || !epaycoRuntime.checkout || typeof epaycoRuntime.checkout.configure !== 'function') {
          throw new Error('La librería de Epayco no quedó disponible para abrir el checkout.');
        }
        const firstType = preferredEpaycoCheckoutType(rawType);
        const fallbackType = firstType === 'onpage' ? 'standard' : 'onpage';
        const testMode = String(mode || '').trim().toLowerCase() === 'sandbox';
        let lastError = null;
        for (const type of [firstType, fallbackType]) {
          try {
            const checkout = epaycoRuntime.checkout.configure({
              sessionId: sessionId,
              type: type,
              test: testMode
            });
            if (!checkout || typeof checkout.open !== 'function') {
              throw new Error('Epayco no devolvió una instancia de checkout válida.');
            }
            if (typeof checkout.onErrors === 'function') {
              checkout.onErrors(function(errors){
                const detail = Array.isArray(errors) && errors.length ? JSON.stringify(errors) : String(errors || 'Error desconocido');
                syncStatusText(document.getElementById('epaycoStatus'), 'Epayco reportó un error al abrir el checkout: ' + detail);
                var btn = document.getElementById('payEpaycoBtn');
                if (btn) {
                  btn.disabled = false;
                  btn.textContent = originalButtonLabel('epayco');
                }
              });
            }
            checkout.open();
            return true;
          } catch (err) {
            lastError = err;
          }
        }
        throw lastError || new Error('No se pudo abrir Epayco Smart Checkout.');
      }
      function openEpaycoClassicCheckout(epaycoRuntime, checkoutConfig, checkoutData){
        if (!epaycoRuntime || !epaycoRuntime.checkout || typeof epaycoRuntime.checkout.configure !== 'function') {
          throw new Error('La librería de Epayco no quedó disponible para abrir el checkout estándar.');
        }
        const config = checkoutConfig && typeof checkoutConfig === 'object' ? checkoutConfig : {};
        const data = checkoutData && typeof checkoutData === 'object' ? checkoutData : {};
        if (!config.key || !data.amount || !data.name) {
          throw new Error('La configuración de Epayco está incompleta para abrir el checkout estándar.');
        }
        const checkout = epaycoRuntime.checkout.configure({
          key: String(config.key || '').trim(),
          test: !!config.test
        });
        if (!checkout || typeof checkout.open !== 'function') {
          throw new Error('Epayco no devolvió una instancia válida del checkout estándar.');
        }
        checkout.open(data);
        return true;
      }
      function isSafeEpaycoCheckoutAction(rawURL){
        try {
          const parsed = new URL(String(rawURL || ''), window.location.origin);
          return parsed.protocol === 'https:' &&
            parsed.hostname.toLowerCase() === 'secure.payco.co' &&
            parsed.pathname.replace(/\/+$/, '') === '/checkout.php';
        } catch (err) {
          return false;
        }
      }
      function isSafeEpaycoRedirectURL(rawURL){
        try {
          const parsed = new URL(String(rawURL || ''), window.location.origin);
          const host = parsed.hostname.toLowerCase();
          const path = parsed.pathname.replace(/\/+$/, '');
          if (parsed.protocol !== 'https:') return false;
          if ((host === 'secure.payco.co' || host === 'checkout.epayco.co') && path === '/checkout.php') return false;
          return host === 'secure.payco.co' || host === 'checkout.epayco.co' || host.endsWith('.epayco.co') || host.endsWith('.payco.co');
        } catch (err) {
          return false;
        }
      }
      function submitEpaycoClassicCheckoutForm(formSpec){
        const spec = formSpec && typeof formSpec === 'object' ? formSpec : null;
        if (!spec || !spec.action || !spec.fields || typeof spec.fields !== 'object') return false;
        if (!isSafeEpaycoCheckoutAction(spec.action)) return false;

        const form = document.createElement('form');
        form.method = String(spec.method || 'POST').trim().toUpperCase() === 'GET' ? 'GET' : 'POST';
        form.action = String(spec.action || '').trim();
        form.style.display = 'none';
        Object.keys(spec.fields).forEach(function(key){
          if (!Object.prototype.hasOwnProperty.call(spec.fields, key)) return;
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = String(spec.fields[key] == null ? '' : spec.fields[key]);
          form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
        return true;
      }
      function isSafeWompiCheckoutAction(rawURL){
        try {
          const parsed = new URL(String(rawURL || ''), window.location.origin);
          return parsed.protocol === 'https:' &&
            parsed.hostname.toLowerCase() === 'checkout.wompi.co' &&
            parsed.pathname.replace(/\/+$/, '') === '/p';
        } catch (err) {
          return false;
        }
      }
      function submitWompiCheckoutForm(formSpec){
        const spec = formSpec && typeof formSpec === 'object' ? formSpec : null;
        if (!spec || !spec.action || !spec.fields || typeof spec.fields !== 'object') return false;
        if (!isSafeWompiCheckoutAction(spec.action)) return false;

        const form = document.createElement('form');
        form.method = String(spec.method || 'GET').trim().toUpperCase() === 'POST' ? 'POST' : 'GET';
        form.action = String(spec.action || '').trim();
        form.style.display = 'none';
        Object.keys(spec.fields).forEach(function(key){
          if (!Object.prototype.hasOwnProperty.call(spec.fields, key)) return;
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = String(spec.fields[key] == null ? '' : spec.fields[key]);
          form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
        return true;
      }
      async function fetchProviderStatus(provider, context, licenciaId, empresaId){
        const normalizedProvider = normalizeProvider(provider);
        if (!normalizedProvider) throw new Error('No se pudo determinar la pasarela del pago.');
        const search = new URLSearchParams();
        if (context && context.transactionId) search.set('id', String(context.transactionId));
        if (context && context.reference) search.set('reference', String(context.reference));
        if (context && context.gatewayReference) search.set('x_ref_payco', String(context.gatewayReference));
        if (context && context.rawParams && typeof context.rawParams === 'object') {
          Object.keys(context.rawParams).forEach(function(key){
            if (!key || search.has(key)) return;
            const value = context.rawParams[key];
            if (value == null || value === '') return;
            search.set(key, String(value));
          });
        }
        if (!search.get('id') && !search.get('reference')) throw new Error('No hay referencia suficiente para consultar el pago.');
        if (licenciaId) search.set('licencia_id', String(licenciaId));
        if (empresaId) search.set('empresa_id', String(empresaId));
        let endpoint = '';
        if (normalizedProvider === 'epayco') {
          endpoint = '/epayco/transaction_status?' + search.toString();
        } else {
          endpoint = '/wompi/transaction_status?' + search.toString();
        }
        const response = await fetch(endpoint, { credentials: 'same-origin' });
        const raw = await response.text();
        let data = null;
        try { data = JSON.parse(raw); } catch (err) { data = null; }
        if (!response.ok) {
          throw new Error((data && data.error) ? data.error : (raw || 'No se pudo consultar el estado del pago.'));
        }
        return data || {};
      }

      async function run(){
        const params = new URLSearchParams(window.location.search);
        const pendingSeed = readPendingPayment();
        let licenciaId = params.get('licencia_id');
        let empresaId = params.get('empresa_id');
        const checkoutMode = String(params.get('checkout_mode') || '').trim();
        const addonLicenciaIDs = String(params.get('addon_licencia_ids') || '').trim();
        const initialAsesorID = String(params.get('asesor_id') || params.get('codigo_asesor') || '').trim();
        if (!licenciaId && pendingSeed && pendingSeed.licenciaId) licenciaId = String(pendingSeed.licenciaId);
        if (!empresaId && pendingSeed && pendingSeed.empresaId) empresaId = String(pendingSeed.empresaId);

        const returnContext = buildReturnContext(params, licenciaId, empresaId);
        const container = document.getElementById('payment');

        if (!licenciaId) {
          if (returnContext.hasReturn) {
            if (isSuccessStatus(returnContext.status)) {
              clearPendingPayment();
              if (redirectToSuccessPage(returnContext.provider, returnContext, licenciaId, empresaId)) return;
              container.innerHTML = '<div class="success"><strong>Pago aprobado</strong><div>La pasarela confirmó tu pago. Si no ves la licencia activa todavía, vuelve a empresas y recarga el listado.</div></div>';
            } else if (isFinalStatus(returnContext.status)) {
              clearPendingPayment();
              container.innerHTML = '<div class="error"><strong>Pago no completado</strong><div>La pasarela reportó el estado ' + escapeHtml(returnContext.status || 'DESCONOCIDO') + '. Puedes volver a intentar el pago.</div></div>';
            } else {
              container.innerHTML = '<div class="muted"><strong>Pago en verificación</strong><div>Estamos recuperando el estado del pago. Si no ves cambios en unos segundos, vuelve a la selección de empresas.</div></div>';
            }
            return;
          }
          container.innerText = 'ID de licencia no proporcionado.';
          return;
        }

        try{
          let adminEmail = '';
          try{
            const meRes = await fetch('/me');
            if (meRes.ok) {
              const me = await meRes.json();
              adminEmail = me.email || me.Email || '';
            }
          }catch(e){}

          const summaryParams = new URLSearchParams();
          summaryParams.set('licencia_id', String(licenciaId));
          if (empresaId) summaryParams.set('empresa_id', String(empresaId));
          if (checkoutMode) summaryParams.set('checkout_mode', checkoutMode);
          if (addonLicenciaIDs) summaryParams.set('addon_licencia_ids', addonLicenciaIDs);
          if (initialAsesorID) summaryParams.set('asesor_id', initialAsesorID);

          function resolveCountryFromBrowser(){
            try {
              const lang = String((navigator.languages && navigator.languages[0]) || navigator.language || '').trim();
              const match = /-([A-Za-z]{2})\b/.exec(lang);
              if (match && match[1]) return match[1].toUpperCase();
            } catch (e) {}
            return '';
          }
          function countryName(code){
            const c = String(code || '').toUpperCase();
            if (c === 'CO') return 'Colombia';
            if (c === 'EC') return 'Ecuador';
            if (c === 'PA') return 'Panamá';
            if (c === 'MX') return 'México';
            if (c === 'US') return 'Estados Unidos';
            if (c === 'ES') return 'España';
            return c || 'No detectado';
          }
          function normalizeCountryCode(code){
            const c = String(code || '').trim().toUpperCase().slice(0, 2);
            return /^[A-Z]{2}$/.test(c) ? c : '';
          }
          function resolveCountryForCheckout(){
            const fromQuery = normalizeCountryCode(params.get('pais_codigo'));
            if (fromQuery) return fromQuery;
            try {
              const stored = normalizeCountryCode(localStorage.getItem('pcs_checkout_country'));
              if (stored) return stored;
            } catch (e) {}
            return normalizeCountryCode(resolveCountryFromBrowser()) || 'CO';
          }
          const countryOptions = ['CO', 'EC', 'PA', 'MX', 'US', 'ES'];
          const paisCodigo = resolveCountryForCheckout();

          const [summaryRes, methodsRes] = await Promise.all([
            fetch('/api/public/licencias/checkout_summary?' + summaryParams.toString(), { credentials: 'same-origin' }),
            fetch('/api/public/licencias/payment_methods?pais_codigo=' + encodeURIComponent(paisCodigo), { credentials: 'same-origin' })
          ]);
          if (!summaryRes.ok) { container.innerText = 'Error al obtener el resumen público de la licencia'; return }
          if (!methodsRes.ok) { container.innerText = 'Error al obtener métodos de pago disponibles'; return }

          const summaryPayload = await summaryRes.json();
          const methodsPayload = await methodsRes.json();
          const lic = summaryPayload && summaryPayload.licencia ? summaryPayload.licencia : null;
          const selectedEmpresa = summaryPayload && summaryPayload.empresa ? summaryPayload.empresa : null;
          const paymentProviders = Array.isArray(methodsPayload.providers) ? methodsPayload.providers : [];
          const epaycoProvider = paymentProviders.find(function(provider){ return provider && provider.id === 'epayco'; }) || null;
          const wompiProvider = paymentProviders.find(function(provider){ return provider && provider.id === 'wompi'; }) || null;
          const availableMethods = [];
          if (epaycoProvider && epaycoProvider.available) availableMethods.push('epayco');
          if (wompiProvider && wompiProvider.available) availableMethods.push('wompi');
          const unavailableMessages = [];
          if (epaycoProvider && !epaycoProvider.available) {
            unavailableMessages.push(epaycoProvider.enabled

            if (advisor) query.set('asesor_id', advisor);
            var res = await fetch('/api/public/licencias/checkout_summary?' + query.toString(), { credentials: 'same-origin' });
            var raw = await res.text();
            var data = null;
            try { data = raw ? JSON.parse(raw) : null; } catch(e) { data = null; }
            if (!res.ok) throw new Error((data && data.error) || raw || 'No se pudo calcular el total de la licencia.');

                  reference: resolved.reference || null,
                  licencia_id: licenciaId,
                  empresa_id: empresaId || null
                });
                renderFeedback(ui.feedback, 'muted', 'Activando licencia', 'Epayco aprobó el pago. Estamos confirmando el registro con el servidor para activar la licencia. ' + referenceText);
                syncStatusText(statusElement, 'Estado ' + label + ': verificando activación');
                return { done: false, context: resolved };
              }
              if (backendDecision && statusData && statusData.discount_blocked) {
                clearPendingPayment();
                renderFeedback(ui.feedback, 'error', 'Pago aprobado sin activar', 'El pago fue aprobado, pero el código de descuento ya había sido usado por esta empresa. Contacta soporte para revisar la licencia. ' + referenceText);
                syncStatusText(statusElement, 'Estado ' + label + ': descuento bloqueado');
                resetProvider(normalizedProvider);
                return { done: true, context: resolved };
              }
              if (normalizedProvider === 'epayco' && backendDecision && statusData && statusData.activated !== true) {
                if (statusData.context_found === false) {
                  clearPendingPayment();
                  renderFeedback(ui.feedback, 'error', 'Pago aprobado sin licencia asociada', 'Epayco aprobó el pago, pero el servidor no encontró la empresa y licencia para activar. Conserva la referencia y contacta soporte. ' + referenceText);
                  syncStatusText(statusElement, 'Estado ' + label + ': falta contexto de licencia');
                  resetProvider(normalizedProvider);
                  return { done: true, context: resolved };
                }
                renderFeedback(ui.feedback, 'muted', 'Activación en proceso', 'Epayco aprobó el pago. Estamos reintentando activar la licencia en el servidor. ' + referenceText);
                syncStatusText(statusElement, 'Estado ' + label + ': reintentando activación');
                return { done: false, context: resolved };
              }
              clearPendingPayment();
              updateUrlState({
                provider: normalizedProvider,
                status: normalizedStatus.toLowerCase(),
                transaction_id: resolved.transactionId || null,
                reference: resolved.reference || null,
                licencia_id: licenciaId,
                empresa_id: empresaId || null
              });
              if (!redirectToSuccessPage(normalizedProvider, resolved, licenciaId, empresaId)) {
                renderFeedback(ui.feedback, 'success', 'Pago aprobado', label + ' confirmó el pago y la licencia quedó activa. ' + referenceText);
                syncStatusText(statusElement, 'Estado ' + label + ': ' + normalizedStatus);
                disableAllPayments();
              }
              return { done: true, context: resolved };
            }

            if (isFinalStatus(normalizedStatus)) {
              clearPendingPayment();
              updateUrlState({
                provider: normalizedProvider,
                status: normalizedStatus.toLowerCase(),
                transaction_id: resolved.transactionId || null,
                reference: resolved.reference || null,
                licencia_id: licenciaId,
                empresa_id: empresaId || null
              });
              renderFeedback(ui.feedback, 'error', 'Pago no completado', label + ' reportó el estado ' + normalizedStatus + '. Puedes intentarlo de nuevo. ' + referenceText);
              syncStatusText(statusElement, 'Estado ' + label + ': ' + normalizedStatus);
              resetProvider(normalizedProvider);
              return { done: true, context: resolved };
            }

            updateUrlState({
              provider: normalizedProvider,
              status: 'pending',
              transaction_id: resolved.transactionId || null,
              reference: resolved.reference || null,
              licencia_id: licenciaId,
              empresa_id: empresaId || null
            });
            renderFeedback(ui.feedback, 'muted', 'Pago en verificación', 'Estamos consultando el estado final con ' + label + '. ' + referenceText);
            syncStatusText(statusElement, 'Estado ' + label + ': ' + (normalizedStatus || 'PENDING'));
            return { done: false, context: resolved };
          }
          function startPolling(provider, context, maxTries){
            const normalizedProvider = normalizeProvider(provider);
            if (!normalizedProvider) return;
            if (!context || (!context.transactionId && !context.reference)) return;

            let tries = 0;
            var ctrl = { cancelled: false };
            pollingCtrl = ctrl;
            setPaymentMethod(normalizedProvider);
            setProviderBusy(normalizedProvider, 'Verificando...');

            var cancelEl = document.createElement('a');
            cancelEl.href = '#';
            cancelEl.textContent = 'Cancelar verificación e intentar de nuevo';
            cancelEl.style.cssText = 'display:block;margin-top:8px;color:#c00;font-size:13px;cursor:pointer;';
            cancelEl.addEventListener('click', function(ev){ ev.preventDefault(); doCancelPolling(); });
            var stEl = getStatusElement(normalizedProvider);
            if (stEl) stEl.appendChild(cancelEl);

            const poll = async function(){
              if (ctrl.cancelled) return;
              tries++;
              try {
                const statusData = await fetchProviderStatus(normalizedProvider, context, licenciaId, empresaId);
                if (ctrl.cancelled) return;
                const outcome = applyResolvedResult(normalizedProvider, statusData, context);
                context = outcome.context;
                if (outcome.done) { pollingCtrl = null; return; }
              } catch (err) {
                if (ctrl.cancelled) return;
                syncStatusText(getStatusElement(normalizedProvider), 'Reintentando verificación con ' + providerLabel(normalizedProvider) + '...');
                if (stEl) stEl.appendChild(cancelEl);
              }
              if (ctrl.cancelled) return;
              if (tries >= maxTries) {
                clearPendingPayment();
                renderFeedback(ui.feedback, 'error', 'No se pudo confirmar el pago', 'Se agotó el tiempo de verificación automática. Puedes intentar un nuevo pago o recargar la página.');
                syncStatusText(getStatusElement(normalizedProvider), '');
                resetProvider(normalizedProvider);
                pollingCtrl = null;
                return;
              }
              setTimeout(poll, 3000);
            };

            poll();
          }

          var pollingCtrl = null;
          function doCancelPolling(){
            if (pollingCtrl) { pollingCtrl.cancelled = true; pollingCtrl = null; }
            clearPendingPayment();
            renderFeedback(ui.feedback, '', '', '');
            ['epayco','wompi'].forEach(function(p){ resetProvider(p); });
            syncStatusText(ui.epaycoStatus, '');
            syncStatusText(ui.wompiStatus, '');
          }

          if (ui.selectWompiCard) ui.selectWompiCard.addEventListener('click', function(){ setPaymentMethod('wompi'); });
          if (ui.selectEpaycoCard) ui.selectEpaycoCard.addEventListener('click', function(){ setPaymentMethod('epayco'); });
          if (ui.checkoutCountrySelect) ui.checkoutCountrySelect.addEventListener('change', function(){
            const nextCountry = normalizeCountryCode(ui.checkoutCountrySelect.value) || 'CO';
            try { localStorage.setItem('pcs_checkout_country', nextCountry); } catch (e) {}
            const nextParams = new URLSearchParams(window.location.search);
            nextParams.set('pais_codigo', nextCountry);
            window.location.search = nextParams.toString();
          });
          if (ui.discountCodeInput) {
            ui.discountCodeInput.addEventListener('input', scheduleCheckoutSummaryRefresh);
            ui.discountCodeInput.addEventListener('blur', refreshCheckoutSummary);
          }
          if (ui.asesorIdInput) {
            ui.asesorIdInput.addEventListener('input', scheduleCheckoutSummaryRefresh);
            ui.asesorIdInput.addEventListener('blur', refreshCheckoutSummary);
          }

          if (ui.activateFreeBtn) ui.activateFreeBtn.addEventListener('click', async function(){
            var summary = checkoutSummaryState;
            if (!summary || !summary.is_zero_total) {
              if (ui.freeActivationStatus) ui.freeActivationStatus.textContent = 'Esta licencia todavía no quedó en total cero.';
              return;
            }
            if (summary.zero_total_blocked) {
              if (ui.freeActivationStatus) ui.freeActivationStatus.textContent = summary.message || 'Esta licencia gratuita ya fue usada por esta empresa.';
              return;
            }
            ui.activateFreeBtn.disabled = true;
            if (ui.freeActivationStatus) ui.freeActivationStatus.textContent = 'Activando licencia...';
            try {
              var payload = {
                licencia_id: Number(licenciaId),
                empresa_id: Number(empresaId || 0),
                motivo: summary.discount_applied ? 'descuento_total_cero' : 'licencia_valor_cero'
              };
              if (checkoutMode) payload.checkout_mode = checkoutMode;
              if (addonLicenciaIDs) payload.addon_licencia_ids = addonLicenciaIDs.split(',').map(function(v){ return Number(String(v).trim() || 0); }).filter(function(v){ return v > 0; });
              var freeCode = String((ui.discountCodeInput && ui.discountCodeInput.value) || '').trim();
              if (freeCode) payload.discount_code = freeCode;
              var freeAsesor = String((ui.asesorIdInput && ui.asesorIdInput.value) || '').trim();
              if (freeAsesor) { payload.asesor_id = freeAsesor; }
              var freeRes = await fetch('/licencias/activar_sin_pago', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });
              var freeRaw = await freeRes.text();
              var freeData = null;
              try { freeData = freeRaw ? JSON.parse(freeRaw) : null; } catch(e) { freeData = null; }
              if (!freeRes.ok) throw new Error((freeData && freeData.error) || freeRaw || 'No se pudo activar la licencia.');
              if (ui.freeActivationStatus) ui.freeActivationStatus.textContent = 'Licencia activada correctamente. Redirigiendo...';
              window.setTimeout(function(){
                window.location.href = (freeData && freeData.redirect_url) ? freeData.redirect_url : ('/administrar_empresa.html?id=' + encodeURIComponent(String(empresaId || '')));
              }, 500);
            } catch (err) {
              ui.activateFreeBtn.disabled = false;
              if (ui.freeActivationStatus) ui.freeActivationStatus.textContent = err && err.message ? err.message : String(err);
            }
          });

          const preferredProvider = normalizeProvider(params.get('provider') || params.get('metodo') || params.get('method'));
          const configuredDefaultProvider = normalizeProvider(methodsPayload.default_method);
          const resolvedDefaultProvider = availableMethods.length === 1
            ? availableMethods[0]
            : (availableMethods.indexOf(configuredDefaultProvider) >= 0 ? configuredDefaultProvider : availableMethods[0]);
          if (availableMethods.length) {
            if (availableMethods.indexOf(preferredProvider) >= 0) setPaymentMethod(preferredProvider);
            else setPaymentMethod(resolvedDefaultProvider);
          }

          refreshCheckoutSummary();

          if (wompiProvider && wompiProvider.available) {
            try{
              const termsRes = await fetch('/wompi/terms');
              if (termsRes.ok) {
                const terms = await termsRes.json();
                const linkA = terms.acceptance_permalink ? ('<a href="'+escapeHtml(terms.acceptance_permalink)+'" target="_blank" rel="noopener">Términos</a>') : 'Términos';
                const linkB = terms.personal_data_permalink ? ('<a href="'+escapeHtml(terms.personal_data_permalink)+'" target="_blank" rel="noopener">Datos personales</a>') : 'Datos personales';
                if (ui.wompiTermsLinks) ui.wompiTermsLinks.innerHTML = linkA + ' · ' + linkB;
                const wompiMode = String(terms.mode || '').toLowerCase();
                if (ui.wompiCheckoutHint) {
                  ui.wompiCheckoutHint.textContent = wompiMode.indexOf('sandbox') >= 0
                    ? 'Wompi está en sandbox. El checkout hospedado permite elegir Nequi, PSE o tarjeta con datos de prueba.'
                    : 'Wompi está en producción. El checkout hospedado permite elegir Nequi, PSE o tarjeta.';
                }
              } else if (ui.wompiTermsLinks) {
                ui.wompiTermsLinks.textContent = 'No se pudieron cargar los términos de Wompi.';
              }
            } catch(e){
              if (ui.wompiTermsLinks) ui.wompiTermsLinks.textContent = 'No se pudieron cargar los términos de Wompi.';
            }
          }

          if (ui.payWompiBtn) ui.payWompiBtn.addEventListener('click', async function(){
            if (!ui.wompiTermsChk || !ui.wompiTermsChk.checked) {
              syncStatusText(ui.wompiStatus, 'Debes aceptar continuar al checkout seguro de Wompi.');
              return;
            }

            setProviderBusy('wompi', 'Enviando a Wompi...');
            syncStatusText(ui.wompiStatus, '');
            try {
              const payload = {
                licencia_id: Number(licenciaId)
              };
              if (checkoutMode) payload.checkout_mode = checkoutMode;
              if (addonLicenciaIDs) payload.addon_licencia_ids = addonLicenciaIDs.split(',').map(function(v){ return Number(String(v).trim() || 0); }).filter(function(v){ return v > 0; });
              if (empresaId) payload.empresa_id = Number(empresaId);
              if (adminEmail) payload.customer_email = adminEmail;
              try { const code = String((ui.discountCodeInput && ui.discountCodeInput.value) || '').trim(); if (code) payload.discount_code = code; } catch(e){}
              try { const aId = String((ui.asesorIdInput && ui.asesorIdInput.value) || '').trim(); if (aId) { payload.asesor_id = aId; } } catch(e){}

              const wompiRes = await fetch('/wompi/create_checkout', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });

              const raw = await wompiRes.text();
              let data = null;
              try { data = JSON.parse(raw); } catch(e) { data = null; }
              if (!wompiRes.ok) {
                const msg = data && data.error ? data.error : raw;
                syncStatusText(ui.wompiStatus, 'Error Wompi: ' + msg);
                resetProvider('wompi');
                return;
              }

              const context = extractResponseContext(data, { provider: 'wompi' });
              if (!context.reference) {
                syncStatusText(ui.wompiStatus, 'No se recibió una referencia válida de Wompi.');
                resetProvider('wompi');
                return;
              }

              savePendingPayment({
                provider: 'wompi',
                licenciaId: licenciaId,
                empresaId: empresaId || '',
                checkoutMode: checkoutMode || '',
                addonLicenciaIDs: addonLicenciaIDs || '',
                transactionId: context.transactionId,
                reference: context.reference,
                status: context.status || 'PENDING',
                createdAt: Date.now()
              });
              updateUrlState({ provider: 'wompi', status: 'pending', transaction_id: context.transactionId || null, reference: context.reference || null, licencia_id: licenciaId, empresa_id: empresaId || null });

              const checkoutForm = data && (data.checkout_form || (data.data && data.data.checkout_form));
              if (checkoutForm) {
                setProviderBusy('wompi', 'Redirigiendo...');
                renderFeedback(ui.feedback, 'muted', 'Redirigiendo a Wompi', 'Te llevaremos al checkout seguro para completar el pago. Cuando regreses, esta página retomará la verificación automática con la referencia guardada.');
                syncStatusText(ui.wompiStatus, 'Enviando formulario seguro de Wompi...');
                if (submitWompiCheckoutForm(checkoutForm)) {
                  return;
                }
                syncStatusText(ui.wompiStatus, 'No se pudo abrir el checkout seguro de Wompi. Revisa la configuración de la pasarela.');
                resetProvider('wompi');
                return;
              }

              renderFeedback(ui.feedback, 'muted', 'Checkout Wompi iniciado', 'No se recibió formulario directo del checkout. Mantendremos esta pantalla verificando el estado del pago.');
              syncStatusText(ui.wompiStatus, 'Estado Wompi: ' + (context.status || 'PENDING'));
              startPolling('wompi', context, 30);
            } catch (err) {
              syncStatusText(ui.wompiStatus, 'Error enviando pago Wompi: ' + (err && err.message ? err.message : String(err)));
              resetProvider('wompi');
            }
          });

          if (ui.payEpaycoBtn) ui.payEpaycoBtn.addEventListener('click', async function(){
            if (!ui.epaycoTermsChk || !ui.epaycoTermsChk.checked) {
              syncStatusText(ui.epaycoStatus, 'Debes aceptar términos y autorización de datos para pagar con Epayco.');
              return;
            }

            setProviderBusy('epayco', 'Enviando a Epayco...');
            syncStatusText(ui.epaycoStatus, '');
            try {
              const payload = {
                licencia_id: Number(licenciaId)
              };
              if (checkoutMode) payload.checkout_mode = checkoutMode;
              if (addonLicenciaIDs) payload.addon_licencia_ids = addonLicenciaIDs.split(',').map(function(v){ return Number(String(v).trim() || 0); }).filter(function(v){ return v > 0; });
              if (empresaId) payload.empresa_id = Number(empresaId);
              if (adminEmail) payload.customer_email = adminEmail;
              try { const code = String((ui.discountCodeInput && ui.discountCodeInput.value) || '').trim(); if (code) payload.discount_code = code; } catch(e){}
              try { const aId = String((ui.asesorIdInput && ui.asesorIdInput.value) || '').trim(); if (aId) { payload.asesor_id = aId; } } catch(e){}

              const epayRes = await fetch('/epayco/create_transaction', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });
              const raw = await epayRes.text();
              let data = null;
              try { data = JSON.parse(raw); } catch(e) { data = null; }
              if (!epayRes.ok) {
                const msg = data && data.error ? data.error : raw;
                syncStatusText(ui.epaycoStatus, 'Error Epayco: ' + msg);
                resetProvider('epayco');
                return;
              }

              const context = extractResponseContext(data, { provider: 'epayco' });
              if (!context.transactionId && !context.reference) {
                syncStatusText(ui.epaycoStatus, 'No se recibió una referencia válida de Epayco.');
                resetProvider('epayco');
                return;
              }

              savePendingPayment({
                provider: 'epayco',
                licenciaId: licenciaId,
                empresaId: empresaId || '',
                checkoutMode: checkoutMode || '',
                addonLicenciaIDs: addonLicenciaIDs || '',
                transactionId: context.transactionId,
                reference: context.reference,
                status: context.status || 'PENDING',
                createdAt: Date.now()
              });
              updateUrlState({ provider: 'epayco', status: 'pending', transaction_id: context.transactionId || null, reference: context.reference || null, licencia_id: licenciaId, empresa_id: empresaId || null });

              const sessionId = String(data && (data.checkout_session_id || data.session_id || (data.data && (data.data.sessionId || data.data.session_id))) || '').trim();
              const checkoutType = String(data && (data.checkout_type || (data.data && data.data.type) || 'standard') || 'standard').trim().toLowerCase();
              const checkoutScriptURL = String(data && (data.checkout_script_url || (data.data && data.data.script_url) || 'https://checkout.epayco.co/checkout-v2.js') || 'https://checkout.epayco.co/checkout-v2.js').trim();
              const checkoutUrl = data && (data.checkout_url || (data.data && data.data.checkout_url));
              const checkoutForm = data && (data.checkout_form || (data.data && data.data.checkout_form));
              const checkoutConfig = data && (data.checkout_config || (data.data && data.data.checkout_config));
              const checkoutData = data && (data.checkout_data || (data.data && data.data.checkout_data));
              if (sessionId) {
                setProviderBusy('epayco', 'Abriendo checkout seguro...');
                renderFeedback(ui.feedback, 'muted', 'Abriendo Epayco', 'Se iniciará el Smart Checkout seguro de Epayco. Cuando regreses, esta página retomará la verificación automática con la referencia guardada.');
                syncStatusText(ui.epaycoStatus, 'Preparando Smart Checkout de Epayco...');
                const epaycoRuntime = await loadEpaycoSmartCheckoutScript(checkoutScriptURL);
                openEpaycoSmartCheckout(epaycoRuntime, sessionId, checkoutType, data && data.mode);
                return;
              }
              if (checkoutType === 'classic_js' && checkoutConfig && checkoutData) {
                setProviderBusy('epayco', 'Abriendo checkout seguro...');
                renderFeedback(ui.feedback, 'muted', 'Abriendo Epayco', 'Se abrirá el checkout estándar seguro de Epayco. Cuando regreses, esta página retomará la verificación automática con la referencia guardada.');
                syncStatusText(ui.epaycoStatus, 'Preparando checkout estándar de Epayco...');
                const epaycoRuntime = await loadEpaycoSmartCheckoutScript(checkoutScriptURL || 'https://checkout.epayco.co/checkout.js');
                openEpaycoClassicCheckout(epaycoRuntime, checkoutConfig, checkoutData);
                startPolling('epayco', context, 60);
                return;
              }
              if (checkoutForm) {
                setProviderBusy('epayco', 'Redirigiendo...');
                renderFeedback(ui.feedback, 'muted', 'Redirigiendo a Epayco', 'Te llevaremos al checkout seguro para completar el pago. Cuando regreses, esta página retomará la verificación automática con la referencia guardada.');
                syncStatusText(ui.epaycoStatus, 'Enviando el formulario seguro de Epayco...');
                if (submitEpaycoClassicCheckoutForm(checkoutForm)) {
                  return;
                }
                syncStatusText(ui.epaycoStatus, 'No se pudo enviar el formulario seguro de Epayco. Revisa la configuración de la pasarela.');
                resetProvider('epayco');
                return;
              }
              if (checkoutUrl) {
                if (!isSafeEpaycoRedirectURL(checkoutUrl)) {
                  syncStatusText(ui.epaycoStatus, 'Epayco devolvió una URL de checkout no válida o requiere formulario POST. No se redirigió para evitar el error AccessDenied.');
                  resetProvider('epayco');
                  return;
                }
                setProviderBusy('epayco', 'Redirigiendo...');
                renderFeedback(ui.feedback, 'muted', 'Redirigiendo a Epayco', 'Te llevaremos al checkout para completar el pago. Cuando regreses, esta página retomará la verificación automática con la referencia guardada.');
                if (ui.epaycoStatus) {
                  ui.epaycoStatus.innerHTML = 'Redirigiendo a la pasarela de Epayco. Si no ocurre automáticamente, usa este enlace: <a href="' + escapeHtml(checkoutUrl) + '" target="_self" rel="noopener">Abrir Epayco</a>.';
                }
                window.setTimeout(function(){
                  window.location.assign(checkoutUrl);
                }, 120);
                return;
              }

              renderFeedback(ui.feedback, 'muted', 'Checkout Epayco iniciado', 'No se recibió una URL directa del checkout. Mantendremos esta pantalla verificando el estado del pago.');
              syncStatusText(ui.epaycoStatus, 'Estado Epayco: ' + (context.status || 'PENDING'));
              startPolling('epayco', context, 30);
            } catch (err) {
              syncStatusText(ui.epaycoStatus, 'Error enviando pago Epayco: ' + (err && err.message ? err.message : String(err)));
              resetProvider('epayco');
            }
          });

          var hasUrlReturnParams = !!(
            params.get('provider') || params.get('metodo') || params.get('method') ||
            params.get('status') || params.get('x_response') || params.get('x_transaction_state') || params.get('response') ||
            params.get('x_cod_response') || params.get('cod_response') ||
            params.get('transaction_id') || params.get('id') || params.get('x_transaction_id') ||
            params.get('reference') || params.get('ref') || params.get('invoice') || params.get('x_id_invoice') || params.get('ref_payco') || params.get('x_ref_payco')
          );

          if (returnContext.hasReturn && hasUrlReturnParams) {
            var providerForReturn = normalizeProvider(returnContext.provider) || availableMethods[0] || '';
            if (providerForReturn) setPaymentMethod(providerForReturn);

            if ((returnContext.transactionId || returnContext.reference) && providerForReturn) {
              var returnOutcome = applyResolvedResult(providerForReturn, returnContext, returnContext);
              if (returnOutcome && !returnOutcome.done) {
                startPolling(providerForReturn, returnOutcome.context || returnContext, 20);
              }
            } else if (returnContext.status) {
              applyResolvedResult(providerForReturn, returnContext, returnContext);
            }
          } else if (returnContext.hasReturn) {
            var providerForStale = normalizeProvider(returnContext.provider) || availableMethods[0] || '';
            if (providerForStale) setPaymentMethod(providerForStale);
            syncStatusText(getStatusElement(providerForStale), 'Se encontró un pago anterior sin completar. Puedes iniciar uno nuevo.');
            clearPendingPayment();
          }

        }catch(err){ console.error(err); container.innerText = 'Error: ' + (err && err.message ? err.message : String(err)); }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run); else run();
    })();
  </script>
  <script src="/js/ai_chat_drawer.js"></script>
</body>
</html>
