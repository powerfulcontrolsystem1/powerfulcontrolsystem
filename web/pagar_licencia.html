<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pagar Licencia</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Pagar Licencia</h2>
      <ul class="nav">
        <li><a href="/seleccionar_empresa.html"><img class="icon" src="/img/company-briefcase-color.svg" alt="">Volver a empresas</a></li>
        <li><a href="/elegir_licencia.html"><img class="icon" src="/img/shield-license-color.svg" alt="">Elegir otra licencia</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="container">
        <div class="page-header">
          <h1 id="pageTitle">Pagar Licencia</h1>
        </div>

        <div id="payment" class="card">Cargando...</div>
      </div>
    </main>
  </div>

  <script>
    (function(){
      const pendingPaymentKey = 'pcs_licencia_payment_pending_v1';

      function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m] }) }
      function normalizeProvider(raw){
        const value = String(raw || '').trim().toLowerCase();
        if (value === 'nequi' || value === 'wompi') return 'wompi';
        if (value === 'epayco') return 'epayco';
        return '';
      }
      function normalizeStatus(raw){
        const value = String(raw || '').trim().toUpperCase();
        if (!value) return '';
        if (['SUCCESS','APPROVED','ACCEPTED','ACREDITADA','ACREDITADO','ACEPTADA','APROBADA','1'].indexOf(value) >= 0) return 'APPROVED';
        if (['FAILURE','DECLINED','REJECTED','RECHAZADA','RECHAZADO','CANCELADA','CANCELADO','ANULADA','ANULADO','2'].indexOf(value) >= 0) return 'DECLINED';
        if (['PENDING','PENDIENTE','EN_PROCESO','3'].indexOf(value) >= 0) return 'PENDING';
        if (['ERROR','FAILED','FALLIDA','FALLIDO','4'].indexOf(value) >= 0) return 'ERROR';
        return value;
      }
      function providerLabel(provider){
        if (provider === 'epayco') return 'Epayco';
        if (provider === 'wompi') return 'Wompi';
        return 'la pasarela';
      }
      function originalButtonLabel(provider){
        return provider === 'epayco' ? 'Pagar con Epayco' : 'Pagar con Wompi (Nequi)';
      }
      function isSuccessStatus(status){ return normalizeStatus(status) === 'APPROVED'; }
      function isFinalStatus(status){
        const value = normalizeStatus(status);
        return ['APPROVED','DECLINED','ERROR','VOIDED','CANCELED','FAILED'].indexOf(value) >= 0;
      }
      function readPendingPayment(){
        try {
          const raw = localStorage.getItem(pendingPaymentKey);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          const createdAt = Number(parsed && parsed.createdAt || 0);
          if (createdAt > 0 && (Date.now() - createdAt) > (6 * 60 * 60 * 1000)) {
            localStorage.removeItem(pendingPaymentKey);
            return null;
          }
          return parsed;
        } catch (err) {
          return null;
        }
      }
      function savePendingPayment(payment){
        try {
          localStorage.setItem(pendingPaymentKey, JSON.stringify(payment || {}));
        } catch (err) {}
      }
      function clearPendingPayment(){
        try {
          localStorage.removeItem(pendingPaymentKey);
        } catch (err) {}
      }
      function matchesPendingContext(pending, licenciaId, empresaId){
        if (!pending) return false;
        if (licenciaId && String(pending.licenciaId || '') !== String(licenciaId)) return false;
        return String(pending.empresaId || '') === String(empresaId || '');
      }
      function buildReturnContext(params, licenciaId, empresaId){
        const pending = readPendingPayment();
        let provider = normalizeProvider(params.get('provider') || params.get('metodo') || params.get('method'));
        let status = normalizeStatus(params.get('status') || params.get('x_response') || params.get('x_transaction_state') || params.get('response'));
        if (!status) status = normalizeStatus(params.get('x_cod_response') || params.get('cod_response'));
        let transactionId = String(params.get('transaction_id') || params.get('id') || params.get('x_transaction_id') || '').trim();
        let reference = String(params.get('reference') || params.get('ref') || params.get('invoice') || params.get('x_id_invoice') || params.get('ref_payco') || params.get('x_ref_payco') || '').trim();

        if ((!provider || (!transactionId && !reference)) && matchesPendingContext(pending, licenciaId, empresaId)) {
          if (!provider) provider = normalizeProvider(pending.provider);
          if (!status) status = normalizeStatus(pending.status);
          if (!transactionId) transactionId = String(pending.transactionId || '').trim();
          if (!reference) reference = String(pending.reference || '').trim();
        }

        return {
          provider: provider,
          status: status,
          transactionId: transactionId,
          reference: reference,
          hasReturn: !!(provider || status || transactionId || reference)
        };
      }
      function renderFeedback(target, kind, title, body){
        if (!target) return;
        const className = kind === 'success' ? 'success' : (kind === 'error' ? 'error' : 'muted');
        target.innerHTML = '<div class="' + className + '"><strong>' + escapeHtml(title) + '</strong><div>' + escapeHtml(body) + '</div></div>';
      }
      function syncStatusText(target, text){ if (target) target.textContent = text || ''; }
      function extractResponseContext(data, fallback){
        const payload = data && data.data && typeof data.data === 'object' ? data.data : null;
        const context = fallback || {};
        return {
          provider: normalizeProvider((data && data.provider) || context.provider),
          status: normalizeStatus((data && data.status) || (payload && payload.status) || context.status),
          transactionId: String((data && (data.transaction_id || data.id)) || (payload && (payload.id || payload.transaction_id)) || context.transactionId || '').trim(),
          reference: String((data && (data.reference || data.ref)) || (payload && (payload.reference || payload.invoice || payload.x_ref_payco)) || context.reference || '').trim()
        };
      }
      async function fetchProviderStatus(provider, context){
        const normalizedProvider = normalizeProvider(provider);
        if (!normalizedProvider) throw new Error('No se pudo determinar la pasarela del pago.');
        let endpoint = '';
        if (normalizedProvider === 'epayco') {
          endpoint = context.transactionId ? ('/epayco/transaction_status?id=' + encodeURIComponent(context.transactionId)) : ('/epayco/transaction_status?reference=' + encodeURIComponent(context.reference || ''));
        } else {
          endpoint = context.transactionId ? ('/wompi/transaction_status?id=' + encodeURIComponent(context.transactionId)) : ('/wompi/transaction_status?reference=' + encodeURIComponent(context.reference || ''));
        }
        const response = await fetch(endpoint, { credentials: 'same-origin' });
        const raw = await response.text();
        let data = null;
        try { data = JSON.parse(raw); } catch (err) { data = null; }
        if (!response.ok) {
          throw new Error((data && data.error) ? data.error : (raw || 'No se pudo consultar el estado del pago.'));
        }
        return data || {};
      }

      async function run(){
        const params = new URLSearchParams(window.location.search);
        const pendingSeed = readPendingPayment();
        let licenciaId = params.get('licencia_id');
        let empresaId = params.get('empresa_id');
        if (!licenciaId && pendingSeed && pendingSeed.licenciaId) licenciaId = String(pendingSeed.licenciaId);
        if (!empresaId && pendingSeed && pendingSeed.empresaId) empresaId = String(pendingSeed.empresaId);

        const returnContext = buildReturnContext(params, licenciaId, empresaId);
        const container = document.getElementById('payment');

        if (!licenciaId) {
          if (returnContext.hasReturn) {
            if (isSuccessStatus(returnContext.status)) {
              clearPendingPayment();
              container.innerHTML = '<div class="success"><strong>Pago aprobado</strong><div>La pasarela confirmó tu pago. Si no ves la licencia activa todavía, vuelve a empresas y recarga el listado.</div></div>';
            } else if (isFinalStatus(returnContext.status)) {
              clearPendingPayment();
              container.innerHTML = '<div class="error"><strong>Pago no completado</strong><div>La pasarela reportó el estado ' + escapeHtml(returnContext.status || 'DESCONOCIDO') + '. Puedes volver a intentar el pago.</div></div>';
            } else {
              container.innerHTML = '<div class="muted"><strong>Pago en verificación</strong><div>Estamos recuperando el estado del pago. Si no ves cambios en unos segundos, vuelve a la selección de empresas.</div></div>';
            }
            return;
          }
          container.innerText = 'ID de licencia no proporcionado.';
          return;
        }

        try{
          let adminEmail = '';
          try{
            const meRes = await fetch('/me');
            if (meRes.ok) {
              const me = await meRes.json();
              adminEmail = me.email || me.Email || '';
            }
          }catch(e){}

          const [res, empRes, methodsRes] = await Promise.all([
            fetch('/super/api/licencias'),
            fetch('/super/api/empresas'),
            fetch('/api/public/licencias/payment_methods')
          ]);
          if (!res.ok) { container.innerText = 'Error al obtener licencias'; return }
          if (!methodsRes.ok) { container.innerText = 'Error al obtener métodos de pago disponibles'; return }

          const licencias = await res.json();
          const empresas = empRes.ok ? await empRes.json() : [];
          const methodsPayload = await methodsRes.json();
          const paymentProviders = Array.isArray(methodsPayload.providers) ? methodsPayload.providers : [];
          const epaycoProvider = paymentProviders.find(function(provider){ return provider && provider.id === 'epayco'; }) || null;
          const wompiProvider = paymentProviders.find(function(provider){ return provider && provider.id === 'wompi'; }) || null;
          const availableMethods = [];
          if (epaycoProvider && epaycoProvider.available) availableMethods.push('epayco');
          if (wompiProvider && wompiProvider.available) availableMethods.push('wompi');
          const unavailableMessages = [];
          if (epaycoProvider && !epaycoProvider.available) {
            unavailableMessages.push(epaycoProvider.enabled
              ? 'Epayco esta activado, pero falta configurar al menos la Public Key en configuracion avanzada.'
              : 'Epayco esta desactivado en configuracion avanzada.');
          }
          if (wompiProvider && !wompiProvider.available) {
            unavailableMessages.push(wompiProvider.enabled
              ? 'Wompi esta activado, pero le faltan credenciales obligatorias (Public Key, Private Key e Integrity Key).'
              : 'Wompi esta desactivado en configuracion avanzada.');
          }

          const paymentCards = [];
          if (epaycoProvider && epaycoProvider.available) {
            paymentCards.push(''+
              '<button id="selectEpaycoCard" type="button" class="payment-method-card payment-method-card-licenses payment-method-epayco">'+
              '<span class="payment-method-badge">Epayco</span>'+
              '<span class="method-name">Epayco</span>'+
              '<span class="method-desc">Tarjeta, PSE y otros</span>'+
              '</button>'
            );
          }
          if (wompiProvider && wompiProvider.available) {
            paymentCards.push(''+
              '<button id="selectWompiCard" type="button" class="payment-method-card payment-method-card-licenses payment-method-wompi">'+
              '<span class="payment-method-badge">Wompi</span>'+
              '<span class="method-name">Wompi</span>'+
              '<span class="method-desc">Nequi / Tarjeta</span>'+
              '</button>'
            );
          }

          const lic = (licencias || []).find(function(x){ return String(x.id) === String(licenciaId) });
          if (!lic){ container.innerText = 'Licencia no encontrada.'; return }

          container.innerHTML = ''+
            '<div class="payment-licencia-summary">'+
              '<div class="payment-licencia-info">'+
                '<h2>'+escapeHtml(lic.nombre||lic.Nombre||'')+'</h2>'+
                '<p class="muted small">' + (empresaId ? ('Empresa: ' + escapeHtml((empresas.find(function(x){ return String(x.id) === String(empresaId) })||{}).nombre || '')) : '') + '</p>'+
                '<p class="card-desc">'+escapeHtml(lic.descripcion||lic.Descripcion||'')+'</p>'+
                '<p><strong>Duración:</strong> '+escapeHtml(String(lic.duracion_dias||lic.DuracionDias||''))+' días</p>'+
              '</div>'+
              '<div class="payment-licencia-price">$ '+escapeHtml(String(lic.valor||lic.Valor||0))+'</div>'+
            '</div>'+
            '<div id="paymentFeedback" class="form-help" style="margin-top:12px;"></div>'+
            '<div class="form-row" style="margin-top:12px;">'+
              '<div class="form-col">'+
                '<label class="form-label" for="discountCode">Código de descuento (opcional)</label>'+
                '<input id="discountCode" class="form-input" type="text" placeholder="Código de descuento">'+
              '</div>'+
              '<div class="form-col">'+
                '<label class="form-label" for="asesorId">Código vendedor (opcional)</label>'+
                '<input id="asesorId" class="form-input" type="text" placeholder="Código del vendedor">'+
              '</div>'+
            '</div>'+
            '<h3 class="payment-method-title">Selecciona el método de pago</h3>'+
            (paymentCards.length
              ? '<div class="payment-method-selector payment-method-selector-licenses">' + paymentCards.join('') + '</div>'
              : '<div class="form-help error">' + escapeHtml(unavailableMessages.length
                ? unavailableMessages.join(' ')
                : 'Actualmente no hay métodos de pago activos. Activa Epayco o Wompi desde configuración avanzada.') + '</div>')+
            ((epaycoProvider && epaycoProvider.available)
              ? '<div id="epaycoPanel" class="payment-method-panel payment-method-panel-epayco">'+
                '<div class="method-panel-heading">Epayco</div>'+
                '<label for="epaycoEmail" class="muted small">Correo del cliente (recomendado):</label>'+
                '<input id="epaycoEmail" class="payment-method-input" type="email" placeholder="cliente@correo.com">'+
                '<div class="small payment-method-hint">Epayco admite tarjetas y PSE según configuración.</div>'+
                '<label class="small payment-method-check"><input id="epaycoTermsChk" type="checkbox"> Acepto términos y tratamiento de datos</label>'+
                '<button id="payEpaycoBtn" class="btn secondary payment-btn-epayco" type="button">Pagar con Epayco</button>'+
                '<div id="epaycoStatus" class="small payment-method-status"></div>'+
                '</div>'
              : '')+
            ((wompiProvider && wompiProvider.available)
              ? '<div id="wompiPanel" class="payment-method-panel payment-method-panel-wompi" style="display:none;">'+
                '<div class="method-panel-heading">Wompi</div>'+
                '<label for="wompiPhone" class="muted small">Celular Nequi (10 dígitos):</label>'+
                '<input id="wompiPhone" class="payment-method-input" type="text" inputmode="numeric" maxlength="10" placeholder="3991111111">'+
                '<div id="wompiSandboxHint" class="small payment-method-hint">En sandbox: 3991111111 aprueba, 3992222222 declina.</div>'+
                '<label class="small payment-method-check"><input id="wompiTermsChk" type="checkbox"> Acepto términos y tratamiento de datos</label>'+
                '<div id="wompiTermsLinks" class="small payment-method-links"></div>'+
                '<button id="payWompiBtn" class="btn secondary payment-btn-wompi" type="button">Pagar con Wompi (Nequi)</button>'+
                '<div id="wompiStatus" class="small payment-method-status"></div>'+
                '</div>'
              : '');

          const ui = {
            feedback: document.getElementById('paymentFeedback'),
            selectWompiCard: document.getElementById('selectWompiCard'),
            selectEpaycoCard: document.getElementById('selectEpaycoCard'),
            wompiPanel: document.getElementById('wompiPanel'),
            epaycoPanel: document.getElementById('epaycoPanel'),
            payWompiBtn: document.getElementById('payWompiBtn'),
            wompiPhoneInput: document.getElementById('wompiPhone'),
            wompiTermsChk: document.getElementById('wompiTermsChk'),
            wompiStatus: document.getElementById('wompiStatus'),
            wompiTermsLinks: document.getElementById('wompiTermsLinks'),
            wompiSandboxHint: document.getElementById('wompiSandboxHint'),
            payEpaycoBtn: document.getElementById('payEpaycoBtn'),
            epaycoEmailInput: document.getElementById('epaycoEmail'),
            epaycoTermsChk: document.getElementById('epaycoTermsChk'),
            epaycoStatus: document.getElementById('epaycoStatus'),
            discountCodeInput: document.getElementById('discountCode'),
            asesorIdInput: document.getElementById('asesorId')
          };

          function updateUrlState(updates){
            const nextParams = new URLSearchParams(window.location.search);
            Object.keys(updates || {}).forEach(function(key){
              const value = updates[key];
              if (value === undefined || value === null || value === '') nextParams.delete(key);
              else nextParams.set(key, String(value));
            });
            const query = nextParams.toString();
            history.replaceState(null, '', window.location.pathname + (query ? ('?' + query) : ''));
          }
          function getStatusElement(provider){
            const normalized = normalizeProvider(provider);
            if (normalized === 'epayco') return ui.epaycoStatus;
            if (normalized === 'wompi') return ui.wompiStatus;
            return null;
          }
          function getButton(provider){
            const normalized = normalizeProvider(provider);
            if (normalized === 'epayco') return ui.payEpaycoBtn;
            if (normalized === 'wompi') return ui.payWompiBtn;
            return null;
          }
          function setPaymentMethod(method){
            if (!availableMethods.length) return;
            const normalizedInput = normalizeProvider(method);
            const normalized = availableMethods.indexOf(normalizedInput) >= 0 ? normalizedInput : availableMethods[0];
            const isWompi = normalized === 'wompi';
            const isEpayco = normalized === 'epayco';
            if (ui.selectWompiCard) ui.selectWompiCard.classList.toggle('active', isWompi);
            if (ui.selectEpaycoCard) ui.selectEpaycoCard.classList.toggle('active', isEpayco);
            if (ui.wompiPanel) { ui.wompiPanel.classList.toggle('active', isWompi); ui.wompiPanel.style.display = isWompi ? '' : 'none'; }
            if (ui.epaycoPanel) { ui.epaycoPanel.classList.toggle('active', isEpayco); ui.epaycoPanel.style.display = isEpayco ? '' : 'none'; }
          }
          function setProviderBusy(provider, label){
            const button = getButton(provider);
            if (!button) return;
            button.disabled = true;
            button.textContent = label || 'Verificando...';
          }
          function resetProvider(provider){
            const button = getButton(provider);
            if (!button) return;
            button.disabled = false;
            button.textContent = originalButtonLabel(provider);
          }
          function disableAllPayments(){
            if (ui.payWompiBtn) ui.payWompiBtn.disabled = true;
            if (ui.payEpaycoBtn) ui.payEpaycoBtn.disabled = true;
          }
          function applyResolvedResult(provider, statusData, fallbackContext){
            const resolved = extractResponseContext(statusData, fallbackContext);
            const normalizedProvider = normalizeProvider(provider || resolved.provider);
            const normalizedStatus = normalizeStatus(resolved.status);
            const statusElement = getStatusElement(normalizedProvider);
            const label = providerLabel(normalizedProvider);
            const referenceText = resolved.reference ? ('Referencia: ' + resolved.reference + '.') : 'Aun no tenemos una referencia confirmada por la pasarela.';

            if (resolved.reference || resolved.transactionId) {
              savePendingPayment({
                provider: normalizedProvider,
                licenciaId: licenciaId,
                empresaId: empresaId || '',
                transactionId: resolved.transactionId || '',
                reference: resolved.reference || '',
                status: normalizedStatus || 'PENDING',
                createdAt: Date.now()
              });
            }

            if (isSuccessStatus(normalizedStatus)) {
              clearPendingPayment();
              updateUrlState({
                provider: normalizedProvider,
                status: normalizedStatus.toLowerCase(),
                transaction_id: resolved.transactionId || null,
                reference: resolved.reference || null,
                licencia_id: licenciaId,
                empresa_id: empresaId || null
              });
              renderFeedback(ui.feedback, 'success', 'Pago aprobado', label + ' confirmó el pago y la licencia quedó activa. ' + referenceText);
              syncStatusText(statusElement, 'Estado ' + label + ': ' + normalizedStatus);
              disableAllPayments();
              return { done: true, context: resolved };
            }

            if (isFinalStatus(normalizedStatus)) {
              clearPendingPayment();
              updateUrlState({
                provider: normalizedProvider,
                status: normalizedStatus.toLowerCase(),
                transaction_id: resolved.transactionId || null,
                reference: resolved.reference || null,
                licencia_id: licenciaId,
                empresa_id: empresaId || null
              });
              renderFeedback(ui.feedback, 'error', 'Pago no completado', label + ' reportó el estado ' + normalizedStatus + '. Puedes intentarlo de nuevo. ' + referenceText);
              syncStatusText(statusElement, 'Estado ' + label + ': ' + normalizedStatus);
              resetProvider(normalizedProvider);
              return { done: true, context: resolved };
            }

            updateUrlState({
              provider: normalizedProvider,
              status: 'pending',
              transaction_id: resolved.transactionId || null,
              reference: resolved.reference || null,
              licencia_id: licenciaId,
              empresa_id: empresaId || null
            });
            renderFeedback(ui.feedback, 'muted', 'Pago en verificación', 'Estamos consultando el estado final con ' + label + '. ' + referenceText);
            syncStatusText(statusElement, 'Estado ' + label + ': ' + (normalizedStatus || 'PENDING'));
            return { done: false, context: resolved };
          }
          function startPolling(provider, context, maxTries){
            const normalizedProvider = normalizeProvider(provider);
            if (!normalizedProvider) return;
            if (!context || (!context.transactionId && !context.reference)) return;

            let tries = 0;
            setPaymentMethod(normalizedProvider);
            setProviderBusy(normalizedProvider, 'Verificando...');

            const poll = async function(){
              tries++;
              try {
                const statusData = await fetchProviderStatus(normalizedProvider, context);
                const outcome = applyResolvedResult(normalizedProvider, statusData, context);
                context = outcome.context;
                if (outcome.done) return;
              } catch (err) {
                if (tries >= maxTries) {
                  renderFeedback(ui.feedback, 'error', 'No se pudo confirmar el pago', 'Se agotó el tiempo de verificación automática. Verifica el estado de la transacción en unos segundos o intenta recargar la página.');
                  syncStatusText(getStatusElement(normalizedProvider), 'Error consultando estado: ' + (err && err.message ? err.message : String(err)));
                  resetProvider(normalizedProvider);
                  return;
                }
                syncStatusText(getStatusElement(normalizedProvider), 'Reintentando verificación con ' + providerLabel(normalizedProvider) + '...');
              }
              setTimeout(poll, 3000);
            };

            poll();
          }

          if (ui.selectWompiCard) ui.selectWompiCard.addEventListener('click', function(){ setPaymentMethod('wompi'); });
          if (ui.selectEpaycoCard) ui.selectEpaycoCard.addEventListener('click', function(){ setPaymentMethod('epayco'); });

          const preferredProvider = normalizeProvider(params.get('provider') || params.get('metodo') || params.get('method'));
          if (availableMethods.length) {
            if (availableMethods.indexOf(preferredProvider) >= 0) setPaymentMethod(preferredProvider);
            else setPaymentMethod(methodsPayload.default_method || availableMethods[0]);
          }

          if (wompiProvider && wompiProvider.available) {
            try{
              const termsRes = await fetch('/wompi/terms');
              if (termsRes.ok) {
                const terms = await termsRes.json();
                const linkA = terms.acceptance_permalink ? ('<a href="'+escapeHtml(terms.acceptance_permalink)+'" target="_blank" rel="noopener">Términos</a>') : 'Términos';
                const linkB = terms.personal_data_permalink ? ('<a href="'+escapeHtml(terms.personal_data_permalink)+'" target="_blank" rel="noopener">Datos personales</a>') : 'Datos personales';
                if (ui.wompiTermsLinks) ui.wompiTermsLinks.innerHTML = linkA + ' · ' + linkB;
                const wompiMode = String(terms.mode || '').toLowerCase();
                if (wompiMode.indexOf('sandbox') >= 0) {
                  if (terms.sandbox_phone_approved && terms.sandbox_phone_declined && ui.wompiSandboxHint) {
                    ui.wompiSandboxHint.textContent = 'Sandbox activo: ' + terms.sandbox_phone_approved + ' aprueba, ' + terms.sandbox_phone_declined + ' declina.';
                  }
                } else if (ui.wompiSandboxHint) {
                  ui.wompiSandboxHint.textContent = 'Modo producción activo para Nequi.';
                }
              } else if (ui.wompiTermsLinks) {
                ui.wompiTermsLinks.textContent = 'No se pudieron cargar los términos de Wompi.';
              }
            } catch(e){
              if (ui.wompiTermsLinks) ui.wompiTermsLinks.textContent = 'No se pudieron cargar los términos de Wompi.';
            }
          }

          if (ui.payWompiBtn) ui.payWompiBtn.addEventListener('click', async function(){
            const phone = String((ui.wompiPhoneInput && ui.wompiPhoneInput.value) || '').trim();
            if (!/^3\d{9}$/.test(phone)) {
              syncStatusText(ui.wompiStatus, 'Ingresa un celular válido de Nequi (10 dígitos, inicia por 3).');
              return;
            }
            if (!ui.wompiTermsChk || !ui.wompiTermsChk.checked) {
              syncStatusText(ui.wompiStatus, 'Debes aceptar términos y autorización de datos para pagar con Nequi.');
              return;
            }

            setProviderBusy('wompi', 'Enviando a Wompi...');
            syncStatusText(ui.wompiStatus, '');
            try {
              const payload = {
                licencia_id: Number(licenciaId),
                phone_number: phone,
                accept_terms: true
              };
              if (empresaId) payload.empresa_id = Number(empresaId);
              if (adminEmail) payload.customer_email = adminEmail;
              try { const code = String((ui.discountCodeInput && ui.discountCodeInput.value) || '').trim(); if (code) payload.discount_code = code; } catch(e){}
              try { const aId = String((ui.asesorIdInput && ui.asesorIdInput.value) || '').trim(); if (aId) { payload.asesor_id = aId; payload.vendedor_id = aId; } } catch(e){}

              const wompiRes = await fetch('/wompi/create_transaction_nequi', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });

              const raw = await wompiRes.text();
              let data = null;
              try { data = JSON.parse(raw); } catch(e) { data = null; }
              if (!wompiRes.ok) {
                const msg = data && data.error ? data.error : raw;
                syncStatusText(ui.wompiStatus, 'Error Wompi: ' + msg);
                if (data && data.acceptance_permalink && data.personal_data_permalink && ui.wompiTermsLinks) {
                  ui.wompiTermsLinks.innerHTML = '<a href="'+escapeHtml(data.acceptance_permalink)+'" target="_blank" rel="noopener">Términos</a> · <a href="'+escapeHtml(data.personal_data_permalink)+'" target="_blank" rel="noopener">Datos personales</a>';
                }
                resetProvider('wompi');
                return;
              }

              const context = extractResponseContext(data, { provider: 'wompi' });
              if (!context.transactionId) {
                syncStatusText(ui.wompiStatus, 'No se recibió transaction_id de Wompi.');
                resetProvider('wompi');
                return;
              }

              savePendingPayment({
                provider: 'wompi',
                licenciaId: licenciaId,
                empresaId: empresaId || '',
                transactionId: context.transactionId,
                reference: context.reference,
                status: context.status || 'PENDING',
                createdAt: Date.now()
              });
              updateUrlState({ provider: 'wompi', status: 'pending', transaction_id: context.transactionId, reference: context.reference || null, licencia_id: licenciaId, empresa_id: empresaId || null });
              renderFeedback(ui.feedback, 'muted', 'Solicitud enviada a Wompi', 'Revisa tu app de Nequi y confirma el pago. Mantendremos esta pantalla verificando el estado automáticamente.');
              syncStatusText(ui.wompiStatus, 'Estado Wompi: ' + (context.status || 'PENDING'));
              startPolling('wompi', context, 30);
            } catch (err) {
              syncStatusText(ui.wompiStatus, 'Error enviando pago Wompi: ' + (err && err.message ? err.message : String(err)));
              resetProvider('wompi');
            }
          });

          if (ui.payEpaycoBtn) ui.payEpaycoBtn.addEventListener('click', async function(){
            const email = String((ui.epaycoEmailInput && ui.epaycoEmailInput.value) || '').trim();
            if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
              syncStatusText(ui.epaycoStatus, 'Ingresa un correo válido para Epayco.');
              return;
            }
            if (!ui.epaycoTermsChk || !ui.epaycoTermsChk.checked) {
              syncStatusText(ui.epaycoStatus, 'Debes aceptar términos y autorización de datos para pagar con Epayco.');
              return;
            }

            setProviderBusy('epayco', 'Enviando a Epayco...');
            syncStatusText(ui.epaycoStatus, '');
            try {
              const payload = {
                licencia_id: Number(licenciaId),
                customer_email: email
              };
              if (empresaId) payload.empresa_id = Number(empresaId);
              try { const code = String((ui.discountCodeInput && ui.discountCodeInput.value) || '').trim(); if (code) payload.discount_code = code; } catch(e){}
              try { const aId = String((ui.asesorIdInput && ui.asesorIdInput.value) || '').trim(); if (aId) { payload.asesor_id = aId; payload.vendedor_id = aId; } } catch(e){}

              const epayRes = await fetch('/epayco/create_transaction', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
              });
              const raw = await epayRes.text();
              let data = null;
              try { data = JSON.parse(raw); } catch(e) { data = null; }
              if (!epayRes.ok) {
                const msg = data && data.error ? data.error : raw;
                syncStatusText(ui.epaycoStatus, 'Error Epayco: ' + msg);
                resetProvider('epayco');
                return;
              }

              const context = extractResponseContext(data, { provider: 'epayco' });
              if (!context.transactionId && !context.reference) {
                syncStatusText(ui.epaycoStatus, 'No se recibió una referencia válida de Epayco.');
                resetProvider('epayco');
                return;
              }

              savePendingPayment({
                provider: 'epayco',
                licenciaId: licenciaId,
                empresaId: empresaId || '',
                transactionId: context.transactionId,
                reference: context.reference,
                status: context.status || 'PENDING',
                createdAt: Date.now()
              });
              updateUrlState({ provider: 'epayco', status: 'pending', transaction_id: context.transactionId || null, reference: context.reference || null, licencia_id: licenciaId, empresa_id: empresaId || null });

              const checkoutUrl = data && (data.checkout_url || (data.data && data.data.checkout_url));
              if (checkoutUrl) {
                const popup = window.open(checkoutUrl, '_blank', 'noopener,noreferrer');
                if (!popup) {
                  syncStatusText(ui.epaycoStatus, 'Solicitud enviada. Abre la pasarela desde el enlace mostrado en pantalla.');
                  renderFeedback(ui.feedback, 'muted', 'Abre Epayco para completar el pago', 'Tu navegador bloqueó la pestaña emergente. Usa el enlace visible en el mensaje del panel para continuar el checkout.');
                  ui.epaycoStatus.innerHTML = 'Solicitud enviada. Abre la pasarela de Epayco aquí: <a href="' + escapeHtml(checkoutUrl) + '" target="_blank" rel="noopener">Abrir Epayco</a>.';
                } else {
                  renderFeedback(ui.feedback, 'muted', 'Checkout Epayco abierto', 'Se abrió Epayco en una pestaña nueva. Esta pantalla seguirá verificando el estado del pago automáticamente.');
                  syncStatusText(ui.epaycoStatus, 'Estado Epayco: ' + (context.status || 'PENDING'));
                }
              } else {
                renderFeedback(ui.feedback, 'muted', 'Checkout Epayco iniciado', 'Completa el pago en la pasarela y mantén esta pantalla abierta para ver la confirmación automática.');
                syncStatusText(ui.epaycoStatus, 'Estado Epayco: ' + (context.status || 'PENDING'));
              }

              startPolling('epayco', context, 30);
            } catch (err) {
              syncStatusText(ui.epaycoStatus, 'Error enviando pago Epayco: ' + (err && err.message ? err.message : String(err)));
              resetProvider('epayco');
            }
          });

          if (returnContext.hasReturn) {
            const providerForReturn = normalizeProvider(returnContext.provider) || availableMethods[0] || '';
            if (providerForReturn) setPaymentMethod(providerForReturn);

            if ((returnContext.transactionId || returnContext.reference) && providerForReturn) {
              applyResolvedResult(providerForReturn, returnContext, returnContext);
              startPolling(providerForReturn, returnContext, 20);
            } else if (returnContext.status) {
              applyResolvedResult(providerForReturn, returnContext, returnContext);
            }
          }

        }catch(err){ console.error(err); container.innerText = 'Error: ' + (err && err.message ? err.message : String(err)); }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run); else run();
    })();
  </script>
</body>
</html>
