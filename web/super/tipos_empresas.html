<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tipos de empresas</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    .tipos-empresas-title {
      margin: 0;
      font-size: inherit;
      line-height: inherit;
    }
  </style>
</head>
<body class="super-page form-bg-dark">
  <div class="container">
    <div class="page-header">
      <h1 class="form-label tipos-empresas-title">Tipos de empresas</h1>
      <button id="addBtn" class="btn add">Agregar</button>
    </div>
  <!-- Menú flotante eliminado en páginas del panel /super -->
    <form id="form" class="form">
      <input type="hidden" id="itemId">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Nombre</label>
          <input id="nombre" class="form-input" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Descripción / Observaciones</label>
          <textarea id="observaciones" class="form-textarea"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" id="saveBtn" class="btn">Guardar</button>
        <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
      </div>
      <div class="form-help" id="msg"></div>
    </form>
    <div id="list">Cargando...</div>
  </div>


  <script>
    async function load(){
      const res = await fetch('/super/api/tipos_empresas');
      const data = await res.json();
      const table = document.createElement('table');
      table.className = 'table';
      table.innerHTML = '<thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>';
      const tbody = document.createElement('tbody');
      data.forEach(i=>{
        const tr = document.createElement('tr');
        const activo = i.estado == 'activo' || i.activo==1 ? 1 : 0;
        const toggleLabel = (activo==1) ? 'Desactivar' : 'Activar';
        tr.innerHTML = `<td>${i.id}</td><td>${i.nombre}</td><td>${i.observaciones||''}</td><td class="actions"><button data-id="${i.id}" class="edit btn secondary">Editar</button> <button data-id="${i.id}" class="del btn danger">Eliminar</button> <button data-id="${i.id}" data-activo="${activo}" class="toggle btn">${toggleLabel}</button></td>`;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const list = document.getElementById('list'); list.innerHTML=''; list.appendChild(table);
      document.querySelectorAll('.edit').forEach(b=>b.onclick = async ()=>{
        const id = b.getAttribute('data-id');
        const item = data.find(x=>x.id==id);
        // mostrar formulario y cargar valores
        document.getElementById('form').style.display = '';
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('itemId').value = item.id;
        document.getElementById('nombre').value = item.nombre;
        document.getElementById('observaciones').value = item.observaciones||'';
        document.getElementById('saveBtn').innerText = 'Actualizar';
        document.getElementById('cancelBtn').style.display = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      document.querySelectorAll('.del').forEach(b=>b.onclick = async ()=>{
        if(!confirm('Eliminar?')) return;
        const id = b.getAttribute('data-id');
        await fetch('/super/api/tipos_empresas?id='+id, { method: 'DELETE' });
        load();
      });
      document.querySelectorAll('.toggle').forEach(b=>b.onclick = async ()=>{
        const id = b.getAttribute('data-id');
        const activo = b.getAttribute('data-activo') === '1' ? '0' : '1';
        if(!confirm((activo==='1' ? 'Activar' : 'Desactivar')+'?')) return;
        await fetch('/super/api/tipos_empresas?id='+id+'&action=activar&activo='+activo, { method: 'PUT' });
        load();
      });
    }

    document.getElementById('form').onsubmit = async (e)=>{
      e.preventDefault();
      const id = document.getElementById('itemId').value;
      const payload = { nombre: document.getElementById('nombre').value.trim(), observaciones: document.getElementById('observaciones').value.trim() };
      try{
        if(!payload.nombre){ document.getElementById('msg').innerText='Nombre requerido'; return }
        if(id){
          await fetch('/super/api/tipos_empresas?id='+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        } else {
          await fetch('/super/api/tipos_empresas', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        }
        document.getElementById('itemId').value=''; document.getElementById('nombre').value=''; document.getElementById('observaciones').value=''; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; document.getElementById('msg').innerText='';
        // ocultar formulario y mostrar boton agregar
        document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display='';
        load();
      }catch(err){ document.getElementById('msg').innerText = err.message }
    }
    document.getElementById('cancelBtn').onclick = ()=>{ document.getElementById('itemId').value=''; document.getElementById('nombre').value=''; document.getElementById('observaciones').value=''; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display=''; }

    document.getElementById('addBtn').onclick = ()=>{
      document.getElementById('form').style.display=''; document.getElementById('addBtn').style.display='none'; document.getElementById('itemId').value=''; document.getElementById('nombre').value=''; document.getElementById('observaciones').value=''; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; window.scrollTo({ top:0, behavior:'smooth' });
    }

    // iniciar oculto
    document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display='';
    load();
  </script>
  <script>
    (function(){
      var toggle = document.querySelector('.floating-menu .fm-toggle');
      var panel = document.querySelector('.floating-menu .fm-panel');
      if (!toggle || !panel) return;
      toggle.addEventListener('click', function(e){ e.stopPropagation(); panel.classList.toggle('open'); });
      document.addEventListener('click', function(){ panel.classList.remove('open'); });
      function getCookie(name){
        const v = document.cookie.match('(^|;)\s*'+name+'\s*=\s*([^;]+)');
        return v ? v.pop() : '';
      }
      var sessionLink = document.getElementById('sessionLink');
      if (sessionLink){
        if (getCookie('session_token')){
          sessionLink.textContent = 'Cerrar sesión';
          sessionLink.href = '/auth/logout';
        } else {
          sessionLink.textContent = 'Iniciar sesión';
          sessionLink.href = '/login.html';
        }
      }
    })();
  </script>
</body>
</html>
