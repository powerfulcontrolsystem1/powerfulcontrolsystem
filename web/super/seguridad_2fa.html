<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2FA super administrador</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body>
  <div class="container page-container">
    <header class="page-header compact-page-header">
      <div>
        <p class="section-eyebrow">Seguridad</p>
        <h1>2FA super administrador</h1>
        <p class="page-subtitle">Protege el acceso global con un código temporal de una aplicación autenticadora.</p>
      </div>
    </header>

    <section class="card operational-card">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Estado</label>
          <div id="totpStatus" class="form-help">Cargando estado 2FA...</div>
        </div>
      </div>
      <div class="form-actions">
        <button id="setupTotpBtn" class="btn primary" type="button">Generar secreto</button>
        <button id="disableTotpBtn" class="btn secondary" type="button">Desactivar 2FA</button>
      </div>
    </section>

    <section id="totpSetupCard" class="card operational-card is-hidden">
      <h2>Vincular aplicación</h2>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="totpSecret">Secreto</label>
          <input id="totpSecret" class="form-input" readonly>
          <p id="totpProvisioningUri" class="form-help break-word"></p>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="totpCode">Código de 6 dígitos</label>
          <input id="totpCode" class="form-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="123456">
        </div>
      </div>
      <div class="form-actions">
        <button id="confirmTotpBtn" class="btn primary" type="button">Confirmar y activar</button>
      </div>
      <div id="totpMessage" class="form-help"></div>
    </section>
  </div>
  <script src="/super/seguridad_2fa.js"></script>
</body>
</html>
