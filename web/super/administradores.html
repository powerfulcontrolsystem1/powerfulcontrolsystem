<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administradores</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page">
  <div class="container">
    <div class="page-header">
      <h1>Administradores</h1>
      <button id="addBtn" class="btn add">Agregar</button>
    </div>

    <form id="form" class="form">
      <input type="hidden" id="itemId">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Email</label>
          <input id="email" class="form-input" required />
        </div>
        <div class="form-col">
          <label class="form-label">Nombre</label>
          <input id="name" class="form-input" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Rol</label>
          <select id="role" class="form-input">
            <option value="administrador">administrador</option>
            <option value="super_administrador">super_administrador</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" id="saveBtn" class="btn">Guardar</button>
        <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
      </div>
      <div class="form-help" id="msg"></div>
    </form>

    <div id="list">Cargando...</div>
  </div>

  <script>
    async function load(){
      try{
        const res = await fetch('/super/api/administradores');
        if(!res.ok) throw new Error('failed to query administradores');
        const data = await res.json();
        const table = document.createElement('table');
        table.className = 'table table-compact';
        table.innerHTML = '<thead><tr><th>ID</th><th>Email</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>';
        const tbody = document.createElement('tbody');
        data.forEach(i=>{
          const tr = document.createElement('tr');
          const activo = (i.estado === 'activo' || i.estado==1) ? 1 : (i.estado||0);
          const toggleLabel = (activo==1) ? 'Desactivar' : 'Activar';
          tr.innerHTML = `<td>${i.id}</td><td>${i.email}</td><td>${i.name||''}</td><td>${i.role||''}</td><td>${i.estado||''}</td><td class="actions"><button data-id="${i.id}" data-email="${i.email||''}" class="edit btn secondary">Editar</button> <button data-id="${i.id}" class="del btn danger">Eliminar</button> <button data-id="${i.id}" data-activo="${activo}" class="toggle btn">${toggleLabel}</button></td>`;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        const list = document.getElementById('list'); list.innerHTML=''; list.appendChild(table);

        document.querySelectorAll('.edit').forEach(b=>b.onclick = async ()=>{
          const id = b.getAttribute('data-id');
          const email = b.getAttribute('data-email');
          // obtener item desde data cargada
          const item = data.find(x => String(x.id) === String(id) || x.email === email);
          if(!item) return alert('Registro no encontrado');
          document.getElementById('form').style.display = '';
          document.getElementById('addBtn').style.display = 'none';
          document.getElementById('itemId').value = item.id;
          document.getElementById('email').value = item.email || '';
          document.getElementById('email').readOnly = true;
          document.getElementById('name').value = item.name || '';
          document.getElementById('role').value = item.role || 'administrador';
          document.getElementById('saveBtn').innerText = 'Actualizar';
          document.getElementById('cancelBtn').style.display = '';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.querySelectorAll('.del').forEach(b=>b.onclick = async ()=>{
          if(!confirm('Eliminar administrador?')) return;
          const id = b.getAttribute('data-id');
          await fetch('/super/api/administradores?id='+id, { method: 'DELETE' });
          load();
        });
        document.querySelectorAll('.toggle').forEach(b=>b.onclick = async ()=>{
          const id = b.getAttribute('data-id');
          const activo = b.getAttribute('data-activo') === '1' ? '0' : '1';
          if(!confirm((activo==='1' ? 'Activar' : 'Desactivar')+' administrador?')) return;
          await fetch('/super/api/administradores?id='+id+'&action=activar&activo='+activo, { method: 'PUT' });
          load();
        });
      }catch(err){ document.getElementById('list').innerText = 'Error cargando administradores: '+(err.message||err); }
    }

    document.getElementById('form').onsubmit = async (e)=>{
      e.preventDefault();
      const id = document.getElementById('itemId').value;
      const payload = {
        Email: document.getElementById('email').value.trim(),
        Name: document.getElementById('name').value.trim(),
        Role: document.getElementById('role').value
      };
      try{
        if(!payload.Email){ document.getElementById('msg').innerText='Email requerido'; return }
        if(id){
          // update name and role by id
          const up = { Name: payload.Name, Role: payload.Role };
          await fetch('/super/api/administradores?id='+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(up) });
        } else {
          await fetch('/super/api/administradores', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ Email: payload.Email, Name: payload.Name, Role: payload.Role }) });
        }
        document.getElementById('itemId').value=''; document.getElementById('email').value=''; document.getElementById('email').readOnly=false; document.getElementById('name').value=''; document.getElementById('role').value='administrador'; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; document.getElementById('msg').innerText='';
        document.getElementById('form').style.display = 'none';
        document.getElementById('addBtn').style.display = '';
        load();
      }catch(err){ document.getElementById('msg').innerText = err.message }
    }

    document.getElementById('cancelBtn').onclick = ()=>{ document.getElementById('itemId').value=''; document.getElementById('email').value=''; document.getElementById('email').readOnly=false; document.getElementById('name').value=''; document.getElementById('role').value='administrador'; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display=''; }

    document.getElementById('addBtn').onclick = ()=>{
      document.getElementById('form').style.display = '';
      document.getElementById('addBtn').style.display = 'none';
      document.getElementById('itemId').value=''; document.getElementById('email').value=''; document.getElementById('email').readOnly=false; document.getElementById('name').value=''; document.getElementById('role').value='administrador'; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // iniciar oculto
    document.getElementById('form').style.display='none';
    document.getElementById('addBtn').style.display='';
    load();
  </script>
    <!-- Menú flotante eliminado en páginas del panel /super -->
</body>
</html>
