<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administradores</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page">
  <div class="container">
    <div class="page-header">
      <div>
        <h1>Administradores</h1>
      </div>
      <button id="addBtn" class="btn add">Agregar</button>
    </div>

    <form id="form" class="form">
      <input type="hidden" id="itemId">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Email</label>
          <input id="email" class="form-input" required />
        </div>
        <div class="form-col">
          <label class="form-label">Nombre</label>
          <input id="name" class="form-input" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Rol</label>
          <select id="role" class="form-input">
            <option value="administrador">administrador</option>
            <option value="super_administrador">super_administrador</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" id="saveBtn" class="btn">Guardar</button>
        <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
      </div>
      <div class="form-help" id="msg"></div>
    </form>

    <div id="list">Cargando...</div>
  </div>

  <script>
    async function load(){
      try{
        const res = await fetch('/super/api/administradores');
        if(!res.ok) throw new Error('failed to query administradores');
        const data = await res.json();
        const table = document.createElement('table');
        table.className = 'table table-compact';
        table.innerHTML = '<thead><tr><th>ID</th><th>Email</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>';
        const tbody = document.createElement('tbody');
        data.forEach(i=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${escapeHTML(i.id)}</td><td>${escapeHTML(i.email)}</td><td>${escapeHTML(i.name||'')}</td><td>${escapeHTML(i.role||'')}</td><td>${escapeHTML(i.estado||'')}</td><td class="actions"><button data-id="${escapeHTML(i.id)}" class="del btn danger">Eliminar</button></td>`;
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        const list = document.getElementById('list'); list.innerHTML=''; list.appendChild(table);

        document.querySelectorAll('.del').forEach(b=>b.onclick = async ()=>{
          if(!confirm('Eliminar administrador?')) return;
          const id = b.getAttribute('data-id');
          await ensureOK(await fetch('/super/api/administradores?id='+encodeURIComponent(id), { method: 'DELETE' }));
          load();
        });
      }catch(err){ document.getElementById('list').innerText = 'Error cargando administradores: '+(err.message||err); }
    }

    function escapeHTML(value){
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function ensureOK(res){
      if(res.ok) return res;
      const raw = await res.text().catch(()=> '');
      throw new Error(raw || ('HTTP ' + res.status));
    }

    function resetForm(){
      document.getElementById('itemId').value='';
      document.getElementById('email').value='';
      document.getElementById('email').readOnly=false;
      document.getElementById('name').value='';
      document.getElementById('role').value='administrador';
      document.getElementById('saveBtn').innerText='Guardar';
      document.getElementById('cancelBtn').style.display='none';
      document.getElementById('msg').innerText='';
    }

    document.getElementById('form').onsubmit = async (e)=>{
      e.preventDefault();
      const payload = {
        Email: document.getElementById('email').value.trim(),
        Name: document.getElementById('name').value.trim(),
        Role: document.getElementById('role').value
      };
      try{
        if(!payload.Email){ document.getElementById('msg').innerText='Email requerido'; return }
        await ensureOK(await fetch('/super/api/administradores', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }));
        resetForm();
        document.getElementById('form').style.display = 'none';
        document.getElementById('addBtn').style.display = '';
        load();
      }catch(err){ document.getElementById('msg').innerText = err.message }
    }

    document.getElementById('cancelBtn').onclick = ()=>{ resetForm(); document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display=''; }

    document.getElementById('addBtn').onclick = ()=>{
      document.getElementById('form').style.display = '';
      document.getElementById('addBtn').style.display = 'none';
      resetForm();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // iniciar oculto
    document.getElementById('form').style.display='none';
    document.getElementById('addBtn').style.display='';
    load();
  </script>
    <!-- Menú flotante eliminado en páginas del panel /super -->
</body>
</html>
