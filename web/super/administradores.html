<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administradores</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>
  <div class="floating-menu" aria-hidden="false">
    <button class="fm-toggle" aria-label="Abrir menú">☰</button>
    <div class="fm-panel" role="menu">
      <a class="fm-item" href="/index.html">Portal</a>
      <a class="fm-item" href="/ayuda.html">Ayuda</a>
      <a id="sessionLink" class="fm-item" href="/login.html">Iniciar sesión</a>
    </div>
  </div>
  <div class="container">
    <h1>Administradores</h1>
    <p class="form-help">Lista de administradores (desde `superadministrador.db`).</p>
    <div id="content">Cargando...</div>
  </div>

  <script>
    async function loadAdmins(){
      try{
        const res = await fetch('/super/administradores');
        if(!res.ok) throw new Error('error al obtener administradores');
        const admins = await res.json();
        if(!Array.isArray(admins)) { document.getElementById('content').innerText = 'Respuesta inesperada'; return }
        const tbl = document.createElement('table'); tbl.className = 'table';
        const thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>ID</th><th>Email</th><th>Nombre</th><th>Rol</th><th>Estado</th></tr>';
        tbl.appendChild(thead);
        const tbody = document.createElement('tbody');
        admins.forEach(a=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${a.id}</td><td>${a.email}</td><td>${a.name}</td><td>${a.role}</td><td>${a.estado}</td>`;
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        const c = document.getElementById('content');
        c.innerHTML=''; c.appendChild(tbl);
      }catch(e){
        document.getElementById('content').innerText = 'No se pudo cargar administradores: '+e.message;
      }
    }
    loadAdmins();
  </script>
    <script>
      (function(){
        var toggle = document.querySelector('.floating-menu .fm-toggle');
        var panel = document.querySelector('.floating-menu .fm-panel');
        if (!toggle || !panel) return;
        toggle.addEventListener('click', function(e){ e.stopPropagation(); panel.classList.toggle('open'); });
        document.addEventListener('click', function(){ panel.classList.remove('open'); });
        function getCookie(name){
          const v = document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');
          return v ? v.pop() : '';
        }
        var sessionLink = document.getElementById('sessionLink');
        if (sessionLink){
          if (getCookie('session_token')){
            sessionLink.textContent = 'Cerrar sesión';
            sessionLink.href = '/auth/logout';
            sessionLink.addEventListener('click', function(){ try { localStorage.removeItem('rememberAccount'); } catch(e){} });
          } else {
            sessionLink.textContent = 'Iniciar sesión';
            sessionLink.href = '/login.html';
          }
        }
      })();
    </script>
</body>
</html>
