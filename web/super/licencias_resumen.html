<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resumen de Licencias</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    .summary-card{padding:28px;text-align:center}
    .big-number{font-size:3.2rem;font-weight:800;color:var(--text)}
    .muted{color:var(--muted)}
  </style>
</head>
<body class="super-page">
  <div class="container">
    <div class="page-header">
      <h1>Resumen de Licencias</h1>
      <div>
        <button id="refreshBtn" class="btn" aria-label="Actualizar recuento">Actualizar</button>
        <a href="/super/licencias.html" target="contentFrame" class="btn secondary">Administrar licencias</a>
      </div>
    </div>
    <div class="card summary-card">
      <div class="muted">Licencias activas</div>
      <div id="activeCount" class="big-number">Cargando...</div>
      <div id="lastUpdate" class="form-help muted"></div>
    </div>
  </div>

  <script>
    async function loadActiveCount(){
      const btn = document.getElementById('refreshBtn');
      try{
        if (btn) { btn.disabled = true; btn.textContent = 'Actualizando...'; }
        const res = await fetch('/super/api/licencias?activo=1&con_empresa=1');
        if(!res.ok){ document.getElementById('activeCount').textContent = 'Error'; return }
        const arr = await res.json();
        const active = Array.isArray(arr) ? arr.length : 0;
        document.getElementById('activeCount').textContent = active;
        document.getElementById('lastUpdate').textContent = 'Última actualización: ' + new Date().toLocaleString();
      }catch(e){
        console.error(e);
        document.getElementById('activeCount').textContent = 'Error';
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; }
      }
    }
    document.addEventListener('DOMContentLoaded', function(){
      const btn = document.getElementById('refreshBtn');
      if (btn) btn.addEventListener('click', loadActiveCount);
      loadActiveCount();
    });
  </script>
</body>
</html>
