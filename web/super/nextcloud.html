<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nextcloud</title><link rel="stylesheet" href="/estilos.css"></head><body><main class="page-wrap"><section class="card empresa-section"><h1>Nextcloud empresarial</h1><p>Configura el servicio VPS y la cuota automática para todas las empresas. La clave de administrador se almacena cifrada y nunca se vuelve a mostrar.</p><div class="form"><label><input id="activo" type="checkbox"> Activar Nextcloud</label><label>URL HTTPS<input id="url" class="form-input" type="url" placeholder="https://nextcloud.dominio.com"></label><label>Usuario administrador<input id="user" class="form-input"></label><label>Secreto o contraseña de aplicación<input id="secret" class="form-input" type="password" autocomplete="new-password" placeholder="Dejar vacío para conservar"></label><label>Cuota predeterminada (MB)<input id="quota" class="form-input" type="number" min="1" value="1024"></label></div><div class="form-actions"><button class="btn" id="save">Guardar configuración</button></div><p id="msg" class="form-help"></p></section></main><script>(function(){var api='/super/api/config/nextcloud';async function load(){var r=await fetch(api,{credentials:'same-origin'}),d=await r.json();activo.checked=!!d.enabled;url.value=d.base_url||'';user.value=d.admin_user||'';quota.value=d.default_quota_mb||1024;msg.textContent=d.admin_secret_set?'Secreto configurado.':'Falta secreto de administrador.'}save.onclick=async function(){var r=await fetch(api,{method:'PUT',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:activo.checked,base_url:url.value,admin_user:user.value,admin_secret:secret.value,default_quota_mb:Number(quota.value)})});msg.textContent=r.ok?'Configuración guardada.':'No se pudo guardar.';if(r.ok)secret.value=''};load()}())</script></body></html>
