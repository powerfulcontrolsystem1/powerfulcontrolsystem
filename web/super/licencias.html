<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Licencias</title>
  <link rel="stylesheet" href="/estilos.css">
  
</head>
<body class="super-page form-bg-dark">
  <div class="container">
    <div class="page-header">
      <h1>Licencias</h1>
      <button id="addBtn" class="btn add">Agregar</button>
    </div>
    <form id="form" class="form">
      <input type="hidden" id="itemId">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Tipo de empresa</label>
          <select id="tipo_id" class="form-input"></select>
        </div>
        <div class="form-col">
          <label class="form-label">Nombre</label>
          <input id="nombre" class="form-input" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Valor</label>
          <input id="valor" type="number" step="0.01" class="form-input" />
        </div>
        <div class="form-col">
          <label class="form-label">Duración (días)</label>
          <input id="duracion_dias" type="number" class="form-input" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Descripción</label>
          <textarea id="descripcion" class="form-textarea"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Módulos habilitados</label>
          <div id="modulosLicenciaBox" class="lic-modulos-grid">
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="ventas"> Ventas</label>
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="inventario"> Inventario</label>
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="finanzas"> Finanzas</label>
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="clientes"> Clientes</label>
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="compras"> Compras</label>
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="facturacion"> Facturación</label>
            <label class="lic-modulo-item"><input type="checkbox" name="lic_modulo" value="seguridad"> Seguridad</label>
          </div>
          <div class="form-help">Si no seleccionas módulos, la licencia no restringe el catálogo por módulo.</div>
        </div>
        <div class="form-col">
          <label class="form-label">Super rol por licencia</label>
          <label class="lic-superrol-item"><input id="super_rol_habilitado" type="checkbox"> Habilitar super rol para supervisor de sucursal</label>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" id="saveBtn" class="btn">Guardar</button>
        <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
      </div>
      <div class="form-help" id="msg"></div>
    </form>
    <div id="list">Cargando...</div>

  <!-- Menú flotante eliminado en páginas del panel /super -->

  <script>
    function buildLicenciasApiURL(){
      const currentParams = new URLSearchParams(window.location.search || '');
      const apiParams = new URLSearchParams();
      ['scope','usuario_creador','con_empresa','activo'].forEach(function(key){
        const value = currentParams.get(key);
        if (value !== null && value !== '') apiParams.set(key, value);
      });
      const query = apiParams.toString();
      return '/super/api/licencias' + (query ? ('?' + query) : '');
    }

    function normalizeCSV(raw) {
      return String(raw || '')
        .split(',')
        .map(v => v.trim().toLowerCase())
        .filter(Boolean)
        .filter((v, idx, arr) => arr.indexOf(v) === idx)
        .join(',');
    }

    function getSelectedLicenciaModulos(){
      return normalizeCSV(Array.from(document.querySelectorAll('input[name="lic_modulo"]:checked')).map(el => el.value).join(','));
    }

    function setSelectedLicenciaModulos(rawCSV){
      const selected = new Set(normalizeCSV(rawCSV).split(',').filter(Boolean));
      document.querySelectorAll('input[name="lic_modulo"]').forEach(function(el){
        el.checked = selected.has(String(el.value || '').trim().toLowerCase());
      });
    }

    function modulosToLabel(rawCSV){
      const normalized = normalizeCSV(rawCSV);
      if (!normalized) return 'Todos';
      return normalized;
    }

    function resetLicenciaForm(){
      document.getElementById('itemId').value='';
      document.getElementById('nombre').value='';
      document.getElementById('descripcion').value='';
      document.getElementById('valor').value='';
      document.getElementById('duracion_dias').value='';
      document.getElementById('tipo_id').value='';
      document.getElementById('super_rol_habilitado').checked = false;
      setSelectedLicenciaModulos('');
      document.getElementById('saveBtn').innerText='Guardar';
      document.getElementById('cancelBtn').style.display='none';
      document.getElementById('msg').innerText='';
    }

    async function load(){
      // cargar tipos para el select
      try{
        const tiposRes = await fetch('/super/api/tipos_empresas');
        const tipos = await tiposRes.json();
        const tipoSelect = document.getElementById('tipo_id');
        tipoSelect.innerHTML = '<option value="">-- Seleccionar --</option>';
        tipos.forEach(t=>{
          const opt = document.createElement('option'); opt.value = t.id; opt.text = t.nombre; tipoSelect.appendChild(opt);
        });
      }catch(e){ console.warn('No se pudieron cargar tipos:', e); }

      // cargar licencias
      const res = await fetch(buildLicenciasApiURL());
      const data = await res.json();
      const table = document.createElement('table');
      table.className = 'table';
      table.innerHTML = '<thead><tr><th>ID</th><th>Tipo</th><th>Nombre</th><th>Valor</th><th>Duración (días)</th><th>Módulos</th><th>Super rol</th><th>Acciones</th></thead>';
      const tbody = document.createElement('tbody');
      data.forEach(i=>{
        const tr = document.createElement('tr');
        const activo = (i.activo === 'activo' || i.activo==1) ? 1 : (i.activo||0);
        const toggleLabel = (activo==1) ? 'Desactivar' : 'Activar';
        const modulos = modulosToLabel(i.modulos_habilitados || '');
        const superRol = Number(i.super_rol_habilitado || 0) === 1 ? 'Sí' : 'No';
        tr.innerHTML = `<td>${i.id}</td><td>${i.tipo_nombre||''}</td><td>${i.nombre}</td><td>${i.valor||''}</td><td>${i.duracion_dias||''}</td><td>${modulos}</td><td>${superRol}</td><td class="actions"><button data-id="${i.id}" class="edit btn secondary">Editar</button> <button data-id="${i.id}" class="del btn danger">Eliminar</button> <button data-id="${i.id}" data-activo="${activo}" class="toggle btn">${toggleLabel}</button></td>`;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const list = document.getElementById('list'); list.innerHTML=''; list.appendChild(table);

      document.querySelectorAll('.edit').forEach(b=>b.onclick = async ()=>{
        const id = b.getAttribute('data-id');
        // mostrar formulario y cargar valores desde la lista ya cargada
        const item = data.find(x => String(x.id) === String(id));
        if(!item) return alert('Registro no encontrado');
        document.getElementById('form').style.display = '';
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('itemId').value = item.id;
        document.getElementById('tipo_id').value = item.tipo_id || '';
        document.getElementById('nombre').value = item.nombre || '';
        document.getElementById('valor').value = item.valor || '';
        document.getElementById('duracion_dias').value = item.duracion_dias || '';
        document.getElementById('descripcion').value = item.descripcion || '';
        setSelectedLicenciaModulos(item.modulos_habilitados || '');
        document.getElementById('super_rol_habilitado').checked = Number(item.super_rol_habilitado || 0) === 1;
        document.getElementById('saveBtn').innerText = 'Actualizar';
        document.getElementById('cancelBtn').style.display = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      document.querySelectorAll('.del').forEach(b=>b.onclick = async ()=>{
        if(!confirm('Eliminar licencia?')) return;
        const id = b.getAttribute('data-id');
        await fetch('/super/api/licencias?id='+id, { method: 'DELETE' });
        load();
      });
      document.querySelectorAll('.toggle').forEach(b=>b.onclick = async ()=>{
        const id = b.getAttribute('data-id');
        const activo = b.getAttribute('data-activo') === '1' ? '0' : '1';
        if(!confirm((activo==='1' ? 'Activar' : 'Desactivar')+' licencia?')) return;
        await fetch('/super/api/licencias?id='+id+'&action=activar&activo='+activo, { method: 'PUT' });
        load();
      });
    }

    document.getElementById('form').onsubmit = async (e)=>{
      e.preventDefault();
      const id = document.getElementById('itemId').value;
      const payload = {
        tipo_id: parseInt(document.getElementById('tipo_id').value||0),
        nombre: document.getElementById('nombre').value.trim(),
        descripcion: document.getElementById('descripcion').value.trim(),
        valor: parseFloat(document.getElementById('valor').value||0),
        duracion_dias: parseInt(document.getElementById('duracion_dias').value||0),
        modulos_habilitados: getSelectedLicenciaModulos(),
        super_rol_habilitado: document.getElementById('super_rol_habilitado').checked ? 1 : 0
      };
      try{
        if(!payload.nombre){ document.getElementById('msg').innerText='Nombre requerido'; return }
        if(id){
          await fetch('/super/api/licencias?id='+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        } else {
          await fetch('/super/api/licencias', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        }
        resetLicenciaForm();
        // ocultar formulario y mostrar botón agregar
        document.getElementById('form').style.display = 'none';
        document.getElementById('addBtn').style.display = '';
        load();
      }catch(err){ document.getElementById('msg').innerText = err.message }
    }
    document.getElementById('cancelBtn').onclick = ()=>{ resetLicenciaForm(); document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display=''; }

    document.getElementById('addBtn').onclick = ()=>{
      document.getElementById('form').style.display = '';
      document.getElementById('addBtn').style.display = 'none';
      resetLicenciaForm();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // iniciar oculto
    document.getElementById('form').style.display='none';
    document.getElementById('addBtn').style.display='';
    load();
  </script>
  <script>
    (function(){
      var toggle = document.querySelector('.floating-menu .fm-toggle');
      var panel = document.querySelector('.floating-menu .fm-panel');
      if (!toggle || !panel) return;
      toggle.addEventListener('click', function(e){ e.stopPropagation(); panel.classList.toggle('open'); });
      document.addEventListener('click', function(){ panel.classList.remove('open'); });
      function getCookie(name){
        const v = document.cookie.match('(^|;)\s*'+name+'\s*=\s*([^;]+)');
        return v ? v.pop() : '';
      }
      var sessionLink = document.getElementById('sessionLink');
      if (sessionLink){
        if (getCookie('session_token')){
          sessionLink.textContent = 'Cerrar sesión';
          sessionLink.href = '/auth/logout';
          sessionLink.addEventListener('click', function(){ try { localStorage.removeItem('rememberAccount'); localStorage.removeItem('rememberedEmail'); } catch(e){} });
        } else {
          sessionLink.textContent = 'Iniciar sesión';
          sessionLink.href = '/login.html';
        }
      }
    })();
  </script>
</body>
</html>
