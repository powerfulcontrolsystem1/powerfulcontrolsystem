<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Configuración avanzada - Vendedor</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page form-bg-dark">
  <div class="container">
    <div class="page-header">
      <h1>Configuración avanzada - Módulo Vendedor</h1>
    </div>

    <form id="cfgForm" class="form">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Comisión por defecto (%)</label>
          <input id="default_comision_pct" type="number" step="0.01" class="form-input" />
          <div class="form-help">Porcentaje que se aplicará por defecto al crear planes si no se especifica.</div>
        </div>
        <div class="form-col">
          <label class="form-label">Meses por defecto (renovaciones)</label>
          <input id="default_meses_renovacion" type="number" class="form-input" />
          <div class="form-help">Número de meses en los que el vendedor seguirá recibiendo comisiones por renovaciones.</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Fecha final de vigencia (opcional)</label>
          <input id="comision_fecha_fin" type="date" class="form-input" />
          <div class="form-help">Si se configura, las comisiones dejarán de aplicarse después de esta fecha.</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" id="saveCfgBtn" class="btn">Guardar configuración</button>
      </div>
      <div id="cfgMsg" class="form-help"></div>
    </form>
  </div>

<script>
  async function loadCfg(){
    try{
      const r = await fetch('/super/api/vendedor_config');
      if(!r.ok){ document.getElementById('cfgMsg').innerText = 'No se pudo cargar la configuración.'; return; }
      const j = await r.json();
      document.getElementById('default_comision_pct').value = j.default_comision_pct || '';
      document.getElementById('default_meses_renovacion').value = j.default_meses_renovacion || '';
      if (j.comision_fecha_fin) document.getElementById('comision_fecha_fin').value = j.comision_fecha_fin;
    }catch(e){ document.getElementById('cfgMsg').innerText = 'Error: '+(e && e.message ? e.message : String(e)); }
  }

  document.getElementById('cfgForm').onsubmit = async function(e){
    e.preventDefault();
    const payload = {
      default_comision_pct: (document.getElementById('default_comision_pct').value||'').trim(),
      meses_renovacion: (document.getElementById('default_meses_renovacion').value||'').trim(),
      comision_fecha_fin: (document.getElementById('comision_fecha_fin').value||'').trim()
    };
    document.getElementById('saveCfgBtn').disabled = true; document.getElementById('saveCfgBtn').innerText = 'Guardando...';
    try{
      const res = await fetch('/super/api/vendedor_config', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if(!res.ok){ const txt = await res.text(); document.getElementById('cfgMsg').innerText = 'Error guardando: '+txt; } else { document.getElementById('cfgMsg').innerText = 'Configuración guardada.'; }
    }catch(err){ document.getElementById('cfgMsg').innerText = 'Error: '+(err && err.message ? err.message : String(err)); }
    document.getElementById('saveCfgBtn').disabled = false; document.getElementById('saveCfgBtn').innerText = 'Guardar configuración';
  };

  loadCfg();
</script>
</body>
</html>
