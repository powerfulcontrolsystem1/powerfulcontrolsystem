<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat IA centralizado</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page">
  <div class="container">
    <section class="card empresa-section">
      <div class="empresa-section-header">
        <h1 class="m-0">Chat IA centralizado</h1>
      </div>
      <p class="form-help">El panel super ahora usa un solo asistente IA central para todo el proyecto.</p>
      <div class="form-actions">
        <button id="openCentralAI" class="btn" type="button">Abrir asistente IA central</button>
      </div>
      <div id="msg" class="form-help"></div>
    </section>
  </div>
  <script>
    (function(){
      function setMsg(text, isError) {
        var el = document.getElementById('msg');
        if (!el) return;
        el.textContent = text || '';
        el.classList.toggle('value-negative', !!isError);
      }
      function openCentral() {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: 'pcs-ai-drawer-open',
              mode: 'operativo',
              prompt: 'Continúa la consulta global desde el asistente IA central.'
            }, '*');
            setMsg('Solicitud enviada al asistente IA central.', false);
            return;
          }
        } catch (error) {}
        setMsg('No se pudo abrir el asistente central desde esta vista.', true);
      }
      document.getElementById('openCentralAI').addEventListener('click', openCentral);
      window.setTimeout(openCentral, 250);
    })();
  </script>
</body>
</html>
