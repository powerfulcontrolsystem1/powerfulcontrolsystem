<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vendedor de licencia - Super</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page form-bg-dark">
  <div class="container">
    <div class="page-header">
      <h1>Configuración Vendedor de licencia</h1>
      <button id="addPlanBtn" class="btn add">Nuevo plan</button>
    </div>

    <form id="planForm" class="form">
      <input type="hidden" id="planId">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Vendedor de licencia</label>
          <select id="asesor_select" class="form-input"></select>
          <div class="form-help">Selecciona un vendedor existente o créalo desde "Activar vendedor".</div>
        </div>
        <div class="form-col">
          <label class="form-label">Email alterno (opcional)</label>
          <input id="asesor_email" class="form-input" placeholder="correo@ejemplo.com" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Comisión por venta de licencia (%)</label>
          <input id="comision_venta_pct" type="number" step="0.01" class="form-input" />
        </div>
        <div class="form-col">
          <label class="form-label">Comisión sobre pago de licencia (%)</label>
          <input id="comision_pago_pct" type="number" step="0.01" class="form-input" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Meses de comisión por renovaciones</label>
          <input id="meses_renovacion" type="number" class="form-input" />
        </div>
        <div class="form-col">
          <label class="form-label">Observaciones / Notas</label>
          <input id="plan_notas" class="form-input" />
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" id="savePlanBtn" class="btn">Guardar plan</button>
        <button type="button" id="cancelPlanBtn" class="btn secondary">Cancelar</button>
      </div>
      <div id="planMsg" class="form-help"></div>
    </form>

    <div id="plansList">Cargando planes...</div>
  </div>

<script>
  async function fetchAsesores() {
    // Intentar endpoint específico /super/api/vendedores, fallback a /super/api/asesores y luego administradores
    try {
      const r = await fetch('/super/api/vendedores');
      if (r.ok) return await r.json();
    } catch(e){}
    try {
      const r = await fetch('/super/api/asesores');
      if (r.ok) return await r.json();
    } catch(e){}
    try {
      const r2 = await fetch('/super/api/administradores');
      if (r2.ok) return await r2.json();
    } catch(e){}
    return [];
  }

  function sanitize(v){ return String(v||'').replace(/[&<>"']/g, function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[m]}); }

  async function load() {
    // cargar asesores para selector
    const asesores = await fetchAsesores();
    const sel = document.getElementById('asesor_select');
    sel.innerHTML = '<option value="">-- Seleccionar --</option>';
    (asesores||[]).forEach(a=>{
      const opt = document.createElement('option'); opt.value = a.id || a.email || a.usuario || ''; opt.text = (a.nombre || a.email || a.usuario || String(a.id || '')); sel.appendChild(opt);
    });

    // cargar planes existentes
    try {
      const res = await fetch('/super/api/asesor_comercial');
      if (!res.ok) { document.getElementById('plansList').innerText = 'No se pudieron cargar planes (endpoint faltante).'; return; }
      const plans = await res.json();
      const table = document.createElement('table'); table.className='table';
      table.innerHTML = '<thead><tr><th>ID</th><th>Vendedor</th><th>Venta %</th><th>Pago %</th><th>Meses</th><th>Notas</th><th>Acciones</th></thead>';
      const tbody = document.createElement('tbody');
      (plans||[]).forEach(p=>{
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>'+sanitize(p.id)+'</td><td>'+sanitize(p.asesor_email||p.asesor||p.asesor_id||'')+'</td><td>'+sanitize(p.comision_venta_pct||'')+'</td><td>'+sanitize(p.comision_pago_pct||'')+'</td><td>'+sanitize(p.meses_renovacion||'')+'</td><td>'+sanitize(p.notas||'')+'</td><td class="actions"><button data-id="'+p.id+'" class="edit btn secondary">Editar</button> <button data-id="'+p.id+'" class="del btn danger">Eliminar</button></td>';
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const el = document.getElementById('plansList'); el.innerHTML=''; el.appendChild(table);
      document.querySelectorAll('.edit').forEach(b=>b.onclick = async ()=>{
        const id = b.getAttribute('data-id');
        const plan = plans.find(x => String(x.id) === String(id));
        if(!plan) return alert('Plan no encontrado');
        document.getElementById('planForm').style.display='';
        document.getElementById('addPlanBtn').style.display='none';
        document.getElementById('planId').value = plan.id || '';
        document.getElementById('asesor_select').value = plan.asesor_id || plan.asesor || plan.asesor_email || '';
        document.getElementById('asesor_email').value = plan.asesor_email || '';
        document.getElementById('comision_venta_pct').value = plan.comision_venta_pct || '';
        document.getElementById('comision_pago_pct').value = plan.comision_pago_pct || '';
        document.getElementById('meses_renovacion').value = plan.meses_renovacion || 0;
        document.getElementById('plan_notas').value = plan.notas || '';
        document.getElementById('savePlanBtn').innerText='Actualizar';
        document.getElementById('cancelPlanBtn').style.display='';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      document.querySelectorAll('.del').forEach(b=>b.onclick = async ()=>{
        if(!confirm('Eliminar plan?')) return; const id = b.getAttribute('data-id'); await fetch('/super/api/asesor_comercial?id='+encodeURIComponent(id),{ method:'DELETE' }); load();
      });
    } catch (e) { document.getElementById('plansList').innerText = 'Error cargando planes: '+(e && e.message ? e.message : String(e)); }
  }

  document.getElementById('planForm').onsubmit = async function(e){
    e.preventDefault();
    const id = document.getElementById('planId').value;
    const payload = {
      asesor_id: (document.getElementById('asesor_select').value||'').trim(),
      vendedor_id: (document.getElementById('asesor_select').value||'').trim(),
      asesor_email: (document.getElementById('asesor_email').value||'').trim(),
      comision_venta_pct: Number(document.getElementById('comision_venta_pct').value||0),
      comision_pago_pct: Number(document.getElementById('comision_pago_pct').value||0),
      meses_renovacion: Number(document.getElementById('meses_renovacion').value||0),
      notas: (document.getElementById('plan_notas').value||'').trim()
    };
    try{
      let res;
      if (id) res = await fetch('/super/api/asesor_comercial?id='+encodeURIComponent(id), { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      else res = await fetch('/super/api/asesor_comercial', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (!res.ok) { document.getElementById('planMsg').innerText = 'Error guardando plan (endpoint puede no existir).'; return; }
      document.getElementById('planMsg').innerText = 'Guardado.';
      document.getElementById('planForm').style.display='none'; document.getElementById('addPlanBtn').style.display='';
      load();
    } catch(err){ document.getElementById('planMsg').innerText = 'Error: '+(err && err.message ? err.message : String(err)); }
  };

  document.getElementById('addPlanBtn').onclick = function(){ document.getElementById('planForm').style.display=''; document.getElementById('addPlanBtn').style.display='none'; document.getElementById('planId').value=''; document.getElementById('planMsg').innerText=''; document.getElementById('savePlanBtn').innerText='Guardar'; }
  document.getElementById('cancelPlanBtn').onclick = function(){ document.getElementById('planForm').style.display='none'; document.getElementById('addPlanBtn').style.display=''; }

  // iniciar oculto
  document.getElementById('planForm').style.display='none';
  load();
</script>
</body>
</html>
