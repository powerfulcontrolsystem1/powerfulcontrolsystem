<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Roles de usuario</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page form-bg-dark">
  <div class="container">
    <div class="page-header">
      <h1>Roles de usuario</h1>
      <button id="addBtn" class="btn add">Agregar</button>
    </div>

    <form id="form" class="form">
      <input type="hidden" id="itemId">
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Tipo de empresa</label>
          <select id="tipo_empresa_id" class="form-input" required></select>
        </div>
        <div class="form-col">
          <label class="form-label">Nombre del rol</label>
          <input id="nombre" class="form-input" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">Descripción</label>
          <textarea id="descripcion" class="form-textarea"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" id="saveBtn" class="btn">Guardar</button>
        <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
      </div>
      <div class="form-help" id="msg"></div>
    </form>

    <div id="list">Cargando...</div>
  </div>

  <script>
    const state = {
      tipos: [],
      roles: []
    };

    function tipoNombre(tipoID) {
      const item = state.tipos.find(function(t) { return Number(t.id) === Number(tipoID); });
      return item ? item.nombre : 'N/A';
    }

    function setMessage(text, isError) {
      const msg = document.getElementById('msg');
      msg.textContent = text || '';
      msg.style.color = isError ? '#ef5350' : '';
    }

    async function ensureOk(res) {
      if (res.ok) return;
      const text = await res.text();
      throw new Error(text || ('HTTP ' + res.status));
    }

    async function loadTipos() {
      const res = await fetch('/super/api/tipos_empresas');
      await ensureOk(res);
      state.tipos = await res.json();

      const select = document.getElementById('tipo_empresa_id');
      select.innerHTML = '<option value="">-- Seleccionar --</option>';
      state.tipos.forEach(function(tipo) {
        const opt = document.createElement('option');
        opt.value = tipo.id;
        opt.textContent = tipo.nombre;
        select.appendChild(opt);
      });
    }

    function renderList() {
      const table = document.createElement('table');
      table.className = 'table';
      table.innerHTML = '<thead><tr><th>ID</th><th>Tipo de empresa</th><th>Nombre</th><th>Descripción</th><th>Estado</th><th>Acciones</th></tr></thead>';

      const tbody = document.createElement('tbody');
      state.roles.forEach(function(item) {
        const tr = document.createElement('tr');
        const activo = item.estado === 'activo' ? 1 : 0;
        const toggleLabel = activo === 1 ? 'Desactivar' : 'Activar';
        tr.innerHTML = '<td>' + item.id + '</td>' +
          '<td>' + tipoNombre(item.tipo_empresa_id) + '</td>' +
          '<td>' + (item.nombre || '') + '</td>' +
          '<td>' + (item.descripcion || '') + '</td>' +
          '<td>' + (item.estado || '') + '</td>' +
          '<td class="actions">' +
          '<button data-id="' + item.id + '" class="perms btn">Permisos</button> ' +
          '<button data-id="' + item.id + '" class="edit btn secondary">Editar</button> ' +
          '<button data-id="' + item.id + '" class="del btn danger">Eliminar</button> ' +
          '<button data-id="' + item.id + '" data-activo="' + activo + '" class="toggle btn">' + toggleLabel + '</button>' +
          '</td>';
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      const list = document.getElementById('list');
      list.innerHTML = '';
      list.appendChild(table);

      document.querySelectorAll('.edit').forEach(function(btn) {
        btn.onclick = function() {
          const id = Number(btn.getAttribute('data-id'));
          const item = state.roles.find(function(x) { return Number(x.id) === id; });
          if (!item) return;

          document.getElementById('form').style.display = '';
          document.getElementById('addBtn').style.display = 'none';
          document.getElementById('itemId').value = item.id;
          document.getElementById('tipo_empresa_id').value = item.tipo_empresa_id;
          document.getElementById('nombre').value = item.nombre || '';
          document.getElementById('descripcion').value = item.descripcion || '';
          document.getElementById('saveBtn').textContent = 'Actualizar';
          document.getElementById('cancelBtn').style.display = '';
          setMessage('', false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
      });

      document.querySelectorAll('.perms').forEach(function(btn) {
        btn.onclick = function() {
          const id = Number(btn.getAttribute('data-id') || 0);
          if (!id) return;
          window.location.href = '/super/permisos_rol.html?rol_id=' + encodeURIComponent(id);
        };
      });

      document.querySelectorAll('.del').forEach(function(btn) {
        btn.onclick = async function() {
          if (!confirm('Eliminar rol?')) return;
          const id = btn.getAttribute('data-id');
          try {
            const res = await fetch('/super/api/roles_de_usuario?id=' + encodeURIComponent(id), { method: 'DELETE' });
            await ensureOk(res);
            await load();
          } catch (err) {
            setMessage(err.message || 'Error eliminando rol', true);
          }
        };
      });

      document.querySelectorAll('.toggle').forEach(function(btn) {
        btn.onclick = async function() {
          const id = btn.getAttribute('data-id');
          const activo = btn.getAttribute('data-activo') === '1' ? '0' : '1';
          const accion = activo === '1' ? 'Activar' : 'Desactivar';
          if (!confirm(accion + ' rol?')) return;
          try {
            const res = await fetch('/super/api/roles_de_usuario?id=' + encodeURIComponent(id) + '&action=activar&activo=' + activo, { method: 'PUT' });
            await ensureOk(res);
            await load();
          } catch (err) {
            setMessage(err.message || 'Error cambiando estado del rol', true);
          }
        };
      });
    }

    async function load() {
      try {
        await loadTipos();
        const res = await fetch('/super/api/roles_de_usuario?include_inactive=1');
        await ensureOk(res);
        state.roles = await res.json();
        renderList();
      } catch (err) {
        document.getElementById('list').textContent = 'Error cargando datos';
        setMessage(err.message || 'Error cargando datos', true);
      }
    }

    function resetForm(hide) {
      document.getElementById('itemId').value = '';
      document.getElementById('tipo_empresa_id').value = '';
      document.getElementById('nombre').value = '';
      document.getElementById('descripcion').value = '';
      document.getElementById('saveBtn').textContent = 'Guardar';
      document.getElementById('cancelBtn').style.display = 'none';
      setMessage('', false);
      if (hide) {
        document.getElementById('form').style.display = 'none';
        document.getElementById('addBtn').style.display = '';
      }
    }

    document.getElementById('form').onsubmit = async function(e) {
      e.preventDefault();

      const id = document.getElementById('itemId').value;
      const payload = {
        tipo_empresa_id: Number(document.getElementById('tipo_empresa_id').value || 0),
        nombre: document.getElementById('nombre').value.trim(),
        descripcion: document.getElementById('descripcion').value.trim()
      };

      if (!payload.tipo_empresa_id || !payload.nombre) {
        setMessage('Tipo de empresa y nombre son obligatorios', true);
        return;
      }

      try {
        const url = '/super/api/roles_de_usuario' + (id ? ('?id=' + encodeURIComponent(id)) : '');
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        await ensureOk(res);

        resetForm(true);
        await load();
      } catch (err) {
        setMessage(err.message || 'Error guardando rol', true);
      }
    };

    document.getElementById('cancelBtn').onclick = function() {
      resetForm(true);
    };

    document.getElementById('addBtn').onclick = function() {
      document.getElementById('form').style.display = '';
      document.getElementById('addBtn').style.display = 'none';
      resetForm(false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.getElementById('form').style.display = 'none';
    document.getElementById('addBtn').style.display = '';
    load();
  </script>
</body>
</html>
