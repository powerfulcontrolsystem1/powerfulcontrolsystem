<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Historial de licencias</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }
    .license-history-frame {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <iframe id="licenseHistoryFrame" class="license-history-frame" title="Historial de licencias"></iframe>
  <script>
    (function () {
      var target = new URL('/super/licencias.html', window.location.origin);
      target.searchParams.set('scope', 'mine');
      target.searchParams.set('con_empresa', '1');
      target.searchParams.set('historial', '1');
      var sourceParams = new URLSearchParams(window.location.search || '');
      ['empresa_id', 'id'].forEach(function (key) {
        var value = sourceParams.get(key);
        if (value) target.searchParams.set(key, value);
      });
      document.getElementById('licenseHistoryFrame').src = target.pathname + target.search;
    })();
  </script>
  <script src="/js/super_page_tools.js?v=20260707"></script>
</body>
</html>
