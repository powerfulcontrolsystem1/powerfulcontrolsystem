<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Explorador de Archivos</title>
  <script>
    (function () {
      var valid = { dark: 1, "dark-violet": 1, "dark-emerald": 1, "dark-corporate": 1, "dark-neon": 1, light: 1, "light-rose": 1, "light-gold": 1, "light-wood": 1 };
      function cookie(name) {
        var match = String(document.cookie || "").match("(^|;)\\s*" + name + "\\s*=\\s*([^;]+)");
        return match ? decodeURIComponent(match.pop()) : "";
      }
      var theme = "";
      try { theme = window.localStorage.getItem("theme") || ""; } catch (error) {}
      theme = String(theme || cookie("pcs_theme") || "light").trim().toLowerCase();
      if (theme === "dark-protect") theme = "dark";
      if (!valid[theme]) theme = "light";
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.classList.toggle("theme-light", theme.indexOf("light") === 0);
      document.documentElement.classList.toggle("theme-dark", theme.indexOf("light") !== 0);
    })();
  </script>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    :root {
      color-scheme: light dark;
      --file-bg: var(--bg, #f5f7fb);
      --file-panel: var(--surface, #ffffff);
      --file-panel-soft: var(--surface-soft, #f8fafc);
      --file-line: var(--border, #dbe3ef);
      --file-text: var(--text, #172033);
      --file-muted: var(--muted, #64748b);
      --file-accent: var(--accent, #2563eb);
      --file-accent-2: var(--accent-2, #0c8c8b);
      --file-danger: var(--danger, #b91c1c);
      --file-warning: var(--warning, #f59e0b);
      --file-shadow: 0 12px 30px color-mix(in srgb, #020617 8%, transparent);
    }

    html[data-theme^="dark"],
    html.theme-dark {
      color-scheme: dark;
      --file-panel: color-mix(in srgb, var(--surface, #16253a) 94%, #000 6%);
      --file-panel-soft: color-mix(in srgb, var(--surface-soft, #1d2f48) 86%, #000 14%);
      --file-line: color-mix(in srgb, var(--border, rgba(152,176,206,.28)) 82%, var(--text, #e8f0fb) 8%);
      --file-shadow: 0 16px 34px rgba(0, 0, 0, .26);
    }

    body.super-page {
      margin: 0;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--file-accent) 7%, transparent), transparent 28rem),
        linear-gradient(180deg, var(--file-bg), color-mix(in srgb, var(--file-bg) 90%, var(--file-panel) 10%));
      color: var(--file-text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .file-explorer-page {
      min-height: 100vh;
      padding: 22px;
      box-sizing: border-box;
    }

    .file-explorer-shell {
      display: grid;
      gap: 14px;
      max-width: 1500px;
      margin: 0 auto;
    }

    .file-explorer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .file-explorer-title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--file-text);
    }

    .file-explorer-title p {
      margin: 4px 0 0;
      color: var(--file-muted);
      font-size: 13px;
    }

    .file-explorer-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--file-line);
      border-radius: 8px;
      background: var(--file-panel);
      color: var(--file-text);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .file-explorer-toolbar,
    .file-explorer-roots,
    .file-explorer-table-wrap {
      border: 1px solid var(--file-line);
      border-radius: 8px;
      background: var(--file-panel);
      box-shadow: var(--file-shadow);
    }

    .file-explorer-toolbar {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) auto auto;
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .file-explorer-toolbar button,
    .file-explorer-root-btn {
      min-height: 38px;
      border: 1px solid var(--file-line);
      border-radius: 8px;
      background: var(--file-panel-soft);
      color: var(--file-text);
      font-weight: 800;
      cursor: pointer;
    }

    .file-explorer-toolbar button {
      padding: 0 14px;
    }

    .file-explorer-toolbar button:hover,
    .file-explorer-root-btn:hover {
      border-color: color-mix(in srgb, var(--file-accent) 54%, var(--file-line));
      color: color-mix(in srgb, var(--file-accent) 82%, var(--file-text));
      background: color-mix(in srgb, var(--file-accent) 12%, var(--file-panel));
    }

    .file-explorer-toolbar button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .file-explorer-path {
      min-width: 0;
      height: 38px;
      border: 1px solid var(--file-line);
      border-radius: 8px;
      padding: 0 12px;
      font: 13px/1.4 "Cascadia Mono", Consolas, monospace;
      color: var(--file-text);
      background: var(--input-bg, var(--file-panel));
      box-sizing: border-box;
    }

    .file-explorer-path:focus {
      outline: 0;
      border-color: color-mix(in srgb, var(--file-accent) 62%, var(--file-line));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--file-accent) 24%, transparent);
    }

    .file-explorer-roots {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      overflow-x: auto;
    }

    .file-explorer-root-btn {
      flex: 0 0 auto;
      padding: 0 12px;
      font-size: 13px;
    }

    .file-explorer-status {
      min-height: 22px;
      color: var(--file-muted);
      font-size: 13px;
    }

    .file-explorer-status.is-error {
      color: var(--file-danger);
      font-weight: 800;
    }

    .file-explorer-table-wrap {
      overflow: auto;
    }

    .file-explorer-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .file-explorer-table th,
    .file-explorer-table td {
      padding: 10px 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--file-line) 78%, transparent);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
      color: var(--file-text);
    }

    .file-explorer-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--file-panel-soft);
      color: var(--file-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .file-explorer-table tbody tr:hover {
      background: color-mix(in srgb, var(--file-accent) 7%, transparent);
    }

    .file-explorer-name-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: 380px;
      border: 0;
      background: transparent;
      color: var(--file-text);
      font: inherit;
      font-weight: 700;
      cursor: default;
      padding: 0;
      text-align: left;
    }

    .file-explorer-name-btn[data-dir="true"] {
      color: color-mix(in srgb, var(--file-accent) 84%, var(--file-text));
      cursor: pointer;
    }

    .file-explorer-name-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-explorer-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--file-muted) 78%, var(--file-panel));
      flex: 0 0 18px;
      box-shadow: inset 0 -3px 0 color-mix(in srgb, #020617 18%, transparent);
    }

    .file-explorer-icon.is-folder {
      background: var(--file-warning);
    }

    .file-explorer-icon.is-link {
      background: color-mix(in srgb, var(--file-accent-2) 72%, var(--file-accent));
    }

    .file-explorer-muted {
      color: var(--file-muted);
    }

    .file-explorer-path-cell {
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: "Cascadia Mono", Consolas, monospace;
      color: var(--file-muted);
    }

    @media (max-width: 760px) {
      .file-explorer-page {
        padding: 14px;
      }

      .file-explorer-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .file-explorer-toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .file-explorer-path {
        grid-column: 1 / -1;
        order: -1;
      }
    }
  </style>
</head>
<body class="super-page">
  <main class="file-explorer-page">
    <section class="file-explorer-shell">
      <header class="file-explorer-header">
        <div class="file-explorer-title">
          <h1>Explorador de Archivos</h1>
          <p id="fileExplorerSummary">Sistema de archivos visible para el backend.</p>
        </div>
        <span class="file-explorer-badge">Solo lectura</span>
      </header>

      <form class="file-explorer-toolbar" id="fileExplorerToolbar">
        <button type="button" id="fileExplorerUp" aria-label="Subir al directorio anterior">Arriba</button>
        <input class="file-explorer-path" id="fileExplorerPath" autocomplete="off" spellcheck="false" aria-label="Ruta actual">
        <button type="submit" aria-label="Abrir la ruta indicada">Abrir</button>
        <button type="button" id="fileExplorerRefresh" aria-label="Recargar explorador de archivos">Recargar</button>
      </form>

      <nav class="file-explorer-roots" id="fileExplorerRoots" aria-label="Raices del sistema"></nav>
      <div class="file-explorer-status" id="fileExplorerStatus">Cargando...</div>

      <div class="file-explorer-table-wrap">
        <table class="file-explorer-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Tipo</th>
              <th>Tamano</th>
              <th>Modificado</th>
              <th>Permisos</th>
              <th>Ruta</th>
            </tr>
          </thead>
          <tbody id="fileExplorerRows">
            <tr>
              <td colspan="6" class="file-explorer-muted">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var pathInput = document.getElementById("fileExplorerPath");
      var rootsBox = document.getElementById("fileExplorerRoots");
      var statusBox = document.getElementById("fileExplorerStatus");
      var rowsBox = document.getElementById("fileExplorerRows");
      var summary = document.getElementById("fileExplorerSummary");
      var upButton = document.getElementById("fileExplorerUp");
      var refreshButton = document.getElementById("fileExplorerRefresh");
      var toolbar = document.getElementById("fileExplorerToolbar");
      var state = { currentPath: "", parentPath: "", loading: false };

      function setStatus(message, isError) {
        statusBox.textContent = message || "";
        statusBox.classList.toggle("is-error", !!isError);
      }

      function formatDate(value) {
        if (!value) return "-";
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return "-";
        return new Intl.DateTimeFormat("es-CO", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function typeLabel(entry) {
        if (entry.type === "folder") return "Carpeta";
        if (entry.type === "symlink") return "Acceso directo";
        if (entry.type === "unknown") return "Sin lectura";
        return entry.extension ? "Archivo " + entry.extension.toUpperCase() : "Archivo";
      }

      function clearRows(message) {
        rowsBox.replaceChildren();
        var row = document.createElement("tr");
        var cell = document.createElement("td");
        cell.colSpan = 6;
        cell.className = "file-explorer-muted";
        cell.textContent = message;
        row.appendChild(cell);
        rowsBox.appendChild(row);
      }

      function appendCell(row, text, className) {
        var cell = document.createElement("td");
        if (className) cell.className = className;
        cell.textContent = text || "-";
        row.appendChild(cell);
        return cell;
      }

      function renderRoots(roots) {
        rootsBox.replaceChildren();
        (roots || []).forEach(function (root) {
          var button = document.createElement("button");
          button.type = "button";
          button.className = "file-explorer-root-btn";
          button.textContent = root.label || root.path;
          button.addEventListener("click", function () {
            loadPath(root.path);
          });
          rootsBox.appendChild(button);
        });
      }

      function renderRows(entries) {
        rowsBox.replaceChildren();
        if (!entries || entries.length === 0) {
          clearRows("Carpeta vacia.");
          return;
        }
        entries.forEach(function (entry) {
          var row = document.createElement("tr");
          var nameCell = document.createElement("td");
          var nameButton = document.createElement("button");
          var icon = document.createElement("span");
          var text = document.createElement("span");

          nameButton.type = "button";
          nameButton.className = "file-explorer-name-btn";
          nameButton.dataset.dir = entry.is_dir ? "true" : "false";
          if (entry.is_dir) {
            nameButton.addEventListener("click", function () {
              loadPath(entry.path);
            });
          }
          icon.className = "file-explorer-icon";
          if (entry.is_dir) icon.classList.add("is-folder");
          if (entry.is_symlink) icon.classList.add("is-link");
          text.className = "file-explorer-name-text";
          text.textContent = entry.name || entry.path;
          nameButton.appendChild(icon);
          nameButton.appendChild(text);
          nameCell.appendChild(nameButton);
          row.appendChild(nameCell);

          appendCell(row, typeLabel(entry));
          appendCell(row, entry.is_dir ? "-" : entry.size_pretty);
          appendCell(row, formatDate(entry.modified_at));
          appendCell(row, entry.mode || entry.error || "-", "file-explorer-muted");
          appendCell(row, entry.path, "file-explorer-path-cell");
          rowsBox.appendChild(row);
        });
      }

      function renderExplorer(data) {
        state.currentPath = data.current_path || "";
        state.parentPath = data.parent_path || "";
        pathInput.value = state.currentPath;
        upButton.disabled = !state.parentPath;
        summary.textContent = "Sistema " + (data.runtime_os || "-") + " - " + (data.total_entries || 0) + " elementos.";
        renderRoots(data.roots || []);
        renderRows(data.entries || []);
        setStatus(state.currentPath, false);
      }

      async function loadPath(path) {
        if (state.loading) return;
        state.loading = true;
        refreshButton.disabled = true;
        upButton.disabled = true;
        setStatus("Cargando...", false);
        try {
          var url = "/super/api/explorador_archivos?action=list";
          if (path) url += "&path=" + encodeURIComponent(path);
          var response = await fetch(url, { credentials: "same-origin" });
          var data = await response.json().catch(function () { return {}; });
          if (!response.ok || data.ok === false) {
            renderRoots(data.roots || []);
            pathInput.value = data.current_path || path || "";
            clearRows(data.error || "No fue posible leer la ruta.");
            setStatus(data.error || "No fue posible leer la ruta.", true);
            state.parentPath = data.parent_path || "";
            upButton.disabled = !state.parentPath;
            return;
          }
          renderExplorer(data);
        } catch (error) {
          clearRows("No fue posible conectar con el servidor.");
          setStatus("No fue posible conectar con el servidor.", true);
        } finally {
          state.loading = false;
          refreshButton.disabled = false;
          upButton.disabled = !state.parentPath;
        }
      }

      toolbar.addEventListener("submit", function (event) {
        event.preventDefault();
        loadPath(pathInput.value);
      });

      upButton.addEventListener("click", function () {
        if (state.parentPath) loadPath(state.parentPath);
      });

      refreshButton.addEventListener("click", function () {
        loadPath(state.currentPath || pathInput.value);
      });

      loadPath("");
    })();
  </script>
  <script src="/js/super_page_tools.js?v=20260707"></script>
</body>
</html>
