<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Empresas</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body class="super-page">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Empresas</h2>
      <ul class="nav">
        <li><a href="/super/empresas.html" class="active">Agregar empresa</a></li>
        <li><a href="/super/tipos_empresas.html">Tipos de empresas</a></li>
      </ul>
    </aside>
    <main class="admin-content">
      <div class="container">
        <div class="page-header">
          <h1>Empresas</h1>
          <button id="addBtn" class="btn add">Agregar</button>
        </div>

        <form id="form" class="form">
          <input type="hidden" id="itemId">
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">Tipo de empresa</label>
              <select id="tipo_id" class="form-input"></select>
            </div>
            <div class="form-col">
              <label class="form-label">Nombre</label>
              <input id="nombre" class="form-input" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">NIT</label>
              <input id="nit" class="form-input" />
            </div>
            <div class="form-col">
              <label class="form-label">Observaciones</label>
              <input id="observaciones" class="form-input" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" id="saveBtn" class="btn">Guardar</button>
            <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
          </div>
          <div class="form-help" id="msg"></div>
        </form>

        <div id="list">Cargando...</div>
      </div>
    </main>
  </div>

<script>
  async function load(){
    // cargar tipos para el select
    try{
      const tiposRes = await fetch('/super/api/tipos_empresas');
      const tipos = await tiposRes.json();
      const tipoSelect = document.getElementById('tipo_id');
      tipoSelect.innerHTML = '<option value="">-- Seleccionar --</option>';
      tipos.forEach(t=>{ const opt=document.createElement('option'); opt.value=t.id; opt.text=t.nombre; tipoSelect.appendChild(opt); });
    }catch(e){ console.warn('No se pudieron cargar tipos:', e); }

    // cargar empresas
    const res = await fetch('/super/api/empresas');
    const data = await res.json();
    const table = document.createElement('table');
    table.className = 'table';
    table.innerHTML = '<thead><tr><th>ID</th><th>Nombre</th><th>NIT</th><th>Tipo</th><th>Acciones</th></tr></thead>';
    const tbody = document.createElement('tbody');
    data.forEach(i=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i.id}</td><td>${i.nombre}</td><td>${i.nit||''}</td><td>${i.tipo_id||''}</td><td class="actions"><button data-id="${i.id}" class="edit btn secondary">Editar</button> <button data-id="${i.id}" class="del btn danger">Eliminar</button> <button data-id="${i.id}" data-estado="${i.estado||'activo'}" class="toggle btn">${(i.estado==='activo' || i.estado==null)?'Desactivar':'Activar'}</button></td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    const list = document.getElementById('list'); list.innerHTML=''; list.appendChild(table);

    document.querySelectorAll('.edit').forEach(b=>b.onclick = async ()=>{
      const id = b.getAttribute('data-id');
      const itemRes = await fetch('/super/api/empresas?id='+id);
      const item = await itemRes.json();
      document.getElementById('form').style.display = ''; document.getElementById('addBtn').style.display='none';
      document.getElementById('itemId').value = item.id;
      document.getElementById('tipo_id').value = item.tipo_id || '';
      document.getElementById('nombre').value = item.nombre || '';
      document.getElementById('nit').value = item.nit || '';
      document.getElementById('observaciones').value = item.observaciones || '';
      document.getElementById('saveBtn').innerText = 'Actualizar';
      document.getElementById('cancelBtn').style.display = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.querySelectorAll('.del').forEach(b=>b.onclick = async ()=>{
      if(!confirm('Eliminar empresa?')) return;
      const id = b.getAttribute('data-id');
      await fetch('/super/api/empresas?id='+id, { method: 'DELETE' });
      load();
    });

    document.querySelectorAll('.toggle').forEach(b=>b.onclick = async ()=>{
      const id = b.getAttribute('data-id');
      const estado = b.getAttribute('data-estado') === 'activo' ? '0' : '1';
      if(!confirm((estado==='1' ? 'Activar' : 'Desactivar')+' empresa?')) return;
      await fetch('/super/api/empresas?id='+id+'&action=activar&activo='+estado, { method: 'PUT' });
      load();
    });
  }

  document.getElementById('form').onsubmit = async (e)=>{
    e.preventDefault();
    const id = document.getElementById('itemId').value;
    const payload = { tipo_id: parseInt(document.getElementById('tipo_id').value||0), nombre: document.getElementById('nombre').value.trim(), nit: document.getElementById('nit').value.trim(), observaciones: document.getElementById('observaciones').value.trim(), usuario_creador: '' };
    try{
      if(!payload.nombre){ document.getElementById('msg').innerText='Nombre requerido'; return }
      if(id){
        await fetch('/super/api/empresas?id='+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      } else {
        await fetch('/super/api/empresas', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      }
      document.getElementById('itemId').value=''; document.getElementById('nombre').value=''; document.getElementById('nit').value=''; document.getElementById('observaciones').value=''; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display='';
      load();
    }catch(err){ document.getElementById('msg').innerText = err.message }
  }

  document.getElementById('cancelBtn').onclick = ()=>{ document.getElementById('itemId').value=''; document.getElementById('nombre').value=''; document.getElementById('nit').value=''; document.getElementById('observaciones').value=''; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display=''; }

  document.getElementById('addBtn').onclick = ()=>{ document.getElementById('form').style.display = ''; document.getElementById('addBtn').style.display = 'none'; document.getElementById('itemId').value=''; document.getElementById('nombre').value=''; document.getElementById('nit').value=''; document.getElementById('observaciones').value=''; document.getElementById('saveBtn').innerText='Guardar'; document.getElementById('cancelBtn').style.display='none'; window.scrollTo({ top: 0, behavior: 'smooth' }); }

  // iniciar oculto
  document.getElementById('form').style.display='none'; document.getElementById('addBtn').style.display='';
  load();
</script>

</body>
</html>
