<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Empresas</title>
  <script>
    (function(){
      var valid = {dark:1,"dark-violet":1,"dark-emerald":1,"dark-corporate":1,"dark-neon":1,light:1,"light-rose":1,"light-gold":1,"light-wood":1};
      function cookie(name){ var match = String(document.cookie || "").match("(^|;)\\s*" + name + "\\s*=\\s*([^;]+)"); return match ? decodeURIComponent(match.pop()) : ""; }
      var theme = "";
      try { theme = window.localStorage.getItem("theme") || ""; } catch(e) {}
      theme = String(theme || cookie("pcs_theme") || "light").trim().toLowerCase();
      if(theme === "dark-protect") theme = "dark";
      if(!valid[theme]) theme = "light";
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.classList.toggle("theme-light", theme.indexOf("light") === 0);
      document.documentElement.classList.toggle("theme-dark", theme.indexOf("light") !== 0);
    })();
  </script>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    :root{color-scheme:light dark;--emp-bg:var(--bg,#f4f7fb);--emp-panel:var(--surface,#fff);--emp-soft:var(--surface-soft,#f7f9fc);--emp-line:var(--border,rgba(15,35,64,.16));--emp-text:var(--text,#10243f);--emp-muted:var(--muted,#52627a);--emp-blue:var(--accent,#0f6fcb);--emp-green:#15803d;--emp-amber:#b45309;--emp-red:#b91c1c;--emp-ok-bg:color-mix(in srgb,var(--emp-green) 10%,var(--emp-panel));--emp-warn-bg:color-mix(in srgb,var(--emp-amber) 12%,var(--emp-panel));--emp-crit-bg:color-mix(in srgb,var(--emp-red) 10%,var(--emp-panel));--emp-info-bg:color-mix(in srgb,var(--emp-blue) 9%,var(--emp-panel))}
    html.theme-dark,html[data-theme^="dark"]{color-scheme:dark;--emp-bg:var(--bg,#0c1420);--emp-panel:color-mix(in srgb,var(--surface,#16253a) 94%,#000 6%);--emp-soft:color-mix(in srgb,var(--surface-soft,#1d2f48) 86%,#000 14%);--emp-line:color-mix(in srgb,var(--border,rgba(152,176,206,.26)) 78%,var(--text,#e8f0fb) 8%);--emp-green:#4ade80;--emp-amber:#fbbf24;--emp-red:#f87171}
    body{margin:0;background:var(--emp-bg);color:var(--emp-text);font-family:Inter,Segoe UI,Arial,sans-serif}
    .emp-shell{width:min(1180px,calc(100vw - 28px));margin:0 auto;padding:14px 0 22px}
    .emp-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:12px}
    .emp-head h1{margin:0;font-size:1.35rem;line-height:1.12}
    .emp-head p{margin:5px 0 0;color:var(--emp-muted);font-size:.86rem}
    .emp-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:34px;padding:8px 12px;border:1px solid var(--emp-line);border-radius:8px;background:var(--emp-panel);color:var(--emp-text);font-weight:850;font-size:.82rem;text-decoration:none;cursor:pointer}
    .emp-btn.primary{background:var(--emp-blue);border-color:var(--emp-blue);color:#fff}
    .emp-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:10px}
    .emp-kpi{min-height:78px;border:1px solid var(--emp-line);border-radius:8px;background:var(--emp-panel);padding:10px}
    .emp-kpi span{display:block;color:var(--emp-muted);font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
    .emp-kpi strong{display:block;margin-top:8px;font-size:1.28rem;line-height:1;color:var(--emp-text)}
    .emp-kpi.ok strong{color:var(--emp-green)}.emp-kpi.warn strong{color:var(--emp-amber)}.emp-kpi.crit strong{color:var(--emp-red)}
    .emp-panel{border:1px solid var(--emp-line);border-radius:8px;background:var(--emp-panel)}
    .emp-filters{display:grid;grid-template-columns:minmax(220px,1fr) minmax(190px,260px) auto auto;gap:8px;align-items:end;padding:10px;border-bottom:1px solid var(--emp-line)}
    .emp-field{display:grid;gap:5px}
    .emp-field label{font-size:.72rem;font-weight:900;color:var(--emp-muted);text-transform:uppercase;letter-spacing:.05em}
    .emp-field input,.emp-field select{width:100%;box-sizing:border-box;min-height:36px;border:1px solid var(--emp-line);border-radius:8px;background:var(--emp-soft);color:var(--emp-text);padding:8px 10px;font:inherit;font-size:.86rem}
    .emp-table-wrap{overflow:auto}
    table{width:100%;min-width:900px;border-collapse:separate;border-spacing:0}
    th,td{padding:8px 10px;border-bottom:1px solid var(--emp-line);text-align:left;vertical-align:top;font-size:.8rem}
    th{position:sticky;top:0;background:var(--emp-panel);z-index:1;color:var(--emp-muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em}
    tbody tr:hover{background:var(--emp-soft)}
    .emp-name{font-weight:900;color:var(--emp-text)}
    .emp-muted{display:block;margin-top:2px;color:var(--emp-muted);font-size:.72rem}
    .emp-pill{display:inline-flex;align-items:center;justify-content:center;min-width:58px;padding:5px 8px;border-radius:999px;border:1px solid var(--emp-line);background:var(--emp-soft);color:var(--emp-muted);font-size:.68rem;font-weight:900;text-transform:uppercase;white-space:nowrap}
    .emp-pill.ok{background:var(--emp-ok-bg);border-color:color-mix(in srgb,var(--emp-green) 32%,var(--emp-line));color:var(--emp-green)}
    .emp-pill.warn{background:var(--emp-warn-bg);border-color:color-mix(in srgb,var(--emp-amber) 34%,var(--emp-line));color:var(--emp-amber)}
    .emp-pill.crit{background:var(--emp-crit-bg);border-color:color-mix(in srgb,var(--emp-red) 34%,var(--emp-line));color:var(--emp-red)}
    .emp-pill.info{background:var(--emp-info-bg);border-color:color-mix(in srgb,var(--emp-blue) 28%,var(--emp-line));color:var(--emp-blue)}
    .emp-empty{padding:24px;text-align:center;color:var(--emp-muted);font-weight:800}
    .emp-status{padding:8px 10px;color:var(--emp-muted);font-size:.78rem;border-top:1px solid var(--emp-line)}
    @media(max-width:980px){.emp-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.emp-filters{grid-template-columns:1fr 1fr}.emp-head{display:grid}}
    @media(max-width:560px){.emp-shell{width:min(100vw - 16px,1180px);padding-top:8px}.emp-grid,.emp-filters{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="emp-shell">
    <header class="emp-head">
      <div>
        <h1>Empresas</h1>
        <p>Consulta global de empresas y estado de licencias. Vista de solo lectura.</p>
      </div>
      <button id="refreshBtn" class="emp-btn primary" type="button">Actualizar</button>
    </header>

    <section class="emp-grid" aria-label="Resumen de empresas">
      <article class="emp-kpi"><span>Total empresas</span><strong id="totalCompanies">--</strong></article>
      <article class="emp-kpi ok"><span>Licencia activa</span><strong id="activeCompanies">--</strong></article>
      <article class="emp-kpi warn"><span>Sin licencia activa</span><strong id="inactiveCompanies">--</strong></article>
      <article class="emp-kpi"><span>Licencia 15 dias</span><strong id="trialCompanies">--</strong></article>
      <article class="emp-kpi crit"><span>Licencia vencida</span><strong id="expiredCompanies">--</strong></article>
    </section>

    <section class="emp-panel">
      <form id="filtersForm" class="emp-filters">
        <div class="emp-field">
          <label for="searchInput">Buscar</label>
          <input id="searchInput" type="search" placeholder="Nombre, NIT, tipo o licencia">
        </div>
        <div class="emp-field">
          <label for="licenseFilter">Filtro</label>
          <select id="licenseFilter">
            <option value="">Todas</option>
            <option value="activa">Con licencia activa</option>
            <option value="sin_activa">Sin licencia activa</option>
            <option value="15_dias">Con licencia de 15 dias</option>
            <option value="vencida">Con licencia vencida</option>
          </select>
        </div>
        <button class="emp-btn primary" type="submit">Buscar</button>
        <button id="clearBtn" class="emp-btn" type="button">Limpiar</button>
      </form>
      <div class="emp-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Empresa</th>
              <th>NIT</th>
              <th>Tipo</th>
              <th>Estado empresa</th>
              <th>Licencia</th>
              <th>Vigencia</th>
              <th>Creador</th>
              <th>Creada</th>
            </tr>
          </thead>
          <tbody id="rows"><tr><td colspan="8" class="emp-empty">Cargando empresas...</td></tr></tbody>
        </table>
      </div>
      <div id="statusText" class="emp-status">Sin lectura reciente.</div>
    </section>
  </main>

  <script>
    (function(){
      "use strict";
      var $ = function(id){ return document.getElementById(id); };
      function esc(value){ return String(value == null ? "" : value).replace(/[&<>"']/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
      function num(value){ var n = Number(value); return Number.isFinite(n) ? n : 0; }
      function fmt(value){ return num(value).toLocaleString("es-CO"); }
      function statusClass(item){
        if(item && item.licencia_activa) return "ok";
        if(item && item.licencia_vencida) return "crit";
        return "warn";
      }
      function statusLabel(item){
        if(item && item.licencia_activa) return "Activa";
        if(item && item.licencia_vencida) return "Vencida";
        return "Sin activa";
      }
      function licenseText(item){
        var name = item.licencia_nombre || "Sin licencia asignada";
        if(item.licencia_15_dias) name += " / 15 dias";
        return name;
      }
      function vigenciaText(item){
        var ini = item.licencia_fecha_inicio || "";
        var fin = item.licencia_fecha_fin || "";
        if(!ini && !fin) return "Sin vigencia";
        if(ini && fin) return ini + " - " + fin;
        return ini || fin;
      }
      function applyUrlFilter(){
        var params = new URLSearchParams(window.location.search || "");
        var license = params.get("licencia") || "";
        var q = params.get("q") || "";
        if(license) $("licenseFilter").value = license;
        if(q) $("searchInput").value = q;
      }
      async function load(){
        $("refreshBtn").disabled = true;
        $("statusText").textContent = "Actualizando empresas...";
        var params = new URLSearchParams();
        params.set("limit", "1000");
        var q = $("searchInput").value.trim();
        var licencia = $("licenseFilter").value;
        if(q) params.set("q", q);
        if(licencia) params.set("licencia", licencia);
        try {
          var res = await fetch("/super/api/empresas_estado?" + params.toString(), { credentials:"same-origin" });
          if(!res.ok) throw new Error("HTTP " + res.status);
          var data = await res.json();
          render(data || {});
          $("statusText").textContent = "Ultima lectura: " + new Date().toLocaleString("es-CO") + ". Registros visibles: " + ((data.items || []).length).toLocaleString("es-CO") + ".";
        } catch(e) {
          $("rows").innerHTML = '<tr><td colspan="8" class="emp-empty">No se pudo cargar la informacion de empresas.</td></tr>';
          $("statusText").textContent = e.message || "Error consultando empresas.";
        } finally {
          $("refreshBtn").disabled = false;
        }
      }
      function render(data){
        var summary = data.summary || {};
        $("totalCompanies").textContent = fmt(summary.total);
        $("activeCompanies").textContent = fmt(summary.con_licencia_activa);
        $("inactiveCompanies").textContent = fmt(summary.sin_licencia_activa);
        $("trialCompanies").textContent = fmt(summary.con_licencia_15_dias);
        $("expiredCompanies").textContent = fmt(summary.con_licencia_vencida);
        var items = Array.isArray(data.items) ? data.items : [];
        if(!items.length){
          $("rows").innerHTML = '<tr><td colspan="8" class="emp-empty">No hay empresas para el filtro seleccionado.</td></tr>';
          return;
        }
        $("rows").innerHTML = items.map(function(item){
          var cls = statusClass(item);
          return '<tr>' +
            '<td><span class="emp-name">'+esc(item.nombre || "Empresa sin nombre")+'</span><span class="emp-muted">ID '+esc(item.empresa_id || item.id || "")+'</span></td>' +
            '<td>'+esc(item.nit || "-")+'</td>' +
            '<td>'+esc(item.tipo_nombre || "-")+'</td>' +
            '<td><span class="emp-pill info">'+esc(item.estado || "activo")+'</span></td>' +
            '<td><span class="emp-pill '+cls+'">'+esc(statusLabel(item))+'</span><span class="emp-muted">'+esc(licenseText(item))+'</span></td>' +
            '<td>'+esc(vigenciaText(item))+'</td>' +
            '<td>'+esc(item.usuario_creador || "-")+'</td>' +
            '<td>'+esc(item.fecha_creacion || "-")+'</td>' +
          '</tr>';
        }).join("");
      }
      $("filtersForm").addEventListener("submit", function(event){ event.preventDefault(); load(); });
      $("refreshBtn").addEventListener("click", load);
      $("clearBtn").addEventListener("click", function(){ $("searchInput").value = ""; $("licenseFilter").value = ""; load(); });
      applyUrlFilter();
      load();
    })();
  </script>
</body>
</html>
