<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pago Exitoso</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>
  <div class="login-page">
    <div class="container">
      <div class="card epayco-success-card">
        <div class="epayco-success">OK</div>
        <p class="checkout-eyebrow">Licencia confirmada</p>
        <h1 class="login-title epayco-success-title">Pago exitoso</h1>
        <p class="login-subtitle epayco-success-copy">Felicitaciones. El pago fue confirmado correctamente y la licencia de tu empresa ya debe quedar disponible en el selector.</p>
        <div id="epaycoSuccessSummary" class="form-help epayco-success-summary"></div>
        <div class="form-actions epayco-success-actions">
          <a class="btn" href="/seleccionar_empresa.html">Ir a seleccionar empresa</a>
          <a class="btn secondary" id="epaycoSuccessPaymentLink" href="/pagar_licencia.html">Ver detalle del pago</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var summary = document.getElementById('epaycoSuccessSummary');
      var detailLink = document.getElementById('epaycoSuccessPaymentLink');
      var parts = [];
      var empresaId = String(params.get('empresa_id') || '').trim();
      var licenciaId = String(params.get('licencia_id') || '').trim();
      var reference = String(params.get('reference') || '').trim();
      var transactionId = String(params.get('transaction_id') || '').trim();

      if (empresaId) parts.push('<div><strong>Empresa:</strong> #' + empresaId + '</div>');
      if (licenciaId) parts.push('<div><strong>Licencia:</strong> #' + licenciaId + '</div>');
      if (reference) parts.push('<div><strong>Referencia:</strong> ' + reference + '</div>');
      if (transactionId) parts.push('<div><strong>Transacción:</strong> ' + transactionId + '</div>');

      if (summary) {
        if (parts.length) {
          summary.innerHTML = parts.join('');
        } else {
          summary.textContent = 'La licencia ya fue confirmada. Puedes volver al selector de empresas para continuar.';
        }
      }

      if (detailLink) {
        var target = new URL('/pagar_licencia.html', window.location.origin);
        target.searchParams.set('provider', 'epayco');
        target.searchParams.set('status', 'approved');
        if (empresaId) target.searchParams.set('empresa_id', empresaId);
        if (licenciaId) target.searchParams.set('licencia_id', licenciaId);
        if (reference) target.searchParams.set('reference', reference);
        if (transactionId) target.searchParams.set('transaction_id', transactionId);
        detailLink.href = target.toString();
      }
    })();
  </script>
</body>
</html>
