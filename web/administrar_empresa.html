<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administrar Empresa</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Administrar Empresa</h2>
      <ul class="nav">
        <li><a href="about:blank" target="contentFrame"><img class="icon" src="/img/company-briefcase.svg" alt="">Inicio</a></li>
        <li><a href="about:blank" target="contentFrame"><img class="icon" src="/img/analytics.svg" alt="">Ventas</a></li>
        <li><a href="about:blank" target="contentFrame"><img class="icon" src="/img/tag.svg" alt="">Productos</a></li>
        <li><a href="about:blank" target="contentFrame"><img class="icon" src="/img/network.svg" alt="">Reportes</a></li>
        <li><a href="/seleccionar_empresa.html" class="select-company"><img class="icon" src="/img/company-briefcase.svg" alt="">Volver a empresas</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-toolbar page-header">
        <h1 id="empresaTitle">Administrar Empresa</h1>
      </div>
      <iframe name="contentFrame" id="contentFrame" src="about:blank" title="Contenido de empresa" style="width:100%;height:calc(100vh - 120px);border:0;background:transparent"></iframe>
    </main>
  </div>

  <script>
    function getQueryParam(name){
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    (function(){
      const id = getQueryParam('id');
      const title = document.getElementById('empresaTitle');
      if (id) {
        title.textContent = 'Administrar Empresa ID: ' + id;
        return;
      }
      title.textContent = 'Administrar Empresa';
    })();
  </script>
</body>
</html>
