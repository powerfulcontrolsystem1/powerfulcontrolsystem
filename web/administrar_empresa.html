<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Administrar Empresa</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>
  <div class="container">
    <h1>Administrar Empresa</h1>
    <p id="info" class="form-help">Cargando detalles...</p>
    <div id="content"></div>
  </div>

  <script>
    function getQueryParam(name){
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    (function(){
      const info = document.getElementById('info');
      const id = getQueryParam('id');
      const module = getQueryParam('module');
      if (id) {
        info.innerText = 'Administrando empresa ID: ' + id;
        document.getElementById('content').innerHTML = '<p>Interfaz de administración para la empresa con id <strong>'+id+'</strong>. Implementar controles específicos según requerimiento.</p>';
        return;
      }
      if (module) {
        info.innerText = 'Detalle del módulo: ' + module;
        document.getElementById('content').innerHTML = '<p>Vista detallada del módulo <strong>'+module+'</strong>. Aquí puede implementarse la documentación o controles del módulo.</p>';
        return;
      }
      info.innerText = 'No se indicó empresa ni módulo (use query param `id` o `module`).';
    })();
  </script>
</body>
</html>
