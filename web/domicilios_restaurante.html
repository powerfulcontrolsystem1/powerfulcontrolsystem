<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Restaurante domicilios</title><link rel="stylesheet" href="/estilos.css">
  <style>.page{min-height:100vh;background:var(--bg);color:var(--text)}.wrap{max-width:980px;margin:auto;padding:16px;display:grid;gap:14px}.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow)}.list{display:grid;gap:10px}.item{background:var(--surface-soft);border:1px solid var(--border);border-radius:8px;padding:12px}.actions{display:flex;flex-wrap:wrap;gap:8px}.muted{color:var(--muted)}</style>
</head>
<body class="page"><main class="wrap">
  <section class="card"><h1>Panel restaurante</h1><p class="muted">Recibe pedidos, confirma preparación y marca “listo” para llamar al domiciliario.</p></section>
  <form id="login" class="card"><h2>Ingresar restaurante</h2><input id="code" class="form-input" placeholder="Código REST" required><input id="pin" class="form-input" placeholder="PIN" required style="margin-top:8px"><button class="btn" style="margin-top:10px">Entrar</button></form>
  <section id="app" class="card" hidden><div class="actions"><button id="refresh" class="btn secondary">Actualizar</button></div><p id="msg" class="muted"></p><div id="orders" class="list"></div></section>
</main><script>
(function(){const qs=new URLSearchParams(location.search),empresaId=qs.get("empresa_id")||"",base="/api/public/domicilios?empresa_id="+empresaId+"&action=",esc=v=>String(v??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])),tokenKey="dom_rest_"+empresaId;let token=localStorage.getItem(tokenKey)||"";async function api(a,p){let r=await fetch(base+a,{method:"POST",headers:{"Content-Type":"application/json","X-Domicilio-Restaurant-Token":token},body:JSON.stringify(p||{})});let t=await r.text(),d={};try{d=t?JSON.parse(t):{}}catch(_){d={raw:t}}if(!r.ok)throw Error(d.raw||t);return d}login.onsubmit=async e=>{e.preventDefault();try{let r=await api("restaurant_login",{codigo:code.value,pin:pin.value});token=r.token_sesion;localStorage.setItem(tokenKey,token);login.hidden=true;app.hidden=false;load()}catch(err){alert(err.message)}};async function load(){try{let rows=await api("restaurant_orders",{});orders.innerHTML=rows.map(o=>`<article class="item"><strong>${esc(o.codigo_pedido)} | ${esc(o.estado)}</strong><p>${esc(o.cliente_nombre)} - ${esc(o.cliente_direccion)}</p><p class="muted">${(o.items||[]).map(i=>esc(i.nombre)+" x "+i.cantidad).join(", ")}</p><div class="actions"><button class="btn secondary" data-state="confirmado" data-id="${o.id}">Confirmar</button><button class="btn secondary" data-state="preparando" data-id="${o.id}">Preparando</button><button class="btn" data-state="listo" data-id="${o.id}">Pedido listo</button></div></article>`).join("")||"<div class='item'>Sin pedidos activos.</div>"}catch(err){msg.textContent=err.message}}refresh.onclick=load;document.addEventListener("click",async e=>{let b=e.target.closest("button");if(!b||!b.dataset.state)return;try{await api("order_state",{order_id:Number(b.dataset.id),state:b.dataset.state});load()}catch(err){msg.textContent=err.message}});if(token){login.hidden=true;app.hidden=false;load()}setInterval(()=>token&&load(),10000)})();</script></body></html>
