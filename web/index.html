<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Powerful Control System</title>
  <link rel="stylesheet" href="/estilos.css">
  <link rel="icon" type="image/png" href="/img/punto_venta.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <script src="/menu.js"></script>
</head>
<body>
  
  <div class="portal">
    <header class="portal-header">
      <nav class="nav-actions">
        <a class="btn portal-header-btn portal-header-btn-login" href="/login.html"><span>Registrarse o iniciar sesión</span></a>
      </nav>
    </header>

    <main class="portal-main container">
      <section class="portal-intro">
        <div class="portal-intro-copy">
          <h1 class="brand-title brand-title-highlight">
            <span>Sistema de Facturación</span>
            <span>Electrónica</span>
          </h1>
          <p class="brand-subtitle">Toma el control de tu negocio con Powerful Control System</p>
        </div>
      </section>

      <section id="portalCardsGrid" class="portal-grid portal-home-grid" aria-live="polite"></section>
      <p id="portalCardsStatus" class="form-help portal-cards-status" role="status"></p>
      <section class="portal-contact-action" aria-label="Acceso a informacion de contacto">
        <a class="portal-contact-btn" href="/Informacion_de_contacto.html">Informacion de contacto</a>
      </section>

      <footer class="footer">@ 2026 - Powerful Control System - Sistema POS Multiempresa</footer>
    </main>
  </div>

  <a
    class="whatsapp-floating-cta"
    href="https://wa.me/573043306506"
    rel="noopener noreferrer"
    aria-label="Contactenos por WhatsApp"
  >
    <span class="whatsapp-floating-icon" aria-hidden="true">
      <svg viewBox="0 0 32 32" role="img" focusable="false">
        <path d="M16.02 4C9.39 4 4 9.23 4 15.67c0 2.3.7 4.44 1.91 6.24L4.34 28l6.33-1.64a12.2 12.2 0 0 0 5.35 1.23C22.64 27.59 28 22.36 28 15.93 28 9.23 22.64 4 16.02 4Zm0 21.57a9.84 9.84 0 0 1-5.02-1.36l-.36-.21-3.75.97 1-3.63-.23-.37a9.38 9.38 0 0 1-1.5-5.03c0-5.2 4.36-9.45 9.86-9.45 5.44 0 9.85 4.17 9.85 9.44 0 5.2-4.41 9.64-9.85 9.64Zm5.4-7.24c-.3-.15-1.74-.84-2-1-.27-.1-.46-.15-.66.15-.2.3-.76 1-.94 1.2-.17.18-.33.21-.63.07-.3-.15-1.24-.45-2.37-1.43a8.94 8.94 0 0 1-1.64-2c-.17-.3-.02-.47.13-.61.14-.14.3-.36.46-.54.15-.18.2-.3.3-.5.1-.2.05-.38-.03-.53-.07-.15-.67-1.56-.92-2.13-.24-.58-.48-.5-.66-.5h-.56c-.2 0-.53.08-.8.38-.28.3-1.06 1.02-1.06 2.5 0 1.46 1.1 2.9 1.26 3.1.15.18 2.12 3.32 5.25 4.52.74.3 1.32.47 1.77.6.74.23 1.41.2 1.95.12.6-.08 1.74-.7 1.98-1.38.25-.68.25-1.26.18-1.38-.08-.12-.28-.2-.58-.35Z" />
      </svg>
    </span>
    <span class="whatsapp-floating-text">Contactenos</span>
  </a>

  <script>
    (function () {
      var gridEl = document.getElementById('portalCardsGrid');
      var statusEl = document.getElementById('portalCardsStatus');

      var fallbackCards = [
        {
          titulo: 'Punto de venta',
          descripcion: 'Solucion completa para ventas rapidas y facturacion electronica.',
          imagen_url: '/img/punto_venta.png',
          enlace: '/administrar_empresa.html?module=punto_venta'
        },
        {
          titulo: 'Motel',
          descripcion: 'Gestion por tiempo de servicio y facturacion tarifada por estancia.',
          imagen_url: '/img/motel.png',
          enlace: '/administrar_empresa.html?module=motel'
        },
        {
          titulo: 'Restaurante',
          descripcion: 'Gestion de mesas, pedidos y facturacion para restaurantes.',
          imagen_url: '/img/restaurante.png',
          enlace: '/administrar_empresa.html?module=restaurante'
        },
        {
          titulo: 'Control por sensor',
          descripcion: 'Integracion y alertas con sensores para control de accesos.',
          imagen_url: '/img/sensor.png',
          enlace: '/administrar_empresa.html?module=sensor'
        },
        {
          titulo: 'Hotel',
          descripcion: 'Administracion de empresas, roles y permisos para operacion hotelera.',
          imagen_url: '/img/settings-color.svg',
          enlace: '/administrar_empresa.html?module=configuracion'
        }
      ];

      function escapeHTML(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function slugifyTitle(value, index) {
        var normalized = String(value || '').toLowerCase();
        if (normalized.normalize) {
          normalized = normalized.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }
        normalized = normalized.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        if (!normalized) {
          normalized = 'tarjeta';
        }
        return normalized + '-detalle-' + (index + 1);
      }

      function normalizeLink(raw) {
        var value = String(raw || '').trim();
        if (!value) return '/login.html';
        var lower = value.toLowerCase();
        if (lower.indexOf('http://') === 0 || lower.indexOf('https://') === 0 || value.indexOf('/') === 0) {
          return value;
        }
        return '/' + value.replace(/^\/+/, '');
      }

      function normalizeImage(raw) {
        var value = String(raw || '').trim();
        if (!value || value.indexOf('/img/') !== 0 || value.indexOf('..') >= 0) {
          return '/img/punto_venta.png';
        }
        return value;
      }

      function normalizeVisualSize(raw) {
        var value = String(raw || '').trim().toLowerCase();
        if (value === 'small') value = 'pequeno';
        if (value === 'medium') value = 'mediano';
        if (value === 'large') value = 'grande';
        if (value !== 'pequeno' && value !== 'mediano' && value !== 'grande') {
          value = 'mediano';
        }
        return value;
      }

      function normalizeVisualSettings(raw) {
        var source = raw && typeof raw === 'object' ? raw : {};
        return {
          index_card_size: normalizeVisualSize(source.index_card_size),
          index_text_size: normalizeVisualSize(source.index_text_size)
        };
      }

      function applyVisualSettings(raw) {
        var settings = normalizeVisualSettings(raw);
        gridEl.setAttribute('data-card-size', settings.index_card_size);
        gridEl.setAttribute('data-text-size', settings.index_text_size);
      }

      function normalizeCards(rawCards) {
        var source = Array.isArray(rawCards) && rawCards.length ? rawCards : fallbackCards;
        return source.map(function (card, idx) {
          var fallback = fallbackCards[idx % fallbackCards.length];
          var titulo = String((card && card.titulo) || '').trim() || fallback.titulo;
          var descripcion = String((card && card.descripcion) || '').trim() || fallback.descripcion;
          var imagen = normalizeImage((card && card.imagen_url) || fallback.imagen_url);
          var enlace = normalizeLink((card && card.enlace) || fallback.enlace);
          var detalleId = slugifyTitle(titulo, idx);
          return {
            titulo: titulo,
            descripcion: descripcion,
            imagen_url: imagen,
            enlace: enlace,
            detalle_id: detalleId,
            detalle_href: '/descripcion_de_los_sistemas.ht#' + encodeURIComponent(detalleId)
          };
        });
      }

      function renderCards(cards) {
        var html = cards.map(function (card, idx) {
          return '' +
            '<article class="portal-card home-offer-card" style="animation-delay:' + (idx * 90) + 'ms">' +
            '  <div class="home-offer-media">' +
            '    <img src="' + escapeHTML(card.imagen_url) + '" alt="Icono ' + escapeHTML(card.titulo) + '" class="card-logo">' +
            '  </div>' +
            '  <h3>' + escapeHTML(card.titulo) + '</h3>' +
            '  <p>' + escapeHTML(card.descripcion) + '</p>' +
            '  <div class="card-actions">' +
            '    <a class="home-offer-btn" href="' + escapeHTML(card.detalle_href) + '">Explorar oferta</a>' +
            '  </div>' +
            '</article>';
        }).join('');
        gridEl.innerHTML = html;
      }

      async function loadCards() {
        statusEl.textContent = 'Cargando ofertas...';
        try {
          var response = await fetch('/api/public/pagina_principal', { credentials: 'same-origin' });
          var payload = null;
          try {
            payload = await response.json();
          } catch (_) {
            payload = null;
          }

          if (!response.ok) {
            throw new Error((payload && (payload.error || payload.message)) || ('HTTP ' + response.status));
          }

          applyVisualSettings(payload && payload.estilos);
          var cards = normalizeCards(payload && payload.tarjetas);
          renderCards(cards);
          statusEl.textContent = '';
        } catch (err) {
          applyVisualSettings(null);
          renderCards(normalizeCards(fallbackCards));
          statusEl.textContent = 'Se mostraron ofertas predeterminadas por un problema temporal de conexion.';
        }
      }

      loadCards();
    })();
  </script>

</body>
</html>
