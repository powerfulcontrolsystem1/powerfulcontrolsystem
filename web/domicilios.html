<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Domicilios</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    .dom-public{min-height:100vh;background:linear-gradient(180deg,var(--bg-alt),var(--bg));color:var(--text)}
    .dom-wrap{max-width:1180px;margin:auto;padding:18px;display:grid;gap:16px}
    .dom-head,.dom-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:16px}
    .dom-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:16px}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}.item{border:1px solid var(--border);border-radius:8px;background:var(--surface-soft);padding:12px;display:grid;gap:8px}.muted{color:var(--muted)}.price{font-weight:950}.cart-line{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);padding:8px 0}.status{padding:12px;border-radius:8px;background:var(--surface-soft);border:1px solid var(--border)}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="dom-public">
  <main class="dom-wrap">
    <header class="dom-head"><div><h1 id="title">Domicilios</h1><p class="muted">Pide tus productos, sigue el estado y recibe con código seguro.</p></div><button id="locBtn" class="btn secondary">Usar mi ubicación</button></header>
    <section class="grid">
      <div class="dom-card"><h2>Restaurantes y productos</h2><div id="restaurants" class="cards"></div><h2>Menú</h2><div id="menu" class="cards"></div></div>
      <aside class="dom-card"><h2>Tu pedido</h2><div id="cart"></div><form id="orderForm" style="display:grid;gap:10px;margin-top:12px"><input id="name" class="form-input" placeholder="Nombre" required><input id="phone" class="form-input" placeholder="Teléfono" required><input id="address" class="form-input" placeholder="Dirección" required><select id="pay" class="form-input"><option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option><option value="tarjeta">Tarjeta al recibir</option></select><textarea id="notes" class="form-textarea" placeholder="Notas para el restaurante o domiciliario"></textarea><button class="btn" type="submit">Confirmar pedido</button></form><div id="status" class="status" style="margin-top:12px"></div></aside>
    </section>
  </main>
  <script>
  (function(){
    const qs = new URLSearchParams(location.search);
    const empresaId = qs.get("empresa_id") || "";
    const esc = v => String(v ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const money = v => "$" + Number(v || 0).toLocaleString("es-CO");
    let data = { restaurants: [], menu: [] }, cart = [], pos = { lat: 0, lng: 0 };
    function api(a, o) {
      return fetch("/api/public/domicilios?empresa_id=" + encodeURIComponent(empresaId) + "&action=" + a, Object.assign({ credentials: "same-origin" }, o || {})).then(async r => {
        let t = await r.text(), d = {};
        try { d = t ? JSON.parse(t) : {}; } catch (_) { d = { raw: t }; }
        if (!r.ok) throw Error(d.raw || d.error || t || ("HTTP " + r.status));
        return d;
      });
    }
    function render(){
      restaurants.innerHTML = data.restaurants.map(r => `<button class="item" data-rest="${r.id}"><strong>${esc(r.nombre)}</strong><span class="muted">${esc(r.categoria || "Restaurante")} | ${esc(r.direccion || "")}</span></button>`).join("");
      menu.innerHTML = data.menu.map(m => `<article class="item"><strong>${esc(m.nombre)}</strong><span class="muted">${esc(m.restaurant_nombre)} | ${esc(m.descripcion || "")}</span><span class="price">${money(m.precio)}</span><button class="btn secondary" data-add="${m.id}">Agregar</button></article>`).join("");
      cart.innerHTML = cart.length ? cart.map((x, i) => `<div class="cart-line"><span>${esc(x.nombre)} x ${x.cantidad}</span><strong>${money(x.precio * x.cantidad)}</strong><button class="btn secondary" data-del="${i}" type="button">Quitar</button></div>`).join("") + "<p><strong>Total productos: " + money(cart.reduce((s, x) => s + x.precio * x.cantidad, 0)) + "</strong></p>" : "<p class='muted'>Agrega productos.</p>";
    }
    async function load(){
      data = await api("catalog");
      title.textContent = data.config?.nombre_portal || "Domicilios";
      render();
    }
    if (!empresaId) {
      restaurants.innerHTML = '<div class="item">Abre este portal desde el enlace publico de una empresa.</div>';
      menu.innerHTML = '<div class="item">Falta empresa_id en el enlace publico.</div>';
      cart.innerHTML = "<p class='muted'>Sin empresa asociada.</p>";
      orderForm.querySelectorAll("input,select,textarea,button").forEach(el => el.disabled = true);
      return;
    }
    document.addEventListener("click", e => {
      let b = e.target.closest("button"); if (!b) return;
      if (b.dataset.add) {
        let m = data.menu.find(x => x.id == b.dataset.add), ex = cart.find(x => x.menu_item_id == m.id);
        if (ex) ex.cantidad++; else cart.push({ menu_item_id: m.id, nombre: m.nombre, precio: m.precio, cantidad: 1, restaurant_id: m.restaurant_id });
        render();
      }
      if (b.dataset.del) { cart.splice(Number(b.dataset.del), 1); render(); }
      if (b.dataset.rest) {
        menu.innerHTML = data.menu.filter(m => m.restaurant_id == b.dataset.rest).map(m => `<article class="item"><strong>${esc(m.nombre)}</strong><span class="muted">${esc(m.descripcion || "")}</span><span class="price">${money(m.precio)}</span><button class="btn secondary" data-add="${m.id}">Agregar</button></article>`).join("");
      }
    });
    locBtn.onclick = () => navigator.geolocation && navigator.geolocation.getCurrentPosition(p => {
      pos = { lat: p.coords.latitude, lng: p.coords.longitude };
      status.textContent = "Ubicacion tomada para calcular mejor el domicilio.";
    });
    orderForm.onsubmit = async e => {
      e.preventDefault();
      try {
        if (!cart.length) throw Error("Agrega productos");
        let rid = cart[0].restaurant_id;
        if (cart.some(x => x.restaurant_id !== rid)) throw Error("Haz pedidos de un restaurante a la vez");
        let o = await api("order", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ restaurant_id: rid, cliente_nombre: name.value, cliente_telefono: phone.value, cliente_direccion: address.value, cliente_latitud: pos.lat, cliente_longitud: pos.lng, metodo_pago: pay.value, notas_cliente: notes.value, items: cart }) });
        localStorage.setItem("dom_order_" + o.id, o.token_cliente);
        status.innerHTML = `Pedido <strong>${esc(o.codigo_pedido)}</strong> creado. Total ${money(o.total)}. Codigo de entrega: <strong>${esc(o.codigo_entrega)}</strong>. <a href="/domicilios.html?empresa_id=${empresaId}&order_id=${o.id}&token=${o.token_cliente}">Seguir pedido</a>`;
        cart = []; render();
      } catch (err) { status.textContent = err.message; }
    };
    async function track(){
      let id = qs.get("order_id"), token = qs.get("token");
      if (!id || !token) return;
      try {
        let o = await api("order&order_id=" + id + "&token=" + encodeURIComponent(token));
        status.innerHTML = `Pedido <strong>${esc(o.codigo_pedido)}</strong><br>Estado: <strong>${esc(o.estado)}</strong><br>Domiciliario: ${esc(o.courier_nombre || "pendiente")}<br>Total: ${money(o.total)}<br>Codigo entrega: <strong>${esc(o.codigo_entrega)}</strong>`;
      } catch (e) {}
    }
    load().then(track).catch(err => { status.textContent = err.message; });
    setInterval(track, 10000);
  })();</script>
</body>
</html>
