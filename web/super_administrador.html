<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Super Administrador</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>
  <div class="floating-menu" aria-hidden="false">
    <button class="fm-toggle" aria-label="Abrir menú">☰</button>
    <div class="fm-panel" role="menu">
      
      <a id="sessionLink" class="fm-item" href="/login.html">Iniciar sesión</a>
    </div>
  </div>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Super Administrador</h2>
      <ul class="nav">
        <li><a href="/seleccionar%20empresa/empresas.html" target="contentFrame">Agregar empresa</a></li>
        <li><a href="/super/tipos_empresas.html" target="contentFrame">Tipos de empresas</a></li>
        <li><a href="/seleccionar_empresa.html" target="_blank" rel="noopener noreferrer">Seleccionar empresa</a></li>
        <li><a href="/super/licencias.html" target="contentFrame">Licencias</a></li>
        <li><a href="/super/configuracion.html" target="contentFrame">Configuración</a></li>
        <li><a href="/super/administradores.html" target="contentFrame">Administradores</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <!-- Título de toolbar eliminado por solicitud del usuario -->
      <iframe name="contentFrame" id="contentFrame" src="/super/administradores.html" title="Contenido" style="width:100%;height:calc(100vh - 64px);border:0;background:transparent"></iframe>
    </main>
  </div>
  <script>
    (function(){
      var toggle = document.querySelector('.floating-menu .fm-toggle');
      var panel = document.querySelector('.floating-menu .fm-panel');
      if (!toggle || !panel) return;
      toggle.addEventListener('click', function(e){ e.stopPropagation(); panel.classList.toggle('open'); });
      document.addEventListener('click', function(){ panel.classList.remove('open'); });
      function getCookie(name){
        const v = document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');
        return v ? v.pop() : '';
      }
      var sessionLink = document.getElementById('sessionLink');
      if (sessionLink){
        if (getCookie('session_token')){
          sessionLink.textContent = 'Cerrar sesión';
          sessionLink.href = '/auth/logout';
          sessionLink.addEventListener('click', function(){ try { localStorage.removeItem('rememberAccount'); } catch(e){} });
        } else {
          sessionLink.textContent = 'Iniciar sesión';
          sessionLink.href = '/login.html';
        }
      }
    })();
    // Resaltar link activo en sidebar y sincronizar con el iframe
    (function(){
      var sidebar = document.querySelector('.admin-sidebar .nav');
      var links = sidebar ? Array.from(sidebar.querySelectorAll('a')) : [];
      var iframe = document.getElementById('contentFrame');
      function clearActive(){ links.forEach(function(a){ a.classList.remove('active'); }); }
      function setActiveByHref(href){ clearActive(); var found = links.find(function(a){ return a.getAttribute('href') === href; }); if(found) found.classList.add('active'); }
      links.forEach(function(a){
        a.addEventListener('click', function(){
          // marcar activo inmediatamente al hacer click
          clearActive(); this.classList.add('active');
        });
      });
      // cuando el iframe carga, sincronizar el active
      if (iframe){
        iframe.addEventListener('load', function(){
          try{
            var src = iframe.contentWindow.location.pathname;
            // convertir path a href relativo si es necesario
            setActiveByHref(src);
          } catch(e){
            // si no se puede leer (crossover), intentar usar iframe.src
            var src2 = iframe.getAttribute('src');
            setActiveByHref(src2);
          }
        });
        // inicializar
        setActiveByHref(iframe.getAttribute('src'));
      }
    })();
  </script>
</body>
</html>
