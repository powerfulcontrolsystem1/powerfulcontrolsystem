<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Super Administrador</title>
  <link rel="stylesheet" href="/estilos.css">
</head>
<body>
  
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Super Administrador</h2>
      <ul class="nav">
        <li><a href="/super/tipos_empresas.html" target="contentFrame"><img class="icon" src="/img/company-briefcase.svg" alt="">Tipos de empresas</a></li>
        <li><a href="/super/licencias.html" target="contentFrame"><img class="icon" src="/img/shield-license.svg" alt="">Licencias</a></li>
        <li><a href="/super/configuracion.html" target="contentFrame"><img class="icon" src="/img/analytics.svg" alt="">Configuración</a></li>
        <li><a href="/metricas_de_trafico_general.html" target="contentFrame"><img class="icon" src="/img/network.svg" alt="">Métricas de tráfico</a></li>
        <li><a href="/super/administradores.html" target="contentFrame"><img class="icon" src="/img/user-avatar.svg" alt="">Administradores</a></li>
        <li><a href="/seleccionar_empresa.html" target="_blank" rel="noopener noreferrer" class="select-company"><img class="icon" src="/img/company-briefcase.svg" alt="">Seleccionar empresa</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-toolbar page-header">
        <h1>Panel Super Administrador</h1>
        <div class="nav-actions">
          <a href="/metricas_de_trafico_general.html" target="contentFrame" class="btn add" id="openMetricsBtn">Métricas de tráfico</a>
        </div>
      </div>
      <iframe name="contentFrame" id="contentFrame" src="/super/licencias_resumen.html" title="Contenido" style="width:100%;height:calc(100vh - 120px);border:0;background:transparent"></iframe>
    </main>
  </div>
  
  <script>
    // Resaltar link activo en sidebar y sincronizar con el iframe
    (function(){
      var sidebar = document.querySelector('.admin-sidebar .nav');
      var links = sidebar ? Array.from(sidebar.querySelectorAll('a')) : [];
      var iframe = document.getElementById('contentFrame');
      function clearActive(){ links.forEach(function(a){ a.classList.remove('active'); }); }
      function setActiveByHref(href){ clearActive(); var found = links.find(function(a){ return a.getAttribute('href') === href; }); if(found) found.classList.add('active'); }
      links.forEach(function(a){
        a.addEventListener('click', function(){
          // marcar activo inmediatamente al hacer click
          clearActive(); this.classList.add('active');
        });
      });
      // cuando el iframe carga, sincronizar el active
      if (iframe){
        iframe.addEventListener('load', function(){
          try{
            var src = iframe.contentWindow.location.pathname;
            // convertir path a href relativo si es necesario
            setActiveByHref(src);
          } catch(e){
            // si no se puede leer (crossover), intentar usar iframe.src
            var src2 = iframe.getAttribute('src');
            setActiveByHref(src2);
          }
        });
        // inicializar: no preseleccionar ningún link al cargar la página
      }
    })();
  </script>
</body>
</html>
