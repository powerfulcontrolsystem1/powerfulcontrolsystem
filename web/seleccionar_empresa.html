<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Seleccionar Empresa</title>
  <link rel="stylesheet" href="/assets/estilos.css">
</head>
<body>
  <div class="floating-menu" aria-hidden="false">
    <button class="fm-toggle" aria-label="Abrir menú">☰</button>
    <div class="fm-panel" role="menu">
      <a class="fm-item" href="/auth/logout">Cerrar sesión</a>
    </div>
  </div>
  <div class="container">
    <div class="card">
      <h2>Seleccionar Empresa</h2>
      <p>Bienvenido. Selecciona la empresa con la que deseas trabajar.</p>
      <!-- Lista placeholder -->
      <ul>
        <li><a class="btn" href="#">Empresa A</a></li>
        <li><a class="btn" href="#">Empresa B</a></li>
      </ul>
    </div>
  </div>
  </div>

  <script>
    (function(){
      var toggle = document.querySelector('.floating-menu .fm-toggle');
      var panel = document.querySelector('.floating-menu .fm-panel');
      if (!toggle || !panel) return;
      toggle.addEventListener('click', function(e){ e.stopPropagation(); panel.classList.toggle('open'); });
      document.addEventListener('click', function(){ panel.classList.remove('open'); });
      // Clear rememberAccount on logout click
      var logoutLink = document.querySelector('.fm-item[href="/auth/logout"]');
      if (logoutLink) {
        logoutLink.addEventListener('click', function(){ try { localStorage.removeItem('rememberAccount'); } catch(e){} });
      }
    })();
  </script>

  </body>
</html>
