<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Seleccionar Empresa</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body>
  
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Seleccionar Empresa</h2>
        <ul class="nav">
        <li><a id="linkAgregarEmpresa" href="#"><img class="icon" src="/img/company-briefcase-color.svg" alt="">Inicio</a></li>
        <li><a id="linkLicencias" href="/super/licencias.html?scope=mine&con_empresa=1" target="contentFrame"><img class="icon" src="/img/shield-license-color.svg" alt="">Licencias</a></li>
        <li><a id="linkAdministradores" href="/super/administradores.html" target="contentFrame"><img class="icon" src="/img/user-avatar-color.svg" alt="">Administradores</a></li>
        <li><a id="linkReportesGlobales" href="/super/reportes_globales.html" target="contentFrame"><img class="icon" src="/img/analytics-color.svg" alt="">Reportes globales</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <section id="empresasPanel">
        <div class="container">
        <div class="page-header">
          <h1 style="display:inline-block;margin-right:12px">Inicio</h1>
          <button id="addBtn" class="btn add" style="vertical-align:middle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Agregar Empresa</span>
          </button>
        </div>

        <form id="form" class="form" style="margin-bottom:18px;display:none">
          <input type="hidden" id="itemId">
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">Tipo de empresa</label>
              <select id="tipo_id" class="form-input"></select>
            </div>
            <div class="form-col">
              <label class="form-label">Nombre</label>
              <input id="nombre" class="form-input" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">NIT</label>
              <input id="nit" class="form-input" />
            </div>
            <div class="form-col">
              <label class="form-label">Observaciones</label>
              <input id="observaciones" class="form-input" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" id="saveBtn" class="btn">Guardar</button>
            <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
          </div>
          <div class="form-help" id="msg"></div>
        </form>

        <div id="cards" class="empresa-groups">Cargando empresas...</div>
        </div>
      </section>

      <iframe name="contentFrame" id="contentFrame" src="about:blank" title="Contenido" class="admin-empresa-frame" style="display:none"></iframe>
    </main>
  </div>

  <script src="/js/seleccionar_empresa.js"></script>

  </body>
</html>
