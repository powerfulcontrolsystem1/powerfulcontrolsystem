<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Seleccionar Empresa</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body>
  
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Seleccionar Empresa</h2>
      <ul class="nav">
        <li><a id="linkAgregarEmpresa" href="#"><img class="icon" src="/img/company-briefcase.svg" alt="">Agregar empresa</a></li>
        <li><a id="linkLicencias" href="/super/licencias.html" target="contentFrame"><img class="icon" src="/img/shield-license.svg" alt="">Licencias</a></li>
        <li><a id="linkAdministradores" href="/super/administradores.html" target="contentFrame"><img class="icon" src="/img/user-avatar.svg" alt="">Administradores</a></li>
        <li><a id="linkReportesGlobales" href="/super/reportes_globales.html" target="contentFrame"><img class="icon" src="/img/analytics.svg" alt="">Reportes globales</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <section id="empresasPanel">
        <div class="container">
        <div class="page-header">
          <h1 style="display:inline-block;margin-right:12px">Seleccionar Empresa</h1>
          <button id="addBtn" class="btn add" style="vertical-align:middle">Agregar</button>
        </div>

        <form id="form" class="form" style="margin-bottom:18px;display:none">
          <input type="hidden" id="itemId">
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">Tipo de empresa</label>
              <select id="tipo_id" class="form-input"></select>
            </div>
            <div class="form-col">
              <label class="form-label">Nombre</label>
              <input id="nombre" class="form-input" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">NIT</label>
              <input id="nit" class="form-input" />
            </div>
            <div class="form-col">
              <label class="form-label">Observaciones</label>
              <input id="observaciones" class="form-input" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" id="saveBtn" class="btn">Guardar</button>
            <button type="button" id="cancelBtn" class="btn secondary">Cancelar</button>
          </div>
          <div class="form-help" id="msg"></div>
        </form>

        <div id="cards" class="empresa-groups">Cargando empresas...</div>
        </div>
      </section>

      <iframe name="contentFrame" id="contentFrame" src="about:blank" title="Contenido" class="admin-empresa-frame" style="display:none"></iframe>
    </main>
  </div>

  <script>
    (function(){
      const empresasPanel = document.getElementById('empresasPanel');
      const contentFrame = document.getElementById('contentFrame');
      const navLinks = Array.from(document.querySelectorAll('.admin-sidebar .nav a'));

      function setActiveNav(activeLink) {
        navLinks.forEach(function(link) { link.classList.remove('active'); });
        if (activeLink) activeLink.classList.add('active');
      }

      function openInRightFrame(href, link) {
        if (!href) return;
        if (!contentFrame || !empresasPanel) {
          window.location.href = href;
          return;
        }
        empresasPanel.style.display = 'none';
        contentFrame.style.display = '';
        contentFrame.setAttribute('src', href);
        setActiveNav(link);
      }

      function buildEmpresaCard(empresa, hasLicense) {
        const a = document.createElement('a');
        a.href = '#';
        a.className = 'card-link';
        a.addEventListener('click', function(evt){
          evt.preventDefault();
          try {
            if (hasLicense) {
              window.open('/administrar_empresa.html?id=' + encodeURIComponent(empresa.id), '_blank');
            } else {
              const params = new URLSearchParams();
              params.set('empresa_id', empresa.id);
              if (empresa.tipo_id) params.set('tipo_id', empresa.tipo_id);
              if (empresa.tipo_nombre) params.set('tipo_nombre', empresa.tipo_nombre);
              window.location.href = '/elegir_licencia.html?' + params.toString();
            }
          } catch (err) {
            console.error(err);
          }
        });

        const div = document.createElement('div');
        div.className = 'portal-card warm';
        div.innerHTML = '<div class="card-body">' +
          '<h3 class="card-title">' + escapeHtml(empresa.nombre || '--') + '</h3>' +
          '<p class="card-desc muted">' + escapeHtml(empresa.observaciones || '') + '</p>' +
          '<div class="card-actions">' +
            '<button class="license-indicator ' + (hasLicense ? 'active' : 'inactive') + '" type="button" aria-hidden="true">' +
              (hasLicense ? 'Licencia activa' : 'Sin licencia') +
            '</button>' +
          '</div>' +
        '</div>';
        a.appendChild(div);
        return a;
      }

      function appendEmpresasGroup(container, title, empresas, activeByEmpresa) {
        if (!empresas.length) return;
        const section = document.createElement('section');
        section.className = 'card empresa-section';

        const header = document.createElement('div');
        header.className = 'empresa-section-header';
        header.innerHTML = '<h2>' + title + '</h2><span class="form-help">Total: ' + empresas.length + '</span>';

        const grid = document.createElement('div');
        grid.className = 'portal-grid empresas-grid';
        empresas.forEach(function(empresa) {
          const hasLicense = !!activeByEmpresa[empresa.id];
          grid.appendChild(buildEmpresaCard(empresa, hasLicense));
        });

        section.appendChild(header);
        section.appendChild(grid);
        container.appendChild(section);
      }

      // Load current admin, empresas and licencias, then render cards for empresas created by the admin
      async function render() {
        try {
          const meRes = await fetch('/me');
          if (!meRes.ok) { window.location.href = '/login.html'; return }
          const me = await meRes.json();
          // Si el usuario activó 'recordar cuenta', guardar el email para futuros auto-logins
          try{ if (localStorage.getItem('rememberAccount') === '1' && me && me.email) { localStorage.setItem('rememberedEmail', me.email); } }catch(e){}

          const [empRes, licRes, tiposRes] = await Promise.all([fetch('/super/api/empresas'), fetch('/super/api/licencias'), fetch('/super/api/tipos_empresas')]);
          if (!empRes.ok) {
            const txt = await empRes.text().catch(()=>'');
            throw new Error('failed to query empresas: ' + (txt || empRes.status + ''))
          }
          let empresas = await empRes.json();
          if (!Array.isArray(empresas)) { empresas = empresas ? [empresas] : []; }
          let licencias = licRes.ok ? await licRes.json() : [];
          if (!Array.isArray(licencias)) { licencias = licencias ? [licencias] : []; }
          let tipos = tiposRes.ok ? await tiposRes.json() : [];
          if (!Array.isArray(tipos)) { tipos = tipos ? [tipos] : []; }

          // map empresa_id -> hasActiveLicense
          const activeByEmpresa = {};
          licencias.forEach(l => { if (l.empresa_id && (l.activo === 1 || l.activo === '1' || l.activo === 'activo')) { activeByEmpresa[l.empresa_id] = true } });

          // filter empresas creadas por el admin
          const myEmpresas = empresas.filter(e => {
            if (!e.usuario_creador) return false
            return e.usuario_creador.toLowerCase() === (me.email||'').toLowerCase()
          });

          const container = document.getElementById('cards'); container.innerHTML = '';
          // preparar select de tipos para el formulario
          const tipoSelect = document.getElementById('tipo_id');
          if (tipoSelect) {
            tipoSelect.innerHTML = '<option value="">-- Seleccionar --</option>';
            tipos.forEach(t=>{ const opt = document.createElement('option'); opt.value = t.nombre; opt.text = t.nombre; opt.dataset.id = t.id; tipoSelect.appendChild(opt); });
          }
          const list = (myEmpresas.length>0) ? myEmpresas : empresas; // fallback: show all if none created by user

          // Si no hay empresas creadas por el usuario y la lista final está vacía, mostrar formulario
          if (list.length === 0) {
            showForm();
          }

          const conLicenciaActiva = list.filter(function(e) { return !!activeByEmpresa[e.id]; });
          const sinLicenciaActiva = list.filter(function(e) { return !activeByEmpresa[e.id]; });

          appendEmpresasGroup(container, 'Empresas con licencia activa', conLicenciaActiva, activeByEmpresa);
          appendEmpresasGroup(container, 'Empresas sin licencia activa', sinLicenciaActiva, activeByEmpresa);
          // ensure add button shows and wires
          document.getElementById('addBtn').onclick = function(){
            showForm();
            setActiveNav(document.getElementById('linkAgregarEmpresa'));
          };
        } catch (err) {
          console.error(err);
          const target = document.getElementById('cards');
          target.innerText = 'Error cargando empresas: ' + (err && err.message ? err.message : String(err));
        }
      }

      function showForm(){
        if (empresasPanel) empresasPanel.style.display = '';
        if (contentFrame) {
          contentFrame.style.display = 'none';
          contentFrame.setAttribute('src', 'about:blank');
        }
        document.getElementById('form').style.display='';
        document.getElementById('addBtn').style.display='none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function hideForm(){
        document.getElementById('form').style.display='none';
        document.getElementById('addBtn').style.display='';
        document.getElementById('itemId').value='';
        document.getElementById('nombre').value='';
        document.getElementById('nit').value='';
        document.getElementById('observaciones').value='';
      }

      function wireSidebarFrameLinks() {
        const linkAgregar = document.getElementById('linkAgregarEmpresa');
        const linkLicencias = document.getElementById('linkLicencias');
        const linkAdministradores = document.getElementById('linkAdministradores');
        const linkReportes = document.getElementById('linkReportesGlobales');

        if (linkAgregar) {
          linkAgregar.addEventListener('click', function(ev) {
            ev.preventDefault();
            if (empresasPanel) empresasPanel.style.display = '';
            if (contentFrame) {
              contentFrame.style.display = 'none';
              contentFrame.setAttribute('src', 'about:blank');
            }
            showForm();
            setActiveNav(linkAgregar);
          });
        }

        [linkLicencias, linkAdministradores, linkReportes].forEach(function(link) {
          if (!link) return;
          link.addEventListener('click', function(ev) {
            ev.preventDefault();
            openInRightFrame(link.getAttribute('href'), link);
          });
        });
      }

      // manejar envío del formulario
      document.addEventListener('DOMContentLoaded', function(){
        wireSidebarFrameLinks();
        setActiveNav(document.getElementById('linkAgregarEmpresa'));
        const form = document.getElementById('form');
        if (form) {
          form.onsubmit = async function(e){
            e.preventDefault();
            const payload = { tipo_id: 0, tipo_nombre: document.getElementById('tipo_id').value||'', nombre: document.getElementById('nombre').value.trim(), nit: document.getElementById('nit').value.trim(), observaciones: document.getElementById('observaciones').value.trim(), usuario_creador: '' };
            try{
              // obtener current admin
              const meRes = await fetch('/me');
              if (meRes.ok){ const me = await meRes.json(); payload.usuario_creador = me.email || ''; }
              if(!payload.nombre){ document.getElementById('msg').innerText='Nombre requerido'; return }
              await fetch('/super/api/empresas', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
              hideForm();
              render();
            }catch(err){ document.getElementById('msg').innerText = err.message }
          };
          document.getElementById('cancelBtn').onclick = hideForm;
        }
      });

      function escapeHtml(s){ return String(s).replace(/[&<>\"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":"&#39;"}[m] }) }

      render();
    })();
  </script>

  </body>
</html>
