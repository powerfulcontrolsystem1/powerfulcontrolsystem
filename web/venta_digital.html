<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Venta digital</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
</head>
<body class="empresa-subpage">
  <div class="container">
    <section class="card empresa-section">
      <div class="page-header">
        <h1 id="vdStoreTitle">Venta digital</h1>
      </div>
      <p id="vdStoreDesc" class="form-help">Cargando catálogo digital...</p>
      <p id="vdStoreMeta" class="form-help"></p>
      <div class="form-actions">
        <button id="vdBtnReloadCatalog" type="button" class="btn secondary">Recargar catálogo</button>
        <button id="vdBtnCheckStatusTop" type="button" class="btn secondary">Consultar estado</button>
      </div>
      <div id="vdTopMsg" class="form-help"></div>
    </section>

    <section class="form creditos-section creditos-section-first">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Productos digitales disponibles</h2>
      </div>
      <div id="vdCatalogGrid" class="portal-grid"></div>
    </section>

    <section class="form creditos-section">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Compra directa con Wompi</h2>
      </div>
      <div id="vdSelectedItem" class="form-help">Selecciona un producto para comprar.</div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="vdBuyerName">Nombre completo</label>
          <input id="vdBuyerName" class="form-input" type="text" placeholder="Nombre y apellido">
        </div>
        <div class="form-col">
          <label class="form-label" for="vdBuyerEmail">Correo electrónico (obligatorio)</label>
          <input id="vdBuyerEmail" class="form-input" type="email" placeholder="correo@dominio.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="vdBuyerPhone">Teléfono Nequi (10 dígitos CO)</label>
          <input id="vdBuyerPhone" class="form-input" type="tel" placeholder="3XXXXXXXXX" maxlength="10">
        </div>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-help creditos-inline-check" for="vdAcceptTerms">
            <input id="vdAcceptTerms" type="checkbox">
            Acepto términos de Wompi y tratamiento de datos personales para procesar el pago.
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button id="vdBtnCreatePayment" type="button" class="btn">Crear transacción</button>
      </div>
      <div id="vdPayMsg" class="form-help"></div>
      <div id="vdPayResult" class="form-help"></div>
    </section>

    <section class="form creditos-section">
      <div class="page-header creditos-section-header">
        <h2 class="creditos-section-title">Estado de orden</h2>
      </div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label" for="vdOrderCode">Código de orden</label>
          <input id="vdOrderCode" class="form-input" type="text" placeholder="VD-ORD-...">
        </div>
        <div class="form-col">
          <label class="form-label" for="vdTransactionId">Transaction ID (opcional)</label>
          <input id="vdTransactionId" class="form-input" type="text" placeholder="ID Wompi">
        </div>
      </div>
      <div class="form-actions">
        <button id="vdBtnCheckStatus" type="button" class="btn secondary">Consultar estado</button>
      </div>
      <div id="vdStatusMsg" class="form-help"></div>
      <pre id="vdStatusPayload" class="backups-detail-pre">Sin consulta de estado.</pre>
    </section>
  </div>

  <script>
    (function () {
      var state = {
        tienda: null,
        items: [],
        selectedItemId: 0
      };

      var topMsgEl = document.getElementById('vdTopMsg');
      var payMsgEl = document.getElementById('vdPayMsg');
      var payResultEl = document.getElementById('vdPayResult');
      var statusMsgEl = document.getElementById('vdStatusMsg');
      var statusPayloadEl = document.getElementById('vdStatusPayload');
      var catalogGridEl = document.getElementById('vdCatalogGrid');
      var selectedItemEl = document.getElementById('vdSelectedItem');
      var storeTitleEl = document.getElementById('vdStoreTitle');
      var storeDescEl = document.getElementById('vdStoreDesc');
      var storeMetaEl = document.getElementById('vdStoreMeta');

      function setMsg(el, text, type) {
        if (!el) return;
        el.textContent = text || '';
        el.classList.remove('error', 'success');
        if (type) el.classList.add(type);
      }

      function escapeHTML(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatMoney(value, currency) {
        var amount = Number(value || 0);
        var curr = String(currency || 'COP').trim().toUpperCase() || 'COP';
        try {
          return new Intl.NumberFormat('es-CO', { style: 'currency', currency: curr, maximumFractionDigits: 2 }).format(amount);
        } catch (_) {
          return amount.toFixed(2) + ' ' + curr;
        }
      }

      function apiURL(action, extraParams) {
        var url = new URL('/api/public/venta_digital', window.location.origin);
        if (action) url.searchParams.set('action', action);
        if (extraParams && typeof extraParams === 'object') {
          Object.keys(extraParams).forEach(function (key) {
            var value = extraParams[key];
            if (value === undefined || value === null || value === '') return;
            url.searchParams.set(key, String(value));
          });
        }
        return url;
      }

      async function requestJSON(method, action, extraParams, bodyObj) {
        var options = {
          method: method,
          credentials: 'same-origin'
        };
        if (bodyObj) {
          options.headers = { 'Content-Type': 'application/json' };
          options.body = JSON.stringify(bodyObj);
        }

        var resp = await fetch(apiURL(action, extraParams).toString(), options);
        var text = await resp.text();
        var data = {};
        if (text) {
          try {
            data = JSON.parse(text);
          } catch (_) {
            data = { raw: text };
          }
        }

        if (!resp.ok) {
          throw new Error((data && (data.error || data.message)) || text || ('HTTP ' + resp.status));
        }

        return data;
      }

      function getSelectedItem() {
        return state.items.find(function (row) {
          return Number(row.id || 0) === Number(state.selectedItemId || 0);
        }) || null;
      }

      function updateSelectedItemSummary() {
        var item = getSelectedItem();
        if (!item) {
          selectedItemEl.textContent = 'Selecciona un producto para comprar.';
          return;
        }
        selectedItemEl.innerHTML = '' +
          'Producto seleccionado: <strong>' + escapeHTML(item.nombre || '') + '</strong> | ' +
          '<strong>' + escapeHTML(formatMoney(item.precio || 0, item.moneda || (state.tienda && state.tienda.moneda) || 'COP')) + '</strong>';
      }

      function updateStoreHeader() {
        var tienda = state.tienda || {};
        storeTitleEl.textContent = tienda.nombre_tienda || 'Venta digital';
        storeDescEl.textContent = tienda.descripcion_tienda || 'Compra licencias y software directamente en línea con Wompi.';
        storeMetaEl.textContent = 'Moneda: ' + String(tienda.moneda || 'COP') + ' | Wompi activo: ' + (tienda.wompi_activo ? 'Sí' : 'No');
      }

      function renderCatalog() {
        if (!Array.isArray(state.items) || state.items.length === 0) {
          catalogGridEl.innerHTML = '<div class="portal-card"><p>No hay productos digitales disponibles por ahora.</p></div>';
          updateSelectedItemSummary();
          return;
        }

        var html = state.items.map(function (item) {
          var id = Number(item.id || 0);
          var isSelected = Number(state.selectedItemId || 0) === id;
          var imageBlock = item.imagen_url ? ('<img src="' + escapeHTML(item.imagen_url) + '" alt="Imagen producto">') : '';
          return '' +
            '<div class="portal-card dark-mode" data-item-id="' + id + '">' +
              imageBlock +
              '<h3>' + escapeHTML(item.nombre || 'Producto digital') + '</h3>' +
              '<p>' + escapeHTML(item.descripcion || '') + '</p>' +
              '<p><strong>' + escapeHTML(formatMoney(item.precio || 0, item.moneda || (state.tienda && state.tienda.moneda) || 'COP')) + '</strong></p>' +
              '<div class="form-actions">' +
                '<button type="button" class="btn ' + (isSelected ? 'secondary' : '') + ' vd-select-item" data-item-id="' + id + '">' + (isSelected ? 'Seleccionado' : 'Comprar este') + '</button>' +
              '</div>' +
            '</div>';
        }).join('');

        catalogGridEl.innerHTML = html;
        updateSelectedItemSummary();
      }

      function resolveInitialOrderCodeFromURL() {
        var params = new URLSearchParams(window.location.search || '');
        var orderCode = String(params.get('order_code') || params.get('codigo_orden') || '').trim();
        if (orderCode) {
          document.getElementById('vdOrderCode').value = orderCode;
        }
      }

      async function loadCatalog() {
        setMsg(topMsgEl, 'Cargando catálogo digital...');
        try {
          var data = await requestJSON('GET', 'catalogo', null, null);
          state.tienda = data.tienda || {};
          state.items = Array.isArray(data.items) ? data.items : [];
          if (!state.selectedItemId && state.items.length > 0) {
            state.selectedItemId = Number(state.items[0].id || 0);
          } else {
            var selectedExists = state.items.some(function (row) {
              return Number(row.id || 0) === Number(state.selectedItemId || 0);
            });
            if (!selectedExists) {
              state.selectedItemId = state.items.length > 0 ? Number(state.items[0].id || 0) : 0;
            }
          }
          updateStoreHeader();
          renderCatalog();
          setMsg(topMsgEl, 'Catálogo cargado: ' + state.items.length + ' producto(s).', 'success');
        } catch (err) {
          setMsg(topMsgEl, 'No se pudo cargar catálogo: ' + err.message, 'error');
          catalogGridEl.innerHTML = '<div class="portal-card"><p>Error al cargar catálogo.</p></div>';
        }
      }

      async function createPayment() {
        setMsg(payMsgEl, 'Creando transacción...');
        payResultEl.textContent = '';

        try {
          var item = getSelectedItem();
          if (!item) throw new Error('Selecciona un producto digital para continuar');

          var buyerName = document.getElementById('vdBuyerName').value.trim();
          var buyerEmail = document.getElementById('vdBuyerEmail').value.trim();
          var buyerPhone = document.getElementById('vdBuyerPhone').value.trim();
          var acceptTerms = !!document.getElementById('vdAcceptTerms').checked;

          if (!buyerName) throw new Error('El nombre completo es obligatorio');
          if (!buyerEmail) throw new Error('El correo electrónico es obligatorio');
          if (!/^3\d{9}$/.test(buyerPhone)) {
            throw new Error('Teléfono Nequi inválido. Debe iniciar en 3 y tener 10 dígitos');
          }
          if (!acceptTerms) throw new Error('Debes aceptar términos de Wompi para continuar');

          var payload = {
            item_id: Number(item.id || 0),
            comprador_nombre: buyerName,
            comprador_email: buyerEmail,
            comprador_telefono: buyerPhone,
            accept_terms: acceptTerms
          };

          var data = await requestJSON('POST', 'crear_pago', null, payload);
          var order = data.order || {};
          var orderCode = order.codigo_orden || '';
          var txID = data.transaction_id || '';

          if (orderCode) document.getElementById('vdOrderCode').value = orderCode;
          if (txID) document.getElementById('vdTransactionId').value = txID;

          setMsg(payMsgEl, 'Transacción creada correctamente. Te enviaremos la licencia al correo cuando el pago esté aprobado.', 'success');
          payResultEl.innerHTML = '' +
            'Orden: <strong>' + escapeHTML(orderCode || '-') + '</strong><br>' +
            'Transacción: <strong>' + escapeHTML(txID || '-') + '</strong><br>' +
            'Estado proveedor: <strong>' + escapeHTML(data.status || '-') + '</strong><br>' +
            'Estado local: <strong>' + escapeHTML(data.status_local || '-') + '</strong>';

          await consultStatus();
        } catch (err) {
          setMsg(payMsgEl, 'No se pudo crear la transacción: ' + err.message, 'error');
        }
      }

      async function consultStatus() {
        var orderCode = document.getElementById('vdOrderCode').value.trim();
        var txID = document.getElementById('vdTransactionId').value.trim();
        if (!orderCode) {
          setMsg(statusMsgEl, 'Ingresa un código de orden para consultar estado.', 'error');
          return;
        }

        setMsg(statusMsgEl, 'Consultando estado de pago...');
        try {
          var data = await requestJSON('GET', 'estado_pago', {
            order_code: orderCode,
            transaction_id: txID || undefined
          }, null);
          var delivered = !!data.delivery_sent;
          setMsg(statusMsgEl, delivered
            ? 'Pago aprobado y licencia enviada al correo del comprador.'
            : 'Estado consultado correctamente. Aún no se confirma la entrega de licencia.', delivered ? 'success' : null);
          statusPayloadEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          setMsg(statusMsgEl, 'No se pudo consultar estado: ' + err.message, 'error');
        }
      }

      catalogGridEl.addEventListener('click', function (ev) {
        var button = ev.target && ev.target.closest ? ev.target.closest('.vd-select-item') : null;
        if (!button) return;
        var itemId = Number(button.getAttribute('data-item-id') || 0);
        if (!(itemId > 0)) return;
        state.selectedItemId = itemId;
        renderCatalog();
      });

      document.getElementById('vdBtnReloadCatalog').addEventListener('click', loadCatalog);
      document.getElementById('vdBtnCreatePayment').addEventListener('click', createPayment);
      document.getElementById('vdBtnCheckStatus').addEventListener('click', consultStatus);
      document.getElementById('vdBtnCheckStatusTop').addEventListener('click', consultStatus);

      resolveInitialOrderCodeFromURL();
      loadCatalog();
      if (document.getElementById('vdOrderCode').value.trim()) {
        consultStatus();
      }
    })();
  </script>
</body>
</html>
