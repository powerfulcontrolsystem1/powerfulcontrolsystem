<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla en Vivo</title>
    <link rel="stylesheet" href="/estilos.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }
        #video-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">Esperando conexión de la empresa...</div>
    <div id="video-container">
        <video id="remoteVideo" autoplay playsinline controls></video>
    </div>

    <script>
        const videoElement = document.getElementById('remoteVideo');
        const statusElement = document.getElementById('status');
        let peerConnection;
        let ws;

        const config = {
            'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]
        };

        function connect() {
            // Determine WebSocket URL based on current protocol
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/api/public/webrtc/signaling`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Conectado al servidor de señalización');
                statusElement.innerText = 'Conectado al servidor. Esperando transmisión...';
                // Registrarse como visualizador
                ws.send(JSON.stringify({ type: 'register_viewer' }));
            };

            ws.onmessage = async (message) => {
                const data = JSON.parse(message.data);
                
                if (data.type === 'offer') {
                    statusElement.innerText = 'Recibiendo transmisión...';
                    peerConnection = new RTCPeerConnection(config);
                    
                    peerConnection.ontrack = (event) => {
                        console.log('Stream recibido');
                        videoElement.srcObject = event.streams[0];
                    };

                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate) {
                            ws.send(JSON.stringify({ type: 'ice_candidate', candidate: event.candidate }));
                        }
                    };

                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    
                    ws.send(JSON.stringify({ type: 'answer', answer: answer }));
                } else if (data.type === 'ice_candidate' && peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            };

            ws.onclose = () => {
                console.log('Desconectado del servidor de señalización');
                statusElement.innerText = 'Desconectado. Reintentando...';
                setTimeout(connect, 3000);
            };
        }

        connect();
    </script>
</body>
</html>
