<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Red Social Comercial</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
  <style>
    body { font-family: "Segoe UI Variable","Segoe UI",Tahoma,sans-serif; margin: 0; padding: 20px; text-align: center; color: var(--text); }
    .social-hero { margin-top: 60px; }
    .social-hero p { color: var(--muted); max-width: 720px; margin: 0.75rem auto 0; }
    .feed { max-width: 880px; margin: 2rem auto; text-align: left; }
    .card { background: linear-gradient(180deg, var(--surface), var(--surface-soft)); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); margin-bottom: 2rem; overflow: hidden; display: flex; flex-direction: column; }
    .card-img { width: 100%; height: 300px; background-color: var(--input-bg-soft); background-size: cover; background-position: center; }
    .card-body { padding: 20px; }
    .card-title { font-size: 1.5rem; margin: 0 0 10px 0; color: var(--text); }
    .card-desc { color: var(--muted); line-height: 1.6; margin-bottom: 15px; }
    .card-actions { display: flex; justify-content: flex-end; }
    .btn-contact { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #fff; border: none; padding: 10px 20px; border-radius: 999px; cursor: pointer; text-decoration: none; font-weight: bold; }
    .btn-contact:hover { filter: brightness(1.06); }
  </style>
</head>
<body>
  <div class="social-hero">
    <h1>Red Social Comercial</h1>
    <p>Descubre productos y ofertas exclusivas de nuestras empresas asociadas.</p>
  </div>
  
  <div class="feed" id="feedContenedor">
    <p class="text-center">Cargando publicaciones...</p>
  </div>

  <script>
    async function cargarPublico() {
      try {
        const res = await fetch('/api/public/publicaciones');
        if (!res.ok) throw new Error('Error de red');
        const data = await res.json();
        const feed = document.getElementById('feedContenedor');
        feed.innerHTML = '';
        
        if (data.length === 0) {
          feed.innerHTML = '<p class="muted text-center">Aún no hay publicaciones disponibles.</p>';
          return;
        }

        data.forEach(p => {
          const imgStyle = p.foto_url 
            ? `class="bg-cover" data-bg-url="${p.foto_url}"`
            : `class="bg-placeholder"`;
          
          const fallBackText = p.foto_url ? '' : '<span>Sin imagen</span>';

          feed.innerHTML += `
            <div class="card">
              <div class="card-img" ${imgStyle}>${fallBackText}</div>
              <div class="card-body">
                <h2 class="card-title">${p.nombre}</h2>
                <p class="card-desc">${p.descripcion}</p>
                <div class="card-actions">
                  <a href="https://api.whatsapp.com/send?text=Me%20interesa%20${encodeURIComponent(p.nombre)}" target="_blank" class="btn-contact">Contactar</a>
                </div>
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
        document.getElementById('feedContenedor').innerHTML = '<p class="text-danger text-center">Error al cargar las publicaciones</p>';
      }
      // Aplicar backgrounds a elementos con data-bg-url (uso de background-image desde atributo data)
      document.querySelectorAll('.bg-cover[data-bg-url]').forEach(function(el){
        try { el.style.backgroundImage = 'url(' + el.dataset.bgUrl + ')'; } catch(e) {}
      });
    }
    cargarPublico();
  </script>
</body>
</html>
