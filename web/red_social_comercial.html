<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Red Social Comercial</title>
  <link rel="stylesheet" href="/estilos.css">
  <script src="/menu.js"></script>
  <style>
    body{margin:0;color:var(--text);min-height:100vh;background:radial-gradient(circle at 30% 0%,color-mix(in srgb,var(--accent) 18%,transparent 82%),transparent 32%),linear-gradient(180deg,var(--bg-alt),var(--bg));font-family:"Segoe UI Variable","Segoe UI",Tahoma,sans-serif}
    .social-shell{max-width:980px;margin:0 auto;padding:22px 14px 64px}
    .social-topbar{
      position:sticky;top:0;z-index:20;
      padding:12px 12px;
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(135deg, rgba(31,142,241,0.12), rgba(255,255,255,0.02)), var(--surface);
      box-shadow:0 18px 44px rgba(0,0,0,0.14);
      margin: 8px auto 14px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    }
    .social-topbar h1{font-size:clamp(1.2rem,2.4vw,1.75rem);margin:0;font-weight:900;letter-spacing:-.03em}
    .social-topbar p{margin:0;color:var(--muted);max-width:48rem;line-height:1.35;font-size:0.92rem}
    .feed{display:flex;flex-direction:column;gap:10px;align-items:stretch}
    .post-card{background:linear-gradient(180deg,color-mix(in srgb,var(--surface-soft) 92%,var(--surface) 8%),var(--surface));border:1px solid var(--border);border-radius:18px;box-shadow:0 12px 26px rgba(0,0,0,.12);overflow:hidden;display:flex;flex-direction:column}
    .post-cover{height:140px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 18%,transparent 82%),color-mix(in srgb,var(--accent-2) 16%,transparent 84%));background-size:cover;background-position:center;display:grid;place-items:center;color:var(--muted);font-weight:800}
    .post-media{width:100%;border:0;display:block}
    .post-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px;flex:1}
    .post-meta{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.86rem}
    .post-avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;font-weight:900}
    .post-title{font-size:1.02rem;line-height:1.25;margin:0;font-weight:900}
    .post-desc{color:var(--text);line-height:1.42;margin:0;white-space:pre-wrap;font-size:0.95rem;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
    .post-actions{margin-top:auto;display:flex;gap:10px;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;flex-wrap:wrap}
    .post-chip{font-size:.82rem;color:var(--muted)}
    .btn-contact{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:none;padding:10px 16px;border-radius:999px;text-decoration:none;font-weight:800;box-shadow:0 10px 24px color-mix(in srgb,var(--accent) 24%,transparent)}
    .btn-private{background:transparent;color:var(--text);border:1px solid var(--border);padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:800}
    .empty-state{grid-column:1/-1;text-align:center;color:var(--muted);padding:42px;border:1px dashed var(--border);border-radius:22px;background:var(--surface)}
    .load-more{color:var(--muted);text-align:center;padding:14px;border:1px dashed var(--border);border-radius:14px;background:var(--surface)}
    .react-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .react-btn{border:1px solid var(--border);background:transparent;color:var(--text);padding:8px 12px;border-radius:999px;font-weight:900;cursor:pointer}
    .react-btn.active{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent}
    .react-mini{color:var(--muted);font-size:.85rem}
    .comments{border-top:1px solid var(--border);padding-top:10px;margin-top:8px;display:none}
    .comments.open{display:block}
    .comment{padding:8px 10px;border:1px solid var(--border);border-radius:14px;background:color-mix(in srgb,var(--surface) 82%,transparent 18%);margin-top:8px}
    .comment .meta{color:var(--muted);font-size:.84rem}
    .comment .txt{white-space:pre-wrap;margin-top:2px;line-height:1.35}
    .comment-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:flex-start}
    .comment-form input,.comment-form textarea{background:var(--input-bg-soft);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:10px 12px}
    .comment-form input{flex:1;min-width:180px}
    .comment-form textarea{flex:1;min-width:240px;min-height:42px;resize:vertical}
    .comment-form .btn-send{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:none;padding:10px 14px;border-radius:14px;font-weight:950;cursor:pointer}
    @media(max-width:640px){.social-shell{padding:14px 12px 44px}.post-cover{height:130px}}
  </style>
</head>
<body>
  <div class="social-shell">
    <header class="social-topbar">
      <div>
        <h1>Red Social Comercial</h1>
        <p>Feed público de publicaciones empresariales. Baja para cargar más (estilo Facebook).</p>
      </div>
      <a class="btn secondary" href="/login_usuario.html" style="text-decoration:none;">Iniciar sesión</a>
    </header>
    <div class="feed" id="feedContenedor">
      <div class="empty-state">Cargando publicaciones...</div>
    </div>
    <div id="feedSentinel" class="load-more" hidden>Cargando más...</div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function initial(value) {
      var raw = String(value || 'E').trim();
      return escapeHtml(raw.charAt(0).toUpperCase() || 'E');
    }
    function formatDate(value) {
      try { return new Date(value).toLocaleString('es-CO', { dateStyle: 'medium', timeStyle: 'short' }); } catch (_) { return ''; }
    }
    function youtubeEmbedURL(raw) {
      var v = String(raw || "").trim();
      if (!v) return "";
      // youtu.be/<id>
      var m = v.match(/youtu\.be\/([A-Za-z0-9_\-]+)/i);
      if (m && m[1]) return "https://www.youtube.com/embed/" + m[1];
      // youtube.com/watch?v=<id>
      m = v.match(/[?&]v=([A-Za-z0-9_\-]+)/i);
      if (m && m[1]) return "https://www.youtube.com/embed/" + m[1];
      // youtube.com/embed/<id>
      m = v.match(/youtube\.com\/embed\/([A-Za-z0-9_\-]+)/i);
      if (m && m[1]) return "https://www.youtube.com/embed/" + m[1];
      return "";
    }

    var pageParams = new URLSearchParams(window.location.search || '');
    var pageEmpresaId = Number(String(pageParams.get('empresa_id') || pageParams.get('id') || '').trim()) || 0;
    var paging = { limit: 12, offset: 0, done: false, loading: false };
    function getActorKey() {
      try {
        var key = localStorage.getItem('pcs_actor_key');
        if (key && key.length >= 8) return key;
        key = (crypto && crypto.randomUUID) ? crypto.randomUUID() : (String(Date.now()) + '_' + Math.random().toString(16).slice(2));
        localStorage.setItem('pcs_actor_key', key);
        return key;
      } catch (_) {
        return String(Date.now()) + '_' + Math.random().toString(16).slice(2);
      }
    }
    function reaccionLabel(r) {
      switch(String(r||'')) {
        case 'me_gusta': return 'Me gusta';
        case 'me_encanta': return 'Me encanta';
        case 'me_importa': return 'Me importa';
        case 'me_divierte': return 'Me divierte';
        case 'me_asombra': return 'Me asombra';
        case 'me_entristece': return 'Me entristece';
        case 'me_enoja': return 'Me enoja';
        default: return '';
      }
    }
    function resumenReacciones(resumen) {
      if (!resumen) return '';
      var total = 0;
      Object.keys(resumen).forEach(k => { total += Number(resumen[k]||0); });
      if (!total) return 'Sin reacciones';
      var top = Object.keys(resumen).sort((a,b) => Number(resumen[b]||0)-Number(resumen[a]||0)).slice(0,2);
      return top.map(k => reaccionLabel(k) + ' ' + Number(resumen[k]||0)).join(' · ') + (Object.keys(resumen).length>2 ? ' · +' : '');
    }

    function renderPost(p) {
      const img = String(p.foto_url || '').trim();
      const empresa = p.empresa_nombre || ('Empresa #' + p.empresa_id);
      const y = youtubeEmbedURL(p.youtube_url || "");
      const cover = img ? `style="background-image:url('${escapeHtml(img)}')"` : '';
      const mediaHtml = y
        ? `<iframe class="post-media" height="360" src="${escapeHtml(y)}" title="YouTube" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>`
        : '';
      const userReaction = String(p.user_reaction || '').trim();
      const reaccionesResumen = p.reacciones_resumen || null;
      const comentariosTotal = Number(p.comentarios_total || 0);
      return `
        <article class="post-card">
          ${mediaHtml || `<div class="post-cover" ${cover}>${img ? '' : 'Publicación empresarial'}</div>`}
          <div class="post-body">
            <div class="post-meta">
              <div class="post-avatar">${initial(empresa)}</div>
              <div><strong>${escapeHtml(empresa)}</strong><br><span>${escapeHtml(formatDate(p.fecha_creacion))}</span></div>
            </div>
            <h2 class="post-title">${escapeHtml(p.nombre)}</h2>
            <p class="post-desc">${escapeHtml(p.descripcion)}</p>
            <div class="react-row">
              <button class="react-btn ${userReaction==='me_gusta'?'active':''}" data-react="me_gusta" data-post="${escapeHtml(p.id)}" type="button">👍 Me gusta</button>
              <button class="react-btn ${userReaction==='me_encanta'?'active':''}" data-react="me_encanta" data-post="${escapeHtml(p.id)}" type="button">❤️ Me encanta</button>
              <button class="react-btn" data-toggle-comments="1" data-post="${escapeHtml(p.id)}" type="button">💬 Comentarios (${comentariosTotal})</button>
              <span class="react-mini" data-react-resumen="${escapeHtml(p.id)}">${escapeHtml(resumenReacciones(reaccionesResumen))}</span>
            </div>
            <div class="comments" id="comments_${escapeHtml(p.id)}" data-loaded="0">
              <div class="react-mini" id="comments_status_${escapeHtml(p.id)}">Cargando...</div>
              <div id="comments_list_${escapeHtml(p.id)}"></div>
              <form class="comment-form" data-comment-form="1" data-post="${escapeHtml(p.id)}">
                <input type="text" maxlength="120" placeholder="Tu nombre (opcional)" name="nombre">
                <textarea maxlength="1500" placeholder="Escribe un comentario..." name="contenido" required></textarea>
                <button class="btn-send" type="submit">Comentar</button>
              </form>
            </div>
            <div class="post-actions">
              <span class="post-chip">Post empresarial</span>
              <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
                <button class="btn-private" type="button" data-empresa-id="${escapeHtml(p.empresa_id)}" data-post-nombre="${escapeHtml(p.nombre||'')}">Mensaje privado</button>
                <a href="https://api.whatsapp.com/send?text=${encodeURIComponent('Me interesa esta publicación: ' + (p.nombre || ''))}" target="_blank" rel="noopener" class="btn-contact">WhatsApp</a>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    async function apiFetch(url, opts) {
      opts = opts || {};
      opts.headers = opts.headers || {};
      opts.headers['X-Actor-Key'] = getActorKey();
      return fetch(url, opts);
    }

    function renderComment(c) {
      const nombre = String(c.nombre || '').trim();
      const quien = nombre ? nombre : 'Usuario';
      return `
        <div class="comment">
          <div class="meta"><strong>${escapeHtml(quien)}</strong> · ${escapeHtml(formatDate(c.fecha_creacion))}</div>
          <div class="txt">${escapeHtml(c.contenido)}</div>
        </div>
      `;
    }

    async function loadComments(postId) {
      const box = document.getElementById('comments_' + postId);
      if (!box) return;
      const list = document.getElementById('comments_list_' + postId);
      const status = document.getElementById('comments_status_' + postId);
      try {
        status.textContent = 'Cargando...';
        const res = await apiFetch('/api/public/publicaciones/' + encodeURIComponent(postId) + '/comentarios?limit=8&offset=0');
        const text = await res.text();
        const data = text ? JSON.parse(text) : [];
        if (!res.ok) throw new Error('No se pudo cargar comentarios');
        list.innerHTML = '';
        (data || []).forEach(c => { list.insertAdjacentHTML('beforeend', renderComment(c)); });
        status.textContent = (data && data.length) ? '' : 'Aún no hay comentarios.';
        box.setAttribute('data-loaded', '1');
      } catch (e) {
        status.textContent = e.message || 'Error cargando comentarios';
      }
    }

    async function setReaction(postId, reaccion) {
      const res = await apiFetch('/api/public/publicaciones/' + encodeURIComponent(postId) + '/reacciones', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reaccion: reaccion })
      });
      const text = await res.text();
      const data = text ? JSON.parse(text) : {};
      if (!res.ok) throw new Error((data && data.error) || text || 'No se pudo reaccionar');
      return data;
    }

    async function cargarPublico(reset) {
      try {
        if (paging.loading) return;
        if (reset) {
          paging.offset = 0; paging.done = false;
          document.getElementById('feedContenedor').innerHTML = '';
        }
        if (paging.done) return;
        paging.loading = true;
        const sentinel = document.getElementById("feedSentinel");
        if (sentinel) { sentinel.hidden = false; sentinel.textContent = "Cargando más..."; }

        var publicacionesUrl = '/api/public/publicaciones?limit=' + encodeURIComponent(paging.limit) + '&offset=' + encodeURIComponent(paging.offset);
        if (pageEmpresaId > 0) publicacionesUrl += '&empresa_id=' + encodeURIComponent(pageEmpresaId);
        const res = await apiFetch(publicacionesUrl);
        if (!res.ok) throw new Error('Error de red');
        const data = await res.json();
        const feed = document.getElementById('feedContenedor');
        if (!Array.isArray(data) || data.length === 0) {
          if (paging.offset === 0) {
            feed.innerHTML = '<div class="empty-state">Aún no hay publicaciones disponibles.</div>';
          }
          paging.done = true;
          if (sentinel) { sentinel.textContent = "No hay más publicaciones."; }
          return;
        }

        data.forEach(p => { feed.insertAdjacentHTML('beforeend', renderPost(p)); });
        paging.offset += data.length;

        // Botones (mensaje privado / reacciones / comentarios)
        feed.querySelectorAll('button.btn-private').forEach(btn => {
          btn.addEventListener('click', async function(){
            try {
              const empresaId = Number(btn.getAttribute('data-empresa-id') || 0);
              const postNombre = String(btn.getAttribute('data-post-nombre') || '').trim();
              if (!empresaId) throw new Error('Empresa no disponible.');
              const nombre = String(prompt('Tu nombre (opcional):') || '').trim();
              const contacto = String(prompt('Tu WhatsApp o correo para que te respondan (opcional):') || '').trim();
              const mensaje = String(prompt('Escribe tu mensaje:') || '').trim();
              if (!mensaje) return;

              btn.disabled = true;
              const res = await fetch('/api/public/mensajes_privados', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  empresa_id: empresaId,
                  origen: 'red_social',
                  origen_ref: postNombre ? ('post: ' + postNombre) : '',
                  nombre: nombre,
                  contacto: contacto,
                  mensaje: mensaje
                })
              });
              const text = await res.text();
              const data = text ? JSON.parse(text) : {};
              if (!res.ok) throw new Error(data.error || text || ('HTTP ' + res.status));
              alert('Mensaje enviado. Si dejas tu contacto, la empresa podrá responderte.');
            } catch (e) {
              alert(e.message || 'No se pudo enviar el mensaje.');
            } finally {
              btn.disabled = false;
            }
          });
        });

        feed.querySelectorAll('button.react-btn[data-react]').forEach(btn => {
          btn.addEventListener('click', async function(){
            try {
              const postId = String(btn.getAttribute('data-post') || '').trim();
              const reaccion = String(btn.getAttribute('data-react') || '').trim();
              if (!postId) return;
              btn.disabled = true;
              const data = await setReaction(postId, reaccion);
              // actualizar UI del post (activos + resumen + contador comentarios)
              const card = btn.closest('.post-card');
              if (card) {
                card.querySelectorAll('button.react-btn[data-react]').forEach(b => {
                  b.classList.toggle('active', String(b.getAttribute('data-react')) === String(data.user_reaction||''));
                });
                const resumenEl = card.querySelector('[data-react-resumen="' + postId + '"]');
                if (resumenEl) resumenEl.textContent = resumenReacciones(data.reacciones_resumen);
                const toggle = card.querySelector('button.react-btn[data-toggle-comments="1"][data-post="' + postId + '"]');
                if (toggle) toggle.textContent = '💬 Comentarios (' + String(data.comentarios_total||0) + ')';
              }
            } catch (e) {
              alert(e.message || 'No se pudo reaccionar.');
            } finally {
              btn.disabled = false;
            }
          });
        });

        feed.querySelectorAll('button.react-btn[data-toggle-comments="1"]').forEach(btn => {
          btn.addEventListener('click', async function(){
            const postId = String(btn.getAttribute('data-post') || '').trim();
            if (!postId) return;
            const box = document.getElementById('comments_' + postId);
            if (!box) return;
            box.classList.toggle('open');
            if (box.classList.contains('open') && box.getAttribute('data-loaded') !== '1') {
              await loadComments(postId);
            }
          });
        });

        feed.querySelectorAll('form[data-comment-form="1"]').forEach(form => {
          form.addEventListener('submit', async function(ev){
            ev.preventDefault();
            const postId = String(form.getAttribute('data-post') || '').trim();
            const fd = new FormData(form);
            const nombre = String(fd.get('nombre') || '').trim();
            const contenido = String(fd.get('contenido') || '').trim();
            if (!contenido) return;
            const btnSend = form.querySelector('button[type="submit"]');
            try {
              if (btnSend) btnSend.disabled = true;
              const res = await apiFetch('/api/public/publicaciones/' + encodeURIComponent(postId) + '/comentarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre: nombre, contenido: contenido })
              });
              const text = await res.text();
              const data = text ? JSON.parse(text) : {};
              if (!res.ok) throw new Error((data && data.error) || text || 'No se pudo comentar');
              form.reset();
              // recargar comentarios para ver el nuevo arriba
              await loadComments(postId);
            } catch (e) {
              alert(e.message || 'No se pudo comentar.');
            } finally {
              if (btnSend) btnSend.disabled = false;
            }
          });
        });
      } catch (err) {
        console.error(err);
        const feed = document.getElementById('feedContenedor');
        if (!feed || feed.children.length) return;
        feed.innerHTML = '<div class="empty-state">Error al cargar las publicaciones.</div>';
      } finally {
        paging.loading = false;
      }
    }

    // Scroll infinito (IntersectionObserver)
    (function initInfinite(){
      var sentinel = document.getElementById("feedSentinel");
      if (!sentinel || !("IntersectionObserver" in window)) {
        cargarPublico(true);
        return;
      }
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if (e.isIntersecting) cargarPublico(false);
        });
      }, { rootMargin: "900px 0px" });
      io.observe(sentinel);
      cargarPublico(true);
    })();
  </script>
</body>
</html>
