<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pantalla de turnos</title>
  <link rel="stylesheet" href="/estilos.css">
  <style>
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top left, rgba(49,157,231,.14), transparent 28%),linear-gradient(180deg,#07131f,#0d1f32);color:#eef4fb;font-family:"Segoe UI Variable","Segoe UI",sans-serif}
    .tv-shell{max-width:1280px;margin:0 auto;padding:20px 18px;display:grid;gap:18px}
    .tv-hero,.tv-card{background:rgba(11,26,42,.9);border:1px solid rgba(150,176,206,.16);border-radius:22px;box-shadow:0 24px 44px rgba(0,0,0,.28)}
    .tv-hero{padding:22px;display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}
    .tv-board{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}
    .tv-card{padding:18px}
    .tv-ticket{padding:18px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(150,176,206,.14);display:grid;gap:8px}
    .tv-code{font-size:3rem;font-weight:900;letter-spacing:.06em}
    .tv-grid{display:grid;gap:12px}
    @media (max-width: 980px){.tv-board{grid-template-columns:1fr}.tv-code{font-size:2.3rem}}
  </style>
</head>
<body>
  <main class="tv-shell">
    <header class="tv-hero">
      <div>
        <h1 id="screenTitle" style="margin:0;font-size:2rem;">Pantalla de turnos</h1>
        <p style="margin:8px 0 0;color:#b8cada;">Los turnos llamados aparecerán aquí en tiempo real mediante actualización automática.</p>
      </div>
      <div id="screenClock" class="turno-pill">--:--</div>
    </header>
    <section class="tv-board">
      <article class="tv-card">
        <h2 style="margin-top:0;">Llamando ahora</h2>
        <div id="callingNow" class="tv-grid"></div>
      </article>
      <aside class="tv-card">
        <h2 style="margin-top:0;">Servicios en espera</h2>
        <div id="serviceSummary" class="tv-grid"></div>
      </aside>
    </section>
    <section class="tv-card">
      <h2 style="margin-top:0;">Llamados recientes</h2>
      <div id="recentCalls" class="tv-grid"></div>
    </section>
  </main>
  <script src="/js/pantalla_turnos.js"></script>
</body>
</html>
