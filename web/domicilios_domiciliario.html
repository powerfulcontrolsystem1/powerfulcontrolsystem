<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Domiciliario</title><link rel="stylesheet" href="/estilos.css">
  <style>.page{min-height:100vh;background:var(--bg);color:var(--text)}.wrap{max-width:820px;margin:auto;padding:16px;display:grid;gap:14px}.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow)}.list{display:grid;gap:10px}.item{background:var(--surface-soft);border:1px solid var(--border);border-radius:8px;padding:12px}.actions{display:flex;flex-wrap:wrap;gap:8px}.muted{color:var(--muted)}</style>
</head>
<body class="page"><main class="wrap">
  <section class="card"><h1>Domiciliario</h1><p class="muted">Conéctate, acepta pedidos y comparte ubicación GPS en tiempo real.</p></section>
  <form id="login" class="card"><h2>Ingresar</h2><input id="doc" class="form-input" placeholder="Documento" required><input id="pin" class="form-input" placeholder="PIN" required style="margin-top:8px"><button class="btn" style="margin-top:10px">Entrar</button></form>
  <section id="app" class="card" hidden><div class="actions"><button id="online" class="btn">Online disponible</button><button id="busy" class="btn secondary">Ocupado</button><button id="refresh" class="btn secondary">Actualizar</button></div><p id="msg" class="muted"></p><h2>Ofertas</h2><div id="offers" class="list"></div><h2>Mis pedidos</h2><div id="orders" class="list"></div></section>
</main><script>
(function(){const qs=new URLSearchParams(location.search),empresaId=qs.get("empresa_id")||"",base="/api/public/domicilios?empresa_id="+empresaId+"&action=",esc=v=>String(v??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])),tokenKey="dom_courier_"+empresaId;let token=localStorage.getItem(tokenKey)||"",currentOrder=0;async function api(a,p){let r=await fetch(base+a,{method:"POST",headers:{"Content-Type":"application/json","X-Domicilio-Courier-Token":token},body:JSON.stringify(p||{})});let t=await r.text(),d={};try{d=t?JSON.parse(t):{}}catch(_){d={raw:t}}if(!r.ok)throw Error(d.raw||t);return d}function show(t){msg.textContent=t||""}login.onsubmit=async e=>{e.preventDefault();try{let c=await api("courier_login",{documento:doc.value,pin:pin.value});token=c.token_sesion;localStorage.setItem(tokenKey,token);login.hidden=true;app.hidden=false;await presence(true,true);load();geo()}catch(err){alert(err.message)}};async function presence(on,disp){await api("courier_presence",{online:on,disponible:disp});show(on?(disp?"Online y disponible":"Online ocupado"):"Offline")}online.onclick=()=>presence(true,true);busy.onclick=()=>presence(true,false);refresh.onclick=()=>load();async function load(){if(!token)return;try{let off=await api("courier_offers",{}),ord=await api("courier_orders",{});offers.innerHTML=off.map(o=>`<div class="item"><strong>Pedido #${o.order_id}</strong><p class="muted">${o.distancia_km} km | ETA ${o.tiempo_aproximado_min} min</p><div class="actions"><button class="btn" data-accept="${o.id}">Aceptar</button><button class="btn secondary" data-reject="${o.id}">Rechazar</button></div></div>`).join("")||"<div class='item'>Sin ofertas.</div>";orders.innerHTML=ord.map(o=>{currentOrder=o.id;return `<div class="item"><strong>${esc(o.codigo_pedido)} | ${esc(o.estado)}</strong><p>${esc(o.restaurant_nombre)} -> ${esc(o.cliente_direccion)}</p><p class="muted">Código que debe dar el cliente: ${esc(o.codigo_entrega)}</p><div class="actions"><button class="btn secondary" data-state="recogido" data-id="${o.id}">Recogido</button><button class="btn secondary" data-state="en_camino" data-id="${o.id}">En camino</button><button class="btn" data-deliver="${o.id}">Entregado</button></div></div>`}).join("")||"<div class='item'>Sin pedidos activos.</div>"}catch(err){show(err.message)}}document.addEventListener("click",async e=>{let b=e.target.closest("button");if(!b)return;try{if(b.dataset.accept){await api("respond_offer",{offer_id:Number(b.dataset.accept),accept:true});load()}if(b.dataset.reject){await api("respond_offer",{offer_id:Number(b.dataset.reject),accept:false});load()}if(b.dataset.state){await api("order_state",{order_id:Number(b.dataset.id),state:b.dataset.state});load()}if(b.dataset.deliver){let code=prompt("Código de entrega del cliente");await api("order_state",{order_id:Number(b.dataset.deliver),state:"entregado",codigo_entrega:code||""});load()}}catch(err){show(err.message)}});function geo(){if(!navigator.geolocation)return;setInterval(()=>navigator.geolocation.getCurrentPosition(p=>api("courier_location",{order_id:currentOrder,latitud:p.coords.latitude,longitud:p.coords.longitude,precision_metros:p.coords.accuracy}).catch(()=>{})),8000)}if(token){login.hidden=true;app.hidden=false;load();geo()}})();</script></body></html>
